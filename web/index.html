<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0a0a0b" media="(prefers-color-scheme: dark)" />
  <title>SAPTest Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230a0a0b'/><text x='32' y='42' font-family='-apple-system,system-ui' font-size='32' font-weight='600' fill='white' text-anchor='middle'>S</text></svg>" />
  <script>
    // Theme bootstrap — read saved preference before paint to avoid flash.
    (function () {
      try {
        var saved = localStorage.getItem('saptest.theme');
        if (saved === 'dark' || saved === 'light') {
          document.documentElement.setAttribute('data-theme', saved);
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <template id="tpl-login">
    <div class="login-screen">
      <div class="login-stripe" aria-hidden="true"></div>
      <div class="topbar-right floating-tools">
        <button class="lang-toggle" data-action="theme-toggle" type="button" aria-label="Toggle theme"></button>
        <button class="lang-toggle" data-action="lang-toggle" type="button" data-bind="lang-label"></button>
      </div>
      <div class="login-card">
        <div class="login-brand">
          <div class="logo-mark">S</div>
          <div>
            <div class="brand-title">SAPTest Console</div>
            <div class="brand-sub" data-i18n="login.tagline"></div>
          </div>
        </div>
        <form class="login-form" data-action="login">
          <label class="field">
            <span data-i18n="login.username"></span>
            <input name="username" autocomplete="username" required autofocus />
          </label>
          <label class="field">
            <span data-i18n="login.password"></span>
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <div class="login-error" data-bind="error"></div>
          <button class="btn primary block" type="submit">
            <span data-bind="submit-text" data-i18n="login.submit"></span>
          </button>
        </form>
        <div class="login-foot" data-i18n="login.foot"></div>
      </div>
    </div>
  </template>

  <template id="tpl-shell">
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="logo-mark sm">S</div>
          <div class="brand-text">
            <div class="brand-title">SAPTest</div>
            <div class="brand-sub">Console</div>
          </div>
        </div>
        <nav class="nav" data-bind="nav"></nav>
        <div class="sidebar-foot">
          <div class="user-card" data-bind="user-card"></div>
          <button class="btn ghost block" data-action="logout" data-i18n="shell.logout"></button>
        </div>
      </aside>
      <main class="main">
        <header class="topbar">
          <div class="crumbs" data-bind="crumbs"></div>
          <div class="topbar-right">
            <span class="env-pill" data-bind="env-pill"></span>
            <a class="lang-toggle docs-link" href="/docs/ui-refactor.html" target="_blank" rel="noopener" title="UI 重构说明">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
              <span data-i18n="shell.docs"></span>
            </a>
            <button class="lang-toggle" data-action="theme-toggle" type="button" aria-label="Toggle theme"></button>
            <button class="lang-toggle" data-action="lang-toggle" type="button" data-bind="lang-label"></button>
          </div>
        </header>
        <section class="view" data-bind="view"></section>
      </main>
    </div>
    <div class="toast-stack" data-bind="toasts"></div>
  </template>

  <script>
    // Theme toggle — wires any [data-action=theme-toggle] button as a light/dark
    // switcher. Kept here (not in app.js) to leave the app file untouched.
    (function () {
      const KEY = 'saptest.theme';
      const SUN = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>';
      const MOON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      function current() {
        const explicit = document.documentElement.getAttribute('data-theme');
        if (explicit === 'dark' || explicit === 'light') return explicit;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      function paint(btn) { btn.innerHTML = current() === 'dark' ? SUN : MOON; }
      function set(next) {
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem(KEY, next); } catch (e) {}
        document.querySelectorAll('[data-action=theme-toggle]').forEach(paint);
      }
      document.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action=theme-toggle]');
        if (!btn) return;
        e.preventDefault();
        set(current() === 'dark' ? 'light' : 'dark');
      });
      // Repaint on DOM updates (login → shell, language switch, etc.)
      const mo = new MutationObserver(() => {
        document.querySelectorAll('[data-action=theme-toggle]').forEach(btn => {
          if (!btn.innerHTML) paint(btn);
        });
      });
      mo.observe(document.body, { childList: true, subtree: true });
    })();
  </script>
  <script type="module" src="/app.js"></script>
</body>
</html>
