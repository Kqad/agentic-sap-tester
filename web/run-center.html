            el('div', { class: 'metric' }, el('b', {}, state.active.length), el('span', {}, 'live channels')),
          ),
        ),
      );
    }

    function renderProjectRuns(panel) {
      const rows = state.batches.filter((b) => (b.caseIds || []).some((id) => SUCCESS_CASE_IDS.includes(id)));
      panel.replaceChildren(el('div', { class: 'section-card' },
        el('div', { class: 'section-title' }, 'Project Run History'),
        el('div', { class: 'section-content run-table' },
          ...(rows.length ? rows.map((b) => el('div', { class: 'run-row' },
            el('div', {}, el('strong', {}, b.name), el('span', {}, `${new Date(b.createdAt).toLocaleString()} · ${b.caseIds.length} cases`)),
            el('span', { class: `status ${b.status}` }, statusLabel(b.status)),
            el('button', { class: 'btn', onclick: () => { state.tab = 'live'; state.section = 'summary'; renderAll(); } }, 'Open'),
          )) : [el('div', { class: 'empty' }, 'No project runs yet.')]),
        ),
      ));
    }

    function renderCaseDetailCard() {
      const detail = state.details.get(state.selectedCaseId);
      if (!detail) {
        return el('div', { class: 'empty' }, 'Select a case');
      }
      const parsed = detail.parsed || detail;
      const fields = extractParams(detail);
      const oldParams = parsed.params && typeof parsed.params === 'object' && !Array.isArray(parsed.params) ? parsed.params : {};
      const inputMap = new Map();
      const paramNodes = fields.map((f) => {
        const input = el('input', { type: 'text', value: f.currentValue });
        inputMap.set(f.order, { input, defaultValue: f.defaultValue });
        return el('div', { class: 'param-field' },
          el('label', { title: f.locator }, `#${f.order} · ${f.locator}`),
          input,
        );
      });
      const saveBtn = el('button', {
        class: 'btn primary',
        onclick: async () => {
          const next = JSON.parse(JSON.stringify(parsed));
          const nextParams = {};
          for (const [order, { input, defaultValue }] of inputMap) {
            if (input.value !== '' && input.value !== defaultValue) nextParams[order] = input.value;
          }
          if (Object.keys(nextParams).length) next.params = nextParams;
          else delete next.params;
          next.naturalLanguage = syncNaturalLanguage(parsed.naturalLanguage || '', oldParams, nextParams, fields);
          try {
            await api('/api/cases/' + encodeURIComponent(detail.id), { method: 'PUT', body: JSON.stringify(next) });
            state.details.delete(detail.id);
            await loadDetail(detail.id);
            toast('参数已保存，自然语言已同步更新');
            renderAll();
          } catch (err) {
            toast(err.message);
          }
        },
      }, 'Save Parameters');

      return el('div', { class: 'detail-main' },
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' },
            el('span', {}, detail.id, ' · ', parsed.title || 'SAP Case'),
            el('span', { class: 'readonly-note' }, 'Step hidden'),
          ),
          el('div', { class: 'section-content' },
            el('div', { class: 'hint' }, parsed.description || 'SAP automation case'),
          ),
        ),
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'Natural Language', el('span', { class: 'readonly-note' }, 'read only')),
          el('div', { class: 'section-content' }, el('pre', { class: 'nl-box' }, parsed.naturalLanguage || 'No natural language description.')),
        ),
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'Parameters', saveBtn),
          el('div', { class: 'section-content' },
            fields.length
              ? el('div', { class: 'param-grid' }, ...paramNodes)
              : el('div', { class: 'empty' }, '这个 case 暂未识别到 aiInput 参数。'),
          ),
        ),
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'Advanced Debug'),
          el('div', { class: 'section-content top-actions' },
            el('button', { class: 'btn', onclick: () => window.open('/#/cases/' + encodeURIComponent(detail.id), '_blank') }, '打开开发者调试页'),
            el('button', { class: 'btn', onclick: () => window.open('/#/cases/' + encodeURIComponent(detail.id) + '/history', '_blank') }, '查看历史报告'),
          ),
        ),
      );
    }

    function renderLiveSection() {
      const titles = {
        summary: ['Batch Summary', '当前 batch 的整体进度'],
        'live-channels': ['Live Channels', '只显示当前正在 run 的 case'],
        'case-results': ['Case Results', '当前 batch 的 case 结果'],
        logs: ['Run History', '所有历史 run 记录，点 ▸ 展开看 logTail'],
      };
      const [title, sub] = titles[state.section] || titles['live-channels'];
      $('#mainTitle').textContent = title;
      $('#mainSub').textContent = sub;
      const panel = $('#mainPanel');
      if (state.section === 'summary') return renderBatchSummary(panel);
      if (state.section === 'case-results') return renderBatchResults(panel);
      if (state.section === 'logs') return renderBatchLogs(panel);
      // live-channels: only currently-running cases
      const cases = currentBatchCases().filter((c) => state.active.some((a) => a.caseId === c.id));
      const rows = cases.map((c) => {
        const active = state.active.find((a) => a.caseId === c.id);
        return el('div', { class: 'run-row' },
          el('div', {},
            el('strong', {}, c.id, ' · ', caseTitle(c)),
            el('span', {}, active?.currentStep
              ? `Step ${active.currentStep.order}/${active.totalSteps} · ${active.currentStep.title || active.currentStep.api || ''}`
              : 'Running…'),
          ),
          el('span', { class: 'status running' }, 'Live'),
          el('button', { class: 'btn live', onclick: () => openLive(c.id) }, 'Watch'),
        );
      });
      panel.replaceChildren(
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, title),
          rows.length
            ? el('div', { class: 'section-content run-table' }, ...rows)
            : el('div', { class: 'empty' }, '当前没有正在直播的 case。等 batch 起来或切到 Case Results 看历史。'),
        ),
      );
    }

    function renderBatchSummary(panel) {
      const cases = currentBatchCases();
      const liveCount = cases.filter((c) => state.active.some((a) => a.caseId === c.id)).length;
      const passed = cases.filter((c) => statusOf(c.id) === 'passed').length;
      const failed = cases.filter((c) => statusOf(c.id) === 'failed').length;
      const pending = cases.length - liveCount - passed - failed;
      const latestBatch = state.batches[0];
      panel.replaceChildren(
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'Batch Summary'),
          el('div', { class: 'section-content metric-grid' },
            el('div', { class: 'metric' }, el('b', {}, cases.length), el('span', {}, 'cases in batch')),
            el('div', { class: 'metric' }, el('b', {}, liveCount), el('span', {}, 'currently live')),
            el('div', { class: 'metric' }, el('b', {}, passed), el('span', {}, 'passed')),
            el('div', { class: 'metric' }, el('b', {}, failed), el('span', {}, 'failed')),
          ),
        ),
        latestBatch ? el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'Current Batch'),
          el('div', { class: 'section-content' },
            el('div', {}, el('strong', {}, latestBatch.name || latestBatch.id)),
            el('div', { class: 'hint' }, `${new Date(latestBatch.createdAt).toLocaleString()} · ${latestBatch.caseIds?.length || 0} cases · status ${latestBatch.status || 'pending'} · ${pending} pending`),
          ),
        ) : null,
      );
    }

    function renderBatchResults(panel) {
      const cases = currentBatchCases();
      const rows = cases.map((c) => {
        const recent = state.recent.find((r) => r.caseId === c.id);
        const s = statusOf(c.id);
        return el('div', { class: 'run-row' },
          el('div', {},
            el('strong', {}, c.id, ' · ', caseTitle(c)),
            el('span', {}, recent?.finishedAt ? new Date(recent.finishedAt).toLocaleString() : 'No prior result in cache'),
          ),
          el('span', { class: `status ${s}` }, statusLabel(s)),
          recent?.report?.url
            ? el('button', { class: 'btn', onclick: () => window.open(recent.report.url, '_blank') }, 'Report')
            : el('button', { class: 'btn', onclick: () => openLive(c.id) }, 'Open'),
        );
      });
      panel.replaceChildren(
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'Case Results'),
          cases.length
            ? el('div', { class: 'section-content run-table' }, ...rows)
            : el('div', { class: 'empty' }, '当前 batch 暂无 case。'),
        ),
      );
    }

    // Recent Runs with expandable log. Click "▸ View log" → fetches the
    // full run record from /api/results/runs/:runId, shows logTail and
    // events inline. Cached in state.runDetails so re-expanding is instant.
    // Reusable: build the history rows (each with click-to-expand log).
    // Used by both Live Channels > Run History (limit ~40) AND Run Center
    // home Recent Runs section (limit ~8) so the inline-log UX is identical.
    function buildRunHistoryRows(limit) {
      const recent = state.recent.slice(0, limit || 40);
      const expanded = state.runLogExpanded = state.runLogExpanded || new Set();
      return recent.map((r) => {
        const open = expanded.has(r.runId);
        const detail = state.runDetails?.get?.(r.runId);
        const finished = r.finishedAt ? new Date(r.finishedAt) : (r.startedAt ? new Date(r.startedAt) : null);
        const duration = (r.durationMs != null) ? `${Math.round(r.durationMs / 100) / 10}s` : (r.status === 'running' ? 'running…' : '?');

        const head = el('div', {
          class: 'run-row history-row',
          onclick: async () => {
            if (expanded.has(r.runId)) { expanded.delete(r.runId); renderAll(); return; }
            expanded.add(r.runId);
            renderAll();
            if (!r.runId) return;
            state.runDetails = state.runDetails || new Map();
            if (!state.runDetails.has(r.runId)) {
              try {
                const data = await api('/api/results/runs/' + encodeURIComponent(r.runId));
                state.runDetails.set(r.runId, data);
              } catch (err) { state.runDetails.set(r.runId, { _error: err?.message || String(err) }); }
              renderAll();
            }
          },
        },
          el('span', { class: 'expand-btn' + (open ? ' expanded' : '') }, open ? '▾' : '▸'),
          el('div', {},
            el('strong', {}, r.caseId || 'case', r.caseTitle ? ` · ${r.caseTitle}` : ''),
            el('span', {}, [
              finished ? finished.toLocaleString() : 'no timestamp',
              duration,
              r.errorMessage,
            ].filter(Boolean).join(' · ')),
          ),
          el('span', { class: `status ${r.status || 'pending'}` }, statusLabel(r.status || 'pending')),
          r.report?.url
            ? el('button', { class: 'btn mini', onclick: (ev) => { ev.stopPropagation(); window.open(r.report.url, '_blank'); } }, 'Report')
            : el('span', { class: 'hint' }, '—'),
        );

        if (!open) return el('div', { class: 'history-card' }, head);

        let logNode;
        if (!detail) {
          logNode = el('div', { class: 'live-log empty' }, 'Loading…');
        } else if (detail._error) {
          logNode = el('div', { class: 'live-log empty' }, `加载失败: ${detail._error}`);
        } else {
          const lines = detail.logTail || [];
          logNode = lines.length
            ? el('div', { class: 'live-log' }, ...lines.map((entry) => el('div', { class: 'live-log-line' },
                el('span', { class: 'live-log-ts' }, entry.ts ? new Date(entry.ts).toLocaleTimeString() : ''),
                el('span', { class: 'live-log-msg' }, entry.line || entry.message || JSON.stringify(entry)),
              )))
            : el('div', { class: 'live-log empty' }, '这个 run 没有保存 log（可能是早期版本，或被截断）');
        }

        return el('div', { class: 'history-card expanded' }, head,
          el('div', { class: 'history-body' },
            el('div', { class: 'live-log-head' }, el('span', {}, 'Log tail'), el('span', { class: 'hint' }, `runId: ${r.runId || '?'}`)),
            logNode,
          ),
        );
      });
    }

    // Recent Batches card shown on Run Center home — groups individual
    // case runs by the batch they belonged to (so a batch of 2 cases shows
    // as ONE entry with both cases nested inside). Same mental model as
    // My Projects below, but only the 4 most recently-run batches.
    function renderRecentRunsOnHome() {
      const expanded = state.recentBatchExpanded = state.recentBatchExpanded || new Set();
      // Only batches that have actually been run (status set + not pending).
      // Sort by updatedAt or createdAt desc and keep 4.
      const sorted = state.batches.slice().sort((a, b) => {
        const ta = new Date(a.updatedAt || a.createdAt || 0).getTime();
        const tb = new Date(b.updatedAt || b.createdAt || 0).getTime();
        return tb - ta;
      });
      const recentBatches = sorted.filter((b) => b.status && b.status !== 'pending').slice(0, 4);
      const totalRun = sorted.filter((b) => b.status && b.status !== 'pending').length;

      // Auto-expand the very latest batch so the user sees results without
      // an extra click — if they collapse it, respect that choice.
      if (recentBatches[0] && !expanded.has('seen-' + recentBatches[0].id)) {
        expanded.add(recentBatches[0].id);
        expanded.add('seen-' + recentBatches[0].id);
      }

      const cards = recentBatches.map((b) => {
        const isOpen = expanded.has(b.id);
        const liveCount = (b.caseIds || []).filter((id) => state.active.some((a) => a.caseId === id)).length;
        const statusKey = liveCount ? 'running' : (b.status || 'pending');
        const when = new Date(b.updatedAt || b.createdAt || Date.now());
        const head = el('div', {
          class: 'project-head',
          onclick: () => { if (isOpen) expanded.delete(b.id); else expanded.add(b.id); renderAll(); },
        },
          el('div', { class: 'pc-icon', style: `background: ${b.status === 'failed' ? 'var(--red)' : (b.status === 'passed' ? '#0e7a64' : 'var(--blue)')};` }, (b.name || '?').trim()[0] || '#'),
          el('div', { style: 'min-width:0;' },
            el('div', { class: 'pj-name' }, b.name || b.id),
            el('div', { class: 'pj-meta' }, `${b.caseIds?.length || 0} cases · ×${b.runsPerCase || 1}/case · ${when.toLocaleString()}${liveCount ? ` · ${liveCount} live` : ''} · ${b.passed || 0} passed · ${b.failed || 0} failed`),
          ),
          el('span', { class: `status ${statusKey}` }, liveCount ? 'Live' : statusLabel(statusKey)),
          el('button', {
            class: 'expand-btn' + (isOpen ? ' expanded' : ''),
            onclick: (ev) => { ev.stopPropagation(); if (isOpen) expanded.delete(b.id); else expanded.add(b.id); renderAll(); },
          }, isOpen ? '▾' : '▸'),
        );
        if (!isOpen) return el('div', { class: 'project-card' }, head);
        const cases = (b.caseIds || []).map((id) => state.cases.find((c) => c.id === id)).filter(Boolean);
        return el('div', { class: 'project-card expanded' }, head,
          el('div', { class: 'project-body' },
            el('div', { class: 'pj-cases' },
              ...cases.map((cs) => caseRowInProject(cs, b)),  // ← b passes the project for override editor
              cases.length === 0 ? el('div', { class: 'hint' }, '这个 batch 里的 case 已删除或重命名。') : null,
            ),
            el('div', { class: 'bc-actions' },
              el('button', { class: 'btn mini primary', onclick: (ev) => { ev.stopPropagation(); openRunModal(b.caseIds || [], { name: b.name, runsPerCase: b.runsPerCase || 1, batchId: b.id }); } }, '▶ Run again'),
              el('button', { class: 'btn mini', onclick: (ev) => { ev.stopPropagation(); loadBatchIntoConsole(b); } }, 'Edit'),
            ),
          ),
        );
      });

      return el('div', { class: 'section-card', id: 'recentRunsHome' },
        el('div', { class: 'section-title' },
          el('span', {}, `Recent Batches · ${recentBatches.length} of ${totalRun}`),
          el('div', { style: 'display:flex; gap:6px;' },
            el('button', { class: 'btn mini', onclick: () => { refreshRuntime().then(renderAll); } }, 'Refresh'),
            totalRun > 4 ? el('button', { class: 'btn mini', onclick: () => { state.tab = 'live'; state.section = 'logs'; renderAll(); } }, 'See all run history') : null,
          ),
        ),
        recentBatches.length
          ? el('div', { style: 'padding: 12px; display: grid; gap: 8px;' }, ...cards)
          : el('div', { class: 'empty' }, '还没有跑过 batch。在上面 Run Console 选 case 跑一批，跑完这里就会出现。'),
      );
    }

    function renderBatchLogs(panel) {
      const rows = buildRunHistoryRows(40);
      panel.replaceChildren(
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' },
            el('span', {}, `Run History · ${rows.length} runs`),
            el('button', { class: 'btn mini', onclick: () => { refreshRuntime().then(renderAll); } }, 'Refresh'),
          ),
          rows.length
            ? el('div', { class: 'section-content', style: 'display: grid; gap: 8px;' }, ...rows)
            : el('div', { class: 'empty' }, '还没有任何 run 记录。'),
        ),
      );
    }

    function renderLive() {
      const panel = $('#livePanel');
      const batchCases = currentBatchCases();
      // Only currently-running cases — `state.active` is the source of truth.
      const liveCases = batchCases.filter((c) => state.active.some((a) => a.caseId === c.id));
      const active = state.active.filter((a) => liveCases.some((c) => c.id === a.caseId));
      if (!state.liveCaseId || !liveCases.some((c) => c.id === state.liveCaseId)) {
        state.liveCaseId = active[0]?.caseId || null;
      }
      const preview = active.find((a) => a.caseId === state.liveCaseId) || active[0] || null;
      const previewCase = liveCases.find((c) => c.id === (preview?.caseId || state.liveCaseId));

      // ── Broadcast switcher (only meaningful when ≥1 active) ──────────
      // Tab-style chips at the top of the live panel for flipping between
      // multiple concurrent runs' broadcasts.
      const switcher = liveCases.length
        ? el('div', { class: 'live-switcher' },
            ...liveCases.map((c) => {
              const a = state.active.find((x) => x.caseId === c.id);
              const stepStr = a?.currentStep ? `step ${a.currentStep.order}/${a.totalSteps}` : 'live';
              return el('button', {
                class: 'live-chip' + (state.liveCaseId === c.id ? ' active' : ''),
                title: `${c.id} · ${stepStr}`,
                onclick: () => { state.liveCaseId = c.id; renderLive(); },
              }, el('span', { class: 'live-dot' }), c.id, el('span', { class: 'live-chip-step' }, ' · ', stepStr));
            }),
            liveCases.length > 1 ? el('span', { class: 'live-switcher-hint' }, `${liveCases.length} live · 点切换`) : null,
          )
        : null;

      const screen = el('div', { class: 'live-screen', id: 'liveScreen' },
        el('img', { id: 'liveShot', alt: 'Live browser screenshot', src: FALLBACK_SCREENSHOT, onerror: (ev) => ev.target.remove() }),
        el('div', { class: 'live-frame' },
          el('b', {}, preview ? (preview.caseTitle || preview.caseId) : (previewCase ? caseTitle(previewCase) : 'No active live channel')),
          el('div', {}, preview?.currentStep
            ? `Step ${preview.currentStep.order}/${preview.totalSteps} · ${preview.currentStep.title || preview.currentStep.api || ''}`
            : 'Waiting for live run'),
        ),
      );

      // ── Live log tail ────────────────────────────────────────────────
      // /api/midscene-js/runs/active returns logTail per run (last 30 lines).
      // Show the current preview's tail, auto-scrolled to bottom.
      const logLines = preview?.logTail || [];
      const logBox = logLines.length
        ? el('div', { class: 'live-log', id: 'liveLogBox' },
            ...logLines.map((entry) => el('div', { class: 'live-log-line' },
              el('span', { class: 'live-log-ts' }, new Date(entry.ts).toLocaleTimeString()),
              el('span', { class: 'live-log-msg' }, entry.line),
            )),
          )
        : el('div', { class: 'live-log empty' }, preview ? '等待第一条 log…' : '启动 case 后这里实时输出 runner log（最新 30 条）');

      // ── Action row ───────────────────────────────────────────────────
      const actions = preview ? el('div', { class: 'live-actions' },
        el('button', { class: 'btn live', onclick: () => openLive(preview.caseId) }, 'Open full Cinema'),
        el('button', { class: 'btn danger', onclick: () => abortRuns([preview.caseId]) }, '⏹ Abort this run'),
      ) : null;

      panel.replaceChildren(
        switcher,
        screen,
        actions,
        el('div', { class: 'live-log-head' }, el('span', {}, 'Live log'), preview ? el('span', { class: 'hint' }, `run: ${preview.runId?.slice(0, 8) || '?'}…`) : null),
        logBox,
        liveCases.length === 0 ? el('div', { class: 'empty', style: 'margin-top:8px;' }, '当前没有正在直播的 case。启动 batch 后这里会出现。') : null,
      );
      hydrateLiveShot(preview);
      // Pin the log to the latest line — like a terminal tail -f.
      const box = document.getElementById('liveLogBox');
      if (box) box.scrollTop = box.scrollHeight;
    }

    async function hydrateLiveShot(preview) {
      const img = $('#liveShot');
      const screen = $('#liveScreen');
      if (!img || !screen) return;
      let src = FALLBACK_SCREENSHOT;
      if (preview?.runId) {
        try {
          const shots = await api('/api/midscene-js/runs/' + encodeURIComponent(preview.runId) + '/screenshots');
          const latest = (shots.screenshots || []).slice().sort((a, b) => b.order - a.order)[0];
          if (latest?.url) src = latest.url + '?t=' + Date.now();
        } catch {}
      }
      img.src = src;
      screen.classList.add('has-image');
    }

    async function runCases(ids, opts = {}) {
      const caseIds = ids.filter((id) => state.cases.some((c) => c.id === id));
      if (!caseIds.length) return toast('请选择至少一个 case');
      const runsPerCase = Math.max(1, Number(opts.runsPerCase) || 1);
      const name = opts.name || `Cached Run · ${caseIds.length} cases`;
      // Try to reuse an existing batch entry (when triggered from saved batch
      // or from edit-then-run). Otherwise create a new one at the top.
      let batch = opts.batchId ? state.batches.find((b) => b.id === opts.batchId) : null;
      if (batch) {
        batch.status = 'running';
        batch.passed = 0;
        batch.failed = 0;
        batch.caseIds = caseIds;
        batch.runsPerCase = runsPerCase;
        batch.name = name;
        batch.updatedAt = new Date().toISOString();
      } else {
        batch = {
          id: 'batch-' + Date.now(),
          name,
          createdAt: new Date().toISOString(),
          caseIds,
          runsPerCase,
          status: 'running',
          passed: 0,
          failed: 0,
        };
        state.batches.unshift(batch);
      }
      state.currentBatchIds = [...caseIds];
      state.liveCaseId = caseIds[0] || state.liveCaseId;
      // Initialize live progress tracking for this batch — drives the
      // "Finished in this batch" panel + confetti on each case completion.
      state.batchProgress = {
        batchId: batch.id,
        totalIds: new Set(caseIds),
        seenFinishedIds: new Set(),
        startedAt: Date.now(),
      };
      saveBatches();
      renderAll();
      const totalExec = caseIds.length * runsPerCase;
      toast(`已启动 "${name}" · ${caseIds.length} 个 case × ${runsPerCase} 次 = ${totalExec} 次执行`);

      // Each (case, attempt) is one fetch. We fire them all in parallel so
      // attempt N+1 doesn't have to wait for attempt N — Midscene serializes
      // on its own active-run queue if needed.
      const jobs = [];
      for (const id of caseIds) {
        for (let attempt = 1; attempt <= runsPerCase; attempt += 1) {
          jobs.push({ id, attempt });
        }
      }
      let done = 0;
      await Promise.all(jobs.map(async ({ id }) => {
        try {
          // Project-level param overrides flow through to the runner as the
          // `params` field in the run body. Library case file is untouched —
          // runner.js merges these on top of apiGuide aiInput defaults via
          // ctx.params (already supported).
          const overrides = batch?.caseOverrides?.[id]?.params || null;
          const body = { headed: true };
          if (overrides && Object.keys(overrides).length) body.params = overrides;
          const res = await api('/api/midscene-js/cases/' + encodeURIComponent(id) + '/run?cache=read', {
            method: 'POST',
            body: JSON.stringify(body),
          });
          if (res?.run?.status === 'passed') batch.passed += 1;
          else batch.failed += 1;
        } catch {
          batch.failed += 1;
        } finally {
          done += 1;
          if (done >= jobs.length) {
            batch.status = batch.failed ? 'failed' : 'passed';
          }
          saveBatches();
          await refreshRuntime();
          renderAll();
        }
      }));
      // Batch fully done — surface a toast that scrolls to Recent Runs.
      // We do this here (after Promise.all) so it fires exactly once per
      // batch, not per-case. The scroll target lives on Run Center home,
      // so make sure user is there first.
      const summary = `${batch.passed} passed · ${batch.failed} failed`;
      toast(`Batch "${batch.name}" 跑完了 — ${summary}`);
      // Hold onto batchProgress for a few seconds so the Finished panel
      // stays visible after the last case completes, then clear it so the
      // next batch starts clean.
      setTimeout(() => { state.batchProgress = null; renderAll(); }, 4000);
      // Auto-jump after a short delay so toast is visible first.
      setTimeout(() => {
        if (state.tab !== 'run' || state.section !== 'run-center') {
          state.tab = 'run';
          state.section = 'run-center';
          if (state.console) state.console.forceComposeMode = false;
          renderAll();
        }
        const el = document.getElementById('recentRunsHome');
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 400);
    }

    // Confirm-before-run modal. Always pops up before runCases fires —
    // user names the project (so the batch shows up in My Projects with a
    // meaningful label) and reviews the case list before kickoff.
    //   ids        — caseIds to run
    //   defaults   — { name?, runsPerCase?, batchId? } pre-fill values
    //   onConfirm  — (finalName, finalRunsPerCase) called after Run click
    function openRunModal(ids, defaults = {}) {
      if (!ids.length) return toast('请先选 case');
      const cases = ids.map((id) => state.cases.find((c) => c.id === id)).filter(Boolean);
      const suggested = defaults.name || suggestBatchName(ids) || `Run · ${ids.length} cases`;
      const initRuns = Math.max(1, Number(defaults.runsPerCase) || 1);
      let chosenRuns = initRuns;

      const backdrop = el('div', { class: 'modal-backdrop', onclick: (ev) => {
        if (ev.target === backdrop) close();
      } });
      function close() { backdrop.remove(); document.removeEventListener('keydown', onKey); }
      function onKey(ev) {
        if (ev.key === 'Escape') close();
        if (ev.key === 'Enter' && ev.target.tagName !== 'TEXTAREA') confirmRun();
      }
      document.addEventListener('keydown', onKey);

      const nameInput = el('input', { type: 'text', value: suggested, placeholder: 'e.g. Asset Suite · daily smoke' });
      setTimeout(() => { nameInput.focus(); nameInput.select(); }, 30);

      const runCountRow = el('div', { class: 'run-count' },
        ...[1, 2, 3, 5].map((n) => {
          const btn = el('button', {
            class: chosenRuns === n ? 'active' : '',
            onclick: () => {
              chosenRuns = n;
              runCountRow.querySelectorAll('button').forEach((b) => b.classList.toggle('active', Number(b.textContent.replace('×', '')) === n));
              totalLabel.textContent = `${ids.length} × ${chosenRuns} = ${ids.length * chosenRuns} executions`;
            },
          }, `×${n}`);
          return btn;
        }),
      );
      const totalLabel = el('div', { class: 'hint', style: 'margin-top:6px;' }, `${ids.length} × ${chosenRuns} = ${ids.length * chosenRuns} executions`);

      function confirmRun() {
        const name = (nameInput.value || suggested).trim() || `Run · ${ids.length} cases`;
        close();
        if (defaults.onConfirm) defaults.onConfirm(name, chosenRuns);
        else runCases(ids, { name, runsPerCase: chosenRuns, batchId: defaults.batchId });
      }

      const modal = el('div', { class: 'modal' },
        el('div', { class: 'modal-head' },
          el('div', {},
            el('div', { class: 'title' }, defaults.title || 'Confirm Run'),
            el('div', { class: 'sub' }, defaults.sub || '取个名字，确认后才会真的开始跑'),
          ),
          el('button', { class: 'btn ghost', onclick: close }, '✕'),
        ),
        el('div', { class: 'modal-body' },
          el('label', { class: 'field' },
            el('span', {}, 'Project name'),
            nameInput,
          ),
          el('label', { class: 'field' },
            el('span', {}, 'Run × per case'),
            runCountRow,
            totalLabel,
          ),
          el('label', { class: 'field' },
            el('span', {}, `Cases (${ids.length})`),
            el('div', { class: 'modal-cases' },
              ...cases.map((cs) => el('div', { class: 'item' }, `${cs.id} · ${caseTitle(cs)}`)),
            ),
          ),
        ),
        el('div', { class: 'modal-foot' },
          el('button', { class: 'btn', onclick: close }, 'Cancel'),
          el('button', { class: 'run-cta', onclick: confirmRun }, '▶ Start running'),
        ),
      );
      backdrop.appendChild(modal);
      document.body.appendChild(backdrop);
    }

    // Rename modal — single-field, used by My Projects card "Rename" button.
    function openRenameModal(currentName, onSave) {
      const backdrop = el('div', { class: 'modal-backdrop', onclick: (ev) => { if (ev.target === backdrop) close(); } });
      function close() { backdrop.remove(); document.removeEventListener('keydown', onKey); }
      function onKey(ev) { if (ev.key === 'Escape') close(); if (ev.key === 'Enter') save(); }
      document.addEventListener('keydown', onKey);
      const input = el('input', { type: 'text', value: currentName, placeholder: 'Project name' });
      setTimeout(() => { input.focus(); input.select(); }, 30);
      function save() {
        const v = input.value.trim();
        if (!v) return toast('名字不能为空');
        close();
        onSave(v);
      }
      const modal = el('div', { class: 'modal' },
        el('div', { class: 'modal-head' }, el('div', {}, el('div', { class: 'title' }, 'Rename project'))),
        el('div', { class: 'modal-body' }, el('label', { class: 'field' }, el('span', {}, 'Name'), input)),
        el('div', { class: 'modal-foot' },
          el('button', { class: 'btn', onclick: close }, 'Cancel'),
          el('button', { class: 'btn primary', onclick: save }, 'Save'),
        ),
      );
      backdrop.appendChild(modal);
      document.body.appendChild(backdrop);
    }

    // ── Create Project modal ─────────────────────────────────────────
    // Two-layer workflow per meeting brief:
    //   1. Pick a Business (e.g. Logistics / Warehouse) — this propagates
    //      back as a "business tag" on every case the project includes.
    //   2. Pick cases two ways (page toggle):
    //      • By Primary Category — bulk add all cases of a category
    //        ("add all 3 AP Report cases").
    //      • Individual — tick checkboxes against the full library.
    //   The case in the library stays untouched; per-case parameter
    //   overrides live on the project (see caseOverrides).
    function openCreateProjectModal(opts = {}) {
      const backdrop = el('div', { class: 'modal-backdrop', onclick: (ev) => { if (ev.target === backdrop) close(); } });
      function close() { backdrop.remove(); document.removeEventListener('keydown', onKey); }
      function onKey(ev) { if (ev.key === 'Escape') close(); }
      document.addEventListener('keydown', onKey);

      const selectedCases = new Set(opts.initialIds || []);
      let pickMode = 'category';   // 'category' | 'individual'
      // Inline editor state: which case ids are expanded for param/NL view,
      // and the in-flight per-case parameter overrides being authored here.
      // Both flushed into the new project on Save.
      const expandedInModal = new Set();
      const pendingOverrides = {};  // { caseId: { '6': 'FBL2N', '8': '8888' } }
      // Which category headers are expanded. Default: only the first
      // category that has matching initial selection auto-opens — the
      // rest stay closed so the picker doesn't fire a wall of rows.
      const openedCats = new Set();

      const nameInput = el('input', { type: 'text', placeholder: 'e.g. WMS UAT smoke', value: opts.initialName || '', class: 'a-input' });
      const businessInput = el('input', { type: 'text', placeholder: 'e.g. Logistics · Warehouse', value: opts.initialBusiness || '', list: 'cp-business-list', class: 'a-input' });
      const businessDatalist = el('datalist', { id: 'cp-business-list' },
        ...getAllBusinesses().map((b) => el('option', { value: b })),
      );

      const pickerBody = el('div', { class: 'cp-picker-body' });
      const summaryRow = el('div', { class: 'cp-summary' });
      const saveBtn = el('button', { class: 'a-button a-button--brand-primary', onclick: doSave }, 'Create & run');

      function renderPicker() {
        if (pickMode === 'category') {
          // Category headers are COLLAPSED by default — click a header
          // to reveal the cases inside. Add-all toggles the whole block,
          // showing a clear "selected" state when active.
          const groups = {};
          for (const c of state.cases) {
            const cat = categorizeCase(c);
            (groups[cat] = groups[cat] || []).push(c);
          }
          const sectionEls = [];
          for (const rule of CATEGORY_RULES) {
            const cs = groups[rule.key];
            if (!cs || !cs.length) continue;
            const inProj = cs.filter((c) => selectedCases.has(c.id)).length;
            const allIn = inProj === cs.length;
            const someIn = inProj > 0 && inProj < cs.length;
            const isOpen = openedCats.has(rule.key);

            // Header row — bigger, clearer, more like a real Bosch card.
            //   • Left:  category tag + count + progress bar
            //   • Right: explicit Add-all toggle button + expand chevron
            // No cryptic indeterminate checkbox — the progress fill +
            // button label tell you exactly what's happening.
            const head = el('div', {
              class: 'cp-cat-head' + (allIn ? ' all-selected' : '') + (someIn ? ' some-selected' : '') + (isOpen ? ' is-open' : ''),
              onclick: (ev) => {
                if (ev.target.closest('.cp-add-all-btn')) return;  // bulk btn has own handler
                if (ev.target.closest('.cp-chev-btn')) return;
                if (isOpen) openedCats.delete(rule.key);
                else openedCats.add(rule.key);
                renderPicker();
              },
            },
              // Big category tag (Bosch flat chip)
              el('span', { class: `cat-tag cat-${rule.key} cp-cat-tag-big` }, rule.label),
              // Counts + progress bar
              el('div', { class: 'cp-cat-progress-wrap' },
                el('div', { class: 'cp-cat-counts' },
                  el('b', {}, `${inProj} / ${cs.length}`),
                  el('span', { style: 'color: var(--muted);' }, ' cases selected'),
                ),
                el('div', { class: 'cp-cat-bar' },
                  el('div', { class: 'cp-cat-bar-fill', style: `width: ${cs.length ? (inProj / cs.length * 100) : 0}%;` }),
                ),
              ),
              // Add-all toggle button — explicit, clear text, never cryptic.
              el('button', {
                class: 'cp-add-all-btn ' + (allIn ? 'a-button a-button--brand-primary' : 'a-button a-button--brand-secondary'),
                onclick: (ev) => {
                  ev.stopPropagation();
                  if (allIn || someIn) cs.forEach((c) => selectedCases.delete(c.id));
                  else cs.forEach((c) => selectedCases.add(c.id));
                  renderPicker(); renderSummary();
                },
              }, allIn ? `✓ All ${cs.length} added` : (someIn ? `+ Add remaining ${cs.length - inProj}` : `+ Add all ${cs.length}`)),
              // Expand chevron as a real button (BDDS keyboard accessible).
              el('button', {
                class: 'cp-chev-btn',
                'aria-label': isOpen ? `Collapse ${rule.label}` : `Expand ${rule.label}`,
                onclick: (ev) => {
                  ev.stopPropagation();
                  if (isOpen) openedCats.delete(rule.key);
                  else openedCats.add(rule.key);
                  renderPicker();
                },
              }, isOpen ? '▾' : '▸'),
            );
            const block = el('div', { class: 'cp-cat-block' + (isOpen ? ' is-open' : '') + (allIn ? ' all-selected' : '') + (someIn ? ' some-selected' : '') }, head);
            if (isOpen) cs.forEach((c) => block.appendChild(buildPickerRow(c, /*showCatTag*/false)));
            sectionEls.push(block);
          }
          pickerBody.replaceChildren(...sectionEls);
        } else {
          // Individual: flat list of every library case with checkboxes.
          pickerBody.replaceChildren(...state.cases.map((c) => buildPickerRow(c, /*showCatTag*/true)));
        }
      }

      // Picker row factory — handles checkbox + label + expand-toggle + inline
      // params/NL editor when expanded. Shared between category mode and
      // individual mode. Auto-checks the case when user starts editing.
      function buildPickerRow(c, showCatTag) {
        const checked = selectedCases.has(c.id);
        const expanded = expandedInModal.has(c.id);
        const cat = categorizeCase(c);
        const meta = categoryMeta(cat);
        const overrideCount = pendingOverrides[c.id] ? Object.keys(pendingOverrides[c.id]).length : 0;

        const checkbox = el('input', { type: 'checkbox', class: 'bdds-cb', checked, onclick: (ev) => ev.stopPropagation(), onchange: (ev) => {
          if (ev.target.checked) selectedCases.add(c.id);
          else { selectedCases.delete(c.id); expandedInModal.delete(c.id); delete pendingOverrides[c.id]; }
          renderPicker(); renderSummary();
        } });

        const head = el('div', { class: 'cp-row-head' },
          checkbox,
          el('div', { style: 'flex:1; min-width:0;' },
            el('div', { class: 'a-text--highlight', style: 'font-size: var(--text-md);' }, c.id, ' · ', caseTitle(c)),
            el('div', { style: 'display: flex; gap: var(--space-2); margin-top: 2px; flex-wrap: wrap; align-items: center;' },
              showCatTag ? el('span', { class: `cat-tag cat-${cat}` }, meta.label) : null,
              ...businessesContainingCase(c.id).map((biz) => el('span', { class: 'biz-badge' }, biz)),
              overrideCount > 0 ? el('span', { class: 'inline-status-pill' }, `● ${overrideCount} overridden`) : null,
            ),
          ),
          el('button', {
            // Brand-secondary outline → high contrast on the white row;
            // becomes brand-primary (filled) once user opens it to edit.
            class: 'cp-params-btn ' + (expanded ? 'a-button a-button--brand-primary -small' : 'a-button a-button--brand-secondary -small'),
            onclick: async (ev) => {
              ev.preventDefault(); ev.stopPropagation();
              if (expandedInModal.has(c.id)) {
                expandedInModal.delete(c.id);
                renderPicker();
                return;
              }
              expandedInModal.add(c.id);
              // Auto-select when user opens to edit — likely they want it in.
              if (!selectedCases.has(c.id)) selectedCases.add(c.id);
              renderPicker(); renderSummary();
              if (!state.details.has(c.id)) {
                await loadDetail(c.id).catch(() => {});
                renderPicker();
              }
            },
          }, expanded ? '▾ Close editor' : '✎ Params & NL'),
        );

        const row = el('label', { class: 'cp-case-row' + (checked ? ' checked' : '') + (expanded ? ' has-editor' : '') }, head);

        if (!expanded) return row;
        row.appendChild(buildInlineEditor(c));
        return row;
      }

      // Inline params + NL editor that lives INSIDE a picker row in the
      // Create Project modal. Mutates pendingOverrides[caseId] as the
      // user types. No save button needed — it's applied on Create project.
      function buildInlineEditor(c) {
        const detail = state.details.get(c.id);
        if (!detail) {
          return el('div', { class: 'cp-row-editor' },
            el('div', { class: 'hint' }, 'Loading case detail…'),
          );
        }
        const fields = extractParams(detail);
        const parsed = detail.parsed || detail;
        const drafts = pendingOverrides[c.id] = pendingOverrides[c.id] || {};

        if (fields.length === 0) {
          return el('div', { class: 'cp-row-editor' },
            el('div', { class: 'hint' }, '这个 case 没有 aiInput 步骤，无可调参数。'),
            el('div', { class: 'a-text--label', style: 'margin-top: var(--space-3);' }, 'Natural Language'),
            el('pre', { class: 'inline-nl-box', style: 'max-height: 12rem;' }, parsed.naturalLanguage || 'No natural language.'),
          );
        }

        // Track input refs for the Reset-all button + footer counter.
        const inputRefs = new Map();
        const inputNodes = fields.map((f) => {
          const currentVal = Object.prototype.hasOwnProperty.call(drafts, f.order) ? drafts[f.order] : f.defaultValue;
          const isModified = currentVal !== f.defaultValue;
          const input = el('input', {
            type: 'text',
            value: currentVal,
            class: isModified ? 'is-modified' : '',
            onclick: (ev) => ev.stopPropagation(),
            oninput: (ev) => {
              if (ev.target.value === f.defaultValue) delete drafts[f.order];
              else drafts[f.order] = ev.target.value;
              ev.target.classList.toggle('is-modified', ev.target.value !== f.defaultValue);
              updateFooter();
              renderSummary();
            },
          });
          inputRefs.set(f.order, { input, defaultValue: f.defaultValue });
          return el('div', { class: 'inline-field' },
            el('div', { class: 'inline-field-label' }, `#${f.order} · ${f.locator}`),
            el('div', { class: 'inline-input-row' },
              input,
              el('button', {
                class: 'cp-reset-btn',
                title: 'Reset to library default',
                'aria-label': 'Reset to library default',
                onclick: (ev) => {
                  ev.preventDefault(); ev.stopPropagation();
                  input.value = f.defaultValue;
                  input.classList.remove('is-modified');
                  delete drafts[f.order];
                  updateFooter();
                  renderSummary();
                },
              }, '↺'),
            ),
            el('div', { class: 'inline-default-pill' }, 'Library default: ', el('code', {}, f.defaultValue || '(empty)')),
          );
        });

        // Footer status + actions
        const footerStatus = el('div', { class: 'cp-editor-status' });
        const updateFooter = () => {
          const n = Object.keys(drafts).length;
          footerStatus.replaceChildren(
            n === 0
              ? el('span', { class: 'cp-editor-pill is-default' }, '✓ Using library defaults · no overrides')
              : el('span', { class: 'cp-editor-pill is-override' }, `● ${n} parameter${n === 1 ? '' : 's'} overridden`),
            el('span', { class: 'cp-editor-hint' }, ' · 改动会随 “Create project” 一起保存。'),
          );
        };
        updateFooter();

        return el('div', { class: 'cp-row-editor' },
          el('div', { class: 'inline-grid' },
            el('div', { class: 'inline-col-params' },
              el('div', { class: 'inline-col-head' },
                el('div', { class: 'a-text--label' }, 'Parameter overrides (this project only)'),
                el('span', { class: 'cp-editor-context' }, 'Library defaults untouched'),
              ),
              el('div', { class: 'inline-fields' }, ...inputNodes),
            ),
            el('div', { class: 'inline-col-nl' },
              el('div', { class: 'inline-col-head' },
                el('div', { class: 'a-text--label' }, 'Natural Language'),
                el('span', { class: 'inline-status-pill is-readonly' }, 'read only'),
              ),
              el('pre', { class: 'inline-nl-box' }, parsed.naturalLanguage || 'No natural language description.'),
            ),
          ),
          // Footer bar — status pill + actions. Save is implicit (changes
          // already live in pendingOverrides), but explicit Done button
          // gives clear closure + Reset-all clears every override for
          // this case in one click.
          el('div', { class: 'cp-editor-foot' },
            footerStatus,
            el('div', { class: 'cp-editor-actions' },
              el('button', {
                class: 'a-button a-button--neutral-secondary -small',
                onclick: (ev) => {
                  ev.preventDefault(); ev.stopPropagation();
                  // Wipe overrides for this case + reset every input
                  delete pendingOverrides[c.id];
                  for (const [order, { input, defaultValue }] of inputRefs) {
                    input.value = defaultValue;
                    input.classList.remove('is-modified');
                  }
                  updateFooter();
                  renderSummary();
                },
              }, '↺ Reset all to library default'),
              el('button', {
                class: 'a-button a-button--brand-primary -small',
                onclick: (ev) => {
                  ev.preventDefault(); ev.stopPropagation();
                  expandedInModal.delete(c.id);
                  renderPicker();
                  const n = Object.keys(drafts).length;
                  toast(n ? `${c.id}: ${n} parameter override${n === 1 ? '' : 's'} ready to save with project` : `${c.id}: 使用 library defaults`);
                },
              }, '✓ Done editing'),
            ),
          ),
        );
      }

      function renderSummary() {
        const count = selectedCases.size;
        summaryRow.replaceChildren(
          el('div', {},
            el('div', { class: 'a-text--highlight', style: 'color: var(--navy);' }, `${count} cases selected`),
            el('div', { style: 'font-size: var(--text-s); color: var(--muted);' }, `Business: ${businessInput.value.trim() || '— none —'}`),
          ),
        );
        saveBtn.disabled = !count || !nameInput.value.trim();
      }
      nameInput.addEventListener('input', renderSummary);
      businessInput.addEventListener('input', renderSummary);

      function doSave() {
        const name = nameInput.value.trim();
        if (!name) return toast('给 project 起个名字');
        const ids = [...selectedCases];
        if (!ids.length) return toast('至少选一个 case');
        const business = businessInput.value.trim();
        const dup = findDuplicateBatch(name, ids, state.console.runsPerCase || 1);
        if (dup) {
          state.batches = [dup, ...state.batches.filter((x) => x.id !== dup.id)];
          dup.updatedAt = new Date().toISOString();
          if (business) dup.business = business;
          saveBatches();
          toast(`已存在同名同 case 的 project，移到顶部："${name}"`);
          close();
          renderAll();
          setTimeout(() => openRunModal(ids, {
            name,
            runsPerCase: state.console.runsPerCase || 1,
            batchId: dup.id,
            title: `Run ${name}`,
            sub: 'Project exists. Confirm to start running now.',
          }), 0);
          return;
        }
        // Bake the in-flight pendingOverrides into the project's caseOverrides
        // map. Skip cases not selected and skip cases with no actual modifications.
        const caseOverrides = {};
        for (const id of ids) {
          const drafts = pendingOverrides[id];
          if (drafts && Object.keys(drafts).length) {
            caseOverrides[id] = { params: { ...drafts } };
          }
        }
        const batch = {
          id: 'batch-' + Date.now(),
          name,
          business,                       // ← which dept owns this project
          createdAt: new Date().toISOString(),
          caseIds: ids,
          runsPerCase: state.console.runsPerCase || 1,
          status: 'pending',
          passed: 0,
          failed: 0,
          caseOverrides,                  // ← per-case param overrides set in modal
        };
        state.batches.unshift(batch);
        saveBatches();
        toast(`Project "${name}" 已创建 · ${ids.length} cases${business ? ` · ${business}` : ''}`);
        close();
        renderAll();
        setTimeout(() => openRunModal(ids, {
          name,
          runsPerCase: batch.runsPerCase || 1,
          batchId: batch.id,
          title: `Run ${name}`,
          sub: 'Project created. Confirm to start running now.',
        }), 0);
      }

      // Mode toggle (segmented control)
      const modeToggle = el('div', { class: 'cp-mode-toggle' },
        el('button', { class: 'cp-mode' + (pickMode === 'category' ? ' active' : ''), onclick: () => { pickMode = 'category'; renderPicker(); modeToggle.querySelectorAll('.cp-mode').forEach((b, i) => b.classList.toggle('active', i === 0)); } }, 'By Primary Category'),
        el('button', { class: 'cp-mode' + (pickMode === 'individual' ? ' active' : ''), onclick: () => { pickMode = 'individual'; renderPicker(); modeToggle.querySelectorAll('.cp-mode').forEach((b, i) => b.classList.toggle('active', i === 1)); } }, 'Individual pick'),
      );

      const modal = el('div', { class: 'modal cp-modal' },
        el('div', { class: 'modal-head' },
          el('div', {},
            el('div', { class: 'title' }, 'Create new project'),
            el('div', { class: 'sub' }, 'Library cases stay untouched · per-case parameter overrides live on the project'),
          ),
          el('button', { class: 'a-button a-button--neutral-tertiary -small', onclick: close, 'aria-label': 'Close' }, '✕'),
        ),
        businessDatalist,
        el('div', { class: 'modal-body' },
          el('div', { class: 'cp-fields' },
            el('div', { class: 'cp-field' },
              el('label', { class: 'a-text--label cp-label' }, 'Project name'),
              nameInput,
              el('div', { class: 'cp-hint' }, 'e.g. "WMS UAT Smoke" · "Q3 Regression" — 建议带场景/环境'),
            ),
            el('div', { class: 'cp-field' },
              el('label', { class: 'a-text--label cp-label' }, 'Business (department)'),
              businessInput,
              el('div', { class: 'cp-hint' }, '部门会作为派生 tag 出现在 case 上' + (getAllBusinesses().length ? ' · 已有：' + getAllBusinesses().slice(0, 4).join(', ') : ' · 还没创建过部门')),
            ),
          ),
          el('div', { class: 'cp-pick-section' },
            modeToggle,
            pickerBody,
          ),
        ),
        el('div', { class: 'modal-foot' },
          summaryRow,
          el('div', { class: 'cp-modal-actions' },
            el('button', { class: 'a-button a-button--neutral-secondary', onclick: close }, 'Cancel'),
            saveBtn,
          ),
        ),
      );

      renderPicker();
      renderSummary();
      backdrop.appendChild(modal);
      document.body.appendChild(backdrop);
      setTimeout(() => nameInput.focus(), 30);
    }

    // Modal: pick which of the currently-running cases to abort. Replaces
    // the blunt "abort everything" button — user can target one bad run
    // and keep the others going.
    function openAbortModal(suggestedIds) {
      const liveActive = state.active.slice();
      if (!liveActive.length) return toast('没有正在 run 的 case');
      // Default selection: caller's hint (e.g. just the case they're
      // watching), otherwise all active runs preselected.
      const selected = new Set((suggestedIds || []).filter((id) => liveActive.some((a) => a.caseId === id)));
      if (!selected.size) liveActive.forEach((a) => selected.add(a.caseId));

      const backdrop = el('div', { class: 'modal-backdrop', onclick: (ev) => { if (ev.target === backdrop) close(); } });
      function close() { backdrop.remove(); document.removeEventListener('keydown', onKey); }
      function onKey(ev) { if (ev.key === 'Escape') close(); }
      document.addEventListener('keydown', onKey);

      const listNode = el('div', { class: 'modal-cases' });
      function repaintList() {
        listNode.replaceChildren(...liveActive.map((a) => {
          const cs = state.cases.find((c) => c.id === a.caseId);
          const checked = selected.has(a.caseId);
          return el('label', { class: 'abort-row' + (checked ? ' checked' : '') },
            el('input', {
              type: 'checkbox', checked,
              onchange: (ev) => {
                if (ev.target.checked) selected.add(a.caseId);
                else selected.delete(a.caseId);
                countSpan.textContent = `${selected.size} of ${liveActive.length} selected`;
                bigBtn.textContent = selected.size === 0 ? 'Select runs to abort'
                  : selected.size === liveActive.length ? `⏹ Abort all ${selected.size}`
                  : `⏹ Abort selected (${selected.size})`;
                bigBtn.disabled = selected.size === 0;
                repaintList();
              },
            }),
            el('span', { class: 'pulse-dot' }),
            el('div', { style: 'flex:1; min-width:0;' },
              el('strong', {}, a.caseId, ' · ', cs ? caseTitle(cs) : a.caseTitle || ''),
              el('span', { class: 'hint' }, a.currentStep
                ? `Step ${a.currentStep.order}/${a.totalSteps} · ${a.currentStep.title || a.currentStep.api || ''}`
                : 'running…'),
            ),
          );
        }));
      }

      const countSpan = el('span', { class: 'hint' }, `${selected.size} of ${liveActive.length} selected`);
      const bigBtn = el('button', {
        class: 'btn abort-big',
        disabled: selected.size === 0,
        onclick: () => {
          const ids = [...selected];
          close();
          abortRuns(ids);
        },
      }, selected.size === liveActive.length ? `⏹ Abort all ${selected.size}` : `⏹ Abort selected (${selected.size})`);

      const modal = el('div', { class: 'modal' },
        el('div', { class: 'modal-head' },
          el('div', {},
            el('div', { class: 'title' }, 'Abort runs'),
            el('div', { class: 'sub' }, '选要 kill 的 run。runner 会清浏览器/页面句柄。'),
          ),
          el('button', { class: 'btn ghost', onclick: close }, '✕'),
        ),
        el('div', { class: 'modal-body' },
          el('div', { class: 'console-toolbar', style: 'margin-bottom:10px;' },
            el('button', { class: 'btn mini', onclick: () => { liveActive.forEach((a) => selected.add(a.caseId)); repaintList(); countSpan.textContent = `${selected.size} of ${liveActive.length} selected`; bigBtn.disabled = selected.size === 0; bigBtn.textContent = `⏹ Abort all ${selected.size}`; } }, 'Select all'),
            el('button', { class: 'btn mini', onclick: () => { selected.clear(); repaintList(); countSpan.textContent = `0 of ${liveActive.length} selected`; bigBtn.disabled = true; bigBtn.textContent = 'Select runs to abort'; } }, 'Clear'),
            countSpan,
          ),
          listNode,
        ),
        el('div', { class: 'modal-foot' },
          el('button', { class: 'btn', onclick: close }, 'Cancel'),
          bigBtn,
        ),
      );
      repaintList();
      backdrop.appendChild(modal);
      document.body.appendChild(backdrop);
    }

    // Abort. Pass null to kill every active run; pass caseIds (array) to kill
    // only those. Best-effort — runner cleans up browser+page handles in
    // attachActiveRunCleanup() then unregisters. Some runs may take a couple
    // seconds to actually disappear from /runs/active.
    async function abortRuns(caseIds) {
      const targets = state.active.filter((a) => !caseIds || caseIds.includes(a.caseId));
      if (!targets.length) return toast('没有可中止的 active run');
      toast(`正在中止 ${targets.length} 个 run…`);
      await Promise.all(targets.map(async (a) => {
        try {
          await api('/api/midscene-js/runs/' + encodeURIComponent(a.runId) + '/abort', { method: 'POST' });
        } catch (err) {
          /* per-run abort errors are surfaced collectively via the refresh */
        }
      }));
      await refreshRuntime();
      renderAll();
      toast(`已发送 ${targets.length} 个 abort 请求`);
    }

    async function refreshRuntime() {
      const [recentRes, activeRes] = await Promise.all([
        api('/api/results/recent?limit=300').catch(() => ({ runs: [] })),
        api('/api/midscene-js/runs/active').catch(() => ({ active: [] })),
      ]);
      state.recent = recentRes.runs || [];
      state.active = activeRes.active || [];
      // Detect newly-finished cases for the in-flight batch and trigger
      // the celebration (pass) / shake (fail) effect. Runs once per case
      // — we track which ones we've already animated in seenFinishedIds.
      detectNewlyFinished();
      // Once all runs end, re-enable live takeover for the next batch —
      // user opted out via "Compose new run" only for the current run set.
      if (state.active.length === 0 && state.console) state.console.forceComposeMode = false;
    }

    function detectNewlyFinished() {
      const bp = state.batchProgress;
      if (!bp) return;
      const stillActive = new Set(state.active.map((a) => a.caseId));
      const newly = [];
      for (const id of bp.totalIds) {
        if (bp.seenFinishedIds.has(id)) continue;
        if (stillActive.has(id)) continue;
        // Look for a result in state.recent for this caseId that landed
        // AFTER the batch started — so we don't pick up a stale prior run.
        const result = state.recent.find((r) => r.caseId === id && r.finishedAt && new Date(r.finishedAt).getTime() >= bp.startedAt);
        if (!result) continue; // not finished yet (or result hasn't propagated)
        bp.seenFinishedIds.add(id);
        newly.push({ id, status: result.status, result });
      }
      // Fire effects after the current paint so the DOM has rendered the
      // new row → the canvas can sit over it.
      if (newly.length) {
        setTimeout(() => {
          for (const item of newly) {
            const row = document.querySelector(`[data-finished-id="${item.id}"]`);
            if (item.status === 'passed') {
              fireConfetti(row || document.getElementById('liveScreenBig'));
              try { toast(`✅ ${item.id} 跑成功了`); } catch {}
            } else {
              if (row) {
                row.classList.add('shake-fail');
                setTimeout(() => row.classList.remove('shake-fail'), 700);
              }
              try { toast(`❌ ${item.id} 失败：${(item.result.errorMessage || '').slice(0, 80) || '未知原因'}`); } catch {}
            }
          }
        }, 30);
      }
    }

    // Tiny canvas confetti — ported from the developer console's cinema
    // result overlay (app.js · runConfetti). 70 paper pieces fall with
    // rotation and drift; cleans up after ~3s. Mounts inside the target
    // element so positioning stays clipped to the local region.
    function fireConfetti(target) {
      if (!target) return;
      const canvas = document.createElement('canvas');
      canvas.className = 'confetti-canvas';
      const rect = target.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      target.style.position = target.style.position || 'relative';
      target.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      const colors = ['#0070F2', '#1F7A39', '#E0660D', '#B00020', '#9333ea', '#22d3ee', '#facc15'];
      const N = 70;
      const pieces = Array.from({ length: N }, () => ({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * 200,
        vx: (Math.random() - 0.5) * 2.4,
        vy: 2 + Math.random() * 3,
        rot: Math.random() * Math.PI * 2,
        vRot: (Math.random() - 0.5) * 0.18,
        w: 8 + Math.random() * 6,
        h: 4 + Math.random() * 5,
        color: colors[Math.floor(Math.random() * colors.length)],
      }));
      let frameCount = 0;
      function tick() {
        frameCount += 1;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const p of pieces) {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.04;
          p.rot += p.vRot;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
        }
        if (frameCount < 180) requestAnimationFrame(tick);
        else canvas.remove();
      }
      requestAnimationFrame(tick);
    }

    function openLive(caseId) {
      window.open('/#/cinema/' + encodeURIComponent(caseId), 'saptest-cinema');
    }

    document.querySelectorAll('.tab').forEach((btn) => {
      btn.addEventListener('click', () => {
        state.tab = btn.dataset.tab;
        state.section = NAV[state.tab][0][0];
        renderAll();
      });
    });
    $('#refreshBtn').addEventListener('click', async () => { await loadInitial(); toast('已刷新'); });
    $('#refreshLiveBtn').addEventListener('click', async () => { await refreshRuntime(); renderAll(); });
    $('#openDevBtn').addEventListener('click', () => window.open('/', '_blank'));
    $('#runProjectTopBtn').addEventListener('click', () => openCreateProjectModal());
    $('#runSelectedCaseBtn').addEventListener('click', () => state.selectedCaseId && openRunModal([state.selectedCaseId], { name: state.selectedCaseId, title: 'Run single case' }));
    $('#watchSelectedBtn').addEventListener('click', () => {
      // While runs are active, the Run Center takeover IS the broadcast.
      // One-click jump to it. Outside an active run, fall back to opening
      // the standalone Cinema page for the currently-selected case.
      if (state.active.length > 0) {
        state.tab = 'run';
        state.section = 'run-center';
        if (state.console) state.console.forceComposeMode = false;
        state.liveCaseId = state.active[0].caseId;
        renderAll();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else if (state.selectedCaseId) {
        openLive(state.selectedCaseId);
      }
    });

    loadInitial();
    state.poll = setInterval(async () => {
      await refreshRuntime();
      renderAll();
    }, 2500);
  </script>
</body>
</html>
