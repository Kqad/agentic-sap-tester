    // clarification is asking for a category / cases on behalf of a
    // create-project workflow. Mutates `plan.projects[0]` in place so the
    // outer submit path can just execute the plan directly. Returns null
    // (no editor) if the plan doesn't fit the single-project shape yet.
    function agentBuildParamEditor(plan) {
      if (!plan || !Array.isArray(plan.projects) || plan.projects.length !== 1) return null;
      const p = plan.projects[0];
      p.runsPerCase = p.runsPerCase || 1;
      p.action = p.action || 'save';

      const wrap = el('div', { class: 'agent-clarify-param-editor' });
      const summaryLine = el('div', { class: 'agent-clarify-param-summary' });
      const fields = el('div', { class: 'agent-clarify-param-fields', style: 'display:none;' });

      const renderSummary = () => {
        summaryLine.replaceChildren(
          el('span', { class: 'ape-icon' }, '⚙'),
          el('span', { class: 'ape-item' }, '名字: ', el('b', {}, p.name || '(未填)')),
          el('span', { class: 'ape-sep' }, '·'),
          el('span', { class: 'ape-item' }, '部门: ', el('b', {}, p.business || '(未填)')),
          el('span', { class: 'ape-sep' }, '·'),
          el('span', { class: 'ape-item' }, '每 case ×', el('b', {}, String(p.runsPerCase))),
          el('span', { class: 'ape-sep' }, '·'),
          el('span', { class: 'ape-item' }, el('b', {}, p.action === 'run' ? '创建后运行' : '只保存')),
        );
      };
      renderSummary();

      const toggle = el('button', {
        class: 'agent-clarify-param-toggle',
        type: 'button',
        title: '点开修改参数',
      }, '▸ 修改参数');
      toggle.addEventListener('click', (ev) => {
        ev.preventDefault();
        const open = fields.style.display === 'none';
        fields.style.display = open ? 'grid' : 'none';
        toggle.textContent = open ? '▾ 收起' : '▸ 修改参数';
      });

      const businessList = 'ape-business-list-' + Math.random().toString(36).slice(2, 8);
      fields.append(
        el('label', { class: 'ape-field' },
          el('span', { class: 'ape-label' }, 'Project 名'),
          el('input', {
            type: 'text',
            value: p.name || '',
            placeholder: 'e.g. Finance Smoke Test',
            oninput: (ev) => { p.name = ev.target.value; renderSummary(); },
          }),
        ),
        el('label', { class: 'ape-field' },
          el('span', { class: 'ape-label' }, '部门 / Business'),
          el('input', {
            type: 'text',
            value: p.business || '',
            list: businessList,
            placeholder: 'e.g. 人力 · Finance',
            oninput: (ev) => { p.business = ev.target.value; renderSummary(); },
          }),
          el('datalist', { id: businessList },
            ...((typeof getAllBusinesses === 'function' ? getAllBusinesses() : [])
              .map((b) => el('option', { value: b }))),
          ),
        ),
        el('label', { class: 'ape-field' },
          el('span', { class: 'ape-label' }, '每 case 跑几次'),
          el('input', {
            type: 'number', min: '1', max: '9',
            value: String(p.runsPerCase || 1),
            oninput: (ev) => {
              const n = Math.max(1, Math.min(9, Number(ev.target.value) || 1));
              p.runsPerCase = n; renderSummary();
            },
          }),
        ),
        el('label', { class: 'ape-field' },
          el('span', { class: 'ape-label' }, '动作'),
          el('select', {
            onchange: (ev) => { p.action = ev.target.value; renderSummary(); },
          },
            el('option', { value: 'save',  selected: p.action !== 'run' ? '' : null }, '只保存'),
            el('option', { value: 'run',   selected: p.action === 'run' ? '' : null }, '创建后运行'),
          ),
        ),
      );

      wrap.append(
        el('div', { class: 'agent-clarify-param-head' }, summaryLine, toggle),
        fields,
      );
      wrap._plan = plan;
      wrap._getPlan = () => plan;
      return wrap;
    }

    // ── Clarification modal — page-level popup that asks the user for
    //    a missing slot (business / category / project name etc.). On
    //    submit, re-runs the planner with the answer appended.
    // Build the chip list for a clarification modal.
    //   · business / department ask → return ALL known businesses, with
    //     the planner's did-you-mean suggestions PREPENDED so the user's
    //     hint stays on the left. This means even when the LLM only
    //     returned "Finance" as its did-you-mean, the user still sees
    //     the full palette (物流、仓储、销售、人力、研发、Finance、
    //     Logistics、R&D、HR、Warehouse、Sales, plus any custom name
    //     used in the local batches).
    //   · non-business choice → the raw suggestions (backward-compatible)
    //   · anything else → []  (the chip row is skipped by the modal)
    function agentExpandBusinessSuggestions(clar) {
      const raw = (clar.suggestions || []).map((s) => String(s).trim()).filter(Boolean);
      const field = String(clar.field || '').toLowerCase();
      const q = String(clar.question || '');
      const isBusinessAsk =
        field === 'business' || field === 'department' ||
        field.includes('business') || field.includes('department') ||
        /部门|business|department/i.test(q);
      if (!isBusinessAsk) {
        return (clar.kind === 'choice') ? raw : [];
      }
      const all = new Set();
      for (const b of state.batches || []) {
        if (b.business) all.add(String(b.business).trim());
      }
      ['财务', '物流', '仓储', '销售', '人力', '研发',
       'Finance', 'Logistics', 'R&D', 'HR', 'Warehouse', 'Sales']
        .forEach((b) => all.add(b));
      // Dedupe case-insensitively so "Finance" (LLM suggestion) and
      // "finance" (in state.batches) don't produce two chips.
      const seen = new Set();
      const out = [];
      const push = (label) => {
        const key = label.toLowerCase();
        if (!key || seen.has(key)) return;
        seen.add(key);
        out.push(label);
      };
      raw.forEach(push);              // LLM's did-you-mean first
      [...all].forEach(push);         // everyone else after
      return out;
    }

    function agentShowClarificationModal(clar, originalMessage, aiMessageId = null) {
      const backdrop = el('div', { class: 'modal-backdrop' });
      const selected = new Set();

      // For a create-project category ask, pre-parse the original message
      // into a workflow plan. If it comes out as a well-formed single
      // project (name + business + everything but the case picker), we
      // can render a param editor above the picker AND skip the LLM retry
      // on submit — the plan has all the info the executor needs.
      let createPlan = null;
      if (clar.field === 'category' && typeof assistantBuildProjectWorkflow === 'function') {
        try {
          const parsed = assistantBuildProjectWorkflow(originalMessage);
          if (parsed && Array.isArray(parsed.projects) && parsed.projects.length === 1) {
            createPlan = parsed;
          }
        } catch { /* parser failed — fall back to LLM retry path */ }
      }

      function close() {
        backdrop.remove();
        document.removeEventListener('keydown', onKey);
        workUpdateMessage(aiMessageId, {
          clarificationAnswer: '(取消)',
          summary: '已取消，未继续执行。',
        });
      }
      function onKey(ev) {
        if (ev.key === 'Escape') close();
      }
      document.addEventListener('keydown', onKey);
      backdrop.addEventListener('click', (ev) => {
        if (ev.target === backdrop) close();
      });

      const submit = (answer) => {
        const v = String(answer || '').trim();
        // ── Direct-execute path ────────────────────────────────────────
        // Category ask + parsed single-project plan + case picker with
        // at least one case selected → we already have everything the
        // workflow executor needs; skip the LLM retry.
        if (createPlan) {
          const picker = document.querySelector('.agent-clarify-catpicker');
          const caseIds = picker && typeof picker._getSelectedCaseIds === 'function'
            ? picker._getSelectedCaseIds()
            : [];
          const p = createPlan.projects[0];
          if (caseIds.length && (p.name || '').trim() && (p.business || '').trim()) {
            backdrop.remove();
            document.removeEventListener('keydown', onKey);
            p.caseIds = caseIds;
            p.categoryKey = ''; // explicit caseIds override category
            createPlan.created = false;
            workUpdateMessage(aiMessageId, {
              clarificationAnswer: `参数已提交 · ${caseIds.length} 个 case`,
              summary: '按用户填的参数直接创建，未再往返 AI。',
            });
            assistantExecuteProjectWorkflow(createPlan).then((r) => {
              if (r && r.message) toast(r.message);
            }).catch((err) => {
              console.error('[clarify] direct execute failed:', err);
              toast('创建失败: ' + (err?.message || err));
            });
            return;
          }
        }
        // ── Fallback: existing LLM retry path (unchanged) ─────────────
        if (!v) return;
        backdrop.remove();
        document.removeEventListener('keydown', onKey);
        workUpdateMessage(aiMessageId, {
          clarificationAnswer: v,
          summary: '用户已补充信息，继续规划。',
        });
        workRunPlanner(`${originalMessage}\n\n用户补充: ${v}`);
      };
      const collectAnswer = () => {
        const parts = [...selected];
        const typed = input.value.trim();
        if (typed) parts.push(typed);
        // The category picker (if used) exposes its selected case IDs
        // as a semicolon-separated string on _collectExtras. Append so
        // the planner sees BOTH selected category labels AND explicit
        // case IDs — it can then output caseIds instead of categoryKey.
        const picker = document.querySelector('.agent-clarify-catpicker');
        if (picker && typeof picker._collectExtras === 'function') {
          const extras = picker._collectExtras();
          if (extras) parts.push(extras);
        }
        return parts.join('、');
      };

      const input = el('input', {
        type: 'text',
        class: 'agent-clarify-modal-input',
        placeholder: (clar.kind === 'choice' && clar.suggestions?.length) ? '或者直接输入答案…' : '请输入答案…',
        onkeydown: (ev) => {
          if (ev.key === 'Enter' && collectAnswer()) {
            ev.preventDefault();
            submit(collectAnswer());
          }
        },
      });

      const modal = el('div', { class: 'modal agent-clarify-modal' },
        el('div', { class: 'modal-head' },
          el('div', { style: 'flex:1; min-width:0;' },
            el('div', { class: 'title' }, '🤖 需要补充信息'),
            el('div', { class: 'sub' }, '原任务：' + (originalMessage.length > 80 ? originalMessage.slice(0, 80) + '…' : originalMessage)),
          ),
          el('button', { class: 'btn ghost', onclick: close, title: '取消' }, '✕'),
        ),
        el('div', { class: 'modal-body' },
          // Strip the "可选：X、Y、Z" tail some LLM outputs still tack on —
          // the option list is redundant because we already render one
          // chip per suggestion below. Kept the leading question ("你指的
          // 是哪个部门？") so the user sees the actual ask.
          el('div', { class: 'agent-clarify-modal-q' },
            (clar.question || '需要更多信息才能继续。')
              .replace(/[\s,，。.]*可[选選]\s*[：:][\s\S]*$/, '')
              .replace(/[\s,，。.]*(?:from|choose from|options?)\s*[:：][\s\S]*$/i, '')
              .trim() || '需要更多信息才能继续。'),
          // For a create-project clarification, insert the collapsible
          // parameter editor ABOVE the case picker so the user can adjust
          // name / business / runsPerCase / action without going back to
          // retype the whole prompt.
          createPlan ? agentBuildParamEditor(createPlan) : null,
          // Category clarification gets a rich UI: chips with an expand
          // arrow (peek at cases in that category), plus an "Individual
          // pick" panel for manually selecting specific cases (mirrors
          // the Create Project modal's Individual pick tab).
          clar.field === 'category'
            ? agentBuildCategoryPicker(clar, selected, collectAnswer, submit, () => input)
            : (() => {
                const chips = agentExpandBusinessSuggestions(clar);
                if (!chips.length) return null;
                return [
                  el('div', { class: 'agent-clarify-modal-help' }, '可多选，选完后点"确认"提交。'),
                  el('div', { class: 'agent-clarify-modal-chips' },
                    ...chips.map((s) => el('button', {
                      class: 'agent-clarify-modal-chip',
                      type: 'button',
                      onclick: (ev) => {
                        ev.preventDefault();
                        if (selected.has(s)) selected.delete(s);
                        else selected.add(s);
                        ev.currentTarget.classList.toggle('is-selected', selected.has(s));
                      },
                    }, s)),
                  ),
                ];
              })(),
          el('div', { class: 'agent-clarify-modal-input-row' },
            input,
            el('button', {
              class: 'agent-clarify-modal-submit',
              onclick: () => submit(collectAnswer()),
            }, '确认'),
          ),
        ),
        el('div', { class: 'modal-foot' },
          el('button', {
            class: 'btn ghost',
            title: '取消本次任务',
            onclick: close,
          }, 'Cancel'),
        ),
      );

      backdrop.appendChild(modal);
      document.body.appendChild(backdrop);
      setTimeout(() => input.focus(), 80);
    }

    // Render the user bubble + a node that workRunPlanner will replace.
    function workShowUserBubble(msg) {
      workSetMain(
        el('div', { class: 'work-msg', style: 'align-self:flex-end;background:var(--blue);color:#fff;border-color:var(--blue);max-width:100%;' }, msg),
        el('div', { class: 'work-msg agent-thinking', style: 'max-width:100%;' },
          el('span', { class: 'agent-thinking-dot' }),
          ' 🤖 正在规划任务…',
        ),
      );
    }

    // Core planner runner — fetches a plan from /api/agent/plan, renders
    // the timeline / clarification card, and dispatches tool calls.
    // Used by workSend() AND by clarification cards re-submitting after
    // a user answers a follow-up question.
    async function workRunPlanner(msg) {
      workPushMessage({ role: 'user', text: msg });
      workShowUserBubble(msg);
      const body = document.getElementById('aiWorkBody');
      const thinkingNode = body?.querySelector('.agent-thinking');

      let plan;
      try {
        plan = await api('/api/agent/plan', {
          method: 'POST',
          body: JSON.stringify({ message: msg, context: agentBuildContext() }),
        });
      } catch (err) {
        console.warn('[agent] /api/agent/plan failed:', err);
        plan = null;
      }

      // CLARIFICATION — LLM needs more info to proceed. Pops a page-
      // level modal (not an inline card) so the question is unmissable
      // and the user can answer without scrolling the chat panel.
      if (plan?.clarification?.question) {
        const aiMessageId = 'wm-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
        workPushMessage({
          id: aiMessageId,
          role: 'ai',
          explain: plan.explain || '需要补充信息才能继续。',
          clarificationQ: plan.clarification.question,
          summary: '等待用户补充信息。',
        });
        // Leave a placeholder in the panel showing the question text so
        // there's a transcript trail after the modal closes.
        thinkingNode?.replaceWith(el('div', { class: 'work-msg agent-clarify-stub' },
          '🤖 ' + (plan.explain || plan.clarification.question),
          el('div', { class: 'agent-clarify-stub-hint' },
            '（已弹出补充信息对话框 · 取消后不会使用默认值）'),
        ));
        agentShowClarificationModal(plan.clarification, msg, aiMessageId);
        return;
      }

      // PRIMARY — tool calls returned, run them.
      if (plan && Array.isArray(plan.toolCalls) && plan.toolCalls.length) {
        const aiMessageId = 'wm-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
        workPushMessage({
          id: aiMessageId,
          role: 'ai',
          explain: plan.explain || '已生成执行计划。',
          summary: '执行中...',
        });
        const planEl = agentRenderPlan(plan);
        thinkingNode?.replaceWith(planEl);
        const { results, snapshots } = await agentExecuteToolCalls(plan.toolCalls, planEl);
        // `snapshots` — persisted with the ai message so reopening this
        // chat later re-renders the exact same table/summary cards.
        workUpdateMessage(aiMessageId, {
          summary: results.length ? results.join(' · ') : '已完成。',
          snapshots: snapshots.length ? snapshots : undefined,
        });
        // Append a final summary line so the user sees a concise outcome.
        if (results.length) {
          planEl.appendChild(el('div', { class: 'agent-plan-summary' },
            el('span', { class: 'agent-plan-summary-icon' }, '✓'),
            results.join(' · '),
          ));
        }
        return;
      }

      // FALLBACK 1 — LLM responded with an `explain` but no tool calls
      // and no clarification (rare; KB tells it to use clarification).
      if (plan && plan.explain) {
        workPushMessage({
          role: 'ai',
          explain: plan.explain,
          summary: '未执行工具调用。',
        });
        thinkingNode?.replaceWith(el('div', { class: 'work-msg', style: 'max-width:100%;' },
          `🤖 ${plan.explain}`));
        return;
      }

      // FALLBACK 2 — Endpoint dead / network error → legacy regex path
      // so the panel still does something useful while the model is out.
      const taskResult = await assistantExecuteWorkbenchTask(msg);
      workPushMessage({
        role: 'ai',
        explain: '使用本地规则处理任务。',
        summary: taskResult || '没看懂这条任务。',
      });
      thinkingNode?.replaceWith(el('div', { class: 'work-msg', style: 'max-width:100%;' },
        taskResult || '没看懂这条任务。可以说得更具体一点吗？例如 "新建 1 个 Finance Smoke project, 部门 Finance, 只保存"。'));
    }

    async function workSend() {
      const input = document.getElementById('aiWorkInput');
      const msg = input.value.trim();
      if (!msg) return;
      input.value = '';
      // Wipe any active highlight from the previous task before kicking
      // off a new one. Highlights also auto-expire after a few seconds.
      if (typeof agentClearHighlights === 'function') agentClearHighlights();
      await workRunPlanner(msg);
    }

    function openAskAssistant() {
      chatToggle(true);
      const input = document.getElementById('chatInput');
      if (input) {
        input.placeholder = '问点啥…（Enter 发送 · Shift+Enter 换行）';
      }
    }

    // Esc closes the chat panel — but only when it's open and Esc didn't
    // already fire on a modal/textarea inside the panel (textarea Esc is
    // fine to bubble; modal close is handled by its own backdrop key).
    document.addEventListener('keydown', (ev) => {
      if (ev.key !== 'Escape') return;
      if (document.getElementById('aiWorkPanel')?.classList.contains('open')) {
        workToggle(false);
        return;
      }
      if (!chatState?.open) return;
      // Let an open chat history popover close itself first if it's open.
      if (chatState.historyOpen) {
        chatState.historyOpen = false;
        chatRenderHistory();
        return;
      }
      chatToggle(false);
    });

    // html2canvas preferred — real PNG. SVG-foreignObject as fallback if
    // CDN blocked. Crops to the visible viewport (not the whole scrollable
    // body) so we don't ship a 6000px-tall PNG to the model when the user
    // is just asking about what they currently see on screen.
    async function chatCaptureScreenshot() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const sx = window.scrollX || window.pageXOffset || 0;
      const sy = window.scrollY || window.pageYOffset || 0;
      if (window.html2canvas) {
        try {
          const canvas = await window.html2canvas(document.body, {
            scale: 0.7, backgroundColor: '#eff1f2',
            logging: false, useCORS: true, removeContainer: true,
            ignoreElements: (el) => el.id === 'chatPanel' || el.id === 'chatFab' || el.id === 'aiWorkFab' || el.id === 'aiWorkPanel',
            // Viewport-only crop — start at current scroll offset, size = viewport.
            x: sx, y: sy, width: vw, height: vh,
            windowWidth: document.documentElement.clientWidth,
            windowHeight: document.documentElement.clientHeight,
          });
          return canvas.toDataURL('image/png');
        } catch (e) {
          console.warn('[chat] html2canvas failed, using SVG fallback:', e?.message || e);
        }
      }
      // SVG fallback: draw the body offset by the current scroll position
      // so the canvas (sized to vw × vh) ends up with just the viewport.
      const html = document.documentElement.outerHTML.replace(/<script[\s\S]*?<\/script>/g, '');
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${vw}" height="${vh}"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml">${html}</div></foreignObject></svg>`;
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      try {
        const img = await new Promise((resolve, reject) => {
          const i = new Image(); i.onload = () => resolve(i); i.onerror = reject; i.src = url;
        });
        const canvas = document.createElement('canvas');
        canvas.width = vw; canvas.height = vh;
        canvas.getContext('2d').drawImage(img, -sx, -sy);
        return canvas.toDataURL('image/png');
      } finally { URL.revokeObjectURL(url); }
    }

    async function chatSend() {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if (!msg) return;
      if (chatState.busy) { toast('上一条还在响应'); return; }
      const chat = chatActive();

      // Capture screenshot FIRST so we can attach it to the user bubble
      // as visible proof the image was really sent. Captured here, before
      // the panel re-renders, so the chat panel itself isn't part of the
      // snapshot (chatCaptureScreenshot also ignores #chatPanel anyway).
      let screenshot = null;
      const shotCb = document.getElementById('chatIncludeScreenshot');
      if (shotCb && shotCb.checked) {
        try { screenshot = await chatCaptureScreenshot(); }
        catch (e) { console.warn('[chat] screenshot capture failed:', e?.message || e); }
      }

      const userMsg = { role: 'user', content: msg };
      if (screenshot) userMsg.screenshot = screenshot;
      chat.messages.push(userMsg);

      if (chat.title === 'New chat') {
        chat.title = msg.replace(/\s+/g, ' ').trim().slice(0, 32) + (msg.length > 32 ? '…' : '');
        chatRenderHeader();
      }
      input.value = '';

      const workflowPlan = assistantBuildProjectWorkflow(msg);
      if (workflowPlan) {
        chat.messages.push({
          role: 'ai',
          kind: 'projectWorkflow',
          content: 'Project automation plan',
          plan: workflowPlan,
          createdAt: Date.now(),
        });
        chatSaveChats();
        chatRender();
        return;
      }

      chatState.busy = true;
      chatRender();
      chatSaveChats();
      const ctx = {
        // `app` tells the server which knowledge base to inject — the
        // Case Studio chat sends 'case-studio' and gets the developer KB;
        // we send 'run-center' and get the end-user KB.
        app: 'run-center',
        section: state.section || 'run-center',
        activeBatches: state.batches?.length,
        activeRuns: state.active?.length,
        validatedCount: SUCCESS_CASE_IDS.length,
      };
      const lastFailed = (state.recent || []).find((r) => r.status === 'failed');
      if (lastFailed) {
        ctx.caseId = lastFailed.caseId;
        ctx.lastRunStatus = lastFailed.status;
        ctx.lastError = lastFailed.errorMessage;
      }
      if (screenshot) ctx.screenshot = screenshot;
      try {
        const r = await api('/api/chat', {
          method: 'POST',
          body: JSON.stringify({ message: msg, context: ctx }),
        });
        chat.messages.push({ role: 'ai', content: r.reply || '(no reply)' });
      } catch (err) {
        chat.messages.push({ role: 'ai', content: '出错了: ' + err.message });
      } finally {
        chatState.busy = false;
        chatSaveChats();
        chatRender();
      }
    }

    // Make the floating Ask AI button draggable. Click without movement
    // still opens the chat; mouse-down + drag > 6px sets its position
    // (left/top), persisted in localStorage so it survives reload.
    function chatFabMakeDraggable() {
      const fab = document.getElementById('chatFab');
      if (!fab) return;

      // Restore saved position. Default position (CSS) is bottom-right.
      try {
        const saved = JSON.parse(localStorage.getItem('userRunCenter.chatFabPos') || 'null');
        if (saved && Number.isFinite(saved.left) && Number.isFinite(saved.top)) {
          fab.style.left   = Math.max(8, Math.min(saved.left, innerWidth - 60)) + 'px';
          fab.style.top    = Math.max(8, Math.min(saved.top,  innerHeight - 60)) + 'px';
          fab.style.right  = 'auto';
          fab.style.bottom = 'auto';
        }
      } catch { /* malformed → ignore */ }

      let dragging = false;
      let startX = 0, startY = 0, origLeft = 0, origTop = 0;
      let moved = false;

      fab.addEventListener('mousedown', (ev) => {
        if (ev.button !== 0) return;
        dragging = true;
        moved = false;
        startX = ev.clientX;
        startY = ev.clientY;
        const r = fab.getBoundingClientRect();
        origLeft = r.left;
        origTop  = r.top;
        // Once we start dragging, anchor to top-left so the math works.
        fab.style.left   = r.left + 'px';
        fab.style.top    = r.top  + 'px';
        fab.style.right  = 'auto';
        fab.style.bottom = 'auto';
        fab.style.transition = 'none';
        ev.preventDefault();
      });

      window.addEventListener('mousemove', (ev) => {
        if (!dragging) return;
        const dx = ev.clientX - startX;
        const dy = ev.clientY - startY;
        if (!moved && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) moved = true;
        if (!moved) return;
        const w = fab.offsetWidth;
        const h = fab.offsetHeight;
        const left = Math.max(4, Math.min(origLeft + dx, innerWidth  - w - 4));
        const top  = Math.max(4, Math.min(origTop  + dy, innerHeight - h - 4));
        fab.style.left = left + 'px';
        fab.style.top  = top  + 'px';
      });

      window.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        fab.style.transition = '';
        if (moved) {
          const left = parseFloat(fab.style.left) || 0;
          const top  = parseFloat(fab.style.top)  || 0;
          try { localStorage.setItem('userRunCenter.chatFabPos', JSON.stringify({ left, top })); } catch {}
          // Swallow the next click so the drag-release doesn't open the
          // chat panel — capture phase, single use.
          const swallow = (e) => { e.stopPropagation(); e.preventDefault(); window.removeEventListener('click', swallow, true); };
          window.addEventListener('click', swallow, true);
        }
      });

      // Keep the button on-screen after viewport resize.
      window.addEventListener('resize', () => {
        if (!fab.style.left) return;
        const w = fab.offsetWidth;
        const h = fab.offsetHeight;
        const left = Math.min(parseFloat(fab.style.left) || 0, innerWidth  - w - 4);
        const top  = Math.min(parseFloat(fab.style.top)  || 0, innerHeight - h - 4);
        fab.style.left = Math.max(4, left) + 'px';
        fab.style.top  = Math.max(4, top)  + 'px';
      });
    }

    function workFabMakeDraggable() {
      const fab = document.getElementById('aiWorkFab');
      if (!fab) return;
      try {
        const saved = JSON.parse(localStorage.getItem('userRunCenter.aiWorkFabPos') || 'null');
        if (saved && Number.isFinite(saved.left) && Number.isFinite(saved.top)) {
          fab.style.left = Math.max(8, Math.min(saved.left, innerWidth - 80)) + 'px';
          fab.style.top = Math.max(8, Math.min(saved.top, innerHeight - 60)) + 'px';
          fab.style.right = 'auto';
          fab.style.bottom = 'auto';
        }
      } catch {}

      let dragging = false;
      let startX = 0, startY = 0, origLeft = 0, origTop = 0;
      let moved = false;
      fab.addEventListener('mousedown', (ev) => {
        if (ev.button !== 0) return;
        dragging = true;
        moved = false;
        startX = ev.clientX;
        startY = ev.clientY;
        const r = fab.getBoundingClientRect();
        origLeft = r.left;
        origTop = r.top;
        fab.style.left = r.left + 'px';
        fab.style.top = r.top + 'px';
        fab.style.right = 'auto';
        fab.style.bottom = 'auto';
        fab.style.transition = 'none';
        ev.preventDefault();
      });
      window.addEventListener('mousemove', (ev) => {
        if (!dragging) return;
        const dx = ev.clientX - startX;
        const dy = ev.clientY - startY;
        if (!moved && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) moved = true;
        if (!moved) return;
        const w = fab.offsetWidth;
        const h = fab.offsetHeight;
        fab.style.left = Math.max(4, Math.min(origLeft + dx, innerWidth - w - 4)) + 'px';
        fab.style.top = Math.max(4, Math.min(origTop + dy, innerHeight - h - 4)) + 'px';
      });
      window.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        fab.style.transition = '';
        if (moved) {
          const left = parseFloat(fab.style.left) || 0;
          const top = parseFloat(fab.style.top) || 0;
          try { localStorage.setItem('userRunCenter.aiWorkFabPos', JSON.stringify({ left, top })); } catch {}
          const swallow = (e) => { e.stopPropagation(); e.preventDefault(); window.removeEventListener('click', swallow, true); };
          window.addEventListener('click', swallow, true);
        }
      });
      window.addEventListener('resize', () => {
        if (!fab.style.left) return;
        const w = fab.offsetWidth;
        const h = fab.offsetHeight;
        fab.style.left = Math.max(4, Math.min(parseFloat(fab.style.left) || 0, innerWidth - w - 4)) + 'px';
        fab.style.top = Math.max(4, Math.min(parseFloat(fab.style.top) || 0, innerHeight - h - 4)) + 'px';
      });
    }

    // ── Make the AI Workbench panel draggable by its dark-blue header ─
    // Once the user grabs and moves the header, we switch positioning
    // from the default slide-in-from-right (transform-based) to explicit
    // left/top (see .work-panel.dragged CSS). Position persists across
    // reloads via localStorage. Clicks on header buttons don't drag —
    // they short-circuit at mousedown via closest('button').
    function workPanelMakeDraggable() {
      const panel = document.getElementById('aiWorkPanel');
      const handle = panel?.querySelector('.chat-head');
      if (!panel || !handle) return;

      const savedRaw = (() => {
        try { return JSON.parse(localStorage.getItem('userRunCenter.workPanelPos') || 'null'); }
        catch { return null; }
      })();
      const applyPos = (left, top) => {
        const w = panel.offsetWidth || 400;
        // Horizontal: keep at least 60px handle visible on either edge.
        const cl = Math.max(-w + 60, Math.min(left, innerWidth - 60));
        // Vertical: bottom stays pinned to the viewport (see .dragged CSS),
        // so dragging down just shrinks the panel from the top. Keep at
        // least ~60px of header visible so the user can always grab it.
        const ct = Math.max(4, Math.min(top, innerHeight - 60));
        panel.style.left = cl + 'px';
        panel.style.top  = ct + 'px';
        panel.classList.add('dragged');
      };
      if (savedRaw && Number.isFinite(savedRaw.left) && Number.isFinite(savedRaw.top)) {
        // Defer once so panel has real dimensions (0 before first layout).
        requestAnimationFrame(() => applyPos(savedRaw.left, savedRaw.top));
      }

      let dragging = false;
      let startX = 0, startY = 0, origLeft = 0, origTop = 0;
      let moved = false;

      handle.addEventListener('mousedown', (ev) => {
        // Left button only; and don't hijack clicks on the header buttons.
        if (ev.button !== 0) return;
        if (ev.target.closest('button')) return;
        const r = panel.getBoundingClientRect();
        dragging = true;
        moved = false;
        startX = ev.clientX;
        startY = ev.clientY;
        origLeft = r.left;
        origTop  = r.top;
        // Anchor via left/top instead of the CSS right:0 + transform.
        panel.style.left = r.left + 'px';
        panel.style.top  = r.top  + 'px';
        panel.classList.add('dragged');
        ev.preventDefault();
      });

      window.addEventListener('mousemove', (ev) => {
        if (!dragging) return;
        const dx = ev.clientX - startX;
        const dy = ev.clientY - startY;
        if (!moved && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) moved = true;
        if (!moved) return;
        applyPos(origLeft + dx, origTop + dy);
      });

      window.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        if (moved) {
          const left = parseFloat(panel.style.left) || 0;
          const top  = parseFloat(panel.style.top)  || 0;
          try { localStorage.setItem('userRunCenter.workPanelPos', JSON.stringify({ left, top })); } catch {}
        }
      });

      // Double-click the header title area (not buttons) to reset to the
      // default right-edge position. Undoes .dragged so the slide animation
      // comes back.
      handle.addEventListener('dblclick', (ev) => {
        if (ev.target.closest('button')) return;
        panel.classList.remove('dragged');
        panel.style.left = '';
        panel.style.top  = '';
        try { localStorage.removeItem('userRunCenter.workPanelPos'); } catch {}
      });

      // Clamp back into the viewport after a resize.
      window.addEventListener('resize', () => {
        if (!panel.classList.contains('dragged')) return;
        const left = parseFloat(panel.style.left) || 0;
        const top  = parseFloat(panel.style.top)  || 0;
        applyPos(left, top);
      });
    }

    function chatWire() {
      chatLoadChats();
      // Multi-conversation state for the workbench (mirrors chatLoadChats).
      if (typeof workLoadChats === 'function') workLoadChats();
      chatFabMakeDraggable();
      workFabMakeDraggable();
      workPanelMakeDraggable();
      document.getElementById('chatFab').addEventListener('click', openAskAssistant);
      document.getElementById('aiWorkFab')?.addEventListener('click', openAiWorkAssistant);
      document.getElementById('aiWorkClose')?.addEventListener('click', () => workToggle(false));
      document.getElementById('aiWorkSend')?.addEventListener('click', workSend);
      // + New task — fresh conversation, wipes active highlights,
      // returns to the welcome / prompt-templates screen.
      document.getElementById('aiWorkNew')?.addEventListener('click', () => {
        workCreateNew(/*silent*/ false);
      });
      // History dropdown toggle — same UX as the Ask AI history dropdown.
      document.getElementById('aiWorkHistoryBtn')?.addEventListener('click', () => {
        workToggleHistory();
      });
      document.getElementById('aiWorkInput')?.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter' && !ev.shiftKey && !ev.isComposing) {
          ev.preventDefault();
          workSend();
        }
      });
      document.getElementById('chatClose').addEventListener('click', () => chatToggle(false));
      document.getElementById('chatNewBtn').addEventListener('click', () => {
        chatCreateNew(); chatRenderHeader(); chatRender();
      });
      document.getElementById('chatHistoryBtn').addEventListener('click', () => {
        chatState.historyOpen = !chatState.historyOpen;
        chatRenderHistory();
      });
      document.getElementById('chatClearAllBtn').addEventListener('click', () => {
        if (!confirm('清空所有对话历史？这一步不可恢复。')) return;
        chatState.chats = [];
        chatCreateNew();
        chatRenderHeader();
        chatRenderHistory();
        chatRender();
      });
      document.getElementById('chatSend').addEventListener('click', chatSend);
      document.getElementById('chatInput').addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter' && !ev.shiftKey && !ev.isComposing) {
          ev.preventDefault();
          chatSend();
        }
      });
      const cb = document.getElementById('chatIncludeScreenshot');
      const lab = document.getElementById('chatShotToggleLabel');
      const mark = document.getElementById('chatShotCheck');
      const syncShot = () => {
        lab.classList.toggle('is-on', cb.checked);
        mark.textContent = cb.checked ? '✓' : '';
      };
      cb.addEventListener('change', syncShot);
      syncShot();
    }
    chatWire();

    loadInitial();
    state.poll = setInterval(async () => {
      if (state.tutCalloutDragging) return;
      // Sections with native <input type="search"> / <input type="date">
      // get their widgets destroyed when the panel is re-rendered, so
      // the search cursor disappears and the date-picker popup closes
      // every 2.5s. Pause polling for those tabs — the user manually
      // hits Refresh to pull fresh data.
      if (state.tab === 'run' && (
        state.section === 'reports' ||
        state.section === 'my-projects' ||
        state.section === 'case-library'
      )) return;
      await refreshRuntime();
      renderAll();
    }, 2500);
  </script>
</body>
