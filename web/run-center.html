        const start = anchorIdx >= 0 ? nl.indexOf(oldVal, anchorIdx) : nl.indexOf(oldVal);
        if (start >= 0) {
          nl = nl.slice(0, start) + newVal + nl.slice(start + oldVal.length);
        }
      }
      return nl;
    }

    function renderAll() {
      // Save the window scroll BEFORE we wipe panel children. Every
      // panel.replaceChildren() resets layout → browser snaps scrollTop back
      // to 0, which jumps the user to the top mid-action (opening NL,
      // toggling a chip, polling tick, …). We restore after the renders
      // commit so the user stays where they were.
      const scrollY = window.scrollY;
      // Tab highlight FIRST. If anything downstream throws, the tabs at
      // least stay in sync with state.tab — the user pressed the tab, they
      // should see it light up regardless of render errors.
      document.querySelectorAll('.tab').forEach((btn) => btn.classList.toggle('active', btn.dataset.tab === state.tab));
      // Body class drives layout — Run Center home hides the right panel.
      document.body.classList.toggle('run-home', state.tab === 'run' && state.section === 'run-center');
      // Right Live Channels rail only belongs to the Live Channels tab.
      // On Run Center / Case Editor it gets hidden so the main panel can
      // expand to fill the freed width.
      document.body.classList.toggle('no-live-rail', state.tab !== 'live');
      // body.has-live toggles flashing on the top "Watch Live" button so
      // users always have a one-click way back to the live broadcast.
      document.body.classList.toggle('has-live', state.active.length > 0);
      safeRender('metrics', renderMetrics);
      safeRender('sideNav', renderSideNav);
      safeRender('main', renderMain);
      safeRender('live', renderLive);
      // Restore focus to an input that triggered the re-render — search box,
      // name box, etc. — so the user can keep typing without clicking back in.
      const f = state.console?._restoreFocus;
      if (f?.id) {
        const node = document.getElementById(f.id);
        if (node) {
          node.focus();
          try { node.setSelectionRange(f.selStart ?? node.value.length, f.selEnd ?? node.value.length); } catch { /* */ }
        }
        state.console._restoreFocus = null;
      }
      // Restore scroll AFTER focus, since input.focus() can also nudge scroll.
      if (scrollY !== window.scrollY) window.scrollTo(0, scrollY);
    }

    function safeRender(name, fn) {
      try { fn(); }
      catch (err) {
        console.error(`render error in ${name}:`, err);
      }
    }

    function renderSideNav() {
      const nav = $('#sideNav');
      const title = state.tab === 'run' ? 'TestOps Command Center'
        : state.tab === 'project' ? 'Project Console'
        : 'Batch Live Monitor';
      nav.replaceChildren(
        el('div', { class: 'side-title' }, title),
        ...NAV[state.tab].map(([key, label]) => el('button', {
          class: 'side-btn' + (state.section === key ? ' active' : ''),
          onclick: () => { state.section = key; renderAll(); },
        }, label)),
      );
    }

    function renderMetrics() {
      const activeCount = state.active.length;
      const passed = state.cases.filter((c) => statusOf(c.id) === 'passed').length;
      // Recent pass rate (excluding aborted runs). Walks the last ~60 run
      // records, treats anything matching 'abort' / status === 'aborted' /
      // 'cancelled' as not counted, then divides passed by the rest.
      // Looks higher than naive pass rate because abort-mid-run isn't a
      // real failure.
      const recentSample = (state.recent || []).slice(0, 60);
      const isAborted = (r) => {
        const s = String(r?.status || '').toLowerCase();
        if (s === 'aborted' || s === 'cancelled' || s === 'canceled') return true;
        const err = String(r?.errorMessage || '').toLowerCase();
        return err.includes('abort') || err.includes('cancel');
      };
      const eligible = recentSample.filter((r) => !isAborted(r) && (r.status === 'passed' || r.status === 'failed'));
      const passCount = eligible.filter((r) => r.status === 'passed').length;
      const passRate = eligible.length ? Math.round((passCount / eligible.length) * 100) : null;
      const passRateStr = passRate == null ? '—' : `${passRate}%`;
      const metrics = [
        ['11', 'validated project cases'],
        [passRateStr, `recent pass rate · ${eligible.length} runs (excl. aborted)`],
        [activeCount, 'active live channels'],
        [`${passed}/${state.cases.length}`, 'latest passed cases'],
      ];
      $('#metricGrid').replaceChildren(...metrics.map(([v, label]) => el('div', { class: 'metric' }, el('b', {}, v), el('span', {}, label))));
    }

    function renderCases() {
      const q = state.search.trim().toLowerCase();
      const filtered = state.cases.filter((c) => !q || c.id.toLowerCase().includes(q) || caseTitle(c).toLowerCase().includes(q));
      return el('div', { class: 'section-card' },
        el('div', { class: 'case-toolbar' },
          el('input', {
            type: 'search',
            value: state.search,
            placeholder: 'Search case',
            oninput: (ev) => { state.search = ev.target.value; renderMain(); },
          }),
          el('button', { class: 'btn primary', onclick: () => runCases([...state.selectedIds]) }, 'Run Selected'),
        ),
        el('ul', { class: 'case-list' }, ...filtered.map((c) => {
        const s = statusOf(c.id);
        const row = el('li', {
          class: 'case-row' + (state.selectedCaseId === c.id ? ' active' : ''),
          onclick: async () => {
            state.selectedCaseId = c.id;
            await loadDetail(c.id);
            if (state.tab === 'run') state.tab = 'project';
            renderAll();
          },
        },
          el('input', {
            type: 'checkbox',
            checked: state.selectedIds.has(c.id),
            onclick: (ev) => {
              ev.stopPropagation();
              if (ev.target.checked) state.selectedIds.add(c.id);
              else state.selectedIds.delete(c.id);
              renderAll();
            },
          }),
          el('div', {},
            el('div', { class: 'case-title' }, c.id, ' · ', caseTitle(c)),
            el('div', { class: 'case-meta' }, caseDesc(c) || 'Cached SAP case'),
          ),
          el('span', { class: `status ${s}` }, statusLabel(s)),
        );
        return row;
        })),
      );
    }

    function renderMain() {
      // Live button is hot whenever there are runs OR a case is selected
      // (idle case → opens cinema). Label flips to "LIVE" while runs are
      // active so the button reads obviously during a broadcast.
      $('#watchSelectedBtn').disabled = !(state.active.length > 0 || state.selectedCaseId);
      $('#watchSelectedBtn').textContent = state.active.length > 0 ? `🔴 LIVE · ${state.active.length}` : 'Watch Live';
      $('#runSelectedCaseBtn').disabled = !state.selectedCaseId;
      if (state.tab === 'run') renderRunSection();
      if (state.tab === 'project') renderProjectSection();
      if (state.tab === 'live') renderLiveSection();
    }

    function renderRunSection() {
      const titles = {
        'run-center': ['Run Center', 'Project 是主入口 · Case Library 是只读模板 · 起跑前给本部门做参数覆盖'],
        projects: ['Projects', '项目组合视图和项目健康度'],
        reports: ['Reports', '运行报告、HTML report 和导出入口'],
        failures: ['Failure Analytics', '失败 case、失败位置和重跑入口'],
      };
      const [title, sub] = titles[state.section] || titles['run-center'];
      $('#mainTitle').textContent = title;
      $('#mainSub').textContent = sub;
      const panel = $('#mainPanel');
      if (state.section === 'projects') return renderProjectsSection(panel);
      if (state.section === 'reports') return renderReportsSection(panel);
      if (state.section === 'failures') return renderFailuresSection(panel);
      // Live takeover — when ≥1 case is actually running, the user almost
      // certainly came here to watch what's happening, not to compose more
      // batches. Replace the Run Console / My Projects panels with a
      // full-width live broadcast hero. User can click "Compose new run"
      // to bring the console back without aborting.
      const haveLive = state.active.length > 0 && !state.console?.forceComposeMode;
      if (haveLive) {
        try {
          panel.replaceChildren(renderLiveTakeover());
          return;
        } catch (err) {
          console.error('renderLiveTakeover threw:', err);
          // fall through to the normal render
        }
      }
      // Build first, then replace — so if anything throws we can swap in an
      // error card instead of leaving the panel stuck on its prior content.
      let consoleNode, projectsNode;
      try { consoleNode = renderRunConsole(); } catch (err) {
        console.error('renderRunConsole threw:', err);
        consoleNode = el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'Run Console · render error'),
          el('div', { class: 'section-content' },
            el('div', { class: 'hint' }, String(err?.message || err)),
            el('button', { class: 'btn', style: 'margin-top:8px;', onclick: () => loadInitial() }, '重新加载'),
          ),
        );
      }
      try { projectsNode = renderMyProjects(); } catch (err) {
        console.error('renderMyProjects threw:', err);
        projectsNode = el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'My Projects · render error'),
          el('div', { class: 'section-content' },
            el('div', { class: 'hint' }, String(err?.message || err)),
            el('button', { class: 'btn danger', style: 'margin-top:8px;', onclick: () => {
              if (!confirm('清空保存的 batches 缓存（仅本地存的列表，不影响 case 文件）？')) return;
              localStorage.removeItem('userRunCenter.batches');
              state.batches = [];
              renderAll();
            } }, '清空本地 batches 缓存'),
          ),
        );
      }
      // Recent Runs card sits between the active Run Console and saved
      // projects so the most recent runs are 1 scroll away — never make the
      // user hunt for "where did my last run go?".
      let recentNode = null;
      try { recentNode = renderRecentRunsOnHome(); } catch (err) {
        console.error('renderRecentRunsOnHome threw:', err);
      }
      // Projects-first hero — what the user lands on. Big "+ Create Project"
      // CTA + reminder that the case library below is read-only and that
      // project-level parameter overrides are how you customize per dept.
      const projectsHero = renderProjectsHero();
      // Wrap the legacy Run Console in a collapsible "Case Library quick run"
      // section so it's still accessible but doesn't dominate the page.
      const libraryCollapsible = wrapAsLibraryQuickRun(consoleNode);
      // Final order: Projects-first → projects gallery → recent batches →
      // case library at the bottom (collapsed).
      panel.replaceChildren(projectsHero, projectsNode, recentNode, libraryCollapsible);
    }

    // Hero card at the top of Run Center home — calls out the new
    // Project-centric model and offers a single big "+ Create Project" CTA.
    function renderProjectsHero() {
      const liveCount = state.batches.filter((b) => (b.caseIds || []).some((id) => state.active.some((a) => a.caseId === id))).length;
      const totalProjects = state.batches.length;
      const businesses = getAllBusinesses();
      return el('div', { class: 'projects-hero' },
        el('div', { class: 'ph-left' },
          el('div', { class: 'ph-eyebrow' }, 'Step 1 · Project'),
          el('h2', { class: 'ph-title' }, 'Build a project · pick cases from the library'),
          el('div', { class: 'ph-lead' }, 'Test cases live in a read-only library. A project = name + business + the cases you need + per-case parameter overrides. Library defaults never change.'),
          el('div', { class: 'ph-stats' },
            el('span', {}, el('b', {}, totalProjects), ' projects'),
            el('span', {}, el('b', {}, liveCount), ' live now'),
            el('span', {}, el('b', {}, businesses.length), ' businesses · ', businesses.slice(0, 3).join(' · ') || 'no business yet'),
          ),
        ),
        el('div', { class: 'ph-right' },
          el('button', {
            class: 'a-button a-button--brand-primary',
            style: 'min-width: 13rem; height: 3.5rem; font-size: 1.0625rem;',
            onclick: () => openCreateProjectModal(),
          }, '+ Create Project'),
          el('div', { style: 'font-size: var(--text-s); color: var(--muted); text-align: right; margin-top: var(--space-2);' },
            'Pick by Primary Category (bulk) or Individual cases'),
        ),
      );
    }

    // Wraps the legacy Run Console / Case-library quick run grid in a
    // collapsible section that defaults to collapsed. Per-case row in
    // here is read-only meta (params shown only as defaults).
    function wrapAsLibraryQuickRun(consoleNode) {
      const expanded = state.console._libraryExpanded = state.console._libraryExpanded || false;
      const toggle = el('button', {
        class: 'lib-toggle-btn',
        onclick: () => { state.console._libraryExpanded = !state.console._libraryExpanded; renderAll(); },
      },
        el('span', { class: 'lib-toggle-chev' }, expanded ? '▾' : '▸'),
        el('span', {}, 'Case Library · quick run'),
        el('span', { class: 'lib-toggle-meta' }, `${state.cases.length} cases · 库 · read-only defaults · 跑前临时勾选起批`),
      );
      return el('div', { class: 'lib-section' },
        toggle,
        expanded ? consoleNode : null,
      );
    }

    // Live takeover — replaces the Run Center home content while ≥1 case is
    // actively running. Big broadcast screen + log + per-run controls.
    function renderLiveTakeover() {
      const c = state.console;
      const liveCases = state.cases.filter((cs) => state.active.some((a) => a.caseId === cs.id));
      if (!liveCases.length) return el('div', { class: 'empty' }, 'No active runs');
      const active = state.active.filter((a) => liveCases.some((cs) => cs.id === a.caseId));
      if (!state.liveCaseId || !liveCases.some((cs) => cs.id === state.liveCaseId)) {
        state.liveCaseId = active[0]?.caseId || null;
      }
      const preview = active.find((a) => a.caseId === state.liveCaseId) || active[0] || null;
      const previewCase = liveCases.find((cs) => cs.id === preview?.caseId);

      // ── header: title + abort all + compose-mode escape hatch ────────
      const head = el('div', { class: 'takeover-head' },
        el('div', {},
          el('div', { class: 'takeover-title' },
            el('span', { class: 'pulse-dot' }),
            `${liveCases.length} case${liveCases.length === 1 ? '' : 's'} running live`,
          ),
          el('div', { class: 'takeover-sub' }, 'Run Console 暂时隐藏 · 跑完自动回到选 case 视图，或者手动点 Compose new run'),
        ),
        el('div', { class: 'takeover-actions' },
          el('button', {
            class: 'btn ghost',
            onclick: () => { c.forceComposeMode = true; renderAll(); },
          }, '＋ Compose new run'),
          el('button', {
            class: 'btn abort-big',
            onclick: () => openAbortModal(liveCases.map((cs) => cs.id)),
          }, `⏹ Abort ${liveCases.length}…`),
        ),
      );

      // ── flip chips ───────────────────────────────────────────────────
      const chips = el('div', { class: 'takeover-chips' },
        ...liveCases.map((cs) => {
          const a = state.active.find((x) => x.caseId === cs.id);
          const stepStr = a?.currentStep ? `${a.currentStep.order}/${a.totalSteps}` : '…';
          return el('button', {
            class: 'flip-chip' + (state.liveCaseId === cs.id ? ' active' : ''),
            onclick: () => { state.liveCaseId = cs.id; renderAll(); },
          },
            el('span', { class: 'pulse-dot' }),
            el('span', { class: 'flip-chip-id' }, cs.id),
            el('span', { class: 'flip-chip-step' }, `step ${stepStr}`),
          );
        }),
      );

      // ── screen ───────────────────────────────────────────────────────
      const screen = el('div', { class: 'takeover-screen', id: 'liveScreenBig' },
        el('img', { id: 'liveShot', alt: 'Live browser', src: FALLBACK_SCREENSHOT, onerror: (ev) => ev.target.remove() }),
        el('div', { class: 'takeover-overlay' },
          el('b', {}, preview?.caseTitle || (previewCase ? caseTitle(previewCase) : '?')),
          el('div', {}, preview?.currentStep
            ? `Step ${preview.currentStep.order}/${preview.totalSteps} · ${preview.currentStep.title || preview.currentStep.api || ''}`
            : 'Waiting for first step…'),
        ),
      );

      // ── log ──────────────────────────────────────────────────────────
      const logLines = preview?.logTail || [];
      const logBox = logLines.length
        ? el('div', { class: 'live-log', id: 'liveLogBox', style: 'max-height: 320px;' },
            ...logLines.map((entry) => el('div', { class: 'live-log-line' },
              el('span', { class: 'live-log-ts' }, new Date(entry.ts).toLocaleTimeString()),
              el('span', { class: 'live-log-msg' }, entry.line),
            )),
          )
        : el('div', { class: 'live-log empty' }, 'Waiting for first log line…');

      // ── Finished in this batch panel ─────────────────────────────────
      // While a batch is running, surface the cases that have already
      // finished underneath the broadcast — with Report + Log + Run again
      // buttons. So the user doesn't have to wait for the whole batch.
      const bp = state.batchProgress;
      let finishedPanel = null;
      if (bp && bp.seenFinishedIds.size > 0) {
        const finishedRows = [...bp.seenFinishedIds].map((id) => {
          const cs = state.cases.find((c) => c.id === id);
          const result = state.recent.find((r) => r.caseId === id && r.finishedAt && new Date(r.finishedAt).getTime() >= bp.startedAt);
          const passed = result?.status === 'passed';
          return el('div', { class: 'finished-row' + (passed ? ' is-pass' : ' is-fail'), dataset: { finishedId: id } },
            el('div', { class: 'finished-badge' }, passed ? '✓' : '✗'),
            el('div', { style: 'min-width:0; flex:1;' },
              el('div', { style: 'font-weight:900; color:var(--navy); font-size:13px;' }, id, cs ? ` · ${caseTitle(cs)}` : ''),
              el('div', { class: 'hint', style: 'font-size:11px; margin-top:1px;' },
                passed
                  ? `跑成功 · ${result?.durationMs ? (Math.round(result.durationMs / 100) / 10) + 's' : ''}`
                  : `失败原因: ${(result?.errorMessage || '未知').slice(0, 120)}`,
              ),
            ),
            result?.report?.url
              ? el('button', { class: 'btn mini', onclick: () => window.open(result.report.url, '_blank') }, 'Report')
              : null,
            result?.runId
              ? el('button', { class: 'btn mini', onclick: () => {
                  state.tab = 'live'; state.section = 'logs';
                  (state.runLogExpanded = state.runLogExpanded || new Set()).add(result.runId);
                  renderAll();
                } }, 'Log')
              : null,
            el('button', { class: 'btn mini', onclick: () => openRunModal([id], { name: `Re-run ${id}`, title: '重跑这一个 case' }) }, '↺ Run again'),
          );
        });
        finishedPanel = el('div', { class: 'finished-panel' },
          el('div', { class: 'finished-head' },
            el('span', { style: 'font-weight:900; color:var(--navy);' }, `Finished in this batch · ${bp.seenFinishedIds.size} of ${bp.totalIds.size}`),
            el('span', { class: 'hint' }, '后到先显示 · 可继续看 Report / Log / 单独重跑'),
          ),
          ...finishedRows,
        );
      }

      // Defer hydration + scroll so DOM is mounted first.
      setTimeout(() => {
        hydrateLiveShot(preview);
        const box = document.getElementById('liveLogBox');
        if (box) box.scrollTop = box.scrollHeight;
      }, 0);

      return el('div', { class: 'takeover' },
        head,
        liveCases.length > 1 ? chips : null,
        screen,
        el('div', { class: 'live-log-head' },
          el('span', {}, '▼ Live log'),
          preview ? el('span', { class: 'hint' }, `run: ${preview.runId?.slice(0, 8) || '?'}…`) : null,
        ),
        logBox,
        finishedPanel,
      );
    }

    function renderRunConsole() {
      const c = state.console;
      const q = c.search.trim().toLowerCase();
      const filtered = state.cases.filter((cs) => {
        if (q && !(cs.id.toLowerCase().includes(q) || caseTitle(cs).toLowerCase().includes(q))) return false;
        if (c.filter === 'all') return true;
        if (c.filter === 'passed') return statusOf(cs.id) === 'passed';
        if (c.filter === 'failed') return statusOf(cs.id) === 'failed';
        return categorizeCase(cs) === c.filter;
      });
      const selectedCount = c.selectedIds.size;
      const totalRuns = selectedCount * c.runsPerCase;
      const editing = c.editingBatchId ? state.batches.find((b) => b.id === c.editingBatchId) : null;

      const nameInput = el('input', {
        type: 'text',
        value: c.name || suggestBatchName([...c.selectedIds]),
        placeholder: 'Batch name (auto-suggested)',
        oninput: (ev) => { c.name = ev.target.value; },
      });
      const runBtn = el('button', {
        class: 'run-cta',
        disabled: selectedCount === 0,
        onclick: () => {
          const ids = [...c.selectedIds];
          openRunModal(ids, {
            name: nameInput.value || suggestBatchName(ids),
            runsPerCase: c.runsPerCase,
            batchId: c.editingBatchId,
            title: c.editingBatchId ? 'Confirm Run (edit + run)' : 'Confirm Run',
            sub: '取个名字 → 跑起来，会出现在 My Projects 下次一键复用',
          });
        },
      },
        el('span', {}, selectedCount === 0 ? 'Select cases to run' : `▶ Run · ${selectedCount} case${selectedCount === 1 ? '' : 's'}`),
        selectedCount > 0 ? el('span', { class: 'small' }, `${totalRuns} total executions · 弹窗确认`) : null,
      );

      const smartChip = (key, label) => el('button', {
        class: 'smart-chip' + (c.filter === key ? ' active' : ''),
        onclick: () => { c.filter = key; renderAll(); },
      }, label);

      const filterChips = [
        smartChip('all', `All · ${state.cases.length}`),
        ...CATEGORY_RULES.map((r) => {
          const n = state.cases.filter((cs) => categorizeCase(cs) === r.key).length;
          return n ? smartChip(r.key, `${r.label} · ${n}`) : null;
        }).filter(Boolean),
        smartChip('passed', 'Passed only'),
        smartChip('failed', 'Failed only'),
      ];

      const activeRuns = state.active.filter((a) => state.cases.some((cs) => cs.id === a.caseId));
      const activeIds = new Set(activeRuns.map((a) => a.caseId));
      const selectedActive = [...c.selectedIds].filter((id) => activeIds.has(id));

      return el('div', { class: 'run-console' },
        el('div', { class: 'run-console-head' },
          el('div', {},
            el('div', { class: 'title' }, editing ? `Editing · ${editing.name}` : 'Run Console'),
            el('div', { class: 'sub' }, editing
              ? '改完点 Save & Run 会覆盖原 batch；点 Cancel 退出编辑'
              : `选 case、命名、设次数，一键起跑 · 已选 ${c.selectedIds.size}/${state.cases.length}${activeRuns.length ? ` · ${activeRuns.length} 正在 run` : ''}`),
          ),
          el('div', { class: 'top-actions' },
            editing ? el('button', { class: 'btn ghost', onclick: () => {
              c.editingBatchId = null; c.name = ''; renderAll();
            } }, 'Cancel edit') : null,
            activeRuns.length ? el('button', {
              class: 'btn abort-big',
              onclick: () => openAbortModal(selectedActive),
            }, `⏹ Abort… (${activeRuns.length} live)`) : null,
            runBtn,
          ),
        ),
        el('div', { class: 'console-body' },
          el('div', { class: 'bulk-bar' },
            el('button', {
              class: 'btn primary mini',
              onclick: () => { state.cases.forEach((cs) => c.selectedIds.add(cs.id)); renderAll(); },
            }, `Select all (${state.cases.length})`),
            el('button', {
              class: 'btn mini',
              onclick: () => {
                if (filtered.length === state.cases.length) return;
                filtered.forEach((cs) => c.selectedIds.add(cs.id));
                renderAll();
              },
              disabled: filtered.length === state.cases.length,
            }, `Select visible (${filtered.length})`),
            el('button', {
              class: 'btn mini',
              onclick: () => {
                filtered.forEach((cs) => c.selectedIds.delete(cs.id));
                renderAll();
              },
            }, 'Deselect visible'),
            el('button', {
              class: 'btn mini',
              onclick: () => { c.selectedIds.clear(); renderAll(); },
            }, 'Clear all'),
            el('button', {
              class: 'btn mini',
              onclick: () => {
                state.cases.forEach((cs) => {
                  if (c.selectedIds.has(cs.id)) c.selectedIds.delete(cs.id);
                  else c.selectedIds.add(cs.id);
                });
                renderAll();
              },
            }, 'Invert'),
            el('span', { class: 'bulk-count' }, `${c.selectedIds.size} selected`),
          ),
          el('div', { class: 'console-toolbar' },
            el('input', {
              id: 'consoleSearch',
              type: 'search',
              value: c.search,
              placeholder: 'Search by id or title',
              oninput: (ev) => {
                c.search = ev.target.value;
                // Re-render wipes the input element → focus would be lost mid-typing.
                // Stash caret + flag so renderAll's post-render hook restores focus.
                c._restoreFocus = { id: 'consoleSearch', selStart: ev.target.selectionStart, selEnd: ev.target.selectionEnd };
                renderAll();
              },
            }),
            ...filterChips,
          ),
          el('div', { class: 'console-cases' },
            ...filtered.map((cs) => renderConsoleCaseRow(cs)),
            state.cases.length === 0
              ? el('div', { class: 'empty', style: 'grid-column: 1 / -1;' },
                  el('div', {}, '没有加载到 case。'),
                  el('div', { class: 'hint', style: 'margin-top:6px;' }, '若是首次进入页面，等 1-2 秒；若长时间没出来，去看一眼开发者控制台是否登录有效。'),
                  el('button', { class: 'btn mini', style: 'margin-top:8px;', onclick: () => loadInitial() }, '重新加载'),
                )
              : (filtered.length === 0
                ? el('div', { class: 'empty', style: 'grid-column: 1 / -1;' }, '没有匹配的 case。把筛选切回 “All” 试试。',
                    el('button', { class: 'btn mini', style: 'margin-left:8px;', onclick: () => { c.filter = 'all'; c.search = ''; renderAll(); } }, 'Reset filter'),
                  )
                : null),
          ),
          el('div', { class: 'console-foot' },
            el('div', {},
              el('label', { class: 'label' }, 'Batch name'),
              nameInput,
            ),
            el('div', {},
              el('label', { class: 'label' }, 'Run × per case'),
              el('div', { class: 'run-count' },
                ...[1, 2, 3, 5].map((n) => el('button', {
                  class: c.runsPerCase === n ? 'active' : '',
                  onclick: () => { c.runsPerCase = n; renderAll(); },
                }, `×${n}`)),
              ),
            ),
            el('div', {},
              el('label', { class: 'label' }, ' '),
              el('button', { class: 'btn', onclick: () => saveBatchFromConsole(nameInput.value) }, editing ? 'Save changes' : 'Save as batch'),
            ),
          ),
        ),
      );
    }

    // One case card inside the Run Console grid. Collapsed view: checkbox +
    // title + category tag + expand toggle. Expanded view: per-case Save bar,
    // editable params (from the case's apiGuide aiInput steps), and a
    // foldable Natural Language preview.
    function renderConsoleCaseRow(cs) {
      const c = state.console;
      const checked = c.selectedIds.has(cs.id);
      const cat = categorizeCase(cs);
      const meta = categoryMeta(cat);
      const expanded = c.expandedIds.has(cs.id);
      const detail = state.details.get(cs.id);

      const head = el('div', {
        class: 'console-case-head',
        onclick: () => {
          if (checked) c.selectedIds.delete(cs.id);
          else c.selectedIds.add(cs.id);
          renderAll();
        },
      },
        el('input', {
          type: 'checkbox',
          checked,
          onclick: (ev) => ev.stopPropagation(),
          onchange: (ev) => {
            if (ev.target.checked) c.selectedIds.add(cs.id);
            else c.selectedIds.delete(cs.id);
            renderAll();
          },
        }),
        el('div', { style: 'min-width:0;' },
          el('div', { class: 'ctitle' }, cs.id, ' · ', caseTitle(cs)),
          el('div', { class: 'cmeta' }, caseDesc(cs) || 'SAP automation case'),
          // Derived business tags — which projects/businesses use this case.
          // Shows up automatically once the user creates a project with a
          // business attached. Empty by default (no projects yet).
          ((bs) => bs.length ? el('div', { style: 'display:flex; gap: 4px; margin-top: 4px; flex-wrap: wrap;' }, ...bs.map((b) => el('span', { class: 'biz-badge' }, b))) : null)(businessesContainingCase(cs.id)),
        ),
        el('span', { class: `cat-tag cat-${cat}` }, meta.label),
        el('button', {
          class: 'expand-btn' + (expanded ? ' expanded' : ''),
          title: expanded ? 'Hide details' : 'Show params & natural language',
          onclick: async (ev) => {
            ev.stopPropagation();
            if (c.expandedIds.has(cs.id)) {
              c.expandedIds.delete(cs.id);
              renderAll();
            } else {
              c.expandedIds.add(cs.id);
              renderAll();
              // Load detail lazily so the API call only fires when the user
              // actually opens this case.
              if (!state.details.has(cs.id)) {
                await loadDetail(cs.id).catch(() => {});
                renderAll();
              }
            }
          },
        }, expanded ? '▾' : '▸'),
      );

      if (!expanded) {
        return el('div', { class: 'console-case' + (checked ? ' checked' : '') }, head);
      }

      // ── Expanded body ───────────────────────────────────────────────
      const body = el('div', { class: 'console-case-body' });

      if (!detail) {
        body.appendChild(el('div', { class: 'hint' }, 'Loading case detail…'));
        return el('div', { class: 'console-case expanded' + (checked ? ' checked' : '') }, head, body);
      }

      const parsed = detail.parsed || detail;
      const fields = extractParams(detail);
      const oldParams = parsed.params && typeof parsed.params === 'object' && !Array.isArray(parsed.params) ? parsed.params : {};
      const inputMap = new Map();

      // Description (cleaned of BP_IT_* prefixes). Lives in the expanded
      // view since the collapsed meta now shows the short bucket label.
      const descText = caseDescriptionClean(detail) || caseDescriptionClean(cs);
      if (descText) {
        body.appendChild(el('div', { class: 'cc-section' },
          el('div', { class: 'cc-label' }, 'Description'),
          el('div', { class: 'cc-desc' }, descText),
        ));
      }

      // Params block — READ-ONLY in Library context.
      // The case library is the source of truth; per-business / per-project
      // parameter overrides live on a Project, not on the case file. This
      // matches the meeting brief: 库里的 case 不动，project 里改。
      const paramsBlock = el('div', { class: 'cc-section' },
        el('div', { class: 'cc-label' },
          el('span', {}, 'Library defaults'),
          el('span', { class: 'inline-status-pill is-readonly' }, 'read only'),
        ),
        fields.length === 0
          ? el('div', { class: 'hint' }, '这个 case 没有可调参数（无 aiInput 步骤）。')
          : el('div', { class: 'cc-param-grid' },
              ...fields.map((f) => el('div', { class: 'cc-param' },
                el('label', { title: f.locator }, `#${f.order} · ${f.locator}`),
                el('input', { type: 'text', value: f.defaultValue, readonly: true, style: 'background: var(--g-gray-95); color: var(--muted); cursor: not-allowed;' }),
              )),
            ),
        fields.length > 0 ? el('div', { class: 'hint', style: 'margin-top: var(--space-3); padding: var(--space-3); background: var(--g-blue-95); border-left: 3px solid var(--blue);' },
          '要改参数？请 ',
          el('button', { class: 'a-button a-button--brand-tertiary -small', style: 'height: auto; padding: 0; min-width: 0; display: inline;', onclick: () => openCreateProjectModal({ initialIds: [cs.id], initialName: `Custom · ${cs.id}` }) }, '+ Create a project'),
          '，里面每个 case 可以有自己的参数覆盖（库里这份默认永不变）。',
        ) : null,
      );
      body.appendChild(paramsBlock);

      // Natural Language block — collapsed by default per user request.
      const nlOpen = c.nlOpenIds.has(cs.id);
      const nlBlock = el('div', { class: 'cc-section' },
        el('div', { class: 'cc-label nl-toggle', onclick: () => {
          if (nlOpen) c.nlOpenIds.delete(cs.id);
          else c.nlOpenIds.add(cs.id);
          renderAll();
        } },
          el('span', {}, nlOpen ? '▾' : '▸', ' Natural Language'),
          el('span', { class: 'readonly-note' }, 'read only · 改参数会自动同步'),
        ),
        nlOpen
          ? el('pre', { class: 'nl-box' }, parsed.naturalLanguage || 'No natural language description.')
          : null,
      );
      body.appendChild(nlBlock);

      return el('div', { class: 'console-case expanded' + (checked ? ' checked' : '') }, head, body);
    }

    // My Projects — merges old Saved Batches + Quick Projects into one
    // expandable list. Each project card has: header (icon + name + meta +
    // expand toggle), actions (Run / Edit selection / Rename / Delete) and
    // when expanded shows every case in the project.
    function renderMyProjects() {
      const projectExpand = state.console._projectExpand = state.console._projectExpand || new Set();

      // ── 1. Build preset projects from category rules ──────────────────
      const presets = [];
      for (const rule of CATEGORY_RULES) {
        const ids = state.cases.filter((c) => categorizeCase(c) === rule.key).map((c) => c.id);
        if (!ids.length) continue;
        presets.push({
          id: `preset-${rule.key}`,
          name: `${rule.label} Suite`,
          icon: rule.label[0],
          color: rule.color,
          caseIds: ids,
          runsPerCase: 1,
          isPreset: true,
          metaExtra: '内置预设',
        });
      }
      const allIds = state.cases.map((c) => c.id);
      if (allIds.length) presets.push({
        id: 'preset-full',
        name: 'Full Regression',
        icon: '★',
        color: '#15304f',
        caseIds: allIds,
        runsPerCase: 1,
        isPreset: true,
        metaExtra: '内置预设',
      });
      const recentFailed = state.recent.filter((r) => r.status === 'failed').slice(0, 8).map((r) => r.caseId).filter(Boolean);
      if (recentFailed.length) presets.push({
        id: 'preset-failed',
        name: 'Rerun Failed',
        icon: '↺',
        color: '#b4232f',
        caseIds: [...new Set(recentFailed)],
        runsPerCase: 1,
        isPreset: true,
        metaExtra: '失败重跑',
      });

      // ── 2. User-created projects (from state.batches storage) ────────
      const userProjects = state.batches.map((b) => ({
        ...b,
        icon: (b.name || '?').trim()[0] || '#',
        color: '#0b6bdc',
        isPreset: false,
      }));

      // ── 3. Render single card ─────────────────────────────────────────
      const renderCard = (p) => {
        const liveCount = (p.caseIds || []).filter((id) => state.active.some((a) => a.caseId === id)).length;
        const expanded = projectExpand.has(p.id);
        const statusKey = liveCount ? 'running' : (p.status || 'pending');
        const head = el('div', {
          class: 'project-head',
          onclick: () => {
            if (expanded) projectExpand.delete(p.id);
            else projectExpand.add(p.id);
            renderAll();
          },
        },
          el('div', { class: 'pc-icon', style: `background: ${p.color};` }, p.icon),
          el('div', { style: 'min-width:0;' },
            el('div', { class: 'pj-name' }, p.name),
            el('div', { class: 'pj-meta' }, `${p.caseIds?.length || 0} cases · ×${p.runsPerCase || 1}/case${p.metaExtra ? ` · ${p.metaExtra}` : (p.createdAt ? ` · ${new Date(p.createdAt).toLocaleDateString()}` : '')}${liveCount ? ` · ${liveCount} live` : ''}`),
          ),
          el('button', {
            class: 'project-run-btn a-button a-button--brand-primary -small',
            onclick: (ev) => {
              ev.stopPropagation();
              openRunModal(p.caseIds || [], { name: p.name, runsPerCase: p.runsPerCase || 1, batchId: p.isPreset ? null : p.id, title: `Run ${p.name}` });
            },
          }, liveCount ? 'Watch live' : 'Run project'),
          el('span', { class: `status ${statusKey}` }, liveCount ? 'Live' : statusLabel(statusKey)),
          el('button', {
            class: 'expand-btn' + (expanded ? ' expanded' : ''),
            onclick: (ev) => { ev.stopPropagation(); if (expanded) projectExpand.delete(p.id); else projectExpand.add(p.id); renderAll(); },
          }, expanded ? '▾' : '▸'),
        );

        if (!expanded) return el('div', { class: 'project-card' + (p.isPreset ? ' preset' : '') }, head);

        const cases = (p.caseIds || []).map((id) => state.cases.find((c) => c.id === id)).filter(Boolean);
        const body = el('div', { class: 'project-body' },
          el('div', { class: 'pj-cases' },
            ...cases.map((cs) => caseRowInProject(cs, p)),  // ← p threads project for override editor
            cases.length === 0 ? el('div', { class: 'hint' }, '这个 project 里的 case 已被删除或重命名。Edit 重新选一遍。') : null,
          ),
          el('div', { class: 'bc-actions' },
            el('button', {
              class: 'btn mini primary',
              onclick: (ev) => { ev.stopPropagation(); openRunModal(p.caseIds || [], { name: p.name, runsPerCase: p.runsPerCase || 1, batchId: p.isPreset ? null : p.id }); },
            }, '▶ Run'),
            el('button', {
              class: 'btn mini',
              onclick: (ev) => {
                ev.stopPropagation();
                state.console.selectedIds = new Set(p.caseIds || []);
                state.console.name = p.isPreset ? p.name : (p.name || '');
                state.console.runsPerCase = p.runsPerCase || 1;
                state.console.editingBatchId = p.isPreset ? null : p.id;
                state.console.filter = 'all';
                renderAll();
                window.scrollTo({ top: 0, behavior: 'smooth' });
                toast(p.isPreset ? `已载入 "${p.name}"，可以再调整然后 Save / Run` : `进入编辑 "${p.name}"`);
              },
            }, p.isPreset ? 'Load into Console' : 'Edit'),
            !p.isPreset ? el('button', {
              class: 'btn mini',
              onclick: (ev) => { ev.stopPropagation(); openRenameModal(p.name || '', (newName) => {
                const existing = state.batches.find((x) => x.id === p.id);
                if (existing) { existing.name = newName; existing.updatedAt = new Date().toISOString(); saveBatches(); }
                renderAll(); toast(`已改名为 "${newName}"`);
              }); },
            }, 'Rename') : null,
            !p.isPreset ? el('button', {
              class: 'btn mini danger',
              onclick: (ev) => { ev.stopPropagation();
                if (!confirm(`删除 project "${p.name || p.id}"？`)) return;
                state.batches = state.batches.filter((x) => x.id !== p.id);
                saveBatches(); renderAll();
              },
            }, 'Delete') : null,
          ),
        );
        return el('div', { class: 'project-card expanded' + (p.isPreset ? ' preset' : '') }, head, body);
      };

      const card = el('div', { class: 'section-card' },
        el('div', { class: 'section-title' },
          el('span', {}, `My Projects · ${userProjects.length} custom · ${presets.length} presets`),
          el('div', { style: 'display:flex; gap:6px;' },
            el('button', {
              class: 'a-button a-button--brand-primary -small',
              onclick: () => openCreateProjectModal({
                initialIds: [...state.console.selectedIds],
                initialName: suggestBatchName([...state.console.selectedIds]) || '',
              }),
            }, '+ New project'),
            userProjects.length ? el('button', { class: 'btn mini danger', onclick: () => {
              if (!confirm('清空所有自建 project？预设不会动。')) return;
              state.batches = []; saveBatches(); renderAll();
            } }, 'Clear all custom') : null,
          ),
        ),
        el('div', { style: 'padding: 12px;' },
          // user projects first (most actionable), then presets
          userProjects.length === 0
            ? el('div', { class: 'empty', style: 'border:1px dashed var(--line); border-radius:8px; margin-bottom:8px; padding:14px;' },
                '还没有自建 project。',
                el('br', {}),
                '在上面 Run Console 勾几个 case → 点 **+ New project from selection** 给它起个名（比如 "Asset Suite"），就有了。')
            : null,
          ...userProjects.map(renderCard),
          presets.length ? el('div', { class: 'hint', style: 'margin: 10px 4px 6px;' }, '── Presets · 按类别自动归类，可以 Load into Console 改了再保存为新 project ──') : null,
          ...presets.map(renderCard),
        ),
      );
      return card;
    }

    // Row inside an expanded project card: category tag + case name + status
    // badge + Report/Log/Open quick actions. Used by Run Center home My
    // Projects + sidebar Projects view (both SAP Automation Project card
    // and user batches).
    function caseRowInProject(cs, project) {
      const cat = categorizeCase(cs);
      const recent = state.recent.find((r) => r.caseId === cs.id);
      const isLive = state.active.some((a) => a.caseId === cs.id);
      const actions = el('div', { class: 'pj-case-actions' });

      // Per-project parameter overrides — counted to show a badge on the
      // row when there's at least one override for this case in this project.
      const overrides = project?.caseOverrides?.[cs.id]?.params || {};
      const overrideCount = Object.keys(overrides).length;
      // Inline-expand key. Format: "<projectId>::<caseId>" so two open
      // editors in different projects don't collide.
      const expandKey = project ? `${project.id}::${cs.id}` : '';
      state.projectCaseExpand = state.projectCaseExpand || new Set();
      const isExpanded = expandKey ? state.projectCaseExpand.has(expandKey) : false;

      // Show "Edit params" only when we're inside a real project (not a
      // preset / not the library-quick-run grid). Click toggles inline
      // expand under the row — no modal.
      if (project && !project.isPreset) {
        actions.appendChild(el('button', {
          class: 'btn mini' + (overrideCount > 0 ? ' primary' : ''),
          title: overrideCount > 0 ? `${overrideCount} parameter overrides on this project — library default untouched` : 'Inline edit parameters for this case in this project (library stays untouched)',
          onclick: async (ev) => {
            ev.stopPropagation();
            if (state.projectCaseExpand.has(expandKey)) {
              state.projectCaseExpand.delete(expandKey);
              renderAll();
            } else {
              state.projectCaseExpand.add(expandKey);
              renderAll();
              if (!state.details.has(cs.id)) {
                await loadDetail(cs.id).catch(() => {});
                renderAll();
              }
            }
          },
        }, isExpanded ? '▾ Close' : (overrideCount > 0 ? `● ${overrideCount} overridden` : '✎ Params')));
      }

      if (isLive) {
        actions.appendChild(el('button', {
          class: 'btn mini',
          onclick: (ev) => { ev.stopPropagation();
            state.tab = 'run'; state.section = 'run-center';
            state.liveCaseId = cs.id; if (state.console) state.console.forceComposeMode = false;
            renderAll(); window.scrollTo({ top: 0, behavior: 'smooth' });
          },
        }, '🔴 Live'));
      } else if (recent) {
        if (recent.report?.url) {
          actions.appendChild(el('button', {
            class: 'btn mini',
            onclick: (ev) => { ev.stopPropagation(); window.open(recent.report.url, '_blank'); },
          }, 'Report'));
        }
        if (recent.runId) {
          actions.appendChild(el('button', {
            class: 'btn mini',
            onclick: (ev) => { ev.stopPropagation();
              state.tab = 'live'; state.section = 'logs';
              (state.runLogExpanded = state.runLogExpanded || new Set()).add(recent.runId);
              renderAll();
            },
          }, 'Log'));
        }
      } else {
        actions.appendChild(el('button', {
          class: 'btn mini',
          onclick: (ev) => { ev.stopPropagation(); openRunModal([cs.id], { name: `Run ${cs.id}`, title: `Run single case` }); },
        }, '▶ Run'));
      }

      const bs = businessesContainingCase(cs.id);
      const headRow = el('div', { class: 'pj-case-line' + (isExpanded ? ' is-expanded' : '') },
        el('span', { class: `cat-tag cat-${cat}` }, categoryMeta(cat).label),
        el('div', { style: 'min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;' },
          `${cs.id} · ${caseTitle(cs)}`,
          bs.length ? el('span', { style: 'margin-left: var(--space-2); display: inline-flex; gap: 4px;' }, ...bs.map((b) => el('span', { class: 'biz-badge' }, b))) : null,
        ),
        el('span', { class: `status ${isLive ? 'running' : statusOf(cs.id)}` }, isLive ? 'Live' : statusLabel(statusOf(cs.id))),
        actions,
      );
      if (!isExpanded || !project) return el('div', { class: 'pj-case-block' }, headRow);
      // ── Inline expand: params + NL · no modal ──
      return el('div', { class: 'pj-case-block is-expanded' }, headRow, renderInlineCaseEditor(project, cs));
    }

    // Inline editor under a project's case row. Params on the left (with
    // library default shown beside each input), Natural Language on the
    // right (read-only, scrollable). Saves overrides directly into
    // project.caseOverrides[caseId].params. Library file never touched.
    function renderInlineCaseEditor(project, cs) {
      const detail = state.details.get(cs.id);
      if (!detail) {
        return el('div', { class: 'pj-case-body loading' },
          el('div', { class: 'a-text--label' }, 'Loading case detail…'),
        );
      }
      const fields = extractParams(detail);
      const parsed = detail.parsed || detail;
      const overrides = { ...((project.caseOverrides?.[cs.id]?.params) || {}) };

      const inputMap = new Map();
      const fieldNodes = fields.map((f) => {
        const currentVal = Object.prototype.hasOwnProperty.call(overrides, f.order) ? overrides[f.order] : f.defaultValue;
        const isModified = currentVal !== f.defaultValue;
        const input = el('input', {
          type: 'text',
          value: currentVal,
          class: isModified ? 'is-modified' : '',
          oninput: (ev) => {
            overrides[f.order] = ev.target.value;
            ev.target.classList.toggle('is-modified', ev.target.value !== f.defaultValue);
            statusPill.textContent = Object.keys(overrides).filter((k) => overrides[k] !== (fields.find((x) => x.order === k)?.defaultValue || '')).length
              ? `${Object.keys(overrides).length} unsaved`
              : 'No changes';
          },
        });
        inputMap.set(f.order, { input, defaultValue: f.defaultValue });
        return el('div', { class: 'inline-field' },
          el('div', { class: 'inline-field-label' }, `#${f.order} · ${f.locator}`),
          el('div', { class: 'inline-input-row' },
            input,
            el('button', {
              class: 'btn mini',
              title: 'Reset to library default',
              onclick: () => {
                input.value = f.defaultValue;
                input.classList.remove('is-modified');
                delete overrides[f.order];
              },
            }, '↺'),
          ),
          el('div', { class: 'inline-default-pill' }, 'Library default: ', el('code', {}, f.defaultValue || '(empty)')),
        );
      });

      const statusPill = el('span', { class: 'inline-status-pill' }, 'No changes');

      // Natural language — collapsible inline, default open.
      const nlBox = el('pre', { class: 'inline-nl-box' }, parsed.naturalLanguage || 'No natural language description.');

      return el('div', { class: 'pj-case-body' },
        el('div', { class: 'inline-grid' },
          // ── Params column ────────────────────────────────────────
          el('div', { class: 'inline-col-params' },
            el('div', { class: 'inline-col-head' },
              el('div', { class: 'a-text--label' }, 'Parameters'),
              statusPill,
            ),
            fields.length === 0
              ? el('div', { class: 'hint', style: 'padding: var(--space-3);' }, '这个 case 没有 aiInput 步骤，无可调参数。')
              : el('div', { class: 'inline-fields' }, ...fieldNodes),
          ),
          // ── NL column ────────────────────────────────────────────
          el('div', { class: 'inline-col-nl' },
            el('div', { class: 'inline-col-head' },
              el('div', { class: 'a-text--label' }, 'Natural Language'),
              el('span', { class: 'inline-status-pill is-readonly' }, 'read only'),
            ),
            nlBox,
          ),
        ),
        // ── Footer actions ───────────────────────────────────────
        fields.length ? el('div', { class: 'inline-actions' },
          el('button', { class: 'a-button a-button--neutral-secondary -small', onclick: () => {
            for (const [order, { input, defaultValue }] of inputMap) {
              input.value = defaultValue;
              input.classList.remove('is-modified');
              delete overrides[order];
            }
            statusPill.textContent = 'No changes';
          } }, 'Reset all to library default'),
          el('div', { style: 'flex: 1;' }),
          el('button', { class: 'a-button a-button--neutral-tertiary -small', onclick: () => {
            state.projectCaseExpand.delete(`${project.id}::${cs.id}`);
            renderAll();
          } }, 'Close'),
          el('button', { class: 'a-button a-button--brand-primary -small', onclick: () => {
            project.caseOverrides = project.caseOverrides || {};
            // Filter out any "modified" that happens to match the library default after edits.
            const cleaned = {};
            for (const f of fields) {
              const v = Object.prototype.hasOwnProperty.call(overrides, f.order) ? overrides[f.order] : f.defaultValue;
              if (v !== f.defaultValue) cleaned[f.order] = v;
            }
            if (Object.keys(cleaned).length === 0) delete project.caseOverrides[cs.id];
            else project.caseOverrides[cs.id] = { params: cleaned };
            project.updatedAt = new Date().toISOString();
            saveBatches();
            toast(`${cs.id} 参数覆盖已保存到 project "${project.name}"`);
            renderAll();
          } }, 'Save overrides'),
        ) : null,
      );
    }

    // Modal: edit per-case parameter overrides for THIS project. Shows
    // the library default beside each editable input. Saved overrides
    // live on project.caseOverrides[caseId].params — case file unchanged.
    async function openParamOverrideModal(project, cs) {
      // Lazy-load full case detail so we can read its default params + fields.
      let detail = state.details.get(cs.id);
      if (!detail) {
        try { detail = await loadDetail(cs.id); } catch (err) {
          return toast('加载 case 详情失败: ' + (err?.message || err));
        }
      }
      const fields = extractParams(detail);
      if (!fields.length) return toast(`${cs.id} 没有可调参数 (没有 aiInput 步骤)`);

      const overrides = { ...((project.caseOverrides?.[cs.id]?.params) || {}) };

      const backdrop = el('div', { class: 'modal-backdrop', onclick: (ev) => { if (ev.target === backdrop) close(); } });
      function close() { backdrop.remove(); document.removeEventListener('keydown', onKey); }
      function onKey(ev) { if (ev.key === 'Escape') close(); }
      document.addEventListener('keydown', onKey);

      const inputMap = new Map();
      const fieldNodes = fields.map((f) => {
        const currentVal = Object.prototype.hasOwnProperty.call(overrides, f.order) ? overrides[f.order] : f.defaultValue;
        const isModified = currentVal !== f.defaultValue;
        const input = el('input', {
          type: 'text',
          value: currentVal,
          class: isModified ? 'is-modified' : '',
          oninput: (ev) => {
            overrides[f.order] = ev.target.value;
            ev.target.classList.toggle('is-modified', ev.target.value !== f.defaultValue);
          },
        });
        inputMap.set(f.order, { input, defaultValue: f.defaultValue });
        return el('div', { class: 'override-field' },
          el('div', { class: 'override-field-label' }, `#${f.order} · ${f.locator}`),
          el('div', { class: 'override-input-row' },
            input,
            el('button', {
              class: 'btn mini',
              title: 'Reset to library default',
              onclick: () => {
                input.value = f.defaultValue;
                delete overrides[f.order];
                input.classList.remove('is-modified');
              },
            }, '↺'),
          ),
          el('div', { class: 'override-default-pill' }, 'Library default: ', el('code', {}, f.defaultValue || '(empty)')),
        );
      });

      const modal = el('div', { class: 'modal cp-modal' },
        el('div', { class: 'modal-head' },
          el('div', {},
            el('div', { class: 'title' }, `${cs.id} · ${caseTitle(cs)}`),
            el('div', { class: 'sub' }, `Project: ${project.name} · 改这里只影响这个 project · 库里的 case 文件不动`),
          ),
          el('button', { class: 'a-button a-button--neutral-tertiary -small', onclick: close, 'aria-label': 'Close' }, '✕'),
        ),
        el('div', { class: 'modal-body' },
          el('div', { class: 'override-section' },
            el('div', { class: 'override-head' },
              el('span', { class: 'a-text--label' }, 'Parameters'),
              el('span', { class: 'override-badge' + (Object.keys(overrides).length === 0 ? ' is-default' : '') },
                Object.keys(overrides).length === 0 ? 'Library defaults' : `${Object.keys(overrides).length} override${Object.keys(overrides).length === 1 ? '' : 's'}`,
              ),
            ),
            el('div', { class: 'override-grid' }, ...fieldNodes),
          ),
        ),
        el('div', { class: 'modal-foot' },
          el('div', { style: 'font-size: var(--text-s); color: var(--muted);' },
            '修改后只 binds 到这个 project · 重置库默认 = 删掉这条 override',
          ),
          el('div', { style: 'display: flex; gap: var(--space-3);' },
            el('button', { class: 'a-button a-button--neutral-secondary', onclick: () => {
              // Reset ALL — removes every override for this case in this project
              for (const [order, { input, defaultValue }] of inputMap) {
                input.value = defaultValue;
                input.classList.remove('is-modified');
                delete overrides[order];
              }
            } }, 'Reset all to library default'),
            el('button', { class: 'a-button a-button--neutral-secondary', onclick: close }, 'Cancel'),
            el('button', { class: 'a-button a-button--brand-primary', onclick: () => {
              project.caseOverrides = project.caseOverrides || {};
              if (Object.keys(overrides).length === 0) {
                delete project.caseOverrides[cs.id];
              } else {
                project.caseOverrides[cs.id] = { params: { ...overrides } };
              }
              project.updatedAt = new Date().toISOString();
              saveBatches();
              toast(`${cs.id} overrides 已保存 to project "${project.name}"`);
              close();
              renderAll();
            } }, 'Save overrides'),
          ),
        ),
      );
      backdrop.appendChild(modal);
      document.body.appendChild(backdrop);
    }

    function loadBatchIntoConsole(b) {
      // Edit was a no-op from the sidebar Projects view because state.section
      // stayed at 'projects' → Run Console wasn't rendered, so the user
      // never saw the loaded batch. Force the user back to Run Center home.
      state.tab = 'run';
      state.section = 'run-center';
      state.console.selectedIds = new Set(b.caseIds || []);
      state.console.name = b.name || '';
      state.console.runsPerCase = b.runsPerCase || 1;
      state.console.editingBatchId = b.id;
      state.console.forceComposeMode = true; // make sure the console is visible even mid-run
      renderAll();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      toast(`已载入 "${b.name || b.id}"，改完点 Save changes 或 Run`);
    }

    // Find an existing batch with identical name + same set of caseIds +
    // same runsPerCase. caseIds compared as sets (order-independent) since
    // the user thinks of "Asset Suite · 3 cases" as 3 cases, not as an
    // ordered tuple. Returns the existing batch or null.
    function findDuplicateBatch(name, ids, runsPerCase) {
      const nameKey = (name || '').trim();
      const idSet = new Set(ids);
      const runs = runsPerCase || 1;
      return state.batches.find((b) => {
        if ((b.name || '').trim() !== nameKey) return false;
        if ((b.runsPerCase || 1) !== runs) return false;
        const bIds = b.caseIds || [];
        if (bIds.length !== idSet.size) return false;
        return bIds.every((id) => idSet.has(id));
      }) || null;
    }

    function saveBatchFromConsole(nameValue) {
      const c = state.console;
      const ids = [...c.selectedIds];
      if (!ids.length) return toast('选至少一个 case 才能保存 batch');
      const name = (nameValue || suggestBatchName(ids)).trim() || `Batch · ${ids.length} cases`;
      if (c.editingBatchId) {
        const existing = state.batches.find((b) => b.id === c.editingBatchId);
        if (existing) {
          existing.name = name;
          existing.caseIds = ids;
          existing.runsPerCase = c.runsPerCase;
          existing.updatedAt = new Date().toISOString();
          saveBatches();
          toast(`已更新 batch "${name}"`);
          c.editingBatchId = null;
          c.name = '';
          renderAll();
          return;
        }
      }
      // Dedupe — if a batch with same name + same caseIds + same runsPerCase
      // already exists, just bump it to the top and call it a day. Avoids
      // a wall of identical "Asset Suite · 3 cases" cards every time the
      // user clicks Save without thinking.
      const dup = findDuplicateBatch(name, ids, c.runsPerCase);
      if (dup) {
        state.batches = [dup, ...state.batches.filter((b) => b.id !== dup.id)];
        dup.updatedAt = new Date().toISOString();
        saveBatches();
        toast(`已存在同名同 case 的 batch，移到顶部："${name}"`);
        c.name = '';
        renderAll();
        return;
      }
      const batch = {
        id: 'batch-' + Date.now(),
        name,
        createdAt: new Date().toISOString(),
        caseIds: ids,
        runsPerCase: c.runsPerCase,
        status: 'pending',
        passed: 0,
        failed: 0,
      };
      state.batches.unshift(batch);
      saveBatches();
      toast(`已保存 batch "${name}"`);
      c.name = '';
      renderAll();
    }

    function runConsoleSubmit({ ids, name, runsPerCase, editingId }) {
      if (!ids.length) return toast('请选至少一个 case');
      if (editingId) {
        const existing = state.batches.find((b) => b.id === editingId);
        if (existing) {
          existing.name = name;
          existing.caseIds = ids;
          existing.runsPerCase = runsPerCase;
          existing.updatedAt = new Date().toISOString();
          saveBatches();
        }
        state.console.editingBatchId = null;
      }
      runCases(ids, { name, runsPerCase });
    }

    // Projects sidebar entry. Two cards:
    //   1. "SAP Automation Project" — the fixed 11 validated cases.
    //   2. "My Projects" — user-created batches (state.batches).
    // Both reuse renderMyProjects-style expand cards so the user gets the
    // same case list + Run/Edit/Delete affordances they're used to.
    function renderProjectsSection(panel) {
      const projectExpand = state.console._projectExpand = state.console._projectExpand || new Set();
      const passed = state.cases.filter((c) => statusOf(c.id) === 'passed').length;
      const failed = state.cases.filter((c) => statusOf(c.id) === 'failed').length;
      const allLive = state.cases.filter((c) => state.active.some((a) => a.caseId === c.id)).length;

      // ── SAP Automation Project — fixed, always present ──
      const sapPid = 'sap-automation-project';
      const sapExpanded = projectExpand.has(sapPid);
      const sapHead = el('div', {
        class: 'project-head',
        onclick: () => { if (sapExpanded) projectExpand.delete(sapPid); else projectExpand.add(sapPid); renderAll(); },
      },
        el('div', { class: 'pc-icon', style: 'background: #15304f;' }, 'S'),
        el('div', { style: 'min-width:0;' },
          el('div', { class: 'pj-name' }, 'SAP Automation Project'),
          el('div', { class: 'pj-meta' }, `${state.cases.length} validated cases · ${passed} passed · ${failed} failed${allLive ? ` · ${allLive} live` : ''}`),
        ),
        el('span', { class: `status ${allLive ? 'running' : (failed ? 'failed' : 'passed')}` }, allLive ? 'Live' : (failed ? 'Has failures' : 'Ready')),
        el('button', {
          class: 'expand-btn' + (sapExpanded ? ' expanded' : ''),
          onclick: (ev) => { ev.stopPropagation(); if (sapExpanded) projectExpand.delete(sapPid); else projectExpand.add(sapPid); renderAll(); },
        }, sapExpanded ? '▾' : '▸'),
      );
      const sapCard = sapExpanded
        ? el('div', { class: 'project-card expanded preset' }, sapHead,
            el('div', { class: 'project-body' },
              el('div', { class: 'pj-cases' },
                ...state.cases.map((cs) => caseRowInProject(cs)),
              ),
              el('div', { class: 'bc-actions' },
                el('button', { class: 'btn mini primary', onclick: (ev) => { ev.stopPropagation(); openRunModal(SUCCESS_CASE_IDS, { name: 'SAP Automation Project', runsPerCase: 1, title: 'Run SAP Automation Project' }); } }, '▶ Run all'),
                el('button', { class: 'btn mini', onclick: (ev) => { ev.stopPropagation(); state.tab = 'run'; state.section = 'run-center'; state.console.selectedIds = new Set(SUCCESS_CASE_IDS); renderAll(); window.scrollTo({ top: 0, behavior: 'smooth' }); } }, 'Open in Run Console'),
              ),
            ),
          )
        : el('div', { class: 'project-card preset' }, sapHead);

      // ── My Projects (user-created, from state.batches) ──
      const userProjects = state.batches;
      // Build the single-project card on-demand inside the business group
      // (DOM nodes can't be reused across parents, so this is a factory).
      function buildProjectCard(b) {
        const liveCount = (b.caseIds || []).filter((id) => state.active.some((a) => a.caseId === id)).length;
        const expanded = projectExpand.has(b.id);
        const statusKey = liveCount ? 'running' : (b.status || 'pending');
        const head = el('div', {
          class: 'project-head',
          onclick: () => { if (expanded) projectExpand.delete(b.id); else projectExpand.add(b.id); renderAll(); },
        },
          el('div', { class: 'pc-icon', style: 'background: var(--blue);' }, (b.name || '?').trim()[0] || '#'),
          el('div', { style: 'min-width:0;' },
            el('div', { class: 'pj-name' }, b.name || b.id),
            el('div', { class: 'pj-meta' }, `${b.caseIds?.length || 0} cases · ×${b.runsPerCase || 1}/case · ${new Date(b.createdAt).toLocaleDateString()}${liveCount ? ` · ${liveCount} live` : ''}`),
          ),
          el('span', { class: `status ${statusKey}` }, liveCount ? 'Live' : statusLabel(statusKey)),
          el('button', {
            class: 'expand-btn' + (expanded ? ' expanded' : ''),
            onclick: (ev) => { ev.stopPropagation(); if (expanded) projectExpand.delete(b.id); else projectExpand.add(b.id); renderAll(); },
          }, expanded ? '▾' : '▸'),
        );
        if (!expanded) return el('div', { class: 'project-card' }, head);
        const cases = (b.caseIds || []).map((id) => state.cases.find((c) => c.id === id)).filter(Boolean);
        return el('div', { class: 'project-card expanded' }, head,
          el('div', { class: 'project-body' },
            el('div', { class: 'pj-cases' },
              ...cases.map((cs) => caseRowInProject(cs, b)),
              cases.length === 0 ? el('div', { class: 'hint' }, '这个 project 里的 case 已被删除或重命名。') : null,
            ),
            el('div', { class: 'bc-actions' },
              el('button', { class: 'a-button a-button--brand-primary -small', onclick: (ev) => { ev.stopPropagation(); openRunModal(b.caseIds || [], { name: b.name, runsPerCase: b.runsPerCase || 1, batchId: b.id }); } }, '▶ Run'),
              el('button', { class: 'a-button a-button--neutral-secondary -small', onclick: (ev) => { ev.stopPropagation(); loadBatchIntoConsole(b); } }, 'Edit'),
              el('button', { class: 'a-button a-button--neutral-secondary -small', onclick: (ev) => { ev.stopPropagation(); openRenameModal(b.name || '', (newName) => { const existing = state.batches.find((x) => x.id === b.id); if (existing) { existing.name = newName; existing.updatedAt = new Date().toISOString(); saveBatches(); } renderAll(); toast(`已改名为 "${newName}"`); }); } }, 'Rename'),
              el('button', { class: 'a-button a-button--destructive-primary -small', onclick: (ev) => { ev.stopPropagation(); if (!confirm(`删除 project "${b.name || b.id}"？`)) return; state.batches = state.batches.filter((x) => x.id !== b.id); saveBatches(); renderAll(); } }, 'Delete'),
            ),
          ),
        );
      }

      // ── Group My Projects by Business (department) ──
      // Each project has an optional `business` field. Group them so the
      // user sees: Logistics ▸ [Project A, B] / Warehouse ▸ [...] / etc.
      // Projects without a business land in "(No business assigned)".
      const groupedByBiz = new Map();
      for (const b of userProjects) {
        const key = (b.business && String(b.business).trim()) || '(No business assigned)';
        if (!groupedByBiz.has(key)) groupedByBiz.set(key, []);
        groupedByBiz.get(key).push(b);
      }
      const sortedBiz = [...groupedByBiz.keys()].sort((a, b) => {
        if (a === '(No business assigned)') return 1;
        if (b === '(No business assigned)') return -1;
        return a.localeCompare(b);
      });
      const bizExpand = state.console._bizExpand = state.console._bizExpand || new Set();
      // Auto-expand first business group on first ever render.
      if (sortedBiz.length && !state.console._bizExpandSeen) {
        sortedBiz.forEach((k) => bizExpand.add(k));
        state.console._bizExpandSeen = true;
      }
      const bizGroups = sortedBiz.map((bizName) => {
        const list = groupedByBiz.get(bizName);
        const opened = bizExpand.has(bizName);
        const groupHead = el('div', {
          class: 'biz-group-head',
          onclick: () => { if (opened) bizExpand.delete(bizName); else bizExpand.add(bizName); renderAll(); },
        },
          el('span', { class: 'biz-group-chev' }, opened ? '▾' : '▸'),
          el('span', { class: 'biz-group-name' }, bizName),
          el('span', { class: 'biz-group-count' }, `${list.length} project${list.length === 1 ? '' : 's'}`),
        );
        const groupBody = opened
          ? el('div', { class: 'biz-group-body' }, ...list.map((b) => buildProjectCard(b)))
          : null;
        return el('div', { class: 'biz-group' + (opened ? ' is-open' : '') }, groupHead, groupBody);
      });

      panel.replaceChildren(
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'SAP Automation Project', el('span', { class: 'readonly-note' }, '内置 · 11 个 validated cases')),
          el('div', { style: 'padding: 12px;' }, sapCard),
        ),
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' },
            el('span', {}, `My Projects · ${userProjects.length}`, sortedBiz.length ? el('span', { class: 'readonly-note' }, ` · grouped by business`) : null),
            el('button', { class: 'a-button a-button--brand-primary -small', onclick: () => openCreateProjectModal() }, '+ New project'),
          ),
          el('div', { style: 'padding: 12px;' },
            userProjects.length === 0
              ? el('div', { class: 'empty', style: 'border:1px dashed var(--line); padding:14px;' }, '还没有自建 project。点上面 + New project 开始。')
              : el('div', { style: 'display: grid; gap: var(--space-3);' }, ...bizGroups),
          ),
        ),
      );
    }

    function renderReportsSection(panel) {
      const all = state.recent || [];
      const total = all.length;
      const passed = all.filter((r) => r.status === 'passed').length;
      const failed = all.filter((r) => r.status === 'failed').length;
      const withReport = all.filter((r) => r.report?.url).length;
      const rows = all.slice(0, 30);

      const fmtDuration = (ms) => {
        if (!ms && ms !== 0) return '—';
        const s = Math.round(ms / 100) / 10;
        if (s < 60) return `${s}s`;
        const m = Math.floor(s / 60);
        const rem = Math.round(s - m * 60);
        return `${m}m ${rem}s`;
      };

      panel.replaceChildren(
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'Reports · Overview'),
          el('div', { class: 'section-content metric-grid' },
            el('div', { class: 'metric' }, el('b', {}, total), el('span', {}, 'total run records')),
            el('div', { class: 'metric' }, el('b', {}, passed), el('span', {}, 'passed')),
            el('div', { class: 'metric' }, el('b', {}, failed), el('span', {}, 'failed')),
            el('div', { class: 'metric' }, el('b', {}, withReport), el('span', {}, 'with HTML report')),
          ),
        ),
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' },
            el('span', {}, `Recent runs · last ${rows.length}`),
            el('button', { class: 'btn mini', onclick: () => refreshRuntime().then(renderAll) }, 'Refresh'),
          ),
          rows.length === 0
            ? el('div', { class: 'empty' }, '还没有任何 run 记录。去 Run Center 跑一批，跑完后这里就有了。')
            : el('div', { class: 'section-content run-table' }, ...rows.map((r) => {
                const cs = state.cases.find((c) => c.id === r.caseId);
                const cat = cs ? categorizeCase(cs) : 'other';
                const when = r.finishedAt ? new Date(r.finishedAt) : (r.startedAt ? new Date(r.startedAt) : null);
                return el('div', { class: 'run-row' },
                  el('div', {},
                    el('strong', {}, r.caseId || 'case', r.caseTitle ? ` · ${r.caseTitle}` : (cs ? ` · ${caseTitle(cs)}` : '')),
                    el('span', {},
                      el('span', { class: `cat-tag cat-${cat}`, style: 'margin-right: 6px;' }, categoryMeta(cat).label),
                      when ? when.toLocaleString() : 'no timestamp',
                      ' · ', fmtDuration(r.durationMs),
                      r.errorMessage ? ` · ${r.errorMessage.slice(0, 80)}` : '',
                    ),
                  ),
                  el('span', { class: `status ${r.status || 'pending'}` }, statusLabel(r.status || 'pending')),
                  r.report?.url
                    ? el('button', { class: 'btn mini', onclick: () => window.open(r.report.url, '_blank') }, 'Report')
                    : el('button', { class: 'btn mini', onclick: () => { state.tab = 'live'; state.section = 'logs'; (state.runLogExpanded = state.runLogExpanded || new Set()).add(r.runId); renderAll(); } }, 'View log'),
                );
              })),
        ),
      );
    }

    function renderFailuresSection(panel) {
      const all = state.recent || [];
      const failures = all.filter((r) => r.status === 'failed');
      const total = all.length;
      const failRate = total ? Math.round((failures.length / total) * 100) : 0;

      // Per-case failure tally
      const byCase = new Map();
      for (const r of failures) {
        const cid = r.caseId || 'unknown';
        const entry = byCase.get(cid) || { caseId: cid, count: 0, lastError: null, lastWhen: null };
        entry.count += 1;
        if (r.errorMessage) entry.lastError = r.errorMessage;
        const when = r.finishedAt ? new Date(r.finishedAt) : (r.startedAt ? new Date(r.startedAt) : null);
        if (when && (!entry.lastWhen || when > entry.lastWhen)) entry.lastWhen = when;
        byCase.set(cid, entry);
      }
      const topFailing = [...byCase.values()].sort((a, b) => b.count - a.count).slice(0, 5);

      // Recent failures
      const recentFailures = failures.slice(0, 15);

      panel.replaceChildren(
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'Failure Analytics · Overview'),
          el('div', { class: 'section-content metric-grid' },
            el('div', { class: 'metric' }, el('b', {}, failures.length), el('span', {}, 'total failures')),
            el('div', { class: 'metric' }, el('b', {}, total ? `${failRate}%` : '—'), el('span', {}, 'failure rate')),
            el('div', { class: 'metric' }, el('b', {}, byCase.size), el('span', {}, 'cases ever failed')),
            el('div', { class: 'metric' },
              el('b', {}, recentFailures.length ? new Date(recentFailures[0].finishedAt || recentFailures[0].startedAt || Date.now()).toLocaleDateString() : '—'),
              el('span', {}, 'last failure date'),
            ),
          ),
        ),

        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' },
            el('span', {}, `Top failing cases · ${topFailing.length}`),
            topFailing.length ? el('button', { class: 'btn mini abort-big', style: 'min-height: 32px; padding: 6px 12px; font-size: 12px;', onclick: () => openRunModal(topFailing.map((f) => f.caseId), { name: `Rerun ${topFailing.length} top-failing`, title: 'Rerun top failing cases' }) }, '↺ Rerun all') : null,
          ),
          topFailing.length === 0
            ? el('div', { class: 'empty' }, '没有失败 case。')
            : el('div', { class: 'section-content run-table' }, ...topFailing.map((f) => {
                const cs = state.cases.find((c) => c.id === f.caseId);
                return el('div', { class: 'run-row' },
                  el('div', {},
                    el('strong', {}, f.caseId, cs ? ` · ${caseTitle(cs)}` : ''),
                    el('span', {}, `${f.count} failure${f.count === 1 ? '' : 's'}${f.lastWhen ? ` · last ${f.lastWhen.toLocaleDateString()}` : ''}${f.lastError ? ` · ${f.lastError.slice(0, 90)}` : ''}`),
                  ),
                  el('span', { class: 'status failed' }, `×${f.count}`),
                  el('button', { class: 'btn mini', onclick: () => openRunModal([f.caseId], { name: `Rerun ${f.caseId}`, title: 'Rerun failing case' }) }, '↺ Rerun'),
                );
              })),
        ),

        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, `Recent failures · last ${recentFailures.length}`),
          recentFailures.length === 0
            ? el('div', { class: 'empty' }, '当前没有失败 case。')
            : el('div', { class: 'section-content run-table' }, ...recentFailures.map((r) => {
                const cs = state.cases.find((c) => c.id === r.caseId);
                const cat = cs ? categorizeCase(cs) : 'other';
                const when = r.finishedAt ? new Date(r.finishedAt) : (r.startedAt ? new Date(r.startedAt) : null);
                return el('div', { class: 'run-row' },
                  el('div', {},
                    el('strong', {}, r.caseId || 'case', cs ? ` · ${caseTitle(cs)}` : ''),
                    el('span', {},
                      el('span', { class: `cat-tag cat-${cat}`, style: 'margin-right: 6px;' }, categoryMeta(cat).label),
                      when ? when.toLocaleString() : 'no timestamp',
                      r.errorMessage ? ` · ${r.errorMessage.slice(0, 100)}` : '',
                    ),
                  ),
                  el('span', { class: 'status failed' }, 'Failed'),
                  el('div', { style: 'display:flex; gap:6px;' },
                    r.report?.url ? el('button', { class: 'btn mini', onclick: () => window.open(r.report.url, '_blank') }, 'Report') : null,
                    el('button', { class: 'btn mini', onclick: () => { state.tab = 'live'; state.section = 'logs'; (state.runLogExpanded = state.runLogExpanded || new Set()).add(r.runId); renderAll(); } }, 'Log'),
                  ),
                );
              })),
        ),
      );
    }

    function renderProjectSection() {
      const titles = {
        overview: ['Project Overview', '项目健康度、最近运行和 case 覆盖'],
        cases: ['Project Cases', '选择 case、改参数、单独或批量运行'],
        runs: ['Project Runs', '当前项目的运行历史'],
        'project-reports': ['Project Reports', '项目级报告和回放入口'],
      };
      const [title, sub] = titles[state.section] || titles.overview;
      $('#mainTitle').textContent = title;
      $('#mainSub').textContent = sub;
      const panel = $('#mainPanel');
      if (state.section === 'overview') return renderProjectOverview(panel);
      if (state.section === 'cases') return panel.replaceChildren(renderCases(), renderCaseDetailCard());
      if (state.section === 'runs') return renderProjectRuns(panel);
      if (state.section === 'project-reports') return renderReportsSection(panel);
    }

    function renderProjectOverview(panel) {
      const passed = state.cases.filter((c) => statusOf(c.id) === 'passed').length;
      const failed = state.cases.filter((c) => statusOf(c.id) === 'failed').length;
      panel.replaceChildren(
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'SAP Validated Regression Project'),
          el('div', { class: 'section-content metric-grid' },
            el('div', { class: 'metric' }, el('b', {}, state.cases.length), el('span', {}, 'total cases')),
            el('div', { class: 'metric' }, el('b', {}, passed), el('span', {}, 'latest passed')),
            el('div', { class: 'metric' }, el('b', {}, failed), el('span', {}, 'latest failed')),
