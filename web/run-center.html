                openRunModal(batch.caseIds, {
                  name: batch.name,
                  runsPerCase: batch.runsPerCase || 1,
                  batchId: batch.id,
                  title: `Re-run ${batch.name || batch.id}`,
                });
              },
            }, '↻ Rerun') : null,
            // Delete just this Live Channels row — run-history files
            // and Midscene reports on disk are untouched, only the
            // batch record is removed from My Projects.
            el('button', {
              class: 'btn mini danger',
              title: '从 My Projects 删掉这个 batch · run 记录和 Midscene report 保留',
              onclick: (ev) => {
                ev.stopPropagation();
                if (!confirm(`从 Live Channels / My Projects 删掉这个 batch?\n"${batch.name || batch.id}"\n\n(run 记录和 Midscene report 在磁盘上保留 — Run Reports 还能查到)`)) return;
                state.batches = state.batches.filter((b) => b.id !== batch.id);
                state.lcExpanded.delete(batch.id);
                saveBatches();
                renderAll();
                toast(`已从 Live Channels 删除 "${batch.name || batch.id}"`);
              },
            }, '✕ Delete'),
          ),
        );

        const body = isOpen ? el('div', { class: 'section-content' },
          // suppressAnimation = true so the row pop doesn't replay on
          // every 2.5s poll. This is the fix for the flicker.
          buildFinishedPanel(bp, { reviewMode: true, suppressAnimation: true }),
        ) : null;

        return el('div', { class: 'section-card lc-broadcast-card' + (isOpen ? ' is-open' : '') }, title, body);
      });

      panel.replaceChildren(
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' },
            el('span', {}, 'Recent broadcasts · ' + slice.length + ' shown'),
            // Bulk expand/collapse — flips every card in the slice. Used
            // when the user wants to scan all results at once or tidy
            // them all up after auditing.
            el('div', { style: 'display:flex;gap:6px;' },
              el('button', {
                class: 'btn mini',
                title: '展开下面所有 broadcast card',
                onclick: () => {
                  for (const b of slice) state.lcExpanded.add(b.id);
                  renderAll();
                },
              }, '▾ Expand all'),
              el('button', {
                class: 'btn mini',
                title: '收起下面所有 broadcast card',
                onclick: () => {
                  for (const b of slice) state.lcExpanded.delete(b.id);
                  renderAll();
                },
              }, '▸ Collapse all'),
            ),
          ),
          el('div', { class: 'section-content', style: 'padding:10px 14px;' }, selector),
        ),
        ...cards,
      );
    }

    // ── My Projects (sidebar section) — standalone tab ───────────────
    // Same project card layout as inside Run Center, but lifted into its
    // own sidebar tab. No top-level grouping by 仓储/物流 — just a flat
    // list of projects with their department tag.
    function renderMyProjectsSection(panel) {
      let projectsNode;
      try { projectsNode = renderMyProjects(); } catch (err) {
        console.error('renderMyProjects threw:', err);
        projectsNode = el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'My Projects · render error'),
          el('div', { class: 'section-content' },
            el('div', { class: 'hint' }, String(err?.message || err)),
            el('button', { class: 'btn danger', style: 'margin-top:8px;', onclick: () => {
              if (!confirm('清空保存的 batches 缓存（仅本地存的列表，不影响 case 文件）？')) return;
              localStorage.removeItem('userRunCenter.batches');
              state.batches = [];
              renderAll();
            } }, '清空本地 batches 缓存'),
          ),
        );
      }
      panel.replaceChildren(projectsNode);
    }

    // ── Case Library (sidebar section) — read-only catalog ───────────
    // Lists all cases (validated set first, then others). Per-case the
    // user can expand to see NL + params, but nothing is editable. Each
    // case also carries a 2-level usage tag:
    //   L1: which businesses (departments) have selected this case across
    //       any project — clickable chip with count.
    //   L2: clicking L1 expands to show the project name(s) under that
    //       business that include the case.
    function renderCaseLibrarySection(panel) {
      // Persistent expansion state — caseId → { open: bool, openBiz: Set }
      state.caseLibExpand = state.caseLibExpand || {};
      const filter = (state.caseLibSearch || '').trim().toLowerCase();

      const searchInput = el('input', {
        id: 'caseLibSearch',
        type: 'search',
        class: 'cl-search-input',
        placeholder: '搜 case id / 标题',
        value: state.caseLibSearch || '',
        oncompositionstart: () => { state.console = state.console || {}; state.console._imeComposing = true; },
        oncompositionend: (ev) => {
          state.console._imeComposing = false;
          state.caseLibSearch = ev.target.value;
          state.console._restoreFocus = {
            id: 'caseLibSearch',
            selStart: ev.target.selectionStart,
            selEnd: ev.target.selectionEnd,
          };
          renderAll();
        },
        oninput: (ev) => {
          if (state.console && state.console._imeComposing) return;
          state.caseLibSearch = ev.target.value;
          state.console = state.console || {};
          state.console._restoreFocus = {
            id: 'caseLibSearch',
            selStart: ev.target.selectionStart,
            selEnd: ev.target.selectionEnd,
          };
          renderAll();
        },
        onkeydown: (ev) => {
          if (ev.key === 'Enter' && !(state.console && state.console._imeComposing)) {
            ev.preventDefault();
            state.caseLibSearch = ev.target.value;
            renderAll();
          }
        },
      });
      const searchButton = el('button', {
        class: 'cl-search-btn',
        onclick: () => {
          const node = document.getElementById('caseLibSearch');
          if (node) state.caseLibSearch = node.value;
          renderAll();
        },
      }, '🔎 Search');
      const searchGroup = el('div', { class: 'cl-search-group' }, searchInput, searchButton);

      // Sort mode — persisted on state so other renders pick it up. Default
      // is 'order' (natural numeric sort on id, so saptest1 / 2 / 3 / 10 / 11
      // come out in the expected human order; plain localeCompare puts
      // saptest10 between 1 and 2).
      state.caseLibSort = state.caseLibSort || 'order';
      const sortSelector = el('div', { class: 'cl-sort' },
        el('span', { class: 'cl-sort-label' }, 'Sort'),
        el('button', {
          class: 'cl-sort-btn' + (state.caseLibSort === 'order' ? ' active' : ''),
          onclick: () => { state.caseLibSort = 'order'; renderAll(); },
        }, 'By order'),
        el('button', {
          class: 'cl-sort-btn' + (state.caseLibSort === 'label' ? ' active' : ''),
          onclick: () => { state.caseLibSort = 'label'; renderAll(); },
        }, 'By label'),
      );

      // Natural-order id comparator: split id into (alpha, digits) so
      // saptest2 < saptest10 < saptest11 the way humans expect.
      const idNumKey = (id) => {
        const m = String(id).match(/^(.*?)(\d+)?$/);
        return [m?.[1] || id, m?.[2] ? Number(m[2]) : -1];
      };
      const cmpByOrder = (a, b) => {
        const [pa, na] = idNumKey(a.id);
        const [pb, nb] = idNumKey(b.id);
        if (pa !== pb) return pa.localeCompare(pb);
        return na - nb;
      };
      // "By label" = group by category (POSTING VERIFY / CREATE /
      // AP REPORT / FINANCE REPORT / other), so all cases of the same
      // category sit together. Within a category, fall back to the
      // natural id order so saptest2 < saptest10 < saptest11.
      const cmpByLabel = (a, b) => {
        const la = categoryMeta(categorizeCase(a)).label;
        const lb = categoryMeta(categorizeCase(b)).label;
        if (la !== lb) return la.localeCompare(lb);
        return cmpByOrder(a, b);
      };

      const allCases = state.cases.slice().sort(
        state.caseLibSort === 'label' ? cmpByLabel : cmpByOrder
      );
      const filtered = filter
        ? allCases.filter((c) =>
            c.id.toLowerCase().includes(filter)
            || caseTitle(c).toLowerCase().includes(filter))
        : allCases;

      const caseRow = (c) => {
        const exp = state.caseLibExpand[c.id] || (state.caseLibExpand[c.id] = { open: false, openBiz: new Set() });
        // Group projects-using-this-case by business
        const usages = projectsUsingCase(c.id);
        const byBiz = {};
        for (const u of usages) {
          (byBiz[u.businessLabel] = byBiz[u.businessLabel] || []).push(u);
        }
        const businesses = Object.keys(byBiz).sort();
        const cat = categorizeCase(c);
        const catMeta = categoryMeta(cat);

        // Row 1 — CATEGORY (case's intrinsic class, colored chip).
        // Different *logic* from dept tags so it lives on its own row.
        const categoryRow = el('div', { class: 'cl-tags-row cl-tags-row--category' },
          el('span', { class: 'cl-row-label' }, '分类'),
          el('span', { class: `cat-tag cat-${cat} cl-cat-tag` }, catMeta.label),
        );

        // Row 2 — DEPT USAGE (which departments / projects use this case).
        // Two-level: dept chip → click → project list drops to a new
        // line BELOW (not inline). Each project is shown as "#N name".
        const deptRow = el('div', { class: 'cl-tags-row cl-tags-row--dept' },
          el('span', { class: 'cl-row-label' }, '被使用'),
          businesses.length
            ? el('div', { class: 'cl-tags' },
                ...businesses.map((biz) => {
                  const isOpen = exp.openBiz.has(biz);
                  return el('button', {
                    class: 'cl-biz-chip' + (isOpen ? ' is-open' : ''),
                    title: `${byBiz[biz].length} 个 ${biz} 部门的 project 用了这个 case · 点击展开看哪些`,
                    onclick: (ev) => {
                      ev.stopPropagation();
                      if (exp.openBiz.has(biz)) exp.openBiz.delete(biz);
                      else exp.openBiz.add(biz);
                      renderAll();
                    },
                  },
                    el('span', { class: 'cl-biz-text' }, biz),
                    el('span', { class: 'cl-biz-count' }, byBiz[biz].length),
                  );
                }),
              )
            : el('span', { class: 'cl-no-dept' }, '尚未被任何 project 调用'),
        );
        // Row 2.5 — drop-down project list. Lives on its own row below the
        // dept chips so it doesn't squeeze them sideways. Renders one
        // entry per (dept, project) combo whose dept chip is "open".
        const openBusinesses = businesses.filter((b) => exp.openBiz.has(b));
        const projDropRow = openBusinesses.length
          ? el('div', { class: 'cl-tags-row cl-proj-drop' },
              el('span', { class: 'cl-row-label' }, ''),
              el('div', { class: 'cl-proj-drop-list' },
                ...openBusinesses.flatMap((biz) =>
                  byBiz[biz].map((u) => el('button', {
                    class: 'cl-proj-entry',
                    onclick: (ev) => {
                      ev.stopPropagation();
                      state.section = 'my-projects';
                      state.tab = 'run';
                      renderAll();
                      // Same idsOnly highlight the AI Workbench uses when
                      // it jumps to a specific project card — pulse the
                      // matched card so the user knows exactly where they
                      // landed instead of just scrolling silently.
                      setTimeout(() => {
                        agentHighlightNewProjects(
                          [{ id: u.projectId, name: u.projectName }],
                          { idsOnly: true },
                        );
                      }, 200);
                    },
                    title: `跳到 My Projects 高亮 #${u.seq} ${u.projectName}`,
                  },
                    el('span', { class: 'cl-proj-entry-seq' }, '#' + u.seq),
                    el('span', { class: 'cl-proj-entry-name' }, u.projectName),
                    el('span', { class: 'cl-proj-entry-biz' }, biz),
                  )),
                ),
              ),
            )
          : null;

        const head = el('div', {
          class: 'cl-case-head',
          onclick: () => { exp.open = !exp.open; renderAll(); },
        },
          el('button', {
            class: 'cl-expand-btn',
            onclick: (ev) => { ev.stopPropagation(); exp.open = !exp.open; renderAll(); },
          }, exp.open ? '▾' : '▸'),
          el('div', { style: 'flex:1; min-width:0;' },
            el('div', { class: 'cl-case-name' }, c.id, ' · ', caseTitle(c)),
            categoryRow,
            deptRow,
            projDropRow,
          ),
          el('span', { class: 'cl-readonly-badge' }, 'READ ONLY'),
        );

        if (!exp.open) return el('div', { class: 'cl-case-card' }, head);

        // Expanded body — NL + params (read-only)
        const detail = state.details.get(c.id);
        const parsed = detail ? (detail.parsed || detail) : null;
        const fields = detail ? extractParams(detail) : [];
        const fieldsWithCurrent = fields.map((f) => ({ ...f, currentValue: f.defaultValue }));

        if (!detail) {
          loadDetail(c.id).then(() => renderAll()).catch(() => {});
          return el('div', { class: 'cl-case-card' }, head,
            el('div', { class: 'cl-case-body' },
              el('div', { class: 'hint', style: 'padding:14px;' }, 'Loading case detail…'),
            ),
          );
        }

        const paramsCol = fields.length
          ? el('div', {},
              el('div', { class: 'a-text--label', style: 'margin-bottom:8px;' }, 'Parameters (library defaults)'),
              el('div', { class: 'cl-params-list' },
                ...fields.map((f) => el('div', { class: 'cl-param-row' },
                  el('span', { class: 'cl-param-key' }, '#' + f.order + ' · ' + f.locator),
                  el('code', { class: 'cl-param-val' }, f.defaultValue || '(empty)'),
                )),
              ),
            )
          : el('div', { class: 'hint', style: 'padding:8px;' }, '这个 case 没有可调参数。');

        return el('div', { class: 'cl-case-card is-open' }, head,
          el('div', { class: 'cl-case-body' },
            el('div', { class: 'inline-grid' },
              el('div', { class: 'inline-col-params' }, paramsCol),
              el('div', { class: 'inline-col-nl' },
                el('div', { class: 'a-text--label', style: 'margin-bottom:6px;' }, 'Natural Language'),
                buildHighlightedNL(parsed, fieldsWithCurrent),
              ),
            ),
          ),
        );
      };

      panel.replaceChildren(
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' },
            el('span', {}, `Case Library · ${filtered.length} / ${state.cases.length}`),
            el('span', { class: 'hint' }, '只读 · 看 NL + params + 被哪些 project 调用'),
          ),
          el('div', { class: 'section-content' },
            el('div', { class: 'cl-toolbar' }, searchGroup, sortSelector),
            ...filtered.map(caseRow),
          ),
        ),
      );
    }

    function renderRunConsole() {
      const c = state.console;
      const q = c.search.trim().toLowerCase();
      const filtered = state.cases.filter((cs) => {
        if (q && !(cs.id.toLowerCase().includes(q) || caseTitle(cs).toLowerCase().includes(q))) return false;
        if (c.filter === 'all') return true;
        if (c.filter === 'passed') return statusOf(cs.id) === 'passed';
        if (c.filter === 'failed') return statusOf(cs.id) === 'failed';
        return categorizeCase(cs) === c.filter;
      });
      const selectedCount = c.selectedIds.size;
      const totalRuns = selectedCount * c.runsPerCase;
      const editing = c.editingBatchId ? state.batches.find((b) => b.id === c.editingBatchId) : null;

      const nameInput = el('input', {
        type: 'text',
        value: c.name || suggestBatchName([...c.selectedIds]),
        placeholder: 'Batch name (auto-suggested)',
        oninput: (ev) => { c.name = ev.target.value; },
      });
      const runBtn = el('button', {
        class: 'run-cta',
        disabled: selectedCount === 0,
        onclick: () => {
          const ids = [...c.selectedIds];
          openRunModal(ids, {
            name: nameInput.value || suggestBatchName(ids),
            runsPerCase: c.runsPerCase,
            batchId: c.editingBatchId,
            title: c.editingBatchId ? 'Confirm Run (edit + run)' : 'Confirm Run',
            sub: '取个名字 → 跑起来，会出现在 My Projects 下次一键复用',
          });
        },
      },
        el('span', {}, selectedCount === 0 ? 'Select cases to run' : `▶ Run · ${selectedCount} case${selectedCount === 1 ? '' : 's'}`),
        selectedCount > 0 ? el('span', { class: 'small' }, `${totalRuns} total executions · 弹窗确认`) : null,
      );

      const smartChip = (key, label) => el('button', {
        class: 'smart-chip' + (c.filter === key ? ' active' : ''),
        onclick: () => { c.filter = key; renderAll(); },
      }, label);

      const filterChips = [
        smartChip('all', `All · ${state.cases.length}`),
        ...CATEGORY_RULES.map((r) => {
          const n = state.cases.filter((cs) => categorizeCase(cs) === r.key).length;
          return n ? smartChip(r.key, `${r.label} · ${n}`) : null;
        }).filter(Boolean),
        smartChip('passed', 'Passed only'),
        smartChip('failed', 'Failed only'),
      ];

      const activeRuns = state.active.filter((a) => state.cases.some((cs) => cs.id === a.caseId));
      const activeIds = new Set(activeRuns.map((a) => a.caseId));
      const selectedActive = [...c.selectedIds].filter((id) => activeIds.has(id));

      return el('div', { class: 'run-console' },
        el('div', { class: 'run-console-head' },
          el('div', {},
            el('div', { class: 'title' }, editing ? `Editing · ${editing.name}` : 'Run Console'),
            el('div', { class: 'sub' }, editing
              ? '改完点 Save & Run 会覆盖原 batch；点 Cancel 退出编辑'
              : `选 case、命名、设次数，一键起跑 · 已选 ${c.selectedIds.size}/${state.cases.length}${activeRuns.length ? ` · ${activeRuns.length} 正在 run` : ''}`),
          ),
          el('div', { class: 'top-actions' },
            editing ? el('button', { class: 'btn ghost', onclick: () => {
              c.editingBatchId = null; c.name = ''; renderAll();
            } }, 'Cancel edit') : null,
            activeRuns.length ? el('button', {
              class: 'btn abort-big',
              onclick: () => openAbortModal(selectedActive),
            }, `⏹ Abort… (${activeRuns.length} live)`) : null,
            runBtn,
          ),
        ),
        el('div', { class: 'console-body' },
          el('div', { class: 'bulk-bar' },
            el('button', {
              class: 'btn primary mini',
              onclick: () => { state.cases.forEach((cs) => c.selectedIds.add(cs.id)); renderAll(); },
            }, `Select all (${state.cases.length})`),
            el('button', {
              class: 'btn mini',
              onclick: () => {
                if (filtered.length === state.cases.length) return;
                filtered.forEach((cs) => c.selectedIds.add(cs.id));
                renderAll();
              },
              disabled: filtered.length === state.cases.length,
            }, `Select visible (${filtered.length})`),
            el('button', {
              class: 'btn mini',
              onclick: () => {
                filtered.forEach((cs) => c.selectedIds.delete(cs.id));
                renderAll();
              },
            }, 'Deselect visible'),
            el('button', {
              class: 'btn mini',
              onclick: () => { c.selectedIds.clear(); renderAll(); },
            }, 'Clear all'),
            el('button', {
              class: 'btn mini',
              onclick: () => {
                state.cases.forEach((cs) => {
                  if (c.selectedIds.has(cs.id)) c.selectedIds.delete(cs.id);
                  else c.selectedIds.add(cs.id);
                });
                renderAll();
              },
            }, 'Invert'),
            el('span', { class: 'bulk-count' }, `${c.selectedIds.size} selected`),
          ),
          el('div', { class: 'console-toolbar' },
            el('input', {
              id: 'consoleSearch',
              type: 'search',
              value: c.search,
              placeholder: 'Search by id or title',
              oninput: (ev) => {
                c.search = ev.target.value;
                // Re-render wipes the input element → focus would be lost mid-typing.
                // Stash caret + flag so renderAll's post-render hook restores focus.
                c._restoreFocus = { id: 'consoleSearch', selStart: ev.target.selectionStart, selEnd: ev.target.selectionEnd };
                renderAll();
              },
            }),
            ...filterChips,
          ),
          el('div', { class: 'console-cases' },
            ...filtered.map((cs) => renderConsoleCaseRow(cs)),
            state.cases.length === 0
              ? el('div', { class: 'empty', style: 'grid-column: 1 / -1;' },
                  el('div', {}, '没有加载到 case。'),
                  el('div', { class: 'hint', style: 'margin-top:6px;' }, '若是首次进入页面，等 1-2 秒；若长时间没出来，去看一眼开发者控制台是否登录有效。'),
                  el('button', { class: 'btn mini', style: 'margin-top:8px;', onclick: () => loadInitial() }, '重新加载'),
                )
              : (filtered.length === 0
                ? el('div', { class: 'empty', style: 'grid-column: 1 / -1;' }, '没有匹配的 case。把筛选切回 “All” 试试。',
                    el('button', { class: 'btn mini', style: 'margin-left:8px;', onclick: () => { c.filter = 'all'; c.search = ''; renderAll(); } }, 'Reset filter'),
                  )
                : null),
          ),
          el('div', { class: 'console-foot' },
            el('div', {},
              el('label', { class: 'label' }, 'Batch name'),
              nameInput,
            ),
            el('div', {},
              el('label', { class: 'label' }, 'Run × per case'),
              el('div', { class: 'run-count' },
                ...[1, 2, 3, 5].map((n) => el('button', {
                  class: c.runsPerCase === n ? 'active' : '',
                  onclick: () => { c.runsPerCase = n; renderAll(); },
                }, `×${n}`)),
              ),
            ),
            el('div', {},
              el('label', { class: 'label' }, ' '),
              el('button', { class: 'btn', onclick: () => saveBatchFromConsole(nameInput.value) }, editing ? 'Save changes' : 'Save as batch'),
            ),
          ),
        ),
      );
    }

    // One case card inside the Run Console grid. Collapsed view: checkbox +
    // title + category tag + expand toggle. Expanded view: per-case Save bar,
    // editable params (from the case's apiGuide aiInput steps), and a
    // foldable Natural Language preview.
    function renderConsoleCaseRow(cs) {
      const c = state.console;
      const checked = c.selectedIds.has(cs.id);
      const cat = categorizeCase(cs);
      const meta = categoryMeta(cat);
      const expanded = c.expandedIds.has(cs.id);
      const detail = state.details.get(cs.id);

      const head = el('div', {
        class: 'console-case-head',
        onclick: () => {
          if (checked) c.selectedIds.delete(cs.id);
          else c.selectedIds.add(cs.id);
          renderAll();
        },
      },
        el('input', {
          type: 'checkbox',
          checked,
          onclick: (ev) => ev.stopPropagation(),
          onchange: (ev) => {
            if (ev.target.checked) c.selectedIds.add(cs.id);
            else c.selectedIds.delete(cs.id);
            renderAll();
          },
        }),
        el('div', { style: 'min-width:0;' },
          el('div', { class: 'ctitle' }, cs.id, ' · ', caseTitle(cs)),
          el('div', { class: 'cmeta' }, caseDesc(cs) || 'SAP automation case'),
          // Derived business tags — which projects/businesses use this case.
          // Shows up automatically once the user creates a project with a
          // business attached. Empty by default (no projects yet).
          ((bs) => bs.length ? el('div', { style: 'display:flex; gap: 4px; margin-top: 4px; flex-wrap: wrap;' }, ...bs.map((b) => el('span', { class: 'biz-badge' }, b))) : null)(businessesContainingCase(cs.id)),
        ),
        el('span', { class: `cat-tag cat-${cat}` }, meta.label),
        el('button', {
          class: 'expand-btn' + (expanded ? ' expanded' : ''),
          title: expanded ? 'Hide details' : 'Show params & natural language',
          onclick: async (ev) => {
            ev.stopPropagation();
            if (c.expandedIds.has(cs.id)) {
              c.expandedIds.delete(cs.id);
              renderAll();
            } else {
              c.expandedIds.add(cs.id);
              renderAll();
              // Load detail lazily so the API call only fires when the user
              // actually opens this case.
              if (!state.details.has(cs.id)) {
                await loadDetail(cs.id).catch(() => {});
                renderAll();
              }
            }
          },
        }, expanded ? '▾' : '▸'),
      );

      if (!expanded) {
        return el('div', { class: 'console-case' + (checked ? ' checked' : '') }, head);
      }

      // ── Expanded body ───────────────────────────────────────────────
      const body = el('div', { class: 'console-case-body' });

      if (!detail) {
        body.appendChild(el('div', { class: 'hint' }, 'Loading case detail…'));
        return el('div', { class: 'console-case expanded' + (checked ? ' checked' : '') }, head, body);
      }

      const parsed = detail.parsed || detail;
      const fields = extractParams(detail);
      const oldParams = parsed.params && typeof parsed.params === 'object' && !Array.isArray(parsed.params) ? parsed.params : {};
      const inputMap = new Map();

      // Description (cleaned of BP_IT_* prefixes). Lives in the expanded
      // view since the collapsed meta now shows the short bucket label.
      const descText = caseDescriptionClean(detail) || caseDescriptionClean(cs);
      if (descText) {
        body.appendChild(el('div', { class: 'cc-section' },
          el('div', { class: 'cc-label' }, 'Description'),
          el('div', { class: 'cc-desc' }, descText),
        ));
      }

      // Params block — READ-ONLY in Library context.
      // The case library is the source of truth; per-business / per-project
      // parameter overrides live on a Project, not on the case file. This
      // matches the meeting brief: 库里的 case 不动，project 里改。
      const paramsBlock = el('div', { class: 'cc-section' },
        el('div', { class: 'cc-label' },
          el('span', {}, 'Library defaults'),
          el('span', { class: 'inline-status-pill is-readonly' }, 'read only'),
        ),
        fields.length === 0
          ? el('div', { class: 'hint' }, '这个 case 没有可调参数（无 aiInput 步骤）。')
          : el('div', { class: 'cc-param-grid' },
              ...fields.map((f) => el('div', { class: 'cc-param' },
                el('label', { title: f.locator }, `#${f.order} · ${f.locator}`),
                el('input', { type: 'text', value: f.defaultValue, readonly: true, style: 'background: var(--g-gray-95); color: var(--muted); cursor: not-allowed;' }),
              )),
            ),
        fields.length > 0 ? el('div', { class: 'hint', style: 'margin-top: var(--space-3); padding: var(--space-3); background: var(--g-blue-95); border-left: 3px solid var(--blue);' },
          '要改参数？请 ',
          el('button', { class: 'a-button a-button--brand-tertiary -small', style: 'height: auto; padding: 0; min-width: 0; display: inline;', onclick: () => openCreateProjectModal({ initialIds: [cs.id], initialName: `Custom · ${cs.id}` }) }, '+ Create a project'),
          '，里面每个 case 可以有自己的参数覆盖（库里这份默认永不变）。',
        ) : null,
      );
      body.appendChild(paramsBlock);

      // Natural Language block — collapsed by default per user request.
      const nlOpen = c.nlOpenIds.has(cs.id);
      const nlBlock = el('div', { class: 'cc-section' },
        el('div', { class: 'cc-label nl-toggle', onclick: () => {
          if (nlOpen) c.nlOpenIds.delete(cs.id);
          else c.nlOpenIds.add(cs.id);
          renderAll();
        } },
          el('span', {}, nlOpen ? '▾' : '▸', ' Natural Language'),
          el('span', { class: 'readonly-note' }, 'read only · 改参数会自动同步'),
        ),
        nlOpen
          ? el('pre', { class: 'nl-box' }, parsed.naturalLanguage || 'No natural language description.')
          : null,
      );
      body.appendChild(nlBlock);

      return el('div', { class: 'console-case expanded' + (checked ? ' checked' : '') }, head, body);
    }

    // My Projects — merges old Saved Batches + Quick Projects into one
    // expandable list. Each project card has: header (icon + name + meta +
    // expand toggle), actions (Run / Edit selection / Rename / Delete) and
    // when expanded shows every case in the project.
    function renderMyProjects() {
      const projectExpand = state.console._projectExpand = state.console._projectExpand || new Set();

      // ── 1. Build preset projects from category rules ──────────────────
      const presets = [];
      for (const rule of CATEGORY_RULES) {
        const ids = state.cases.filter((c) => categorizeCase(c) === rule.key).map((c) => c.id);
        if (!ids.length) continue;
        presets.push({
          id: `preset-${rule.key}`,
          name: `${rule.label} Suite`,
          icon: rule.label[0],
          color: rule.color,
          caseIds: ids,
          runsPerCase: 1,
          isPreset: true,
          metaExtra: '内置预设',
        });
      }
      const allIds = state.cases.map((c) => c.id);
      if (allIds.length) presets.push({
        id: 'preset-full',
        name: 'Full Regression',
        icon: '★',
        color: '#15304f',
        caseIds: allIds,
        runsPerCase: 1,
        isPreset: true,
        metaExtra: '内置预设',
      });
      const recentFailed = state.recent.filter((r) => r.status === 'failed').slice(0, 8).map((r) => r.caseId).filter(Boolean);
      if (recentFailed.length) presets.push({
        id: 'preset-failed',
        name: 'Rerun Failed',
        icon: '↺',
        color: '#b4232f',
        caseIds: [...new Set(recentFailed)],
        runsPerCase: 1,
        isPreset: true,
        metaExtra: '失败重跑',
      });

      // ── 2. User-created projects (from state.batches storage) ────────
      // Sequence numbers: oldest project = #1, newest = #N. state.batches
      // is stored newest-first (unshift on create), so we walk it in
      // reverse to assign seq, then keep newest-first for display.
      const totalCustom = state.batches.length;
      const userProjectsAll = state.batches.map((b, i) => ({
        ...b,
        icon: (b.name || '?').trim()[0] || '#',
        color: '#0b6bdc',
        isPreset: false,
        seq: totalCustom - i,
      }));

      // ── 2b. Search + status filter state + helpers ───────────────────
      // Lives on state.console so the bar's value survives renders +
      // case switches. statuses Set is multi-select (empty = no filter).
      // dateFrom / dateTo bound the last-run timestamp; aiMatchedIds is
      // the set of project ids returned by the async AI search (added
      // to the local match union).
      state.console._myProjFilter = state.console._myProjFilter || {
        search: '',
        statuses: new Set(),  // 'passed' | 'failed' | 'pending' | 'running'
        dateFrom: '',
        dateTo: '',
        aiState: 'idle',       // 'idle' | 'loading' | 'done' | 'error'
        aiQuery: '',           // the query the current aiMatchedIds belong to
        aiMatchedIds: new Set(),
        aiError: '',
        // AI date-parse channel — runs in parallel with semantic search
        // and feeds into the date filter when the local regex misses.
        aiDateState: 'idle',
        aiDateQuery: '',
        aiDateStart: null,
        aiDateEnd: null,
      };
      const filt = state.console._myProjFilter;
      // Same tiny pinyin table as Run Reports for common SAP terms.
      const PINYIN_MAP_MP = {
        '财务': 'caiwu', '人力': 'renli', '物流': 'wuliu', '仓储': 'cangchu',
        '销售': 'xiaoshou', '采购': 'caigou', '生产': 'shengchan',
        '质量': 'zhiliang', '资产': 'zichan', '会计': 'kuaiji',
      };
      const pinyinizeMP = (str) => {
        let out = (str || '').toLowerCase();
        for (const [ch, py] of Object.entries(PINYIN_MAP_MP)) {
          if (out.includes(ch)) out += ' ' + py;
        }
        return out;
      };

      // ── Date-in-search parsing ─────────────────────────────────────
      // Extracts up to two dates from the search string and returns
      // { startDate, endDate, residual } where residual is the text
      // with the date tokens stripped (used for the project-name match).
      // Handles: "6月29号" "6/29" "06-29" "2026-06-29" plus relative
      // tokens "今天/昨天/前天/上周/这周/本月/上月". Two dates = range.
      const parseDateQuery = (raw) => {
        if (!raw) return { startDate: null, endDate: null, residual: '' };
        const text = String(raw);
        const now = new Date();
        const year = now.getFullYear();
        const dayMs = 24 * 60 * 60 * 1000;
        // Sundays = 0; we use Mon as the week start to match Chinese custom.
        const startOfWeek = (d) => {
          const day = d.getDay();
          const diff = day === 0 ? 6 : day - 1;
          const c = new Date(d); c.setHours(0,0,0,0); c.setDate(c.getDate() - diff);
          return c;
        };

        let workingText = text;
        const found = []; // each entry { start: Date, end: Date }

        // 1) Relative tokens — strip and resolve.
        const relMap = [
          ['今天', () => { const s = new Date(now); s.setHours(0,0,0,0); return { start: s, end: new Date(s.getTime() + dayMs - 1) }; }],
          ['昨天', () => { const s = new Date(now); s.setHours(0,0,0,0); s.setDate(s.getDate() - 1); return { start: s, end: new Date(s.getTime() + dayMs - 1) }; }],
          ['前天', () => { const s = new Date(now); s.setHours(0,0,0,0); s.setDate(s.getDate() - 2); return { start: s, end: new Date(s.getTime() + dayMs - 1) }; }],
          ['这周', () => { const s = startOfWeek(now); const e = new Date(s.getTime() + 7 * dayMs - 1); return { start: s, end: e }; }],
          ['本周', () => { const s = startOfWeek(now); const e = new Date(s.getTime() + 7 * dayMs - 1); return { start: s, end: e }; }],
          ['上周', () => { const s = startOfWeek(now); s.setDate(s.getDate() - 7); const e = new Date(s.getTime() + 7 * dayMs - 1); return { start: s, end: e }; }],
          ['本月', () => { const s = new Date(year, now.getMonth(), 1); const e = new Date(year, now.getMonth() + 1, 0, 23, 59, 59); return { start: s, end: e }; }],
          ['这个月', () => { const s = new Date(year, now.getMonth(), 1); const e = new Date(year, now.getMonth() + 1, 0, 23, 59, 59); return { start: s, end: e }; }],
          ['上个月', () => { const s = new Date(year, now.getMonth() - 1, 1); const e = new Date(year, now.getMonth(), 0, 23, 59, 59); return { start: s, end: e }; }],
          ['上月', () => { const s = new Date(year, now.getMonth() - 1, 1); const e = new Date(year, now.getMonth(), 0, 23, 59, 59); return { start: s, end: e }; }],
        ];
        for (const [token, fn] of relMap) {
          if (workingText.includes(token)) {
            found.push(fn());
            workingText = workingText.split(token).join(' ');
          }
        }

        // 2) Absolute date patterns.
        const patterns = [
          // YYYY-MM-DD / YYYY/MM/DD
          { re: /(20\d{2})[-\/\.](\d{1,2})[-\/\.](\d{1,2})/g, build: (m) => {
            const s = new Date(+m[1], +m[2] - 1, +m[3]); s.setHours(0,0,0,0);
            const e = new Date(s.getTime() + dayMs - 1);
            return { start: s, end: e };
          } },
          // "6月29号" "6月29日"
          { re: /(\d{1,2})\s*月\s*(\d{1,2})\s*[号日]?/g, build: (m) => {
            const s = new Date(year, +m[1] - 1, +m[2]); s.setHours(0,0,0,0);
            const e = new Date(s.getTime() + dayMs - 1);
            return { start: s, end: e };
          } },
          // Lone month: "6月" / "6月份" — whole month
          { re: /(?<!\d)(\d{1,2})\s*月份?(?!\s*\d)/g, build: (m) => {
            const s = new Date(year, +m[1] - 1, 1);
            const e = new Date(year, +m[1], 0, 23, 59, 59);
            return { start: s, end: e };
          } },
          // M/D or M-D (no year)
          { re: /(?<!\d)(\d{1,2})[\/\-](\d{1,2})(?!\d)/g, build: (m) => {
            const s = new Date(year, +m[1] - 1, +m[2]); s.setHours(0,0,0,0);
            const e = new Date(s.getTime() + dayMs - 1);
            return { start: s, end: e };
          } },
        ];
        for (const { re, build } of patterns) {
          let m;
          while ((m = re.exec(workingText)) !== null) {
            const dt = build(m);
            if (dt && !isNaN(dt.start) && !isNaN(dt.end)) {
              found.push(dt);
              // Replace this occurrence with spaces so subsequent regexes
              // don't re-match it AND the residual stays clean.
              workingText = workingText.slice(0, m.index)
                + ' '.repeat(m[0].length)
                + workingText.slice(m.index + m[0].length);
              re.lastIndex = 0;
            }
          }
        }

        // 3) Combine: 0 → no dates; 1 → that day; 2+ → min..max range.
        let startDate = null, endDate = null;
        if (found.length === 1) {
          startDate = found[0].start;
          endDate = found[0].end;
        } else if (found.length >= 2) {
          startDate = new Date(Math.min(...found.map((d) => d.start.getTime())));
          endDate   = new Date(Math.max(...found.map((d) => d.end.getTime())));
        }
        const residual = workingText.replace(/\s+/g, ' ').trim();
        return { startDate, endDate, residual };
      };
      // Inline date-from-text augments the explicit From/To inputs:
      // whichever range is NARROWER wins for any given project.
      // The AI-parsed range (filt.aiDateStart/End) is preferred when
      // the regex parser couldn't find anything but the AI did.
      const localParsed = parseDateQuery(filt.search);
      const parsedQueryDates = (localParsed.startDate)
        ? localParsed
        : (
            (filt.aiDateState === 'done'
              && filt.aiDateQuery === filt.search.trim()
              && filt.aiDateStart)
              ? {
                  startDate: new Date(filt.aiDateStart + 'T00:00:00'),
                  endDate:   filt.aiDateEnd ? new Date(filt.aiDateEnd + 'T23:59:59') : null,
                  residual:  '', // AI consumed the whole query for date intent
                }
              : { startDate: null, endDate: null, residual: filt.search.trim() }
          );
      // Categorise a project into ONE of four status buckets so the
      // chip filter has a consistent key to match against.
      const projectStatusKey = (p) => {
        if (projectLiveCount(p) > 0) return 'running';
        if (p.status === 'passed') return 'passed';
        if (p.status === 'failed') return 'failed';
        return 'pending';
      };
      // Same expansive haystack approach as Run Reports — every field
      // a user might plausibly type, including dates in multiple
      // formats and the year alone.
      const isoDateBitsMP = (iso) => {
        if (!iso) return [];
        try {
          const d = new Date(iso);
          if (isNaN(d)) return [String(iso)];
          const yyyy = d.getFullYear();
          const mm = String(d.getMonth() + 1).padStart(2, '0');
          const dd = String(d.getDate()).padStart(2, '0');
          return [
            String(iso),
            d.toLocaleString(),
            d.toLocaleDateString(),
            `${yyyy}`,
            `${yyyy}-${mm}-${dd}`,
            `${mm}/${dd}/${yyyy}`,
            `${d.getMonth() + 1}月`,
          ];
        } catch { return [String(iso)]; }
      };
      const passesLocalSearch = (p) => {
        // After date tokens are stripped, the residual is what we
        // actually search against. If the user typed pure dates, the
        // residual is empty → no text filter, only the date filter
        // (from parsedQueryDates) does the work.
        const q = (parsedQueryDates.residual || filt.search.trim()).toLowerCase();
        if (!q) return true;
        const hay = pinyinizeMP([
          p.name, p.id, p.business, p.status,
          ...isoDateBitsMP(p.updatedAt),
          ...isoDateBitsMP(p.createdAt),
          ...(p.caseIds || []),
        ].filter(Boolean).join(' '));
        return hay.includes(q);
      };
      // A project passes the SEARCH filter if EITHER the local
      // substring/pinyin match OR (once AI has returned for the
      // current query) the AI ranking includes its id.
      const passesSearch = (p) => {
        if (!filt.search.trim()) return true;
        if (passesLocalSearch(p)) return true;
        if (filt.aiState === 'done'
          && filt.aiQuery === filt.search.trim()
          && filt.aiMatchedIds.has(p.id)) return true;
        return false;
      };
      const passesStatus = (p) =>
        filt.statuses.size === 0 || filt.statuses.has(projectStatusKey(p));
      const passesDate = (p) => {
        // Three date sources can constrain a project:
        //   1. explicit From input        → filt.dateFrom
        //   2. explicit To input          → filt.dateTo
        //   3. dates parsed from the search query (parsedQueryDates)
        // The project passes if ANY of its timestamps (updatedAt OR
        // createdAt) falls inside ALL active constraints. Checking both
        // is important: a project created 6/26 but last-run 7/29 still
        // legitimately matches a "6/26" query.
        const hasFromTo = !!(filt.dateFrom || filt.dateTo);
        const hasQueryDates = !!(parsedQueryDates.startDate);
        if (!hasFromTo && !hasQueryDates) return true;
        const isos = [p.updatedAt, p.createdAt].filter(Boolean);
        if (isos.length === 0) return false;
        const inRange = (iso) => {
          const t = new Date(iso).getTime();
          if (filt.dateFrom) {
            const from = new Date(filt.dateFrom + 'T00:00:00').getTime();
            if (t < from) return false;
          }
          if (filt.dateTo) {
            const to = new Date(filt.dateTo + 'T23:59:59').getTime();
            if (t > to) return false;
          }
          if (hasQueryDates) {
            if (t < parsedQueryDates.startDate.getTime()) return false;
            if (parsedQueryDates.endDate && t > parsedQueryDates.endDate.getTime()) return false;
          }
          return true;
        };
        return isos.some(inRange);
      };
      const applyFilter = (list) => list.filter(passesSearch).filter(passesStatus).filter(passesDate);

      const userProjects = applyFilter(userProjectsAll);
      const filteredPresets = applyFilter(presets);

      // ── 2c. AI semantic search (debounced, against full project list)
      // Fires whenever filt.search changes. Hits /api/search/projects on
      // the server, which calls the configured Qwen model and gets back
      // a list of project ids that semantically match the query. Results
      // get merged with the local substring/pinyin hits in passesSearch.
      // renderAll() destroys + recreates the search input, so by the
      // time an async AI callback fires the user's caret is gone. The
      // global _restoreFocus pipeline only handles ONE re-render (the
      // one that immediately follows the input event); subsequent
      // async re-renders (AI returns 1-3 s later) lose the focus.
      // This helper re-arms _restoreFocus right before each async
      // renderAll so the caret survives the AI round-trip.
      const renderAllKeepFocus = (preferredId = 'myProjSearch') => {
        try {
          const active = document.activeElement;
          const target = (active && active.id === preferredId)
            ? active
            : document.getElementById(preferredId);
          if (target && typeof target.selectionStart === 'number') {
            state.console._restoreFocus = {
              id: preferredId,
              selStart: target.selectionStart,
              selEnd: target.selectionEnd,
            };
          }
        } catch { /* ignore */ }
        renderAll();
      };

      const triggerAiSearch = () => {
        const q = filt.search.trim();
        // Reset both channels when the query empties.
        if (!q) {
          filt.aiState = 'idle';
          filt.aiQuery = '';
          filt.aiMatchedIds = new Set();
          filt.aiError = '';
          filt.aiDateState = 'idle';
          filt.aiDateQuery = '';
          filt.aiDateStart = null;
          filt.aiDateEnd = null;
          return;
        }
        // AI date parsing — fire ONLY when the local regex parser
        // couldn't extract any date AND the query doesn't already look
        // like a pure project name (cheap heuristic: contains a 月, 日,
        // 周, 天, 昨, 今, 前, 上, 本 or a digit).
        const localD = parseDateQuery(q);
        if (!localD.startDate && /[月日周天昨今前上本]|\d/.test(q)) {
          if (q !== filt.aiDateQuery || filt.aiDateState === 'idle') {
            if (window._myProjAiDateTimer) clearTimeout(window._myProjAiDateTimer);
            window._myProjAiDateTimer = setTimeout(async () => {
              const q2 = filt.search.trim();
              if (!q2) return;
              filt.aiDateState = 'loading';
              filt.aiDateQuery = q2;
              filt.aiDateStart = null;
              filt.aiDateEnd = null;
              renderAllKeepFocus();
              try {
                const r = await api('/api/search/parse-date', {
                  method: 'POST',
                  body: JSON.stringify({ query: q2 }),
                });
                if (filt.search.trim() !== q2) return;
                filt.aiDateStart = r?.startDate || null;
                filt.aiDateEnd   = r?.endDate   || null;
                filt.aiDateState = 'done';
                renderAllKeepFocus();
              } catch (err) {
                if (filt.search.trim() !== q2) return;
                filt.aiDateState = 'error';
                renderAllKeepFocus();
              }
            }, 800);
          }
        } else {
          filt.aiDateState = 'idle';
          filt.aiDateQuery = '';
          filt.aiDateStart = null;
          filt.aiDateEnd = null;
        }
        // Semantic search — same as before. Already-in-flight short-circuit.
        if (q && q === filt.aiQuery && (filt.aiState === 'loading' || filt.aiState === 'done')) return;
        if (window._myProjAiTimer) clearTimeout(window._myProjAiTimer);
        window._myProjAiTimer = setTimeout(async () => {
          // Re-check the query — the user may have typed more.
          const q2 = filt.search.trim();
          if (!q2) { filt.aiState = 'idle'; filt.aiMatchedIds = new Set(); return; }
          filt.aiQuery = q2;
          filt.aiState = 'loading';
          filt.aiMatchedIds = new Set();
          filt.aiError = '';
          renderAllKeepFocus();
          try {
            const payload = {
              query: q2,
              projects: [...userProjectsAll, ...presets].map((p) => ({
                id: p.id,
                name: p.name || '',
                business: p.business || '',
                caseIds: p.caseIds || [],
              })),
            };
            const r = await api('/api/search/projects', {
              method: 'POST',
              body: JSON.stringify(payload),
            });
            // If the user has moved on to a different query, drop these results.
            if (filt.search.trim() !== q2) return;
            const ids = Array.isArray(r?.matchedIds) ? r.matchedIds : [];
            filt.aiMatchedIds = new Set(ids);
            filt.aiState = 'done';
            renderAllKeepFocus();
          } catch (err) {
            if (filt.search.trim() !== q2) return;
            filt.aiState = 'error';
            filt.aiError = (err && err.message) ? err.message : String(err);
            renderAllKeepFocus();
          }
        }, 600);
      };

      // ── 3. Render single card ─────────────────────────────────────────
      const renderCard = (p) => {
        const liveCount = projectLiveCount(p);
        const expanded = projectExpand.has(p.id);
        const statusKey = liveCount ? 'running' : (p.status || 'pending');
        // In select mode, user-created projects get a checkbox at the head.
        // Presets are immutable demo data, so we don't allow selecting them.
        const showCheckbox = state.console._selectMode && !p.isPreset;
        const isChecked = state.console._selectedProjects?.has(p.id);
        const head = el('div', {
          class: 'project-head',
          onclick: () => {
            if (expanded) projectExpand.delete(p.id);
            else projectExpand.add(p.id);
            renderAll();
          },
        },
          // Checkbox slot — always rendered (fixed width) so the grid
          // doesn't reflow when the user toggles select mode. We just
          // hide the actual <input> when select-mode is off or this is
          // a preset.
          el('div', { class: 'pj-check-slot' + (state.console._selectMode ? ' is-active' : '') },
            showCheckbox ? el('input', {
              type: 'checkbox',
              class: 'pj-row-check',
              checked: isChecked ? '' : null,
              onclick: (ev) => {
                ev.stopPropagation();
                if (!state.console._selectedProjects) state.console._selectedProjects = new Set();
                if (state.console._selectedProjects.has(p.id)) state.console._selectedProjects.delete(p.id);
                else state.console._selectedProjects.add(p.id);
                renderAll();
              },
            }) : null,
          ),
          // Sequence rail — large #N badge on the far left of the card so
          // the eye picks up the order without scanning the name. Hidden
          // for presets (they don't have a stable order). Floats to the
          // left of the icon, not inline with the name.
          !p.isPreset && p.seq ? el('div', { class: 'pj-seq-rail' }, '#' + p.seq) : null,
          el('div', { class: 'pc-icon', style: `background: ${p.color};` }, p.icon),
          el('div', { class: 'pj-info' },
            el('div', { class: 'pj-name' },
              p.name,
              // Project-level business tag (replaces per-case tags). One tag
              // per project — picks the project's business field, else falls
              // back to the most common business across its cases.
              (() => {
                const biz = p.business;
                if (!biz) return null;
                return el('span', { class: 'project-biz-tag' }, biz);
              })(),
            ),
            el('div', { class: 'pj-meta' },
              `${p.caseIds?.length || 0} cases · ×${p.runsPerCase || 1}/case`,
              // Creation time
              p.createdAt ? ' · 创建于 ' + new Date(p.createdAt).toLocaleDateString() : '',
              // Last run time. Three cases:
              //   · currently running (liveCount > 0) → handled by live badge
              //   · has a finished run (updatedAt + non-pending status) → show date
              //   · never run → say so explicitly
              liveCount
                ? ` · ${liveCount} live`
                : (p.updatedAt && p.status && p.status !== 'pending')
                  ? ' · 上次运行时间 ' + new Date(p.updatedAt).toLocaleString()
                  : '',
            ),
            // Status pill — three states:
            //   · ran + all passed → "all cases pass"
            //   · ran + some failed → "Recent run: X/Y case fail"
            //   · never run → "Not run yet · Ready to run"
            // Counts derived from state.recent (computeBatchOutcome) so the
            // pill agrees with the per-case rows the user expands — and so
            // single-case reruns surface here without needing a full batch run.
            liveCount
              ? null
              : (() => {
                  const everRan = p.status === 'passed' || p.status === 'failed';
                  if (!everRan) return el('div', { class: 'pj-result-tag is-pending' }, 'Not run yet · Ready to run');
                  const o = computeBatchOutcome(p);
                  return el('div', {
                    class: 'pj-result-tag ' + (o.allPassed ? 'is-passed' : 'is-failed'),
                  }, o.allPassed
                    ? 'all cases pass'
                    : `Recent run: ${o.failed}/${o.total || '?'} case fail`);
                })(),
          ),
          el('button', {
            class: 'project-run-btn a-button a-button--brand-primary -small',
            onclick: (ev) => {
              ev.stopPropagation();
              openRunModal(p.caseIds || [], { name: p.name, runsPerCase: p.runsPerCase || 1, batchId: p.isPreset ? null : p.id, title: `Run ${p.name}` });
            },
          }, liveCount ? 'Watch live' : 'Run project'),
          // History — always-visible (sits on the head, no need to
          // expand the project to find it). Opens the per-project
          // run-history modal with batches grouped by execution time.
          el('button', {
            class: 'a-button a-button--neutral-secondary -small',
            title: '看这个 project 跑过的所有 batch · 按时间分组 · 点 case 跳到 Midscene report',
            onclick: (ev) => { ev.stopPropagation(); openRunHistoryReportModal(p); },
          }, '📋 History'),
          // Tiny "Live" badge only while running — when not live the .pj-result-tag
          // pill inside .pj-info already says pass / fail / not run yet, so the
          // old static Ready / Passed / Failed badge here is a duplicate.
          liveCount ? el('span', { class: 'status running' }, 'Live') : null,
          // Delete slot — only customs get one; preset slot stays empty
          // and collapses (display:none via :empty).
          el('div', { class: 'pj-del-slot' },
            !p.isPreset ? el('button', {
              class: 'btn mini danger',
              title: '删除这个 project（不影响 case 库本身）',
              onclick: (ev) => {
                ev.stopPropagation();
                if (!confirm(`删除 project "${p.name || p.id}"？\n（不影响 case 库本身）`)) return;
                state.batches = state.batches.filter((x) => x.id !== p.id);
                state.console._selectedProjects?.delete(p.id);
                saveBatches();
                renderAll();
                toast(`已删除 "${p.name || p.id}"`);
              },
            }, 'Delete') : null,
          ),
          el('button', {
            class: 'expand-btn' + (expanded ? ' expanded' : ''),
            onclick: (ev) => { ev.stopPropagation(); if (expanded) projectExpand.delete(p.id); else projectExpand.add(p.id); renderAll(); },
          }, expanded ? '▾' : '▸'),
        );

        if (!expanded) return el('div', {
          class: 'project-card' + (p.isPreset ? ' preset' : ''),
          dataset: { projectId: p.id || '', projectName: p.name || p.id || '' },
        }, head);

        const cases = (p.caseIds || []).map((id) => state.cases.find((c) => c.id === id)).filter(Boolean);
        const body = el('div', { class: 'project-body' },
          el('div', { class: 'pj-cases' },
            ...cases.map((cs) => caseRowInProject(cs, p)),  // ← p threads project for override editor
            cases.length === 0 ? el('div', { class: 'hint' }, '这个 project 里的 case 都被移除了。可以删掉这个 project，或者重新创建一个。') : null,
          ),
          // Bottom action row — kept minimal: Run + (custom only) Rename.
          // Edit and Delete are gone:
          //   · Delete lives at the row head (✕ button) and in select mode.
          //   · Edit was a duplicate path into the same modal — params are
          //     now read-only here, so users edit via Create/Edit Project
          //     modal which they reach by re-clicking + New project or by
          //     opening the project (no separate Edit button needed).
          el('div', { class: 'bc-actions' },
            el('button', {
              class: 'btn mini primary',
              onclick: (ev) => { ev.stopPropagation(); openRunModal(p.caseIds || [], { name: p.name, runsPerCase: p.runsPerCase || 1, batchId: p.isPreset ? null : p.id }); },
            }, '▶ Run'),
            !p.isPreset ? el('button', {
              class: 'btn mini',
              onclick: (ev) => { ev.stopPropagation(); openRenameModal(p.name || '', (newName) => {
                const existing = state.batches.find((x) => x.id === p.id);
                if (existing) { existing.name = newName; existing.updatedAt = new Date().toISOString(); saveBatches(); }
                renderAll(); toast(`已改名为 "${newName}"`);
              }); },
            }, 'Rename') : null,
            // History button moved up to the project head row so it's
            // always visible without having to expand the card first.
          ),
        );
        return el('div', {
          class: 'project-card expanded' + (p.isPreset ? ' preset' : ''),
          dataset: { projectId: p.id || '', projectName: p.name || p.id || '' },
        }, head, body);
      };

      // View mode — 'list' (default) shows projects flat; 'by-dept' groups
      // same-department projects under a collapsible card.
      state.console._projectViewMode = state.console._projectViewMode || 'list';
      const viewMode = state.console._projectViewMode;

      // ── Filter toolbar — two rows (search+date on top, chips below)
      // so nothing gets squished. Chips are multi-select.
      const filterMatches = !!(filt.search.trim() || filt.statuses.size > 0 || filt.dateFrom || filt.dateTo);
      const statusChip = (key, label, swatchClass) => el('button', {
        class: 'mp-status-chip ' + swatchClass + (filt.statuses.has(key) ? ' is-on' : ''),
        title: filt.statuses.has(key) ? '已选中 · 点击取消' : '点击只看这种状态的 project',
        onclick: () => {
          if (filt.statuses.has(key)) filt.statuses.delete(key);
          else filt.statuses.add(key);
          renderAll();
        },
      }, label);
      const dateInput = (prop) => el('input', {
        type: 'date',
        value: filt[prop] || '',
        class: 'mp-date-input',
        onchange: (ev) => { filt[prop] = ev.target.value; renderAll(); },
      });
      // AI search status badge — kept in the same row as the search
      // widget so it reads as a search-status indicator, not a separate
      // unrelated control. Only one of these renders at a time.
      const aiBadge = (() => {
        const q = filt.search.trim();
        if (!q) return null;
        // Date parsing has priority — when the user is typing a date
        // expression, showing semantic-search status is just noise.
        if (filt.aiDateState === 'loading') {
          return el('span', { class: 'mp-ai-badge mp-ai-loading' },
            el('span', { class: 'mp-ai-spinner' }),
            ' 🤖 解析日期中…');
        }
        if (filt.aiDateState === 'done' && filt.aiDateQuery === q && filt.aiDateStart) {
          const fmt = (s) => s ? new Date(s + 'T00:00:00').toLocaleDateString() : '';
          const range = filt.aiDateEnd && filt.aiDateEnd !== filt.aiDateStart
            ? `${fmt(filt.aiDateStart)} – ${fmt(filt.aiDateEnd)}`
            : fmt(filt.aiDateStart);
          return el('span', { class: 'mp-ai-badge mp-ai-done' },
            `🤖 解析日期: ${range}`);
        }
        if (filt.aiState === 'loading') {
          return el('span', { class: 'mp-ai-badge mp-ai-loading' },
            el('span', { class: 'mp-ai-spinner' }),
            ' 🤖 AI 搜索中…');
        }
        if (filt.aiState === 'done' && filt.aiQuery === q && filt.aiMatchedIds.size > 0) {
          return el('span', { class: 'mp-ai-badge mp-ai-done' },
            `🤖 AI 补充匹配 ${filt.aiMatchedIds.size} 个`);
        }
        // Error state suppressed — silently fall back to local-only
        // results. Showing a red badge every time the model is down /
        // rate-limited is noise.
        return null;
      })();

      const filterBar = el('div', { class: 'mp-filter-bar' },
        // ── Row 1: search widget + AI badge + From/To + Clear ───────
        el('div', { class: 'mp-filter-row' },
          el('div', { class: 'mp-search-group' },
            el('input', {
              id: 'myProjSearch',
              type: 'search',
              placeholder: '搜 project / case id / 部门 / 运行时间',
              value: filt.search,
              class: 'mp-search-input',
              oncompositionstart: () => { state.console._imeComposing = true; },
              oncompositionend: (ev) => {
                state.console._imeComposing = false;
                filt.search = ev.target.value;
                state.console._restoreFocus = { id: 'myProjSearch',
                  selStart: ev.target.selectionStart, selEnd: ev.target.selectionEnd };
                renderAll();
                triggerAiSearch();
              },
              oninput: (ev) => {
                if (state.console._imeComposing) return;
                filt.search = ev.target.value;
                state.console._restoreFocus = { id: 'myProjSearch',
                  selStart: ev.target.selectionStart, selEnd: ev.target.selectionEnd };
                renderAll();
                triggerAiSearch();
              },
              onkeydown: (ev) => {
                if (ev.key === 'Enter' && !state.console._imeComposing) {
                  ev.preventDefault();
                  filt.search = ev.target.value;
                  renderAll();
                  triggerAiSearch();
                }
              },
            }),
            el('button', {
              class: 'mp-search-btn',
              onclick: () => {
                const node = document.getElementById('myProjSearch');
                if (node) filt.search = node.value;
                renderAll();
                triggerAiSearch();
              },
            }, '🔎 Search'),
          ),
          aiBadge,
          // Spacer pushes the date group to the right.
          el('div', { class: 'mp-filter-spacer' }),
          el('span', { class: 'mp-filter-icon', title: '按运行时间筛选' }, 'Filter'),
          el('div', { class: 'mp-date-group' },
            el('span', { class: 'mp-date-label' }, 'From'),
            dateInput('dateFrom'),
            el('span', { class: 'mp-date-label' }, 'To'),
            dateInput('dateTo'),
          ),
          filterMatches ? el('button', {
            class: 'mp-clear-btn',
            onclick: () => {
              filt.search = '';
              filt.statuses = new Set();
              filt.dateFrom = '';
              filt.dateTo = '';
              filt.aiState = 'idle';
              filt.aiMatchedIds = new Set();
              filt.aiQuery = '';
              filt.aiDateState = 'idle';
              filt.aiDateQuery = '';
              filt.aiDateStart = null;
              filt.aiDateEnd = null;
              renderAll();
            },
          }, '✕ Clear') : null,
        ),
        // ── Row 2: status chips ─────────────────────────────────────
        el('div', { class: 'mp-filter-row' },
          el('div', { class: 'mp-status-group' },
            el('span', { class: 'mp-status-label' }, '状态'),
            statusChip('passed',  'all cases pass',              'is-passed'),
            statusChip('failed',  'Recent run: case fail',       'is-failed'),
            statusChip('pending', 'Not run yet · Ready to run',  'is-pending'),
            statusChip('running', 'Live',                        'is-running'),
          ),
        ),
      );

      const totalCount = userProjectsAll.length;
      const shownCount = userProjects.length;
      const card = el('div', { class: 'section-card' },
        el('div', { class: 'section-title' },
          el('span', {},
            'My Project · ',
            filterMatches
              ? `${shownCount} of ${totalCount} custom`
              : `${totalCount} custom`,
            ` · ${presets.length} presets`,
          ),
          el('div', { style: 'display:flex; gap:6px; align-items:center;' },
            // View-mode segmented control: list vs. group-by-department.
            el('div', { class: 'pj-view-seg' },
              el('button', {
                class: 'pj-view-btn' + (viewMode === 'list' ? ' active' : ''),
                onclick: () => { state.console._projectViewMode = 'list'; renderAll(); },
                title: '所有 project 平铺',
              }, 'All projects'),
              el('button', {
                class: 'pj-view-btn' + (viewMode === 'by-dept' ? ' active' : ''),
                onclick: () => { state.console._projectViewMode = 'by-dept'; renderAll(); },
                title: '相同部门的 project 合并成一组',
              }, 'By department'),
            ),
            // Select-mode toggle — when on, every user-created project row
            // gets a checkbox + bulk Select all / Exclude all / Delete N
            // controls appear in the top bar.
            userProjects.length ? el('button', {
              class: 'a-button a-button--neutral-secondary -small',
              onclick: () => {
                state.console._selectMode = !state.console._selectMode;
                if (!state.console._selectMode) {
                  // Leaving select mode → clear selection
                  state.console._selectedProjects = new Set();
                }
                renderAll();
              },
            }, state.console._selectMode ? '✓ Done selecting' : '☐ Select') : null,
            el('button', {
              class: 'a-button a-button--brand-primary -small',
              onclick: () => openCreateProjectModal({
                initialIds: [...state.console.selectedIds],
                initialName: suggestBatchName([...state.console.selectedIds]) || '',
              }),
            }, '+ New project'),
          ),
        ),
        // Second row — appears only in select mode
        state.console._selectMode && userProjects.length ? el('div', {
          style: 'padding: 10px 14px; background: #fff7ed; border-bottom: 1px solid #fed7aa; display: flex; gap: 8px; align-items: center;',
        },
          el('span', { style: 'font-size:12px;font-weight:700;color:#7c2d12;' },
            `${state.console._selectedProjects?.size || 0} of ${userProjects.length} selected`),
          el('button', {
            class: 'a-button a-button--neutral-secondary -small',
            onclick: () => {
              state.console._selectedProjects = new Set(userProjects.map((p) => p.id));
              renderAll();
            },
          }, 'Select all'),
          el('button', {
            class: 'a-button a-button--neutral-tertiary -small',
            onclick: () => { state.console._selectedProjects = new Set(); renderAll(); },
          }, 'Exclude all'),
          el('div', { style: 'flex:1;' }),
          el('button', {
            class: 'a-button a-button--destructive-primary -small',
            disabled: !state.console._selectedProjects?.size ? '' : null,
            onclick: () => {
              const ids = [...(state.console._selectedProjects || [])];
              if (!ids.length) return;
              if (!confirm(`删除选中的 ${ids.length} 个 project？\n（不影响 case 库本身，只是把这些 project 配置删掉）`)) return;
              state.batches = state.batches.filter((b) => !ids.includes(b.id));
              state.console._selectedProjects = new Set();
              saveBatches();
              renderAll();
              toast(`已删除 ${ids.length} 个 project`);
            },
          }, `⊖ Delete ${state.console._selectedProjects?.size || 0} selected`),
        ) : null,
        // Filter bar — search + status chips. Stays above the legend so
        // the user reaches it without scrolling past the tutorial card.
        filterBar,
        el('div', { style: 'padding: 12px;' },
          // Tiny tutorial card — labels each piece of a project card so
          // a new user understands what they're seeing. Persists hidden
          // state in localStorage so it stays dismissed across reloads.
          renderMyProjectsLegend(),
          // user projects first (most actionable), then presets
          userProjects.length === 0
            ? el('div', { class: 'empty', style: 'border:1px dashed var(--line); border-radius:8px; margin-bottom:8px; padding:14px;' },
                filterMatches
                  ? '没有 project 匹配当前筛选条件。点 ✕ Clear 重置。'
                  : el('span', {},
                      '还没有自建 project。',
                      el('br', {}),
                      '点上面的 ', el('b', {}, '+ New project'), ' 起一个新的。'))
            : null,
          ...(viewMode === 'by-dept'
            ? renderProjectsByDept(userProjects, renderCard)
            : userProjects.map(renderCard)),
          filteredPresets.length ? el('div', { class: 'hint', style: 'margin: 10px 4px 6px;' }, '── Presets · 按类别自动归类，可以 Load into Console 改了再保存为新 project ──') : null,
          ...filteredPresets.map(renderCard),
        ),
      );
      return card;
    }

    // Inline legend / mini-tutorial — sits above the project list and
    // labels the 4 things new users keep asking about: what's the #N
    // badge, the dept tag, the case count, the ×N/case runs marker.
    // Always visible (non-dismissable) so first-timers always have the
    // reference and returning users can re-read it without digging.
    function renderMyProjectsLegend() {
      const labelChip = (text, color) => el('span', { class: 'pj-legend-chip', style: `border-color:${color};color:${color};` }, text);
      return el('div', { class: 'pj-legend' },
        el('div', { class: 'pj-legend-title' },
          el('span', {}, 'TIP · 一张卡片里都是什么意思'),
        ),
        el('div', { class: 'pj-legend-row' },
          el('span', { class: 'pj-seq-rail', style: 'min-width:36px;padding:2px 6px;font-size:12px;' }, '#N'),
          el('span', {},
            el('b', {}, '#N 序号'), ' — 你建过的所有 project 顺序编号。',
            el('b', {}, '最老 #1，最新数字最大'), '。',
          ),
        ),
        el('div', { class: 'pj-legend-row' },
          el('span', { class: 'project-biz-tag', style: 'margin-left:0;' }, '部门名'),
          el('span', {},
            el('b', {}, '部门 tag'), ' — 创建 project 时填的部门，用来在 ',
            el('b', {}, 'Case Library'), ' / ', el('b', {}, 'By department'), ' / Reports / Failures 各处归类。',
          ),
        ),
        el('div', { class: 'pj-legend-row' },
          el('code', { class: 'pj-legend-mono' }, 'N cases'),
          el('span', {},
            el('b', {}, '勾了多少个 case'), ' — 这个 project 一跑会跑里面的全部 case。',
          ),
        ),
        el('div', { class: 'pj-legend-row' },
          el('code', { class: 'pj-legend-mono' }, '×N/case'),
          el('span', {},
            el('b', {}, '每个 case 跑几遍'), ' — 默认 ×1（每个 case 跑 1 遍）。',
            'Create 模态可以改成 ×2 / ×3 / ×5 拿稳定性数据。',
          ),
        ),
        el('div', { class: 'pj-legend-row' },
          labelChip('all cases pass', '#0b6a43'),
          labelChip('Recent run: X/Y case fail', '#9f1d2a'),
          labelChip('Not run yet · Ready to run', '#475569'),
          el('span', {},
            el('b', {}, '状态 pill'), ' — 最近一次跑的结果。没跑过会显示 ',
            el('i', {}, 'Not run yet'), '。',
          ),
        ),
      );
    }

    // Group user projects by their `business` field. Projects with no
    // explicit dept fall under "(unsorted)". Each dept becomes a
    // collapsible card; expand to show the individual project cards
    // (built by passing renderCard back as a callback).
    function renderProjectsByDept(userProjects, renderCard) {
      state.console._deptExpand = state.console._deptExpand || new Set();
      const expanded = state.console._deptExpand;

      // Stable grouping in insertion order so newest-first ordering inside
      // each group still holds.
      const groups = new Map();
      for (const p of userProjects) {
        const key = p.business || '(unsorted)';
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(p);
      }

      const nodes = [];
      for (const [dept, projects] of groups.entries()) {
        const isOpen = expanded.has(dept);
        const passCount = projects.filter((p) => p.status === 'passed').length;
        const failCount = projects.filter((p) => p.status === 'failed').length;
        const head = el('div', {
          class: 'pj-dept-head',
          onclick: () => {
            if (isOpen) expanded.delete(dept);
            else expanded.add(dept);
            renderAll();
          },
        },
          el('span', { class: 'pj-dept-chev' }, isOpen ? '▾' : '▸'),
          el('span', { class: 'project-biz-tag pj-dept-name' }, dept),
          el('span', { class: 'pj-dept-count' }, `${projects.length} project${projects.length === 1 ? '' : 's'}`),
          el('div', { style: 'flex:1;' }),
          passCount ? el('span', { class: 'pj-dept-stat pj-dept-stat--pass' }, `✓ ${passCount}`) : null,
          failCount ? el('span', { class: 'pj-dept-stat pj-dept-stat--fail' }, `✗ ${failCount}`) : null,
        );
        const body = isOpen
          ? el('div', { class: 'pj-dept-body' }, ...projects.map(renderCard))
          : null;
        nodes.push(el('div', { class: 'pj-dept-group' + (isOpen ? ' is-open' : '') }, head, body));
      }
      return nodes;
    }

    // Row inside an expanded project card: category tag + case name + status
    // badge + Report/Log/Open quick actions. Used by Run Center home My
    // Projects + sidebar Projects view (both SAP Automation Project card
    // and user batches).
    function caseRowInProject(cs, project) {
      const recent = state.recent.find((r) => r.caseId === cs.id);
      const isLive = state.active.some((a) => a.caseId === cs.id);
      const actions = el('div', { class: 'pj-case-actions' });

      // Per-project parameter overrides — counted to show a badge on the
      // row when there's at least one override for this case in this project.
      const overrides = project?.caseOverrides?.[cs.id]?.params || {};
      const overrideCount = Object.keys(overrides).length;
      // Inline-expand key — "<projectId>::<caseId>" so two open editors
      // in different projects don't collide.
      const expandKey = project ? `${project.id}::${cs.id}` : '';
      state.projectCaseExpand = state.projectCaseExpand || new Set();
      const isExpanded = expandKey ? state.projectCaseExpand.has(expandKey) : false;

      // Params indicator — visual affordance only. The row itself
      // catches the click via toggleExpand below, so we render this as
      // a plain <span> that doesn't need its own onclick. Override
      // count + ▾/▸ marker keep the user oriented.
      if (project && !project.isPreset) {
        actions.appendChild(el('span', {
          class: 'btn mini pj-case-params-tag' + (overrideCount > 0 ? ' primary' : ''),
          title: overrideCount > 0
            ? `${overrideCount} 个参数有 project 覆盖 — 点行任意位置展开 / 收起`
            : '点行任意位置展开 / 收起 params + NL（只读）',
        }, isExpanded ? '▾ Close' : (overrideCount > 0 ? `● ${overrideCount} overridden` : '▸ Params')));
      }

      if (isLive) {
        actions.appendChild(el('button', {
          class: 'btn mini',
          onclick: (ev) => { ev.stopPropagation();
            state.tab = 'run'; state.section = 'live-channels';
            state.liveCaseId = cs.id; if (state.console) state.console.forceComposeMode = false;
            renderAll(); window.scrollTo({ top: 0, behavior: 'smooth' });
          },
        }, '🔴 Live'));
      } else if (!recent) {
        actions.appendChild(el('button', {
          class: 'btn mini',
          onclick: (ev) => { ev.stopPropagation(); openRunModal([cs.id], { name: `Run ${cs.id}`, title: `Run single case` }); },
        }, '▶ Run'));
      }

      // Per-case Delete — explicit red text button, removes the case from
      // this project (not from the library). Custom projects only.
      if (project && !project.isPreset) {
        actions.appendChild(el('button', {
          class: 'btn mini danger',
          title: '从这个 project 移除这个 case（不影响 case 库本身）',
          onclick: (ev) => {
            ev.stopPropagation();
            if (!confirm(`从 project "${project.name || project.id}" 移除 case "${cs.id}"？\n（不影响 case 库本身，只是这个 project 不再跑它）`)) return;
            const target = state.batches.find((b) => b.id === project.id);
            if (!target) return;
            target.caseIds = (target.caseIds || []).filter((id) => id !== cs.id);
            if (target.caseOverrides && target.caseOverrides[cs.id]) {
              delete target.caseOverrides[cs.id];
            }
            target.updatedAt = new Date().toISOString();
            saveBatches();
            renderAll();
            toast(`已从 "${target.name || target.id}" 移除 "${cs.id}"`);
          },
        }, 'Delete'));
      }

      // Whole row toggles expand — not just the Params button. Anywhere
      // outside a real action button (Run / Live / Delete) flips the
      // expand state. We use a single shared async handler so loading
      // the case detail still kicks in on first open.
      const toggleExpand = async () => {
        if (!project || project.isPreset || !expandKey) return;
        if (state.projectCaseExpand.has(expandKey)) {
          state.projectCaseExpand.delete(expandKey);
          renderAll();
        } else {
          state.projectCaseExpand.add(expandKey);
          renderAll();
          if (!state.details.has(cs.id)) {
            await loadDetail(cs.id).catch(() => {});
            renderAll();
          }
        }
      };

      // Title row — shows ONLY the case title (no duplicate id; the leading
      // `#caseId` pill already covers that). Whole row is clickable.
      // Per-case Pass/Fail pill removed — that history now lives in the
      // project-level "Open run history report" modal (which links each
      // run to its Midscene report). Only the live indicator stays here
      // since that's actionable (jump-to-live).
      // Category tag — same visual as the Create Project modal's
      // Individual pick rows so the user can pattern-match by colour.
      const catKey = categorizeCase(cs);
      const catInfo = categoryMeta(catKey);
      const headRow = el('div', {
        class: 'pj-case-line' + (isExpanded ? ' is-expanded' : '') + (project && !project.isPreset ? ' is-clickable' : ''),
        onclick: toggleExpand,
      },
        el('div', { class: 'pj-case-num' }, '#' + (cs.id || '')),
        el('div', { class: 'pj-case-title-cell' },
          caseTitle(cs),
          catInfo ? el('span', { class: `cat-tag cat-${catKey} pj-case-cat-tag` }, catInfo.label || catKey) : null,
        ),
        isLive ? el('span', { class: 'status running' }, 'Live') : null,
        actions,
      );
      if (!isExpanded || !project) return el('div', { class: 'pj-case-block' }, headRow);
