      return el('div', { class: 'pj-case-block is-expanded' }, headRow, renderInlineCaseEditor(project, cs));
    }

    // Inline editor under a project's case row. Params on the left (with
    // library default shown beside each input), Natural Language on the
    // right (read-only, scrollable). Saves overrides directly into
    // project.caseOverrides[caseId].params. Library file never touched.
    function renderInlineCaseEditor(project, cs) {
      const detail = state.details.get(cs.id);
      if (!detail) {
        return el('div', { class: 'pj-case-body loading' },
          el('div', { class: 'a-text--label' }, 'Loading case detail…'),
        );
      }
      const fields = extractParams(detail);
      const parsed = detail.parsed || detail;
      const overrides = { ...((project.caseOverrides?.[cs.id]?.params) || {}) };

      // Read-only mode — show resolved (override-or-default) values as
      // chips. To CHANGE params, the user must edit on the Create / Edit
      // Project modal where the full editor lives. Project case view is
      // for inspection only now.
      const fieldsWithCurrent = fields.map((f) => ({
        ...f,
        currentValue: Object.prototype.hasOwnProperty.call(overrides, f.order) ? overrides[f.order] : f.defaultValue,
      }));
      const nlBox = buildHighlightedNL(parsed, fieldsWithCurrent);

      const fieldNodes = fieldsWithCurrent.map((f) => {
        const overridden = Object.prototype.hasOwnProperty.call(overrides, f.order)
          && overrides[f.order] !== f.defaultValue;
        return el('div', { class: 'inline-field' },
          el('div', { class: 'inline-field-label' }, `#${f.order} · ${f.locator}`),
          el('div', { class: 'inline-ro-value' + (overridden ? ' is-override' : '') },
            el('code', {}, f.currentValue || '(empty)'),
            overridden ? el('span', { class: 'inline-ro-tag' }, 'override') : null,
          ),
          overridden
            ? el('div', { class: 'inline-default-pill' }, 'Library default: ', el('code', {}, f.defaultValue || '(empty)'))
            : null,
        );
      });

      return el('div', { class: 'pj-case-body' },
        el('div', { class: 'inline-grid' },
          el('div', { class: 'inline-col-params' },
            el('div', { class: 'inline-col-head' },
              el('div', { class: 'a-text--label' }, 'Parameters'),
              el('span', { class: 'inline-status-pill is-readonly' }, 'read only'),
            ),
            fields.length === 0
              ? el('div', { class: 'hint', style: 'padding: var(--space-3);' }, '这个 case 没有 aiInput 步骤，无可调参数。')
              : el('div', { class: 'inline-fields' }, ...fieldNodes),
          ),
          el('div', { class: 'inline-col-nl' },
            el('div', { class: 'inline-col-head' },
              el('div', { class: 'a-text--label' }, 'Natural Language'),
              el('span', { class: 'inline-status-pill is-readonly' }, '一步一行 · 只读'),
            ),
            nlBox,
          ),
        ),
        // Footer — just Close. No Save / Reset since editing is disabled
        // here. To edit params, use the Create Project / Edit Project modal.
        el('div', { class: 'inline-actions' },
          el('span', { style: 'font-size:11px;color:var(--muted);' },
            '只读视图 · 改参数请去 ', el('b', {}, '+ Create a project'), ' 或 Edit Project modal'),
          el('div', { style: 'flex: 1;' }),
          el('button', { class: 'a-button a-button--neutral-tertiary -small', onclick: () => {
            state.projectCaseExpand.delete(`${project.id}::${cs.id}`);
            renderAll();
          } }, 'Close'),
        ),
      );
    }

    // Modal: edit per-case parameter overrides for THIS project. Shows
    // the library default beside each editable input. Saved overrides
    // live on project.caseOverrides[caseId].params — case file unchanged.
    async function openParamOverrideModal(project, cs) {
      // Lazy-load full case detail so we can read its default params + fields.
      let detail = state.details.get(cs.id);
      if (!detail) {
        try { detail = await loadDetail(cs.id); } catch (err) {
          return toast('加载 case 详情失败: ' + (err?.message || err));
        }
      }
      const fields = extractParams(detail);
      if (!fields.length) return toast(`${cs.id} 没有可调参数 (没有 aiInput 步骤)`);

      const overrides = { ...((project.caseOverrides?.[cs.id]?.params) || {}) };

      const backdrop = el('div', { class: 'modal-backdrop', onclick: (ev) => { if (ev.target === backdrop) close(); } });
      function close() { backdrop.remove(); document.removeEventListener('keydown', onKey); }
      function onKey(ev) { if (ev.key === 'Escape') close(); }
      document.addEventListener('keydown', onKey);

      const inputMap = new Map();
      const fieldNodes = fields.map((f) => {
        const currentVal = Object.prototype.hasOwnProperty.call(overrides, f.order) ? overrides[f.order] : f.defaultValue;
        const isModified = currentVal !== f.defaultValue;
        const input = el('input', {
          type: 'text',
          value: currentVal,
          class: isModified ? 'is-modified' : '',
          oninput: (ev) => {
            overrides[f.order] = ev.target.value;
            ev.target.classList.toggle('is-modified', ev.target.value !== f.defaultValue);
          },
        });
        inputMap.set(f.order, { input, defaultValue: f.defaultValue });
        return el('div', { class: 'override-field' },
          el('div', { class: 'override-field-label' }, `#${f.order} · ${f.locator}`),
          el('div', { class: 'override-input-row' },
            input,
            el('button', {
              class: 'btn mini',
              title: 'Reset to library default',
              onclick: () => {
                input.value = f.defaultValue;
                delete overrides[f.order];
                input.classList.remove('is-modified');
              },
            }, '↺'),
          ),
          el('div', { class: 'override-default-pill' }, 'Library default: ', el('code', {}, f.defaultValue || '(empty)')),
        );
      });

      const modal = el('div', { class: 'modal cp-modal' },
        el('div', { class: 'modal-head' },
          el('div', {},
            el('div', { class: 'title' }, `${cs.id} · ${caseTitle(cs)}`),
            el('div', { class: 'sub' }, `Project: ${project.name} · 改这里只影响这个 project · 库里的 case 文件不动`),
          ),
          el('button', { class: 'a-button a-button--neutral-tertiary -small', onclick: close, 'aria-label': 'Close' }, '✕'),
        ),
        el('div', { class: 'modal-body' },
          el('div', { class: 'override-section' },
            el('div', { class: 'override-head' },
              el('span', { class: 'a-text--label' }, 'Parameters'),
              el('span', { class: 'override-badge' + (Object.keys(overrides).length === 0 ? ' is-default' : '') },
                Object.keys(overrides).length === 0 ? 'Library defaults' : `${Object.keys(overrides).length} override${Object.keys(overrides).length === 1 ? '' : 's'}`,
              ),
            ),
            el('div', { class: 'override-grid' }, ...fieldNodes),
          ),
        ),
        el('div', { class: 'modal-foot' },
          el('div', { style: 'font-size: var(--text-s); color: var(--muted);' },
            '修改后只 binds 到这个 project · 重置库默认 = 删掉这条 override',
          ),
          el('div', { style: 'display: flex; gap: var(--space-3);' },
            el('button', { class: 'a-button a-button--neutral-secondary', onclick: () => {
              // Reset ALL — removes every override for this case in this project
              for (const [order, { input, defaultValue }] of inputMap) {
                input.value = defaultValue;
                input.classList.remove('is-modified');
                delete overrides[order];
              }
            } }, 'Reset all to library default'),
            el('button', { class: 'a-button a-button--neutral-secondary', onclick: close }, 'Cancel'),
            el('button', { class: 'a-button a-button--brand-primary', onclick: () => {
              project.caseOverrides = project.caseOverrides || {};
              if (Object.keys(overrides).length === 0) {
                delete project.caseOverrides[cs.id];
              } else {
                project.caseOverrides[cs.id] = { params: { ...overrides } };
              }
              project.updatedAt = new Date().toISOString();
              saveBatches();
              toast(`${cs.id} overrides 已保存 to project "${project.name}"`);
              close();
              renderAll();
            } }, 'Save overrides'),
          ),
        ),
      );
      backdrop.appendChild(modal);
      document.body.appendChild(backdrop);
    }

    function loadBatchIntoConsole(b) {
      // Edit was a no-op from the sidebar Projects view because state.section
      // stayed at 'projects' → Run Console wasn't rendered, so the user
      // never saw the loaded batch. Force the user back to Run Center home.
      state.tab = 'run';
      state.section = 'run-center';
      state.console.selectedIds = new Set(b.caseIds || []);
      state.console.name = b.name || '';
      state.console.runsPerCase = b.runsPerCase || 1;
      state.console.editingBatchId = b.id;
      state.console.forceComposeMode = true; // make sure the console is visible even mid-run
      renderAll();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      toast(`已载入 "${b.name || b.id}"，改完点 Save changes 或 Run`);
    }

    // Find an existing batch with identical name + same set of caseIds +
    // same runsPerCase. caseIds compared as sets (order-independent) since
    // the user thinks of "Asset Suite · 3 cases" as 3 cases, not as an
    // ordered tuple. Returns the existing batch or null.
    function findDuplicateBatch(name, ids, runsPerCase) {
      const nameKey = (name || '').trim();
      const idSet = new Set(ids);
      const runs = runsPerCase || 1;
      return state.batches.find((b) => {
        if ((b.name || '').trim() !== nameKey) return false;
        if ((b.runsPerCase || 1) !== runs) return false;
        const bIds = b.caseIds || [];
        if (bIds.length !== idSet.size) return false;
        return bIds.every((id) => idSet.has(id));
      }) || null;
    }

    function saveBatchFromConsole(nameValue) {
      const c = state.console;
      const ids = [...c.selectedIds];
      if (!ids.length) return toast('选至少一个 case 才能保存 batch');
      const name = (nameValue || suggestBatchName(ids)).trim() || `Batch · ${ids.length} cases`;
      if (c.editingBatchId) {
        const existing = state.batches.find((b) => b.id === c.editingBatchId);
        if (existing) {
          existing.name = name;
          existing.caseIds = ids;
          existing.runsPerCase = c.runsPerCase;
          existing.updatedAt = new Date().toISOString();
          saveBatches();
          toast(`已更新 batch "${name}"`);
          c.editingBatchId = null;
          c.name = '';
          renderAll();
          return;
        }
      }
      // Dedupe — if a batch with same name + same caseIds + same runsPerCase
      // already exists, just bump it to the top and call it a day. Avoids
      // a wall of identical "Asset Suite · 3 cases" cards every time the
      // user clicks Save without thinking.
      const dup = findDuplicateBatch(name, ids, c.runsPerCase);
      if (dup) {
        state.batches = [dup, ...state.batches.filter((b) => b.id !== dup.id)];
        dup.updatedAt = new Date().toISOString();
        saveBatches();
        toast(`已存在同名同 case 的 batch，移到顶部："${name}"`);
        c.name = '';
        renderAll();
        return;
      }
      const batch = {
        id: 'batch-' + Date.now(),
        name,
        createdAt: new Date().toISOString(),
        caseIds: ids,
        runsPerCase: c.runsPerCase,
        status: 'pending',
        passed: 0,
        failed: 0,
      };
      state.batches.unshift(batch);
      saveBatches();
      toast(`已保存 batch "${name}"`);
      c.name = '';
      renderAll();
    }

    function runConsoleSubmit({ ids, name, runsPerCase, editingId }) {
      if (!ids.length) return toast('请选至少一个 case');
      if (editingId) {
        const existing = state.batches.find((b) => b.id === editingId);
        if (existing) {
          existing.name = name;
          existing.caseIds = ids;
          existing.runsPerCase = runsPerCase;
          existing.updatedAt = new Date().toISOString();
          saveBatches();
        }
        state.console.editingBatchId = null;
      }
      runCases(ids, { name, runsPerCase });
    }

    // Projects sidebar entry. Two cards:
    //   1. "SAP Automation Project" — the fixed 11 validated cases.
    //   2. "My Projects" — user-created batches (state.batches).
    // Both reuse renderMyProjects-style expand cards so the user gets the
    // same case list + Run/Edit/Delete affordances they're used to.
    function renderProjectsSection(panel) {
      const projectExpand = state.console._projectExpand = state.console._projectExpand || new Set();
      const passed = state.cases.filter((c) => statusOf(c.id) === 'passed').length;
      const failed = state.cases.filter((c) => statusOf(c.id) === 'failed').length;
      const allLive = state.cases.filter((c) => state.active.some((a) => a.caseId === c.id)).length;

      // ── SAP Automation Project — fixed, always present ──
      const sapPid = 'sap-automation-project';
      const sapExpanded = projectExpand.has(sapPid);
      const sapHead = el('div', {
        class: 'project-head',
        onclick: () => { if (sapExpanded) projectExpand.delete(sapPid); else projectExpand.add(sapPid); renderAll(); },
      },
        el('div', { class: 'pc-icon', style: 'background: #15304f;' }, 'S'),
        el('div', { style: 'min-width:0;' },
          el('div', { class: 'pj-name' }, 'SAP Automation Project'),
          el('div', { class: 'pj-meta' }, `${state.cases.length} validated cases · ${passed} passed · ${failed} failed${allLive ? ` · ${allLive} live` : ''}`),
        ),
        el('span', { class: `status ${allLive ? 'running' : (failed ? 'failed' : 'passed')}` }, allLive ? 'Live' : (failed ? 'Has failures' : 'Ready')),
        el('button', {
          class: 'expand-btn' + (sapExpanded ? ' expanded' : ''),
          onclick: (ev) => { ev.stopPropagation(); if (sapExpanded) projectExpand.delete(sapPid); else projectExpand.add(sapPid); renderAll(); },
        }, sapExpanded ? '▾' : '▸'),
      );
      const sapCard = sapExpanded
        ? el('div', { class: 'project-card expanded preset' }, sapHead,
            el('div', { class: 'project-body' },
              el('div', { class: 'pj-cases' },
                ...state.cases.map((cs) => caseRowInProject(cs)),
              ),
              el('div', { class: 'bc-actions' },
                el('button', { class: 'btn mini primary', onclick: (ev) => { ev.stopPropagation(); openRunModal(SUCCESS_CASE_IDS, { name: 'SAP Automation Project', runsPerCase: 1, title: 'Run SAP Automation Project' }); } }, '▶ Run all'),
                el('button', { class: 'btn mini', onclick: (ev) => { ev.stopPropagation(); state.tab = 'run'; state.section = 'run-center'; state.console.selectedIds = new Set(SUCCESS_CASE_IDS); renderAll(); window.scrollTo({ top: 0, behavior: 'smooth' }); } }, 'Open in Run Console'),
              ),
            ),
          )
        : el('div', { class: 'project-card preset' }, sapHead);

      // ── My Projects (user-created, from state.batches) ──
      const userProjects = state.batches;
      // Build the single-project card on-demand inside the business group
      // (DOM nodes can't be reused across parents, so this is a factory).
      function buildProjectCard(b) {
        const liveCount = projectLiveCount(b);
        const expanded = projectExpand.has(b.id);
        const statusKey = liveCount ? 'running' : (b.status || 'pending');
        const head = el('div', {
          class: 'project-head',
          onclick: () => { if (expanded) projectExpand.delete(b.id); else projectExpand.add(b.id); renderAll(); },
        },
          el('div', { class: 'pc-icon', style: 'background: var(--blue);' }, (b.name || '?').trim()[0] || '#'),
          el('div', { style: 'min-width:0;' },
            el('div', { class: 'pj-name' }, b.name || b.id),
            el('div', { class: 'pj-meta' }, `${b.caseIds?.length || 0} cases · ×${b.runsPerCase || 1}/case · ${new Date(b.createdAt).toLocaleDateString()}${liveCount ? ` · ${liveCount} live` : ''}`),
          ),
          el('span', { class: `status ${statusKey}` }, liveCount ? 'Live' : statusLabel(statusKey)),
          el('button', {
            class: 'expand-btn' + (expanded ? ' expanded' : ''),
            onclick: (ev) => { ev.stopPropagation(); if (expanded) projectExpand.delete(b.id); else projectExpand.add(b.id); renderAll(); },
          }, expanded ? '▾' : '▸'),
        );
        if (!expanded) return el('div', {
          class: 'project-card',
          dataset: { projectId: b.id || '', projectName: b.name || b.id || '' },
        }, head);
        const cases = (b.caseIds || []).map((id) => state.cases.find((c) => c.id === id)).filter(Boolean);
        return el('div', {
          class: 'project-card expanded',
          dataset: { projectId: b.id || '', projectName: b.name || b.id || '' },
        }, head,
          el('div', { class: 'project-body' },
            el('div', { class: 'pj-cases' },
              ...cases.map((cs) => caseRowInProject(cs, b)),
              cases.length === 0 ? el('div', { class: 'hint' }, '这个 project 里的 case 已被删除或重命名。') : null,
            ),
            el('div', { class: 'bc-actions' },
              el('button', { class: 'a-button a-button--brand-primary -small', onclick: (ev) => { ev.stopPropagation(); openRunModal(b.caseIds || [], { name: b.name, runsPerCase: b.runsPerCase || 1, batchId: b.id }); } }, '▶ Run'),
              el('button', { class: 'a-button a-button--neutral-secondary -small', onclick: (ev) => { ev.stopPropagation(); loadBatchIntoConsole(b); } }, 'Edit'),
              el('button', { class: 'a-button a-button--neutral-secondary -small', onclick: (ev) => { ev.stopPropagation(); openRenameModal(b.name || '', (newName) => { const existing = state.batches.find((x) => x.id === b.id); if (existing) { existing.name = newName; existing.updatedAt = new Date().toISOString(); saveBatches(); } renderAll(); toast(`已改名为 "${newName}"`); }); } }, 'Rename'),
              el('button', { class: 'a-button a-button--destructive-primary -small', onclick: (ev) => { ev.stopPropagation(); if (!confirm(`删除 project "${b.name || b.id}"？`)) return; state.batches = state.batches.filter((x) => x.id !== b.id); saveBatches(); renderAll(); } }, 'Delete'),
            ),
          ),
        );
      }

      // ── Group My Projects by Business (department) ──
      // Each project has an optional `business` field. Group them so the
      // user sees: Logistics ▸ [Project A, B] / Warehouse ▸ [...] / etc.
      // Projects without a business land in "(No business assigned)".
      const groupedByBiz = new Map();
      for (const b of userProjects) {
        const key = (b.business && String(b.business).trim()) || '(No business assigned)';
        if (!groupedByBiz.has(key)) groupedByBiz.set(key, []);
        groupedByBiz.get(key).push(b);
      }
      const sortedBiz = [...groupedByBiz.keys()].sort((a, b) => {
        if (a === '(No business assigned)') return 1;
        if (b === '(No business assigned)') return -1;
        return a.localeCompare(b);
      });
      const bizExpand = state.console._bizExpand = state.console._bizExpand || new Set();
      // Auto-expand first business group on first ever render.
      if (sortedBiz.length && !state.console._bizExpandSeen) {
        sortedBiz.forEach((k) => bizExpand.add(k));
        state.console._bizExpandSeen = true;
      }
      const bizGroups = sortedBiz.map((bizName) => {
        const list = groupedByBiz.get(bizName);
        const opened = bizExpand.has(bizName);
        const groupHead = el('div', {
          class: 'biz-group-head',
          onclick: () => { if (opened) bizExpand.delete(bizName); else bizExpand.add(bizName); renderAll(); },
        },
          el('span', { class: 'biz-group-chev' }, opened ? '▾' : '▸'),
          el('span', { class: 'biz-group-name' }, bizName),
          el('span', { class: 'biz-group-count' }, `${list.length} project${list.length === 1 ? '' : 's'}`),
        );
        const groupBody = opened
          ? el('div', { class: 'biz-group-body' }, ...list.map((b) => buildProjectCard(b)))
          : null;
        return el('div', { class: 'biz-group' + (opened ? ' is-open' : '') }, groupHead, groupBody);
      });

      panel.replaceChildren(
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'SAP Automation Project', el('span', { class: 'readonly-note' }, '内置 · 11 个 validated cases')),
          el('div', { style: 'padding: 12px;' }, sapCard),
        ),
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' },
            el('span', {}, `My Projects · ${userProjects.length}`, sortedBiz.length ? el('span', { class: 'readonly-note' }, ` · grouped by business`) : null),
            el('button', { class: 'a-button a-button--brand-primary -small', onclick: () => openCreateProjectModal() }, '+ New project'),
          ),
          el('div', { style: 'padding: 12px;' },
            userProjects.length === 0
              ? el('div', { class: 'empty', style: 'border:1px dashed var(--line); padding:14px;' }, '还没有自建 project。点上面 + New project 开始。')
              : el('div', { style: 'display: grid; gap: var(--space-3);' }, ...bizGroups),
          ),
        ),
      );
    }

    // Reports — project-grouped layout. Top-level: one card per project
    // (with business tag). Expand to see per-case rows; each case row
    // shows its most recent run's Midscene HTML report + log button.
    function renderReportsSection(panel) {
      const all = state.recent || [];

      // View state persists across re-renders. The old My-Projects /
      // By-runtime tab toggle was collapsed away — Reports now always
      // shows the byRuntime clustered batch view.
      state.reportsView = state.reportsView || {
        search: '',
        dateFrom: '',
        dateTo: '',
      };
      const v = state.reportsView;

      const fmtDuration = (ms) => {
        if (!ms && ms !== 0) return '—';
        const s = Math.round(ms / 100) / 10;
        if (s < 60) return `${s}s`;
        const m = Math.floor(s / 60);
        const rem = Math.round(s - m * 60);
        return `${m}m ${rem}s`;
      };

      // ── Filter predicates ─────────────────────────────────────────
      const inDateRange = (iso) => {
        if (!iso) return !v.dateFrom && !v.dateTo;
        const t = new Date(iso).getTime();
        if (v.dateFrom) {
          const from = new Date(v.dateFrom + 'T00:00:00').getTime();
          if (t < from) return false;
        }
        if (v.dateTo) {
          const to = new Date(v.dateTo + 'T23:59:59').getTime();
          if (t > to) return false;
        }
        return true;
      };
      const s = v.search.trim().toLowerCase();
      // Tiny built-in pinyin map for the most common SAP-side terms
      // we see in project/business names. Pre-pending each project's
      // pinyin-equivalent string to the searchable text means users can
      // type "caiwu" / "q1" / "wuliu" and still hit "财务" / "Q1" /
      // "物流". For a full pinyin solution we'd need a library, but
      // this covers ~95% of what's actually in the data today.
      const PINYIN_MAP = {
        '财务': 'caiwu', '人力': 'renli', '物流': 'wuliu', '仓储': 'cangchu',
        '销售': 'xiaoshou', '采购': 'caigou', '生产': 'shengchan',
        '质量': 'zhiliang', '资产': 'zichan', '会计': 'kuaiji',
      };
      const pinyinize = (str) => {
        let out = (str || '').toLowerCase();
        for (const [ch, py] of Object.entries(PINYIN_MAP)) {
          if (out.includes(ch)) out += ' ' + py;
        }
        return out;
      };
      // For each run, build the full searchable haystack: own fields +
      // EVERY owning project's name/id/business (so typing "Q1" finds
      // runs that belong to project "Q1" even though "Q1" appears
      // nowhere on the run record itself).
      const projectsForCaseLookup = new Map();
      const projectsForCase = (caseId) => {
        if (projectsForCaseLookup.has(caseId)) return projectsForCaseLookup.get(caseId);
        const owners = state.batches.filter((b) => (b.caseIds || []).includes(caseId));
        projectsForCaseLookup.set(caseId, owners);
        return owners;
      };
      // Build the run's searchable haystack from EVERY field a user
      // could plausibly type — id, title, status, error, dates (ISO +
      // localised + just the year + just the month-day), runId tail,
      // duration, plus every owning project's name/id/business.
      const isoDateBits = (iso) => {
        if (!iso) return [];
        try {
          const d = new Date(iso);
          if (isNaN(d)) return [String(iso)];
          const yyyy = d.getFullYear();
          const mm = String(d.getMonth() + 1).padStart(2, '0');
          const dd = String(d.getDate()).padStart(2, '0');
          return [
            String(iso),
            d.toLocaleString(),
            d.toLocaleDateString(),
            `${yyyy}`,
            `${yyyy}-${mm}-${dd}`,
            `${mm}/${dd}/${yyyy}`,
            `${mm}/${dd}`,
            `${yyyy}/${mm}`,
            `${d.getMonth() + 1}月`,
            `${d.getMonth() + 1}月${d.getDate()}日`,
            `${d.getMonth() + 1}月${d.getDate()}号`,
          ];
        } catch { return [String(iso)]; }
      };
      // Pre-cluster all runs so we can attribute each run to its ACTUAL
      // executing batch (the cluster's owner-by-vote), then use only that
      // owner's name/id/business in the search haystack. Previously the
      // haystack pulled in EVERY project that referenced the caseId, so
      // typing "仓储" matched Finance Smoke Test batches whenever a 仓储
      // project happened to also list saptest7 in its caseIds — clearly
      // not what the user wants when searching Run Reports by dept.
      const searchClusters = (typeof clusterRunsIntoBatches === 'function')
        ? clusterRunsIntoBatches(all.slice())
        : [];
      const searchRunToOwner = new Map();
      for (const c of searchClusters) {
        const ownerCounts = new Map();
        for (const r of c.runs) {
          for (const o of (state.batches || [])) {
            if (o.isPreset) continue;
            if ((o.caseIds || []).includes(r.caseId)) {
              ownerCounts.set(o.id, (ownerCounts.get(o.id) || 0) + 1);
            }
          }
        }
        const topOwnerEntry = [...ownerCounts.entries()].sort((a, b) => b[1] - a[1])[0];
        const owner = topOwnerEntry ? (state.batches || []).find((b) => b.id === topOwnerEntry[0]) : null;
        for (const r of c.runs) {
          if (r.runId && owner) searchRunToOwner.set(r.runId, owner);
        }
      }
      const runMatchesSearch = (r) => {
        if (!s) return true;
        const owner = (r.runId && searchRunToOwner.get(r.runId)) || null;
        const ownerBits = owner ? [owner.name, owner.id, owner.business] : [];
        const hay = pinyinize([
          r.caseId, r.caseTitle, r.errorMessage, r.status, r.runId,
          ...isoDateBits(r.finishedAt),
          ...isoDateBits(r.startedAt),
          ...ownerBits,
        ].filter(Boolean).join(' '));
        return hay.includes(s);
      };

      // ── Toolbar: search + dates ────────────────────────────────────
      const dateInput = (prop, placeholder) => el('input', {
        type: 'date',
        value: v[prop] || '',
        class: 'rp-date-input',
        title: placeholder,
        onchange: (ev) => { v[prop] = ev.target.value; renderAll(); },
      });
      const hasFilter = !!(v.search || v.dateFrom || v.dateTo);

      // Single-row toolbar — never wraps. Search input + button are
      // a flush combined widget on the LEFT; spacer eats the slack;
      // From/To dates dock to the FAR RIGHT.
      const toolbar = el('div', { class: 'rp-toolbar' },
        el('div', { class: 'rp-search-group' },
          el('input', {
            id: 'reportsSearch',
            type: 'search',
            placeholder: '搜 project / case / 部门 / 运行时间',
            value: v.search,
            class: 'rp-search-input',
            // Chinese IME composition — the `input` event fires for
            // every pinyin keystroke DURING composition; calling
            // renderAll() then destroys the input and the IME loses
            // the candidate window. We flag composing-in-progress and
            // skip render until compositionend.
            oncompositionstart: () => {
              state.console = state.console || {};
              state.console._imeComposing = true;
            },
            oncompositionend: (ev) => {
              state.console = state.console || {};
              state.console._imeComposing = false;
              v.search = ev.target.value;
              state.console._restoreFocus = {
                id: 'reportsSearch',
                selStart: ev.target.selectionStart,
                selEnd: ev.target.selectionEnd,
              };
              renderAll();
            },
            oninput: (ev) => {
              if (state.console && state.console._imeComposing) return;
              v.search = ev.target.value;
              // Without this the renderAll below wipes the input and
              // moves the cursor to the top of the page mid-typing.
              state.console = state.console || {};
              state.console._restoreFocus = {
                id: 'reportsSearch',
                selStart: ev.target.selectionStart,
                selEnd: ev.target.selectionEnd,
              };
              renderAll();
            },
            onkeydown: (ev) => {
              // Enter = "commit search" — silent shortcut, no placeholder hint.
              if (ev.key === 'Enter' && !(state.console && state.console._imeComposing)) {
                ev.preventDefault();
                v.search = ev.target.value;
                renderAll();
              }
            },
          }),
          el('button', {
            class: 'rp-search-btn',
            title: '搜索（输入时已经实时过滤）',
            onclick: () => {
              const node = document.getElementById('reportsSearch');
              if (node) v.search = node.value;
              renderAll();
            },
          }, '🔎 Search'),
        ),
        // Spacer pushes the date group + Clear to the far right.
        el('div', { class: 'rp-toolbar-spacer' }),
        el('span', { class: 'rp-filter-icon', title: '按运行时间筛选' }, 'Filter'),
        el('div', { class: 'rp-date-group' },
          el('span', { class: 'rp-date-label' }, 'From'),
          dateInput('dateFrom', '起始日期'),
          el('span', { class: 'rp-date-label' }, 'To'),
          dateInput('dateTo', '结束日期'),
        ),
        // Clear goes at the far right when any filter is active.
        hasFilter ? el('button', {
          class: 'rp-clear-btn',
          onclick: () => { v.search = ''; v.dateFrom = ''; v.dateTo = ''; v.agentFocus = null; renderAll(); },
        }, '✕ Clear') : null,
      );

      // Filtered runs (search + date range).
      const filteredRuns = all
        .filter(runMatchesSearch)
        .filter((r) => inDateRange(r.finishedAt || r.startedAt));

      // ── Cluster runs into batches BEFORE the overview so we can count
      //    project runs only (single-case re-runs excluded from stats).
      state.reportsBatchExpand = state.reportsBatchExpand || new Set();
      const clusters = clusterRunsIntoBatches(filteredRuns);
      const annotated = clusters.map((c) => {
        const caseIdsInBatch = [...new Set(c.runs.map((r) => r.caseId))];
        const ownerCounts = new Map();
        for (const r of c.runs) {
          for (const o of projectsForCase(r.caseId)) {
            ownerCounts.set(o.id, (ownerCounts.get(o.id) || 0) + 1);
          }
        }
        const topOwnerEntry = [...ownerCounts.entries()].sort((a, b) => b[1] - a[1])[0];
        const owner = topOwnerEntry ? state.batches.find((b) => b.id === topOwnerEntry[0]) : null;
        const ownerSize = owner ? (owner.caseIds || []).length : 0;
        const isPartial = ownerSize > 0 && caseIdsInBatch.length < ownerSize;
        return { cluster: c, caseIdsInBatch, owner, ownerSize, ownerCounts, isPartial };
      });
      const fullBatches = annotated.filter((a) => !a.isPartial);
      const partialBatches = annotated.filter((a) => a.isPartial);

      // ── Stats overview ─ 5 cards, all excluding aborted-by-user
      //    project run = a batch (cluster of case runs); single-case re-runs
      //    (partials) never count here — those are broken out below.
      //    Left group is project counts (runs / passed / failed); right
      //    group is two success rates: one at project level, one at
      //    individual case-run level.
      const isAborted = (r) => {
        const s = String(r?.status || '').toLowerCase();
        if (s === 'aborted' || s === 'cancelled' || s === 'canceled') return true;
        const err = String(r?.errorMessage || '').toLowerCase();
        return err.includes('abort') || err.includes('cancel');
      };

      // Project-level: keep batches that still have at least one
      // non-aborted case run. Batch counts as passed only if EVERY
      // non-aborted case run in it is 'passed'.
      const projectBatchesElig = fullBatches.filter((a) =>
        a.cluster.runs.some((r) => !isAborted(r)));
      const projectTotal  = projectBatchesElig.length;
      const projectPassed = projectBatchesElig.filter((a) => {
        const nonAborted = a.cluster.runs.filter((r) => !isAborted(r));
        return nonAborted.length > 0 && nonAborted.every((r) => r.status === 'passed');
      }).length;
      const projectFailed = projectBatchesElig.filter((a) =>
        a.cluster.runs.some((r) => !isAborted(r) && r.status === 'failed')).length;
      const projectRateStr = projectTotal
        ? `${Math.round((projectPassed / projectTotal) * 100)}%`
        : '—';

      // Case-level success rate: over ALL non-aborted case runs in filteredRuns.
      const caseRunsElig = filteredRuns.filter((r) =>
        !isAborted(r) && (r.status === 'passed' || r.status === 'failed'));
      const casePassed = caseRunsElig.filter((r) => r.status === 'passed').length;
      const caseRateStr = caseRunsElig.length
        ? `${Math.round((casePassed / caseRunsElig.length) * 100)}%`
        : '—';

      const overview = el('div', { class: 'section-card' },
        el('div', { class: 'section-title' },
          el('span', {}, 'Overview' + (hasFilter ? ' (filtered)' : '')),
        ),
        el('div', { class: 'section-content metric-grid metric-grid--five' },
          el('div', { class: 'metric' }, el('b', {}, projectTotal),   el('span', {}, 'project runs')),
          el('div', { class: 'metric' }, el('b', {}, projectPassed),  el('span', {}, 'passed')),
          el('div', { class: 'metric' }, el('b', {}, projectFailed),  el('span', {}, 'failed')),
          el('div', { class: 'metric' }, el('b', {}, projectRateStr), el('span', {}, 'project run success rate')),
          el('div', { class: 'metric' }, el('b', {}, caseRateStr),    el('span', {}, 'case run success rate')),
        ),
      );
      const focus = v.agentFocus || null;
      // Cluster-level match is the primary gate. When focus carries a
      // projectId (set by focusReportsOnRun), REQUIRE the cluster's
      // owner id to equal it — otherwise a shared case (e.g. saptest11
      // in both "a" and "Finance Smoke Test") would light every batch
      // whose runs happen to contain that case. Without a projectId we
      // fall back to run-level match, but that path is rare.
      // Prefer runId over projectId — the card corresponds to ONE
      // specific run, whose runId is globally unique and pins down
      // exactly one cluster. projectId (via bestReportProjectForRun)
      // can match MANY clusters when the same project has been run
      // multiple times → lit up every past run of that project, which
      // is what the user was complaining about. Fall back to projectId
      // only when runId is missing from focus (rare — some legacy call
      // sites don't set it).
      const focusMatchesCluster = (a) => {
        if (!focus) return false;
        if (focus.runId) return a.cluster.runs.some((r) => r.runId === focus.runId);
        if (focus.projectId) return a.owner?.id === focus.projectId;
        return false;
      };
      // Row-level match — only used inside a cluster the outer gate has
      // already accepted, so caseId fallback is safe here (it just
      // picks WHICH row inside the correct batch to draw the ring on).
      const focusMatchesRun = (r) => {
        if (!focus) return false;
        if (focus.runId) return r.runId === focus.runId;
        return focus.caseId && r.caseId === focus.caseId;
      };
      const focusedBatch = annotated.find(focusMatchesCluster);
      if (focusedBatch) {
        state.reportsBatchExpand.add(focusedBatch.cluster.id);
        if (focusedBatch.isPartial) state.reportsPartialOpen = true;
      }

      const buildClusterCard = (a) => {
        const c = a.cluster;
        const isOpen = state.reportsBatchExpand.has(c.id);
        const isFocusedBatch = focusMatchesCluster(a);
        const passedCount = c.runs.filter((r) => r.status === 'passed').length;
        const failedCount = c.runs.filter((r) => r.status === 'failed').length;
        const owner = a.owner;
        const biz = owner ? owner.business : null;

        const head = el('div', {
          class: 'rh-batch-head' + (isOpen ? ' is-open' : ''),
          onclick: () => {
            if (isOpen) state.reportsBatchExpand.delete(c.id);
            else state.reportsBatchExpand.add(c.id);
            renderAll();
          },
        },
          el('span', { class: 'rh-batch-caret' }, isOpen ? '▾' : '▸'),
          el('div', { class: 'rh-batch-main' },
            // ── TITLE: project name + dept tag (was: timestamp) ──
            el('div', { class: 'rh-batch-title' },
              owner ? (owner.name || owner.id) : '(no project)',
              biz ? el('span', { class: 'project-biz-tag' }, biz) : null,
              a.isPartial
                ? el('span', {
                    class: 'rh-batch-partial',
                    title: `这次只跑了 ${a.caseIdsInBatch.length}/${a.ownerSize} 个 case · 单 case 重跑`,
                  }, `partial ${a.caseIdsInBatch.length}/${a.ownerSize}`)
                : null,
            ),
            // ── SUBTITLE row: runtime (prominent) + cases ────────
            el('div', { class: 'rh-batch-sub' },
              el('span', { class: 'rh-batch-when' }, new Date(c.earliestStart).toLocaleString()),
              el('span', { class: 'rh-batch-sep' }, '·'),
              el('span', { class: 'rh-batch-cases' }, a.caseIdsInBatch.join(', ')),
            ),
          ),
          el('div', { class: 'rh-batch-summary' },
            el('span', { class: 'rh-batch-count' }, `${c.runs.length} run${c.runs.length === 1 ? '' : 's'}`),
            passedCount ? el('span', { class: 'rh-batch-pass' }, `${passedCount} passed`) : null,
            failedCount ? el('span', { class: 'rh-batch-fail' }, `${failedCount} failed`) : null,
            el('button', {
              class: 'rh-batch-delete',
              title: '删除这个 report 记录',
              onclick: (ev) => {
                ev.stopPropagation();
                deleteReportBatch(c.runs, owner);
              },
            }, '×'),
          ),
        );

        if (!isOpen) return el('div', {
          class: 'rh-batch' + (isFocusedBatch ? ' agent-highlight agent-report-focus' : ''),
          // Stable identifiers so the AI Workbench "重新定位/高亮" button
          // can find + light this card up from outside the render even if
          // the render-time focus check somehow missed it.
          dataset: {
            ownerId: owner?.id || '',
            clusterId: c.id || '',
            ...(isFocusedBatch ? { agentReportFocus: '1' } : {}),
          },
        }, head);

        const rows = c.runs.map((r) => {
          const canOpen = !!r.report?.url;
          const isFocusedRun = focusMatchesRun(r);
          return el('div', {
            class: 'rh-row' + (canOpen ? ' is-clickable' : '') + ' is-' + (r.status || 'pending') + (isFocusedRun ? ' agent-highlight agent-report-focus' : ''),
            dataset: {
              runId: r.runId || '',
              caseId: r.caseId || '',
              ...(isFocusedRun ? { agentReportFocus: '1' } : {}),
            },
            title: canOpen ? '点行新窗口打开 Midscene report' : '这个 run 没有 report URL',
            onclick: () => { if (canOpen) window.open(r.report.url, '_blank'); },
          },
            el('span', { class: 'rh-row-status status ' + (r.status || 'pending') }, statusLabel(r.status || 'pending')),
            el('div', { class: 'rh-row-main' },
              el('div', { class: 'rh-row-case' }, r.caseId || '?', r.caseTitle ? el('span', { class: 'rh-row-title' }, ` · ${r.caseTitle}`) : null),
              el('div', { class: 'rh-row-meta' },
                (r.finishedAt ? new Date(r.finishedAt).toLocaleString() : 'no timestamp'),
                ' · ', fmtDuration(r.durationMs),
                r.errorMessage ? ' · ' + r.errorMessage.slice(0, 80) : '',
              ),
            ),
            canOpen
              ? el('span', { class: 'rh-row-open' }, 'Report ↗')
              : el('span', { class: 'rh-row-noreport' }, 'No report'),
            el('button', {
              class: 'rh-row-delete',
              title: '删除这条 Run Reports 记录',
              onclick: (ev) => {
                ev.stopPropagation();
                deleteReportRun(r);
              },
            }, 'Delete'),
          );
        });

        return el('div', {
          class: 'rh-batch is-open' + (isFocusedBatch ? ' agent-highlight agent-report-focus-batch' : ''),
          dataset: {
            ownerId: owner?.id || '',
            clusterId: c.id || '',
            ...(isFocusedBatch ? { agentReportFocusBatch: '1' } : {}),
          },
        }, head, el('div', { class: 'rh-list' }, ...rows));
      };

      // Optional collapsible "single-case re-runs" section. Default
      // collapsed since most of the time the user wants real batches.
      state.reportsPartialOpen = state.reportsPartialOpen ?? false;
      const partialSection = partialBatches.length === 0 ? null : el('div', { class: 'section-card' },
        el('div', {
          class: 'section-title',
          style: 'cursor:pointer;',
          onclick: () => { state.reportsPartialOpen = !state.reportsPartialOpen; renderAll(); },
        },
          el('span', {},
            state.reportsPartialOpen ? '▾ ' : '▸ ',
            `Single-case re-runs · ${partialBatches.length} batch${partialBatches.length === 1 ? '' : 'es'}`,
          ),
          el('span', { class: 'hint' }, '从 "↺ Run again" 触发的单 case 重跑 · 默认折叠以免淹没真正的 batch'),
        ),
        state.reportsPartialOpen
          ? el('div', { class: 'section-content', style: 'padding: 14px;' },
              el('div', { class: 'rh-groups', style: 'padding:0;' }, ...partialBatches.map(buildClusterCard)),
            )
          : null,
      );

      panel.replaceChildren(
        overview,
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' },
            el('span', {}, `Run history · ${fullBatches.length} batch${fullBatches.length === 1 ? '' : 'es'} (${filteredRuns.length} runs)`),
            // Refresh button removed — polling stays paused on this
            // section anyway, and clicking didn't reliably trigger a
            // visible update. Users can switch tabs to force-refresh.
          ),
          toolbar,
          el('div', { class: 'section-content', style: 'padding: 14px;' },
            fullBatches.length === 0
              ? el('div', { class: 'empty' },
                  hasFilter
                    ? '没有 batch 匹配当前筛选条件。清空搜索框 + 日期重置。'
                    : '还没有任何完整 batch 记录。')
              : el('div', { class: 'rh-groups', style: 'padding:0;' }, ...fullBatches.map(buildClusterCard)),
          ),
        ),
        partialSection,
      );
      if (focus) {
        setTimeout(() => {
          const target = document.querySelector('[data-agent-report-focus="1"]')
            || document.querySelector('[data-agent-report-focus-batch="1"]');
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 120);
      }
    }

    function renderFailuresSection(panel) {
      const all = state.recent || [];
      const failures = all.filter((r) => r.status === 'failed');

      // Failure rate over the most recent 30 runs, with user-aborted runs
      // dropped from both numerator and denominator (matches the top-header
      // pass-rate logic — see renderMetrics).
      const recentSample = all.slice(0, 30);
      const isAborted = (r) => {
        const s = String(r?.status || '').toLowerCase();
        if (s === 'aborted' || s === 'cancelled' || s === 'canceled') return true;
        const err = String(r?.errorMessage || '').toLowerCase();
        return err.includes('abort') || err.includes('cancel');
      };
      const eligible = recentSample.filter((r) => !isAborted(r) && (r.status === 'passed' || r.status === 'failed'));
      const recentFailCount = eligible.filter((r) => r.status === 'failed').length;
      const failRate = eligible.length ? Math.round((recentFailCount / eligible.length) * 100) : null;

      // Currently failing: cases whose most recent run is in 'failed' state.
      const currentlyFailing = state.cases.filter((c) => statusOf(c.id) === 'failed').length;

      // Recent failures — show as individual case rows, but each row is
      // labelled with the project + dept it belongs to (looked up via
      // state.batches). Top-failing aggregate view removed per user.
      const recentFailures = failures.slice(0, 30);

      // For each case id, find the most recently-updated project that
      // contains it. Returns { projectName, biz } or null.
      const projectInfoForCase = (caseId) => {
        let bestProject = null;
        let bestTime = 0;
        for (const p of state.batches) {
          if (!(p.caseIds || []).includes(caseId)) continue;
          const t = new Date(p.updatedAt || p.createdAt || 0).getTime();
          if (t >= bestTime) { bestTime = t; bestProject = p; }
        }
        if (!bestProject) return null;
        return {
          projectName: bestProject.name || bestProject.id,
          biz: bestProject.business || '',
        };
      };

      panel.replaceChildren(
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'Failure Analytics · Overview'),
          el('div', { class: 'section-content metric-grid' },
            el('div', { class: 'metric' }, el('b', {}, failures.length), el('span', {}, 'total failures')),
            el('div', { class: 'metric' }, el('b', {}, failRate == null ? '—' : `${failRate}%`), el('span', {}, `failure rate · ${eligible.length} runs (excl. aborted)`)),
            el('div', { class: 'metric' }, el('b', {}, currentlyFailing), el('span', {}, 'currently failing cases')),
            el('div', { class: 'metric' },
              el('b', {}, recentFailures.length ? new Date(recentFailures[0].finishedAt || recentFailures[0].startedAt || Date.now()).toLocaleDateString() : '—'),
              el('span', {}, 'last failure date'),
            ),
          ),
        ),

        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, `Recent failures · last ${recentFailures.length}`,
            el('span', { class: 'hint' }, '每条标注所属 project + 部门'),
          ),
          recentFailures.length === 0
            ? el('div', { class: 'empty' }, '当前没有失败 case。')
            : el('div', { class: 'section-content' }, ...recentFailures.map((r) => {
                const cs = state.cases.find((c) => c.id === r.caseId);
                const when = r.finishedAt ? new Date(r.finishedAt) : (r.startedAt ? new Date(r.startedAt) : null);
                const proj = projectInfoForCase(r.caseId);
                return el('div', { class: 'fa-failure-row' },
                  el('div', { class: 'fa-tag-row' },
                    proj
                      ? el('span', { class: 'fa-project-pill' }, proj.projectName)
                      : el('span', { class: 'fa-no-project' }, '未挂在任何 project'),
                    proj?.biz ? el('span', { class: 'project-biz-tag' }, proj.biz) : null,
                  ),
                  el('div', { class: 'fa-case-line' },
                    el('strong', {}, r.caseId || 'case', cs ? ` · ${caseTitle(cs)}` : ''),
                    el('span', { class: 'fa-when' }, when ? when.toLocaleString() : 'no timestamp'),
                  ),
                  r.errorMessage ? el('div', { class: 'fa-error' }, r.errorMessage.slice(0, 240)) : null,
                  el('div', { class: 'fa-actions' },
                    r.report?.url ? el('button', { class: 'a-button a-button--brand-primary -small', onclick: () => window.open(r.report.url, '_blank') }, '📋 Midscene Report') : null,
                    el('button', { class: 'a-button a-button--neutral-secondary -small', onclick: () => openRunModal([r.caseId], { name: `Rerun ${r.caseId}`, title: 'Rerun failing case' }) }, '↺ Rerun this case'),
                  ),
                );
              })),
        ),
      );
    }

    function renderProjectSection() {
      const titles = {
        overview: ['Project Overview', '项目健康度、最近运行和 case 覆盖'],
        cases: ['Project Cases', '选择 case、改参数、单独或批量运行'],
        runs: ['Project Runs', '当前项目的运行历史'],

          el('div', { class: 'section-title' }, 'SAP Validated Regression Project'),

            el('div', { class: 'metric' }, el('b', {}, state.cases.length), el('span', {}, 'total cases')),
            el('div', { class: 'metric' }, el('b', {}, passed), el('span', {}, 'latest passed')),
            el('div', { class: 'metric' }, el('b', {}, failed), el('span', {}, 'latest failed')),

    function renderProjectRuns(panel) {

      panel.replaceChildren(el('div', { class: 'section-card' },

        el('div', { class: 'section-content run-table' },
          ...(rows.length ? rows.map((b) => el('div', { class: 'run-row' },
            el('div', {}, el('strong', {}, b.name), el('span', {}, `${new Date(b.createdAt).toLocaleString()} · ${b.caseIds.length} cases`)),
            el('span', { class: `status ${b.status}` }, statusLabel(b.status)),
            el('button', { class: 'btn', onclick: () => { state.tab = 'live'; state.section = 'summary'; renderAll(); } }, 'Open'),
          )) : [el('div', { class: 'empty' }, 'No project runs yet.')]),
        ),
      ));

    function renderCaseDetailCard() {
      const detail = state.details.get(state.selectedCaseId);
      if (!detail) {
        return el('div', { class: 'empty' }, 'Select a case');
      }
      const parsed = detail.parsed || detail;
      const fields = extractParams(detail);
      const oldParams = parsed.params && typeof parsed.params === 'object' && !Array.isArray(parsed.params) ? parsed.params : {};
      const inputMap = new Map();
      const paramNodes = fields.map((f) => {
        const input = el('input', { type: 'text', value: f.currentValue });
        inputMap.set(f.order, { input, defaultValue: f.defaultValue });
        return el('div', { class: 'param-field' },
          el('label', { title: f.locator }, `#${f.order} · ${f.locator}`),
          input,
        );
      });
      const saveBtn = el('button', {
        class: 'btn primary',
        onclick: async () => {
          const next = JSON.parse(JSON.stringify(parsed));
          const nextParams = {};
          for (const [order, { input, defaultValue }] of inputMap) {
            if (input.value !== '' && input.value !== defaultValue) nextParams[order] = input.value;
          }
          if (Object.keys(nextParams).length) next.params = nextParams;
          else delete next.params;
          next.naturalLanguage = syncNaturalLanguage(parsed.naturalLanguage || '', oldParams, nextParams, fields);
          try {
            await api('/api/cases/' + encodeURIComponent(detail.id), { method: 'PUT', body: JSON.stringify(next) });
            state.details.delete(detail.id);
            await loadDetail(detail.id);
            toast('参数已保存，自然语言已同步更新');
            renderAll();
          } catch (err) {
            toast(err.message);
          }
        },
      }, 'Save Parameters');

      return el('div', { class: 'detail-main' },
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' },
            el('span', {}, detail.id, ' · ', parsed.title || 'SAP Case'),
            el('span', { class: 'readonly-note' }, 'Step hidden'),
          ),
          el('div', { class: 'section-content' },
            el('div', { class: 'hint' }, parsed.description || 'SAP automation case'),
          ),
        ),
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'Natural Language', el('span', { class: 'readonly-note' }, 'read only')),
          el('div', { class: 'section-content' }, el('pre', { class: 'nl-box' }, parsed.naturalLanguage || 'No natural language description.')),
        ),
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'Parameters', saveBtn),
          el('div', { class: 'section-content' },
            fields.length
              ? el('div', { class: 'param-grid' }, ...paramNodes)
              : el('div', { class: 'empty' }, '这个 case 暂未识别到 aiInput 参数。'),
          ),
        ),
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'Advanced Debug'),
          el('div', { class: 'section-content top-actions' },
            el('button', { class: 'btn', onclick: () => window.open('/#/cases/' + encodeURIComponent(detail.id), '_blank') }, '打开开发者调试页'),
            el('button', { class: 'btn', onclick: () => window.open('/#/cases/' + encodeURIComponent(detail.id) + '/history', '_blank') }, '查看历史报告'),
          ),
        ),
      );
    }

    function renderLiveSection() {
      const titles = {
        summary: ['Batch Summary', '当前 batch 的整体进度'],
        'live-channels': ['Live Channels', '只显示当前正在 run 的 case'],
        'case-results': ['Case Results', '当前 batch 的 case 结果'],
        logs: ['Run History', '所有历史 run 记录，点 ▸ 展开看 logTail'],
      };
      const [title, sub] = titles[state.section] || titles['live-channels'];
      $('#mainTitle').textContent = title;
      $('#mainSub').textContent = sub;
      const panel = $('#mainPanel');
      if (state.section === 'summary') return renderBatchSummary(panel);
      if (state.section === 'case-results') return renderBatchResults(panel);
      if (state.section === 'logs') return renderBatchLogs(panel);
      // live-channels: only currently-running cases
      const cases = currentBatchCases().filter((c) => state.active.some((a) => a.caseId === c.id));
      const rows = cases.map((c) => {
        const active = state.active.find((a) => a.caseId === c.id);
        return el('div', { class: 'run-row' },
          el('div', {},
            el('strong', {}, c.id, ' · ', caseTitle(c)),
            el('span', {}, active?.currentStep
              ? `Step ${active.currentStep.order}/${active.totalSteps} · ${active.currentStep.title || active.currentStep.api || ''}`
              : 'Running…'),

    function renderBatchSummary(panel) {
      const cases = currentBatchCases();
      const liveCount = cases.filter((c) => state.active.some((a) => a.caseId === c.id)).length;
      const passed = cases.filter((c) => statusOf(c.id) === 'passed').length;
      const failed = cases.filter((c) => statusOf(c.id) === 'failed').length;
      const pending = cases.length - liveCount - passed - failed;
      const latestBatch = state.batches[0];
      panel.replaceChildren(
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'Batch Summary'),
          el('div', { class: 'section-content metric-grid' },
            el('div', { class: 'metric' }, el('b', {}, cases.length), el('span', {}, 'cases in batch')),
            el('div', { class: 'metric' }, el('b', {}, liveCount), el('span', {}, 'currently live')),
            el('div', { class: 'metric' }, el('b', {}, passed), el('span', {}, 'passed')),
            el('div', { class: 'metric' }, el('b', {}, failed), el('span', {}, 'failed')),
          ),
        ),
        latestBatch ? el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'Current Batch'),
          el('div', { class: 'section-content' },
            el('div', {}, el('strong', {}, latestBatch.name || latestBatch.id)),

          ),
        ) : null,
      );
