    /* ──────────── AI Chat widget (ported from case-studio.html) ────────── */
    .chat-fab {
      position: fixed; bottom: 22px; right: 22px;
      background: var(--blue); color: #fff;
      border: 0; border-radius: 999px !important;
      padding: 12px 20px 12px 16px;
      width: 176px;
      height: 56px;
      box-sizing: border-box;
      box-shadow:
        0 10px 30px rgba(0,123,192,0.45),
        0 0 0 4px rgba(0,123,192,0.18);
      cursor: pointer; z-index: 150;
      display: flex; align-items: center; gap: 10px;
      font-weight: 800;
      transition: all 0.2s ease-out;
      /* pulse 只动 box-shadow（光晕缩放），float 只动 transform（上下浮动）；
         两个 keyframes 目标属性不冲突，可以叠加。让 Ask AI 的浮标和
         AI Workbench 的 fab 一样能上下摆动。 */
      animation:
        chat-fab-pulse 2.6s ease-in-out infinite,
        work-fab-float 3s ease-in-out infinite;
    }
    .chat-fab:hover {
      background: var(--blue-hover);
      transform: translateY(-2px);
      box-shadow:
        0 14px 40px rgba(0,123,192,0.55),
        0 0 0 4px rgba(0,123,192,0.25);
      animation: none;
    }
    /* While dragging — kill the pulse + transform-on-hover so the cursor
       tracks 1:1. Toggle via .is-dragging applied during mousemove. */
    .chat-fab:active { cursor: grabbing; animation: none; transform: none; }
    .chat-fab.is-hidden { display: none; }
    .chat-fab .fab-icon {
      font-size: 20px; line-height: 1;
      display: inline-grid; place-items: center;
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.18); border-radius: 50%;
    }
    .chat-fab .fab-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.15; }
    .chat-fab .fab-label { font-size: 14px; font-weight: 800; }
    .chat-fab .fab-sub { font-size: 10.5px; opacity: 0.9; font-weight: 600; letter-spacing: 0.02em; }
    .work-fab {
      position: fixed; right: 22px; bottom: 98px;
      border: 0;
      border-radius: 999px !important;
      padding: 12px 20px 12px 16px;
      width: 176px;
      height: 56px;
      box-sizing: border-box;
      color: #fff;
      background:
        linear-gradient(135deg, #003253 0%, #007bc0 54%, #22c5ff 100%);
      box-shadow:
        0 14px 36px rgba(0, 50, 83, 0.36),
        0 0 0 5px rgba(34, 197, 255, 0.18);
      z-index: 151;
      display: flex;
      align-items: center;
      gap: 11px;
      cursor: pointer;
      font-weight: 900;
      animation: work-fab-float 3s ease-in-out infinite;
    }
    .work-fab:hover {
      transform: translateY(-3px);
      box-shadow:
        0 18px 44px rgba(0, 50, 83, 0.46),
        0 0 0 7px rgba(34, 197, 255, 0.22);
      animation: none;
    }
    .work-fab.is-hidden { display: none; }
    .work-fab .work-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.38);
      display: grid;
      place-items: center;
      font-size: 20px;
      box-shadow: inset 0 0 18px rgba(255,255,255,0.12);
    }
    .work-fab .work-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.1;
    }
    .work-fab .work-label { font-size: 15px; letter-spacing: 0.01em; }
    .work-fab .work-sub { font-size: 9.5px; font-weight: 700; opacity: 0.92; margin-top: 3px; white-space: nowrap; }
    .work-fab .work-spark {
      position: absolute;
      top: -4px;
      right: 14px;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #ffd200;
      box-shadow: 0 0 0 4px rgba(255,210,0,0.2), 0 0 20px rgba(255,210,0,0.75);
    }
    @keyframes work-fab-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    @keyframes chat-fab-pulse {
      0%, 100% { box-shadow: 0 10px 30px rgba(0,123,192,0.45), 0 0 0 4px rgba(0,123,192,0.18); }
      50%      { box-shadow: 0 10px 34px rgba(0,123,192,0.55), 0 0 0 8px rgba(0,123,192,0.25); }
    }
    .work-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(680px, 94vw);
      background: #fff;
      box-shadow: -8px 0 30px rgba(0,0,0,0.18);
      z-index: 162;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .work-panel.open { transform: translateX(0); }
    /* Drag mode — user grabbed the dark-blue header and moved the panel.
       Explicit left/top now positions it; the slide-in transform is out
       of the picture, so open/close switches to a simple opacity fade. */
    .work-panel.dragged {
      transform: none !important;
      /* Only clear `right` — keep `bottom: 0` from the base rule so the
         panel keeps a defined height (top + bottom gives it a real box),
         which is what makes .work-body's flex:1 + overflow:auto actually
         scroll. Height is not set explicitly — it follows the viewport. */
      right: auto;
      transition: opacity 0.18s ease, visibility 0.18s ease;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .work-panel.dragged.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    /* The dark-blue title bar is the drag handle. Buttons inside it stay
       clickable (they stop mousedown from starting a drag). */
    #aiWorkPanel .chat-head { cursor: grab; user-select: none; }
    #aiWorkPanel .chat-head:active { cursor: grabbing; }
    #aiWorkPanel .chat-head button { cursor: pointer; }
    .work-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--g-gray-95);
    }
    .work-welcome {
      background: #fff;
      border: 1px solid var(--g-gray-85);
      border-radius: 12px 12px 12px 2px !important;
      padding: 12px;
      display: grid;
      gap: 12px;
    }
    .work-welcome-title {
      font-size: 15px;
      font-weight: 900;
      color: var(--navy);
    }
    .work-welcome-sub {
      font-size: 12px;
      line-height: 1.55;
      color: var(--muted);
    }
    .work-prompt-group {
      display: grid;
      gap: 6px;
    }
    .work-prompt-group-title {
      font-size: 11px;
      font-weight: 900;
      color: var(--g-blue-20);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .work-prompt {
      width: 100%;
      text-align: left;
      border: 1px solid var(--g-gray-85);
      background: #fff;
      color: var(--ink);
      border-radius: 6px !important;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.35;
      cursor: pointer;
    }
    .work-prompt:hover {
      border-color: var(--blue);
      background: var(--g-blue-95);
      color: var(--g-blue-20);
    }
    .work-prompt-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      /* stretch so the Send/Save column tracks the textarea's actual
         height — 1-line prompts get a compact row, multi-line prompts
         let the buttons grow with them. */
      align-items: stretch;
    }
    .work-prompt-input {
      width: 100%;
      min-height: 32px;
      box-sizing: border-box;
      border: 1px solid var(--g-gray-85);
      background: #fff;
      color: var(--ink);
      border-radius: 6px !important;
      padding: 8px 10px;
      font: inherit;
      font-size: 12px;
      line-height: 1.35;
      resize: none;
      outline: none;
      overflow: hidden;
      cursor: text;
      appearance: none;
      transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }
    .work-prompt-input::-webkit-resizer { display: none; }
    .work-prompt-input:hover {
      border-color: var(--blue);
      background: var(--g-blue-95);
    }
    .work-prompt-input:focus {
      border-color: var(--blue);
      background: #fff;
      box-shadow: 0 0 0 2px rgba(0, 123, 192, 0.16);
    }
    .work-prompt-actions {
      display: flex;
      gap: 6px;
      /* stretch so each button fills the full row height, matching the
         textarea instead of sitting as a stubby fixed-height pill. */
      align-items: stretch;
      /* 122 → 158: 多留 28+6px 给右侧的删除叉。 */
      width: 158px;
    }
    .work-prompt-action {
      border: 1px solid var(--g-gray-85);
      background: #fff;
      color: var(--ink);
      border-radius: 5px !important;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      padding: 0 8px;
      /* min-height dropped — height now driven by the row (textarea). */
      flex: 1 1 0;
    }
    .work-prompt-action.send {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }
    .work-prompt-action.save:hover,
    .work-prompt-action.send:hover {
      filter: brightness(0.96);
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
    }
    /* 红色 × 删除按钮 — 固定宽度 28px，不参与 Send/Save 的 flex 均分。
       hover 时反白填充，视觉上强调"这是破坏性操作"。 */
    .work-prompt-action.delete {
      flex: 0 0 28px;
      width: 28px;
      padding: 0;
      color: var(--red);
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      display: grid;
      place-items: center;
    }
    .work-prompt-action.delete:hover {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
      filter: none;
      box-shadow: 0 1px 4px rgba(237, 0, 7, 0.22);
    }
    .work-prompt-add-wrap {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-top: 2px;
    }
    .work-prompt-add {
      width: 28px;
      height: 28px;
      border-radius: 50% !important;
      border: 1px dashed var(--blue);
      background: #fff;
      color: var(--blue);
      font-size: 18px;
      line-height: 1;
      font-weight: 800;
      cursor: pointer;
    }
    .work-prompt-add:hover {
      background: var(--g-blue-95);
      border-style: solid;
    }
    .work-foot {
      border-top: 1px solid var(--line);
      background: #fff;
      padding: 10px 12px 12px;
    }
    .work-foot textarea {
      width: 100%;
      min-height: 70px;
      resize: vertical;
      box-sizing: border-box;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: inherit;
      font-size: 13px;
    }
    .work-foot .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .work-msg {
      max-width: 96%;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      align-self: flex-start;
      background: #fff;
      border: 1px solid var(--g-gray-85);
      border-radius: 12px 12px 12px 2px !important;
    }
    /* ─── AI Workbench planning timeline ────────────────────────────
     * Shown right after a user message: 🤖 explain header on top, then
     * one row per tool call. Rows tick from "pending → running → done"
     * as the dispatcher executes them, so the user sees the agent's
     * thinking step by step. */
    .agent-thinking {
      align-self: flex-start;
      color: var(--muted); font-size: 12.5px;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .agent-thinking-dot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid var(--blue); border-top-color: transparent;
      animation: agent-spin 0.8s linear infinite;
    }
    @keyframes agent-spin { to { transform: rotate(360deg); } }
    .agent-plan {
      align-self: stretch;
      background: #fff;
      border: 1px solid var(--g-gray-85);
      border-radius: 12px 12px 12px 2px;
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 10px;
      font-size: 13px; line-height: 1.5;
    }
    .agent-plan-explain {
      display: flex; gap: 10px; align-items: flex-start;
      padding-bottom: 10px; border-bottom: 1px dashed var(--g-gray-90);
    }
    .agent-plan-explain-icon { font-size: 18px; flex-shrink: 0; }
    .agent-plan-explain-label {
      font-size: 10.5px; font-weight: 800; letter-spacing: 0.05em;
      color: var(--blue); text-transform: uppercase; margin-bottom: 2px;
    }
    .agent-plan-explain-text { color: var(--navy); font-weight: 600; }
    .agent-plan-steps { display: flex; flex-direction: column; gap: 6px; }
    .agent-plan-step {
      display: grid;
      grid-template-columns: 22px 1fr 22px;
      gap: 10px;
      align-items: start;
      padding: 8px 10px;
      border-radius: 6px;
      background: #f8fafc;
      transition: background 0.15s ease;
    }
    .agent-plan-step.running {
      background: #eff6ff;
      box-shadow: inset 3px 0 0 0 var(--blue);
    }
    .agent-plan-step.done {
      background: #f0fdf4;
      box-shadow: inset 3px 0 0 0 #16a34a;
    }
    .agent-plan-step.failed {
      background: #fef2f2;
      box-shadow: inset 3px 0 0 0 #dc2626;
    }
    .agent-plan-step-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--g-gray-90); color: var(--navy);
      font-weight: 900; font-size: 12px;
      display: grid; place-items: center;
    }
    .agent-plan-step.running .agent-plan-step-num { background: var(--blue); color: #fff; }
    .agent-plan-step.done    .agent-plan-step-num { background: #16a34a; color: #fff; }
    .agent-plan-step.failed  .agent-plan-step-num { background: #dc2626; color: #fff; }
    .agent-plan-step-title { font-weight: 700; color: var(--navy); }
    .agent-plan-step-status {
      font-size: 11.5px; color: var(--muted); margin-top: 2px;
      white-space: normal;
    }
    .agent-plan-step.running .agent-plan-step-status { color: var(--blue); }
    .agent-plan-step.done    .agent-plan-step-status { color: #15803d; }
    .agent-plan-step.failed  .agent-plan-step-status { color: #b91c1c; }
    /* Popup-blocker fallback link inside a timeline row — bold blue,
     * underlined on hover so it clearly reads as clickable. */
    .agent-plan-step-link {
      color: var(--blue); font-weight: 800; text-decoration: none;
      padding: 1px 4px; border-radius: 3px;
      background: rgba(11,107,220,0.08);
    }
    .agent-plan-step-link:hover {
      background: rgba(11,107,220,0.18);
      text-decoration: underline;
    }
    .agent-plan-step-icon {
      font-size: 14px; font-weight: 900;
      color: var(--muted);
      display: grid; place-items: center;
    }
    .agent-plan-step.running .agent-plan-step-icon { color: var(--blue); animation: agent-spin 1.2s linear infinite; }
    .agent-plan-step.done    .agent-plan-step-icon { color: #16a34a; }
    .agent-plan-step.failed  .agent-plan-step-icon { color: #dc2626; }
    /* Plan summary — the green "✓ done" card that appears at the
     * bottom of the agent timeline when everything finishes. One-shot
     * pop so the user actually notices the task succeeded (replaced
     * the faint blue line that nobody saw). */
    .agent-plan-summary {
      margin-top: 6px;
      padding: 12px 14px;
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border: 2px solid #16a34a;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(22, 163, 74, 0.20);
      font-size: 13.5px; font-weight: 700; color: #14532d;
      display: flex; gap: 10px; align-items: center;
      animation: agent-summary-pop 1.1s cubic-bezier(0.34, 1.56, 0.64, 1) 1 both;
      transform-origin: left center;
    }
    .agent-plan-summary-icon {
      color: #16a34a; font-weight: 900; font-size: 22px;
      flex-shrink: 0;
      animation: agent-summary-icon-bounce 1.3s ease-out 1 both;
    }
    @keyframes agent-summary-pop {
      0%   { opacity: 0; transform: scale(0.7) translateY(8px); }
      40%  { opacity: 1; transform: scale(1.06) translateY(0); box-shadow: 0 0 0 12px rgba(22,163,74,0.18), 0 6px 22px rgba(22,163,74,0.35); }
      70%  { transform: scale(0.98); }
      100% { transform: scale(1); box-shadow: 0 4px 16px rgba(22,163,74,0.20); }
    }
    @keyframes agent-summary-icon-bounce {
      0%   { transform: scale(0)    rotate(-90deg); }
      55%  { transform: scale(1.55) rotate(15deg);  }
      80%  { transform: scale(0.92) rotate(-3deg);  }
      100% { transform: scale(1)    rotate(0);      }
    }

    /* ─── Clarification stub (small placeholder left in the panel
     *     after the modal opens, so the transcript still shows what
     *     was asked even after the modal closes). */
    .agent-clarify-stub {
      align-self: stretch;
      background: #fff7ed;
      border: 1px solid #fed7aa !important;
      color: #7c2d12;
    }
    .agent-clarify-stub-hint {
      font-size: 11px; color: #9a3412;
      margin-top: 6px; font-weight: 500;
    }
    /* ─── Clarification modal (page-level popup) ─────────────────── */
    .agent-clarify-modal {
      width: min(680px, 94vw);
      max-height: 88vh;
      background: #fff;
      border-top: 4px solid #c2410c;
      display: flex; flex-direction: column;
    }
    .agent-clarify-modal .modal-body { overflow-y: auto; }
    .agent-clarify-modal .modal-head .title { color: #7c2d12; }
    .agent-clarify-modal-q {
      font-size: 14.5px; font-weight: 700;
      color: var(--navy);
      padding: 14px 16px;
      background: #fff7ed; border: 1px solid #fed7aa;
      border-radius: 6px;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .agent-clarify-modal-chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 14px;
    }
    .agent-clarify-modal-chip {
      padding: 8px 14px; font-size: 13px; font-weight: 700;
      border: 1px solid #fed7aa; border-radius: 999px;
      background: #fff7ed; color: #7c2d12;
      cursor: pointer;
      transition: all 0.12s ease;
    }
    .agent-clarify-modal-chip:hover {
      background: #c2410c; color: #fff; border-color: #c2410c;
      transform: translateY(-1px);
    }
    .agent-clarify-modal-chip.is-selected {
      background: #c2410c; color: #fff; border-color: #c2410c;
      box-shadow: 0 0 0 2px rgba(194, 65, 12, 0.16);
    }
    .agent-clarify-modal-help {
      margin: -6px 0 12px;
      font-size: 11px;
      color: #9a3412;
      font-weight: 600;
    }

    /* ─── Param editor rendered above the case picker in a create-project
     *   clarification. Collapsed by default so it doesn't overshadow the
     *   picker; expands to a 2-column grid of inputs. ─── */
    .agent-clarify-param-editor {
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    .agent-clarify-param-head {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
    }
    .agent-clarify-param-summary {
      flex: 1; min-width: 0;
      display: flex; flex-wrap: wrap; gap: 6px 8px;
      font-size: 12.5px; color: var(--navy);
      align-items: baseline;
    }
    .agent-clarify-param-summary .ape-icon { font-size: 13px; }
    .agent-clarify-param-summary .ape-sep { color: var(--muted); }
    .agent-clarify-param-summary .ape-item b { color: var(--navy); font-weight: 800; }
    .agent-clarify-param-toggle {
      background: transparent; border: 1px solid var(--line);
      padding: 4px 10px; border-radius: 6px;
      font-size: 11.5px; font-weight: 700;
      color: var(--blue); cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
    }
    .agent-clarify-param-toggle:hover { background: #eef2ff; }
    .agent-clarify-param-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 12px;
      padding: 12px;
    }
    .agent-clarify-param-fields .ape-field {
      display: flex; flex-direction: column; gap: 4px;
    }
    .agent-clarify-param-fields .ape-label {
      font-size: 11px; font-weight: 800;
      color: #475467;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .agent-clarify-param-fields input,
    .agent-clarify-param-fields select {
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font: inherit; font-size: 13px;
      background: #fff;
      color: var(--navy);
    }
    .agent-clarify-param-fields input:focus,
    .agent-clarify-param-fields select:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(11, 107, 220, 0.15);
    }
    .agent-cat-mode-link {
      background: transparent; border: 0; padding: 0;
      color: var(--blue); font-weight: 800; font-size: 11.5px;
      cursor: pointer; text-decoration: underline;
    }
    .agent-cat-mode-link:hover { color: var(--blue-pressed, #0a5fc4); }
    /* Category picker — top tab bar switching between Category /
     * Individual tabs. Both tabs share the same selectedCaseIds Set,
     * so the whole selection state is one source of truth. */
    .agent-clarify-catpicker { margin-bottom: 14px; }
    .agent-cat-tabs {
      display: flex; align-items: center; gap: 4px;
      border-bottom: 1px solid var(--g-gray-90);
      margin-bottom: 12px;
    }
    .agent-cat-tab {
      padding: 8px 14px; border: 0; background: transparent;
      font-size: 13px; font-weight: 800; color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
    }
    .agent-cat-tab:hover { color: var(--navy); }
    .agent-cat-tab.is-active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }
    .agent-cat-tabs-count {
      margin-left: auto;
      padding: 6px 10px;
      font-size: 11.5px; font-weight: 700;
      color: var(--blue);
      background: #eff6ff; border-radius: 999px;
    }
    .agent-cat-tab-body { animation: agent-tab-in 0.18s ease-out; }
    @keyframes agent-tab-in {
      from { opacity: 0; transform: translateY(2px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* Tri-state box inside a category chip label — mirrors the tri-state
     * checkboxes SAP uses in the Create Project modal (empty / dash /
     * check) so users pattern-match immediately. */
    .agent-cat-tri-box {
      width: 16px; height: 16px;
      display: inline-grid; place-items: center;
      margin-right: 8px;
      border: 1.5px solid #fed7aa; border-radius: 3px;
      background: #fff;
      font-size: 12px; font-weight: 900; line-height: 1;
      color: transparent;
    }
    .agent-cat-tri-box.is-selected { background: #c2410c; border-color: #c2410c; color: #fff; }
    .agent-cat-tri-box.is-partial  { background: #fdba74; border-color: #c2410c; color: #7c2d12; }
    .agent-cat-chip-select.is-partial {
      background: #fff7ed; color: #7c2d12; border-color: #c2410c;
    }
    .agent-cat-chip-list { display: flex; flex-direction: column; gap: 8px; }
    .agent-cat-chip-block {
      background: #fff7ed; border: 1px solid #fed7aa;
      border-radius: 8px; overflow: hidden;
    }
    .agent-cat-chip-head { display: flex; align-items: center; gap: 6px; padding: 6px 8px; }
    .agent-cat-chip-select {
      flex: 1; text-align: left;
      display: inline-flex; align-items: center;
      padding: 6px 12px; font-size: 13px; font-weight: 700;
      border: 1px solid transparent; border-radius: 999px;
      background: #fff; color: #7c2d12;
      cursor: pointer;
    }
    .agent-cat-chip-select:hover { background: #fed7aa; }
    .agent-cat-chip-select.is-selected {
      background: #c2410c; color: #fff; border-color: #c2410c;
    }
    .agent-cat-chip-select.is-selected .cat-tag { background: rgba(255,255,255,0.28); color: #fff; }
    .agent-cat-chip-expand {
      width: 28px; height: 28px;
      background: transparent; border: 1px solid #fed7aa;
      border-radius: 4px; cursor: pointer;
      color: #7c2d12; font-weight: 900;
    }
    .agent-cat-chip-expand:hover { background: #fed7aa; }
    .agent-cat-chip-cases {
      background: #fff; border-top: 1px dashed #fed7aa;
      padding: 8px 10px; max-height: 220px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 4px;
    }
    .agent-cat-chip-case {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 4px; font-size: 12px;
    }
    .agent-cat-chip-case:hover { background: #f8fafc; }
    .agent-cat-chip-case-id {
      font-family: ui-monospace, Consolas, monospace;
      font-weight: 700; color: var(--muted);
    }
    .agent-cat-chip-case-title {
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--ink);
    }
    .agent-cat-chip-empty {
      padding: 10px; font-style: italic; color: var(--muted); font-size: 12px;
      text-align: center;
    }
    /* Individual pick mode — scrollable case library with checkboxes. */
    .agent-cat-ind-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .agent-cat-ind-search {
      flex: 1; height: 32px; padding: 0 12px;
      border: 1px solid var(--g-gray-85); border-radius: 4px;
      background: #fff; font-family: inherit; font-size: 13px;
    }
    .agent-cat-ind-search:focus {
      outline: 2px solid var(--blue); outline-offset: -1px; border-color: var(--blue);
    }
    .agent-cat-ind-scroll {
      max-height: 340px; overflow-y: auto;
      border: 1px solid var(--g-gray-90); border-radius: 6px;
      padding: 4px;
      background: #fff;
    }
    .agent-cat-ind-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px;
      border-radius: 4px;
      font-size: 12.5px;
      cursor: pointer;
    }
    .agent-cat-ind-row:hover { background: #f1f5f9; }
    .agent-cat-ind-row.is-checked { background: #eff6ff; }
    .agent-cat-ind-row input[type="checkbox"] { flex-shrink: 0; }
    .agent-cat-ind-id {
      font-family: ui-monospace, Consolas, monospace;
      font-weight: 700; color: var(--muted); font-size: 11.5px;
      flex-shrink: 0;
    }
    .agent-cat-ind-title {
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--navy); font-weight: 600;
    }
    .agent-cat-ind-footer {
      margin-top: 8px;
      padding: 8px 10px;
      background: #f8fafc; border-radius: 4px;
      font-size: 11.5px; color: var(--muted);
    }
    .agent-cat-ind-count { font-weight: 600; }
    .agent-clarify-modal-input-row {
      display: flex; gap: 8px; align-items: stretch;
    }
    .agent-clarify-modal-input {
      flex: 1; height: 36px; padding: 0 12px;
      border: 1px solid var(--g-gray-85); border-radius: 4px;
      background: #fff; font-family: inherit; font-size: 13px;
    }
    .agent-clarify-modal-input:focus {
      outline: 2px solid #c2410c; outline-offset: -1px; border-color: #c2410c;
    }
    .agent-clarify-modal-submit {
      height: 36px; padding: 0 18px;
      font-size: 13px; font-weight: 700;
      border: 1px solid #c2410c; border-radius: 4px;
      background: #c2410c; color: #fff; cursor: pointer;
    }
    .agent-clarify-modal-submit:hover { background: #9a3412; }

    /* ─── Query result table (animated rows) ─────────────────────── */
    .agent-query-card {
      align-self: stretch;
      background: #fff;
      border: 1px solid var(--g-gray-85);
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 6px;
      font-size: 13px;
    }
    .agent-query-title {
      font-weight: 900; color: var(--navy);
      font-size: 14px; margin-bottom: 10px;
    }
    .agent-query-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
      table-layout: auto;
    }
    .agent-query-table thead th {
      text-align: left;
      padding: 8px 10px;
      background: #f8fafc;
      color: var(--navy);
      font-weight: 800;
      font-size: 11.5px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border-bottom: 2px solid var(--g-gray-85);
      white-space: nowrap;
    }
    .agent-query-table tbody td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--g-gray-95);
      color: var(--ink);
    }
    .agent-query-table tbody tr {
      opacity: 0;
      transform: translateY(6px);
      animation: agent-row-in 0.4s ease-out forwards;
    }
    @keyframes agent-row-in {
      to { opacity: 1; transform: translateY(0); }
    }
    .agent-query-table tbody tr:hover { background: #eff6ff; }
    .agent-query-table tbody tr:last-child td { border-bottom: 0; }
    .agent-query-empty {
      padding: 22px 14px; text-align: center;
      color: var(--muted); font-style: italic;
      background: #f8fafc; border-radius: 6px;
    }
    .agent-query-footer {
      margin-top: 12px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      font-size: 11px; color: var(--muted);
    }
    .agent-query-footer-count {
      margin-left: auto;
      font-size: 11px; color: var(--muted);
    }
    .agent-query-jump-btn {
      padding: 6px 12px;
      font-size: 12px; font-weight: 700;
      border: 1px solid var(--blue); border-radius: 4px;
      background: var(--blue); color: #fff;
      cursor: pointer; white-space: nowrap;
      transition: background 0.12s ease, transform 0.08s ease;
    }
    .agent-query-jump-btn:hover {
      background: var(--blue-pressed, #0a5fc4);
      transform: translateY(-1px);
    }
    /* Clickable value in a query cell — hint that clicking pops a detail
     * sheet (e.g. the specific case list behind a case-count number). */
    .agent-query-expand-btn {
      background: transparent;
      border: 1px solid transparent;
      padding: 1px 6px;
      cursor: pointer;
      color: var(--navy);
      font: inherit;
      font-weight: 700;
      border-radius: 4px;
      transition: background 0.12s, border-color 0.12s;
    }
    .agent-query-expand-btn:hover {
      background: #eef2ff;
      border-color: #c7d2fe;
    }
    .agent-query-expand-btn::after {
      content: ' ▸';
      font-size: 10px;
      color: var(--muted);
      transition: transform 0.12s ease;
      display: inline-block;
    }
    .agent-query-expand-btn.is-open::after { content: ' ▾'; color: var(--blue); }
    /* Inline expansion row — sits directly under the clicked row inside
     * the same <table>. Muted background so it doesn't feel like a data
     * row; scroll cap keeps a very long case list from pushing the whole
     * card off-screen. */
    .agent-query-expand-row td.agent-query-expand-cell {
      background: #f8fafc;
      border-top: 0;
      padding: 6px 12px 10px;
    }
    .agent-query-expand-inline {
      max-height: 320px;
      overflow-y: auto;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #fff;
    }
    .agent-query-expand-inline-title {
      font-weight: 700;
      color: var(--navy);
      padding: 8px 12px;
      border-bottom: 1px solid #e5e7eb;
      background: #f1f5f9;
      font-size: 12px;
    }
    .agent-query-expand-empty {
      padding: 10px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }
    /* Popover body — reused whenever an agent-query cell drills into
     * the list of things behind the number (case list, project list…). */
    .agent-expand-list {
      max-height: 50vh;
      overflow-y: auto;
      padding: 4px 0;
      display: flex; flex-direction: column;
    }
    .agent-expand-item {
      padding: 8px 12px 8px 10px;
      border-bottom: 1px solid #eef2f6;
      border-left: 3px solid transparent; /* overridden inline per category */
      display: flex; gap: 10px; align-items: center;
      background: #fff;
      transition: background 0.12s;
    }
    .agent-expand-item:last-child { border-bottom: 0; }
    .agent-expand-item:hover { background: #f8fafc; }
    .agent-expand-item .id {
      font-family: var(--mono, ui-monospace, monospace);
      font-weight: 800;
      min-width: 74px;
      /* color set inline to the category color */
    }
    .agent-expand-item .title { color: var(--navy); flex: 1; }
    .agent-expand-item .cat.cat-chip {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 9999px;
      white-space: nowrap;
      letter-spacing: 0.2px;
      /* background + color set inline from CATEGORY_RULES */
    }

    /* ─── Highlight for project cards the agent just acted on ──────
     *   Three things at once so it's impossible to miss:
     *     1. Bold gold/amber background (NOT a faint blue line)
     *     2. Thick gold outline — uses CSS `outline`, not `box-shadow`,
     *        so it doesn't get clipped by ancestor `overflow:hidden`
     *     3. A short scale pop, then JS clears the highlight after a few
     *        seconds so it doesn't stick like a permanent patch.
     *   High z-index so the scaled-up card paints over its neighbours
     *   instead of getting cropped by their borders.
     */
    .agent-highlight {
      animation: agent-card-highlight 1.8s cubic-bezier(0.34, 1.4, 0.64, 1) 1 forwards;
      position: relative;
      z-index: 999;
      outline: 2px solid #0b7bd3;
      outline-offset: 0;
      background: linear-gradient(135deg, #dff3ff 0%, #b9e6ff 52%, #e8fff5 100%) !important;
      border-color: #0084d6 !important;
      box-shadow:
        inset 0 0 0 999px rgba(0, 132, 214, 0.08),
        0 12px 30px rgba(0, 132, 214, 0.28) !important;
    }
    .agent-highlight .project-head,
    .agent-highlight .project-body {
      background: transparent !important;
    }
    @keyframes agent-card-highlight {
      0%   { transform: scale(1); }
      14%  { transform: scale(1.035); }
      36%  { transform: scale(1.012); }
      100% { transform: scale(1); }
    }
    .chat-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(440px, 92vw);
      background: #fff; box-shadow: -8px 0 30px rgba(0,0,0,0.18);
      z-index: 160;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .chat-panel.open { transform: translateX(0); }
    .chat-head {
      background: var(--navy); color: #fff;
      padding: 14px 18px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .chat-head .title { font-weight: 900; }
    .chat-head .sub { font-size: 11px; opacity: 0.75; margin-top: 2px; }
    .chat-head .chat-close {
      background: rgba(255,255,255,0.18); border: 0; color: #fff;
      height: 32px; padding: 0 12px; border-radius: 4px !important;
      font-weight: 700; font-size: 12px;
      display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    }
    .chat-head .chat-close:hover { background: rgba(255,255,255,0.3); }
    /* Esc hint badge inside the Hide button — small "Esc" key cap so users
       know they can close the panel without aiming for the button. */
    .chat-esc-hint {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 22px; height: 16px; padding: 0 4px;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 3px;
      font-size: 10px; font-weight: 800; letter-spacing: 0.04em;
      font-family: ui-monospace, Consolas, monospace;
    }
    .chat-head-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .chat-icon-btn {
      background: rgba(255,255,255,0.12); border: 0; color: #fff;
      width: 32px; height: 32px; border-radius: 4px !important;
      font-size: 15px; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative;
      transition: background 0.12s;
    }
    .chat-icon-btn:hover { background: rgba(255,255,255,0.25); }
    .chat-icon-btn--ghost {
      background: transparent; border: 1px solid rgba(255,255,255,0.3);
      width: auto; padding: 0 10px; height: 26px; font-size: 11px;
    }
    .chat-icon-btn--ghost:hover { background: rgba(255,255,255,0.1); }
    .chat-history-badge {
      position: absolute; top: -4px; right: -4px;
      background: var(--amber); color: var(--g-gray-10);
      font-size: 9px; font-weight: 900;
      min-width: 16px; height: 16px;
      border-radius: 999px !important; padding: 0 4px;
      display: inline-flex; align-items: center; justify-content: center;
      border: 2px solid var(--g-blue-20);
    }
    .chat-history-drop {
      background: var(--g-blue-20); color: #fff;
      max-height: 0; overflow: hidden;
      transition: max-height 0.25s ease-out;
    }
    .chat-history-drop.open { max-height: 60vh; overflow-y: auto; }
    .chat-history-head {
      padding: 10px 14px;
      font-size: 11px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .chat-history-list { padding: 0 8px 8px; }
    .chat-thread-item {
      background: rgba(255,255,255,0.05);
      border-radius: 4px !important; padding: 8px 10px; margin: 4px 0;
      display: flex; gap: 8px; align-items: stretch;
      cursor: pointer; transition: background 0.12s;
    }
    .chat-thread-item:hover { background: rgba(255,255,255,0.12); }
    .chat-thread-item.is-active { background: var(--blue); }
    .chat-thread-item.is-active:hover { background: var(--blue-hover); }
    .chat-thread-item .thread-main { flex: 1; min-width: 0; }
    .chat-thread-item .thread-title {
      font-size: 12.5px; font-weight: 700; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-thread-item .thread-meta { font-size: 10.5px; color: rgba(255,255,255,0.6); margin-top: 1px; }
    .chat-thread-item .thread-preview {
      font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-thread-item.is-active .thread-meta,
    .chat-thread-item.is-active .thread-preview { color: rgba(255,255,255,0.85); }
    .chat-thread-item .thread-del {
      background: transparent; border: 0; color: rgba(255,255,255,0.5);
      width: 24px; align-self: center;
      cursor: pointer; font-weight: 700;
    }
    .chat-thread-item .thread-del:hover { color: var(--red); }
    .chat-body {
      flex: 1; overflow-y: auto; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
      background: var(--g-gray-95);
    }
    .chat-msg {
      max-width: 86%;
      padding: 10px 12px;
      font-size: 13px; line-height: 1.55;
      white-space: pre-wrap; word-break: break-word;
    }
    .chat-msg.user { align-self: flex-end; background: var(--blue); color: #fff; border-radius: 12px 12px 2px 12px !important; }
    .chat-msg.ai { align-self: flex-start; background: #fff; border: 1px solid var(--g-gray-85); color: var(--ink); border-radius: 12px 12px 12px 2px !important; }
    .chat-msg.sys { align-self: center; background: transparent; color: var(--g-gray-50); font-size: 11px; font-style: italic; }
    .chat-msg.ai strong { font-weight: 800; color: var(--g-blue-20); }
    .chat-msg.ai em { font-style: italic; }
    .chat-msg.ai code {
      font-family: ui-monospace, Consolas, monospace; font-size: 0.9em;
      background: rgba(0,123,192,0.08); color: #00427a;
      padding: 1px 5px; border-radius: 3px;
    }
    .chat-msg.ai pre {
      background: var(--g-gray-10); color: var(--g-gray-95);
      padding: 10px 12px; margin: 8px 0; overflow-x: auto;
      border-radius: 4px;
      font-family: ui-monospace, Consolas, monospace; font-size: 0.85em; line-height: 1.5;
    }
    .chat-msg.ai pre code { background: transparent; color: inherit; padding: 0; }
    .chat-msg.ai ul, .chat-msg.ai ol { margin: 4px 0; padding-left: 22px; }
    .chat-msg.ai li { margin: 3px 0; }
    .chat-msg.ai h4 { font-size: 13px; margin: 8px 0 4px; font-weight: 800; color: var(--g-blue-20); }
    .chat-msg.user code { background: rgba(255,255,255,0.22); color: #fff; }
    .chat-workflow {
      display: grid;
      gap: 10px;
      min-width: min(360px, calc(100vw - 80px));
    }
    .chat-workflow.needs-review {
      border-left: 4px solid var(--blue);
      padding-left: 10px;
    }
    .chat-workflow-title {
      font-weight: 900;
      color: var(--navy);
      font-size: 14px;
    }
    .chat-workflow-sub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .chat-workflow-shot {
      width: 100%;
      max-height: 150px;
      object-fit: cover;
      object-position: top;
      border: 1px solid var(--g-gray-85);
      border-radius: 4px;
      background: #fff;
    }
    .chat-workflow-visual {
      position: relative;
      overflow: hidden;
      border-radius: 6px;
      border: 1px solid var(--g-gray-85);
      background: #fff;
    }
    .chat-workflow-visual .chat-workflow-shot {
      border: 0;
      border-radius: 0;
      display: block;
      max-height: 165px;
    }
    .chat-arrow {
      position: absolute;
      display: none;
      color: var(--red);
      font-weight: 900;
      font-size: 28px;
      text-shadow: 0 1px 0 #fff, 0 0 10px rgba(255,255,255,0.8);
      transform: rotate(-18deg);
    }
    .chat-arrow.business { display: block; left: 20px; top: 18px; }
    .chat-arrow.category { display: block; right: 72px; top: 22px; }
    .chat-arrow.name { display: block; left: 78px; top: 88px; }
    .chat-workflow-question {
      padding: 9px 10px;
      background: var(--g-blue-95);
      border: 1px solid var(--g-blue-90);
      color: var(--g-blue-20);
      border-radius: 5px;
      font-size: 12.5px;
      font-weight: 800;
    }
    .chat-workflow-grid {
      display: grid;
      gap: 8px;
    }
    .chat-workflow-row {
      display: grid;
      grid-template-columns: 1fr 0.8fr;
      gap: 6px;
      padding: 8px;
      border: 1px solid var(--g-gray-90);
      border-radius: 6px;
      background: var(--g-gray-100);
    }
    .chat-workflow-row input,
    .chat-workflow-row select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 7px 8px;
      font: inherit;
      background: #fff;
    }
    .chat-workflow-field-wide {
      grid-column: 1 / -1;
    }
    .chat-workflow-label {
      display: block;
      margin-bottom: 3px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .chat-workflow-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chat-workflow-status {
      padding: 8px 10px;
      border-radius: 4px;
      background: var(--g-blue-95);
      color: var(--g-blue-20);
      font-size: 12px;
      font-weight: 700;
    }
    /* Inline screenshot thumbnail in a user bubble — visible proof the

    .chat-msg-shot {
      display: block;
      width: 200px; max-width: 100%; height: auto;
      margin-top: 8px;
      border: 2px solid rgba(255,255,255,0.55);

      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      cursor: zoom-in;
      transition: transform 0.12s ease;

    .chat-msg-shot:hover { transform: scale(1.02); border-color: #fff; }
    .chat-lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    .chat-lightbox img {
      max-width: 95vw; max-height: 95vh;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      border-radius: 4px;
    }
    .chat-lightbox-close {
      position: absolute; top: 20px; right: 24px;
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      display: grid; place-items: center;
      font-size: 20px; font-weight: 800;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.12s ease;
    }
    .chat-lightbox-close:hover { background: rgba(255,255,255,0.28); }
    .chat-foot {
      border-top: 1px solid var(--g-gray-85);
      padding: 12px 14px; background: #fff;
    }
    .chat-foot textarea {
      width: 100%; min-height: 60px; max-height: 200px;
      padding: 8px 10px;
      border: 1px solid var(--g-gray-85); border-radius: 0 !important;
      font-size: 13px; font-family: inherit; resize: vertical;
    }
    .chat-foot textarea:focus { outline: 2px solid var(--blue); outline-offset: -1px; }
    .chat-foot .row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
    .chat-foot .chat-hint { font-size: 11px; color: var(--g-gray-50); margin-top: 6px; }
    .chat-shot-toggle {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 12px; border: 1.5px solid var(--g-gray-85);

      box-shadow: 0 2px 8px rgba(0,123,192,0.3);
    }
    .chat-shot-toggle.is-on:hover { background: var(--blue-hover); border-color: var(--blue-hover); color: #fff; }
    .chat-shot-toggle .shot-check {
      width: 16px; height: 16px;
      display: inline-grid; place-items: center;
      border: 1.5px solid currentColor;
      font-size: 11px; font-weight: 900;

    .chat-shot-toggle.is-on .shot-check { background: #fff; color: var(--blue); border-color: #fff; }
    .chat-welcome { padding: 4px 2px 8px; }
    .chat-welcome .w-greet {
      font-size: 14px; font-weight: 800; color: var(--g-blue-20);
      margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px;

    .chat-welcome .w-greet .w-avatar {
      width: 28px; height: 28px; border-radius: 50%;

      display: grid; place-items: center; font-size: 14px;
    }
    .chat-welcome .w-intro {
      font-size: 12.5px; color: var(--g-gray-50);
      line-height: 1.6; margin-bottom: 12px;
    }
    .chat-welcome .w-cat { margin-bottom: 10px; }
    .chat-welcome .w-cat-title {
      font-size: 11.5px; font-weight: 800; color: var(--g-blue-20);
      margin-bottom: 4px;
    }
    .chat-welcome .w-q {
      display: block; width: 100%; text-align: left;
      padding: 7px 10px; margin-bottom: 4px;
      background: #fff; border: 1px solid var(--g-gray-85);
      color: var(--g-gray-10); font-size: 12px;
      cursor: pointer; transition: all 0.12s;

      border-color: var(--blue); background: var(--g-blue-95); color: var(--blue);
    }
    .chat-welcome .w-foot {
      font-size: 11px; color: var(--g-gray-50);
      margin-top: 10px; padding-top: 10px;
      border-top: 1px dashed var(--g-gray-85);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">SAP</div>
        <div>
          <h1>Test Run Center</h1>
          <div class="subtitle">用户运行中心 · 项目批量执行 · 多 Case Live 转播 · 参数化运行</div>
        </div>
      </div>
      <div class="top-actions">
        <button class="a-button a-button--neutral-tertiary -small" id="refreshBtn">Refresh</button>
        <button class="a-button a-button--neutral-secondary -small" id="openCaseStudioBtn" title="单 case debug 工作台">Case Studio</button>
        <button class="a-button a-button--neutral-secondary -small" id="openDevBtn">开发者控制台</button>
      </div>
    </header>

    <section class="metric-grid" id="metricGrid"></section>

    <main class="layout">
      <aside class="panel">
        <nav class="side-nav" id="sideNav"></nav>
      </aside>

      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title" id="mainTitle">Run Center</div>
