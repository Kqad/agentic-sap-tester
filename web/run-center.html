  <script>
    // Validated-cases set — case ids the Run Center surfaces to the user.
    // Default seed (the original 11 saptest ids) is overwritten by the
    // server response from GET /api/validated during loadInitial(). The
    // Global Refresh button (topbar) refetches this on demand. Promote /
    // demote is done from Case Studio (POST/DELETE /api/validated/:id).
    let SUCCESS_CASE_IDS = Array.from({ length: 11 }, (_, i) => `saptest${i + 1}`);
    const FALLBACK_SCREENSHOT = '/api/midscene-js/runs/2026-06-03T04-14-33-780-jsrun-saptest1-5ed9/screenshot/10';
    // Sidebar sections under TestOps Command Center. Top-tab system
     // ('project' / 'live') was removed — all nav is sidebar-driven now.
     // 'live-channels' shows the live broadcast (if a case is running)
     // or the last completed project's result panel (if not).
    const NAV = {
      run: [
        ['run-center', 'Run Center'],
        ['my-projects', 'My Projects'],
        ['live-channels', 'Live Channels'],
        ['case-library', 'Case Library'],
        ['reports', 'Run Reports'],
        ['failures', 'Failure Analytics'],
      ],
    };
    const state = {
      tab: 'run',
      section: 'run-center',
      cases: [],
      details: new Map(),
      selectedIds: new Set(SUCCESS_CASE_IDS),
      selectedCaseId: SUCCESS_CASE_IDS[0],
      liveCaseId: SUCCESS_CASE_IDS[0],
      currentBatchIds: [...SUCCESS_CASE_IDS],
      // Live batch progress — set by runCases() at kickoff, cleared when
      // the batch fully resolves. Drives the "Finished in this batch"
      // panel under the takeover broadcast + the per-case confetti burst.
      batchProgress: null, // { batchId, totalIds: Set<id>, seenFinishedIds: Set<id> }
      // Last known screenshot URL per runId. Lets the live <img> survive
      // 2.5s poll re-renders without blinking back to FALLBACK_SCREENSHOT.
      liveShotCache: new Map(),
      active: [],
      recent: [],
      batches: loadBatches(),
      // Metric sample sizes — user can tweak from the metric card popover.
      // Recent pass rate reports 「N runs (excl. aborted)」and the projects
      // card reports 「passed/N latest」— N is these two numbers.
      recentSampleLimit: (() => {
        const v = Number(localStorage.getItem('runCenter.metricLimits.recent'));
        return (Number.isFinite(v) && v >= 1 && v <= 999) ? v : 20;
      })(),
      latestProjectsLimit: (() => {
        const v = Number(localStorage.getItem('runCenter.metricLimits.latest'));
        return (Number.isFinite(v) && v >= 1 && v <= 999) ? v : 10;
      })(),
      search: '',
      poll: null,
      // Run Console state — what the user is composing on the Run Center home.
      console: {
        selectedIds: new Set(SUCCESS_CASE_IDS),
        name: '',
        runsPerCase: 1,
        search: '',
        filter: 'all', // 'all' | 'asset' | 'finance' | 'supplier' | 'customer' | 'mm' | 'sd' | 'passed' | 'failed'
        editingBatchId: null,
        // Cases the user has opened to view NL / edit params, plus per-case
        // NL fold flag so opening one case doesn't auto-show its 3KB NL.
        expandedIds: new Set(),
        nlOpenIds: new Set(),
        // My Projects bulk-select mode + selection set. Set is populated
        // when user clicks per-row checkboxes; bulk Delete button consumes it.
        _selectMode: false,
        _selectedProjects: new Set(),
      },
      // Run Center "Getting started" guide — which step cards are
      // expanded. Lives in module state so the 2.5s poll re-render
      // doesn't reset what the user just opened. Default: step 1 open.
      tutOpenSteps: new Set([1]),
      tutCalloutDragging: false,
    };

    // ── Case categorization ──────────────────────────────────────────
    // Cheap keyword heuristic over transactionCode + title + description.
    // The user wanted Asset / Finance / Supplier-style buckets surfaced as
    // Quick Projects. Tweak/extend the keyword lists as new cases land —
    // anything that doesn't match falls into "other" and still shows up in
    // Full Regression.
    // Four broad buckets — keep it short and skimmable. Rule order matters
    // (first match wins), so narrower categories sit on top: Posting Verify
    // and Create both mention "FI" / "asset" but should beat the generic
    // Report buckets below them.
    const CATEGORY_RULES = [
      // Narrow first — "Check Invoice/Credit Note → FI Posting" verification.
      { key: 'posting-verify', label: 'Posting Verify', color: '#c2410c',
        keywords: ['check invoice', 'check credit note', 'fi posting', 'document flow', 'central finance', 'verify fi'] },
      // Create transactional documents / master data.
      { key: 'create',         label: 'Create',         color: '#7a3fbd',
        keywords: ['create sales order', 'sales order creation', 'va01', 'as01', 'as02', 'auc', 'master data creation', 'create asset'] },
      // Supplier / AP queries — Fiori "Manage" + GUI FBL1N family.
      { key: 'ap-report',      label: 'AP Report',      color: '#0e7a64',
        keywords: ['accounts payable', 'manage supplier', 'manage ap', 'supplier balances', 'supplier line item', 'vendor', 'fbl1n', 'fb60', 'miro', 'mr11', 'ap process', '供应商'] },
      // Everything else that's a finance/asset/tax/GL report.
      { key: 'finance-report', label: 'Finance Report', color: '#0b6bdc',
        keywords: ['asset history', 'asset balance', 'asset list', 'historysheet',
                   'gl line item', 'g/l line item', 'fi line item', 'general ledger', 'balance sheet', 'financial statement', 'ledger', 'fagl', 'fbl3n',
                   'fb03', 'document drill', 'display document',
                   'cit', 'income tax', 'itr', 'withholding', 'gst', 'vat',
                   'report'] },
    ];
    // Safety-net mapping for the cases I've already categorized by hand
    // (saptest 1–11). The keyword rules above also catch most of these via
    // tcode / description, but list endpoints sometimes ship without
    // `description` (older server build) leaving S_ALR_* / generic VF03
    // cases unmatched — this dict guarantees a bucket regardless.
    const FALLBACK_BUCKETS = {
      saptest1:  'finance-report',  // Asset History Sheet
      saptest2:  'ap-report',       // Manage AP — Open Items
      saptest3:  'ap-report',       // Manage Supplier Line Items (Fiori)
      saptest4:  'ap-report',       // FBL1N Supplier Balances
      saptest5:  'finance-report',  // CIT reporting
      saptest6:  'finance-report',  // G/L Line Items
      saptest7:  'create',          // AS01 Asset Master
      saptest8:  'finance-report',  // FI Document drill-down
      saptest9:  'posting-verify',  // Check Invoice → FI posting
      saptest10: 'posting-verify',  // Check Credit Note → FI posting
      saptest11: 'create',          // VA01 Sales Order
    };

    function categorizeCase(c) {
      if (!c) return 'other';
      const parsed = c.parsed || c;
      const summary = c.summary || {};
      const hay = [
        summary.transactionCode, summary.title, summary.description, summary.favoritesEntry,
        parsed.transactionCode, parsed.title, parsed.description, parsed.naturalLanguage,
        c.id,
      ].filter(Boolean).join(' ').toLowerCase();
      for (const rule of CATEGORY_RULES) {
        if (rule.keywords.some((k) => hay.includes(k))) return rule.key;
      }
      // Hardcoded fallback for known cases — never falls through to OTHER
      // if the case id is one we've classified before.
      if (c.id && FALLBACK_BUCKETS[c.id]) return FALLBACK_BUCKETS[c.id];
      return 'other';
    }
    function categoryMeta(key) {
      return CATEGORY_RULES.find((r) => r.key === key) || { key: 'other', label: 'Other', color: 'var(--g-gray-50)' };
    }

    // ── Two-layer Project/Tag Model ──────────────────────────────────
    // Per latest direction (会议纪要 + clarification):
    //   • Layer 1: Primary Category (inherent on the case).
    //     The existing 4 buckets — AP Report / Finance Report / Posting
    //     Verify / Create — remain the case's "true" classification.
    //   • Layer 2: Business tags (DERIVED from project membership).
    //     A project (batch) has an optional `business` field. Any case
    //     pulled into that project inherits that business as a tag.
    //     So a case may show "AP Report" (category) + "Logistics ·
    //     Warehouse" (businesses it belongs to via projects).
    //
    // Helpers below give us the back-references the UI needs.

    // List every project (batch) that includes this caseId.
    function projectsContainingCase(caseId) {
      return state.batches.filter((b) => (b.caseIds || []).includes(caseId));
    }
    // Unique business names attached to projects this case appears in.
    function businessesContainingCase(caseId) {
      const set = new Set();
      for (const p of projectsContainingCase(caseId)) {
        if (p.business) set.add(p.business);
      }
      return [...set];
    }
    // All distinct business names seen across saved projects — used as
    // datalist autocomplete in the Create Project modal.
    function getAllBusinesses() {
      const set = new Set();
      for (const b of state.batches) if (b.business) set.add(b.business);
      return [...set].sort();
    }
    // Most-recently-used businesses, newest first, deduped. Used by the
    // hero "N businesses" preview which shows the first 3 of these. Recency
    // is taken from batch.updatedAt → createdAt → 0 (oldest).
    function getRecentBusinesses(limit) {
      const sorted = state.batches
        .filter((b) => b.business)
        .slice()
        .sort((a, b) => {
          const at = String(a.updatedAt || a.createdAt || '');
          const bt = String(b.updatedAt || b.createdAt || '');
          return bt.localeCompare(at);
        });
      const out = [];
      const seen = new Set();
      for (const b of sorted) {
        if (seen.has(b.business)) continue;
        seen.add(b.business);
        out.push(b.business);
        if (out.length >= limit) break;
      }
      return out;
    }
    // Pick a single representative business for a project: explicit
    // project.business wins; else fall back to the dominant category among
    // its case ids (so an "all 仓储" project still gets a tag even without
    // an explicit business field set on the batch object).
    function dominantBusinessOf(project) {
      if (project?.business) return project.business;
      const ids = project?.caseIds || [];
      if (!ids.length) return null;
      const tally = {};
      for (const id of ids) {
        const cs = state.cases.find((c) => c.id === id);
        if (!cs) continue;
        const cat = categorizeCase(cs);
        if (!cat || cat === 'other') continue;
        const label = categoryMeta(cat).label;
        tally[label] = (tally[label] || 0) + 1;
      }
      let best = null, max = 0;
      for (const [label, n] of Object.entries(tally)) {
        if (n > max) { best = label; max = n; }
      }
      return best;
    }
    // For Case Library: which projects use this case? Returns an array of
    // { businessLabel, projectName, projectId } so the UI can group by
    // business as the first-level expandable tag.
    //
    // Two exclusions:
    //   1. Presets (isPreset) — auto-generated demo projects don't count.
    //   2. Projects without an explicit `business` (department) — category
    //      fallback names like "Finance Report" / "AP Report" / "Posting
    //      Verify" should NOT appear here. Only real dept tags (财务 / 仓储
    //      / 物流) — i.e. projects the user explicitly tagged with a dept.
    function projectsUsingCase(caseId) {
      const out = [];
      const total = state.batches.length;
      for (let i = 0; i < state.batches.length; i++) {
        const p = state.batches[i];
        if (p.isPreset) continue;
        if (!p.business) continue;
        if (!(p.caseIds || []).includes(caseId)) continue;
        out.push({
          businessLabel: p.business,
          projectName: p.name || p.id,
          projectId: p.id,
          seq: total - i,  // oldest=#1, newest=#N — same scheme as My Projects
        });
      }
      return out;
    }
    function suggestBatchName(ids) {
      if (!ids.length) return '';
      const cats = new Set(ids.map((id) => categorizeCase(state.cases.find((c) => c.id === id))));
      cats.delete('other');
      if (cats.size === 1) return `${categoryMeta([...cats][0]).label} Suite · ${ids.length} cases`;
      if (ids.length === state.cases.length) return `Full Regression · ${ids.length} cases`;
      return `Custom Batch · ${ids.length} cases`;
    }

    const $ = (sel) => document.querySelector(sel);
    const el = (tag, attrs = {}, ...children) => {
      const node = document.createElement(tag);
      for (const [key, value] of Object.entries(attrs || {})) {
        if (value == null || value === false) continue;
        if (key === 'class') node.className = value;
        else if (key === 'dataset') Object.assign(node.dataset, value);
        else if (key === 'style') {
          // String form ("color: red;") → cssText. Object form → property
          // assignment. Object.assign on node.style with a string sets
          // node.style[0]='c', [1]='o', … and throws CSSStyleDeclaration
          // "Indexed property setter is not supported".
          if (typeof value === 'string') node.style.cssText = value;
          else Object.assign(node.style, value);
        }
        else if (key.startsWith('on') && typeof value === 'function') node.addEventListener(key.slice(2).toLowerCase(), value);
        else if (value === true) node.setAttribute(key, '');
        else node.setAttribute(key, String(value));
      }
      for (const child of children.flat()) {
        if (child == null || child === false) continue;
        node.appendChild(child instanceof Node ? child : document.createTextNode(String(child)));
      }
      return node;
    };

    async function api(path, options = {}) {
      const res = await fetch(path, {
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options,
      });
      if (res.status === 401) {
        throw new Error('请先在原控制台登录，再打开用户运行中心。');
      }
      const text = await res.text();
      const data = text ? JSON.parse(text) : {};
      if (!res.ok) throw new Error(data.error || data.message || res.statusText);
      return data;
    }

    function toast(message) {
      const old = document.querySelector('.toast');
      if (old) old.remove();
      const box = el('div', { class: 'toast' }, message);
      document.body.appendChild(box);
      setTimeout(() => box.remove(), 4200);
    }

    function loadBatches() {
      try {
        const raw = JSON.parse(localStorage.getItem('userRunCenter.batches') || '[]');
        if (!Array.isArray(raw)) return [];
        // Drop null/non-object entries and entries missing id (legacy/broken).
        // Without this a single bad entry left in localStorage would explode
        // every render that touches state.batches.
        return raw.filter((b) => b && typeof b === 'object' && b.id);
      } catch { return []; }
    }
    function saveBatches() {
      localStorage.setItem('userRunCenter.batches', JSON.stringify(state.batches.slice(0, 20)));
    }

    // /api/cases (list) returns { id, summary: { title, transactionCode, ... } }.
    // /api/cases/:id (detail) returns the full case under .parsed. Try both
    // so the same helper works for list rows and expanded detail.
    const caseTitle = (c) => c?.parsed?.title || c?.summary?.title || c?.title || c?.id || 'Case';

    // The collapsed case row just shows its bucket label ("AP Report",
    // "Finance Report", "Posting Verify", "Create") — short and repeated,
    // so the list reads like a tagged inventory. The full description
    // appears in the expanded row.
    function caseDesc(c) {
      return categoryMeta(categorizeCase(c)).label;
    }

    // Clean SAP description for display in expanded views — strips the
    // BP_IT_B2P_GUI_ / PSL_CT_B2P_PE_GUI_ / *_FIORI_ prefixes and the
    // trailing "(Row X/Y)" tags that appear in nearly every description.
    function caseDescriptionClean(c) {
      const raw = c?.parsed?.description || c?.summary?.description || c?.description;
      if (!raw) return '';
      return String(raw)
        .replace(/^(BP|PSL)_[A-Z]{2,4}_[A-Z]{2,4}(?:_[A-Z]{2,4})?_(GUI|FIORI|PE)_?/im, '')
        .replace(/^_+/, '')
        .replace(/\s*\(Row[^)]*\)\s*/g, ' ')
        .replace(/\s{2,}/g, ' ')
        .trim();
    }
    const statusOf = (caseId) => {
      if (state.active.some((a) => a.caseId === caseId)) return 'running';
      const r = state.recent.find((x) => x.caseId === caseId);
      return r?.status || 'pending';
    };
    const statusLabel = (s) => s === 'passed' ? 'Passed' : s === 'failed' ? 'Failed' : s === 'running' ? 'Live' : s === 'queued' ? 'Queued' : 'Ready';
    // How many of a project's cases are running RIGHT NOW under this
    // specific project's batch. Without the batchId guard a shared case
    // would mark every project that owns it as "Live" simultaneously,
    // which is what we were seeing.
    const projectLiveCount = (p) => {
      if (!p) return 0;
      if (!state.batchProgress || state.batchProgress.batchId !== p.id) return 0;
      const caseIds = p.caseIds || [];
      return caseIds.filter((id) => state.active.some((a) => a.caseId === id)).length;
    };
    const currentBatchCases = () => {
      const ids = state.currentBatchIds?.length ? state.currentBatchIds : [...state.selectedIds];
      return ids.map((id) => state.cases.find((c) => c.id === id)).filter(Boolean);
    };

    async function loadInitial() {
      try {
        // Pull validated set first so we filter cases against the LIVE list,
        // not the hardcoded seed. Other fetches run in parallel.
        const [validatedRes, casesRes, recentRes, activeRes] = await Promise.all([
          api('/api/validated').catch(() => ({ ids: SUCCESS_CASE_IDS })),
          api('/api/cases'),
          api('/api/results/recent?limit=1000').catch(() => ({ runs: [] })),
          api('/api/midscene-js/runs/active').catch(() => ({ active: [] })),
        ]);
        if (Array.isArray(validatedRes?.ids) && validatedRes.ids.length) {
          SUCCESS_CASE_IDS = validatedRes.ids;
        }
        const all = casesRes.cases || [];
        state.cases = SUCCESS_CASE_IDS
          .map((id) => all.find((c) => c.id === id))
          .filter(Boolean);
        state.recent = recentRes.runs || [];
        state.active = activeRes.active || [];
        if (!state.cases.some((c) => c.id === state.selectedCaseId)) {
          state.selectedCaseId = state.cases[0]?.id || null;
        }
        await loadDetail(state.selectedCaseId);
        renderAll();
      } catch (err) {
        $('#mainPanel').innerHTML = '';
        $('#mainPanel').appendChild(el('div', { class: 'empty' }, err.message));
      }
    }

    // Global Refresh — user clicks this to re-fetch validated set, case
    // catalog, recent runs, active runs. Other tabs don't auto-sync; users
    // choose when to pull in fresh state.
    async function globalRefresh() {
      const btn = $('#globalRefreshBtn');
      if (btn) { btn.disabled = true; btn.classList.add('is-refreshing'); }
      try {
        await loadInitial();
        toast('全部刷新完成 · 已拉到最新 validated 集 + case 数据');
      } catch (err) {
        toast('刷新失败: ' + err.message);
      } finally {
        if (btn) { btn.disabled = false; btn.classList.remove('is-refreshing'); }
      }
    }

    async function loadDetail(caseId) {
      if (!caseId || state.details.has(caseId)) return state.details.get(caseId);
      const detail = await api('/api/cases/' + encodeURIComponent(caseId));
      state.details.set(caseId, detail);
      return detail;
    }

    function extractParams(detail) {
      const parsed = detail?.parsed || detail || {};
      const overrides = parsed.params && typeof parsed.params === 'object' && !Array.isArray(parsed.params) ? parsed.params : {};
      const out = [];
      for (const step of parsed.apiGuide?.steps || []) {
        if (!String(step.midsceneApi || '').toLowerCase().includes('aiinput')) continue;
        const m = /aiInput\s*\(\s*(['"`])([\s\S]*?)\1\s*,\s*\{\s*value\s*:\s*(['"`])([\s\S]*?)\3\s*\}\s*\)/.exec(step.exampleCode || '');
        if (!m) continue;
        const order = String(step.order);
        out.push({
          order,
          locator: m[2].replace(/左上角矩形/g, 'T Code').replace(/矩形/g, 'T Code'),
          rawLocator: m[2],
          defaultValue: m[4],
          currentValue: Object.prototype.hasOwnProperty.call(overrides, order) ? String(overrides[order] ?? '') : m[4],
        });
      }
      return out;
    }

    // ── Highlighted NL renderer ──────────────────────────────────────
    // Splits the raw NL into atomic steps — one per line — by walking the
    // text and breaking on Chinese punctuation (，。；) and newlines. The
    // raw NL is the canonical source (NOT apiGuide.steps[].title, which
    // is truncated for display: "BX00000028" gets stored as "BX...").
    //
    // Edge case handled: SAP xpath expressions contain Chinese commas
    // inside brackets like //*[@id="M1:46:1[1,0]"] — we use English `,`
    // inside xpath, not 「，」, so splitting only by Chinese commas leaves
    // xpaths intact.
    //
    // Each step's param values are wrapped in <span data-order="N"> so
    // syncNLHighlight() can update them inline without a re-render.
    function buildHighlightedNL(parsed, fields) {
      // ── Preferred source: apiGuide.steps[] ─────────────────────────
      // Every step already carries a numeric `order` — the SAME order
      // that keys parameter #N labels. Using this array directly means
      // the NL step numbers on the right pane match the param numbers
      // on the left pane 1:1.
      //
      // Earlier logic split the raw `naturalLanguage` text on
      // punctuation and numbered by array index — that broke as soon as
      // two API steps shared one raw-NL sentence ("点击visualization 并
      // 启用show Ok code field" is one comma-free clause but is two
      // apiGuide steps, so all subsequent NL numbers drifted -1).
      //
      // `naturalLanguageInstruction` beats `title` because titles get
      // truncated when they contain long values (e.g. "在 Sales Org
      // 输入框 输入 …" vs the full-value NLI).
      const steps = Array.isArray(parsed?.apiGuide?.steps) ? parsed.apiGuide.steps : null;
      let numbered = null;
      if (steps && steps.length) {
        numbered = steps
          .map((s) => ({
            num: s?.order != null ? String(s.order) : '',
            text: String(s?.naturalLanguageInstruction || s?.title || '').trim(),
          }))
          .filter((l) => l.text);
      }
      // ── Fallback: split raw natural-language text ──────────────────
      // Older cases (hand-edited, imported before apiGuide became
      // canonical) don't ship apiGuide.steps. For those we keep the
      // original splitter so *something* renders — numbers just won't
      // match parameter #N in that edge case.
      if (!numbered || !numbered.length) {
        const raw = String(parsed?.naturalLanguage || '').trim();
        if (!raw) {
          return el('div', { class: 'nl-hl-empty' }, 'No natural language description.');
        }
        // Smart splitter — walks char-by-char and breaks on punctuation
        // that is OUTSIDE quotes / brackets / parens. Preserves xpath
        // content like //*[@id="M1:46:1[1,0]"] because the comma there
        // is inside `"..."` and `[...]`.
        const splitNL = (text) => {
          const out = [];
          let buf = '';
          let inDouble = false, inSingle = false, brackets = 0, parens = 0;
          for (let i = 0; i < text.length; i += 1) {
            const ch = text[i];
            if (ch === '"' && !inSingle) { inDouble = !inDouble; buf += ch; continue; }
            if (ch === "'" && !inDouble) { inSingle = !inSingle; buf += ch; continue; }
            if (!inDouble && !inSingle) {
              if (ch === '[') { brackets += 1; buf += ch; continue; }
              if (ch === ']') { brackets = Math.max(0, brackets - 1); buf += ch; continue; }
              if (ch === '(') { parens += 1; buf += ch; continue; }
              if (ch === ')') { parens = Math.max(0, parens - 1); buf += ch; continue; }
            }
            const safe = !inDouble && !inSingle && brackets === 0 && parens === 0;
            if (safe && (ch === '，' || ch === '。' || ch === '；' || ch === ',' || ch === ';' || ch === '\n')) {
              if (buf.trim()) out.push(buf);
              buf = '';
              continue;
            }
            buf += ch;
          }
          if (buf.trim()) out.push(buf);
          return out;
        };
        const rawLines = splitNL(raw)
          .map((l) => l.replace(/^\s*\d+\s*[.、:：]\s*/, '').trim())
          .filter(Boolean);
        numbered = rawLines.map((text, i) => ({ num: String(i + 1), text }));
      }

      if (!numbered.length) {
        return el('div', { class: 'nl-hl-empty' }, 'No natural language description.');
      }

      // Sort param values by length DESC so "85401" wins over "5401" when
      // both are tried against the same substring.
      const sortedFields = [...(fields || [])]
        .filter((f) => f.currentValue != null && String(f.currentValue).length > 0)
        .sort((a, b) => String(b.currentValue).length - String(a.currentValue).length);

      const wrap = el('div', { class: 'nl-hl' });
      numbered.forEach(({ num, text: line }) => {
        const used = []; // [start, end] occupied ranges
        const hits = []; // { start, end, order, value }
        for (const f of sortedFields) {
          const val = String(f.currentValue);
          const at = line.indexOf(val);
          if (at < 0) continue;
          const end = at + val.length;
          if (used.some(([s, e]) => at < e && end > s)) continue;
          used.push([at, end]);
          hits.push({ start: at, end, order: f.order, value: val });
        }
        hits.sort((a, b) => a.start - b.start);

        const lineEl = el('div', { class: 'nl-hl-line' });
        lineEl.appendChild(el('span', { class: 'nl-hl-num' }, num + '.'));
        const textWrap = el('span', { class: 'nl-hl-text' });
        let pos = 0;
        for (const h of hits) {
          if (h.start > pos) textWrap.appendChild(document.createTextNode(line.slice(pos, h.start)));
          const hilite = el('span', {
            class: 'nl-param-hilite',
            'data-order': h.order,
            title: 'param #' + h.order,
          }, h.value);
          textWrap.appendChild(hilite);
          pos = h.end;
        }
        if (pos < line.length) textWrap.appendChild(document.createTextNode(line.slice(pos)));
        lineEl.appendChild(textWrap);
        wrap.appendChild(lineEl);
      });
      return wrap;
    }
    // Live sync — call from a param input's oninput handler. Updates the
    // text content of every <span data-order="N"> inside `container`.
    // No-op when the span doesn't exist (NL didn't contain the value).
    function syncNLHighlight(container, order, newValue) {
      if (!container) return;
      container.querySelectorAll(`.nl-param-hilite[data-order="${order}"]`).forEach((s) => {
        s.textContent = newValue;
        s.classList.add('is-just-changed');
        clearTimeout(s._flashT);
        s._flashT = setTimeout(() => s.classList.remove('is-just-changed'), 800);
      });
    }

    function syncNaturalLanguage(oldNL, oldParams, newParams, fields) {
      let nl = oldNL || '';
      for (const field of fields) {
        const oldVal = Object.prototype.hasOwnProperty.call(oldParams, field.order) ? String(oldParams[field.order]) : field.defaultValue;
        const newVal = Object.prototype.hasOwnProperty.call(newParams, field.order) ? String(newParams[field.order]) : field.defaultValue;
        if (!oldVal || oldVal === newVal) continue;
        const anchor = field.rawLocator || field.locator;
        const anchorIdx = nl.indexOf(anchor);
        const start = anchorIdx >= 0 ? nl.indexOf(oldVal, anchorIdx) : nl.indexOf(oldVal);
        if (start >= 0) {
          nl = nl.slice(0, start) + newVal + nl.slice(start + oldVal.length);
        }
      }
      return nl;
    }

    function renderAll() {
      // Save the window scroll BEFORE we wipe panel children. Every
      // panel.replaceChildren() resets layout → browser snaps scrollTop back
      // to 0, which jumps the user to the top mid-action (opening NL,
      // toggling a chip, polling tick, …). We restore after the renders
      // commit so the user stays where they were.
      const scrollY = window.scrollY;
      // Tab highlight FIRST. If anything downstream throws, the tabs at
      // least stay in sync with state.tab — the user pressed the tab, they
      // should see it light up regardless of render errors.
      document.querySelectorAll('.tab').forEach((btn) => btn.classList.toggle('active', btn.dataset.tab === state.tab));
      // Body class drives layout — Run Center home hides the right panel.
      document.body.classList.toggle('run-home', state.tab === 'run' && state.section === 'run-center');
      // Right Live Channels rail only belongs to the Live Channels tab.
      // On Run Center / Case Editor it gets hidden so the main panel can
      // expand to fill the freed width.
      document.body.classList.toggle('no-live-rail', state.tab !== 'live');
      // body.has-live toggles flashing on the top "Watch Live" button so
      // users always have a one-click way back to the live broadcast.
      document.body.classList.toggle('has-live', state.active.length > 0);
      safeRender('metrics', renderMetrics);
      safeRender('sideNav', renderSideNav);
      safeRender('main', renderMain);
      safeRender('live', renderLive);
      // Restore focus to an input that triggered the re-render — search box,
      // name box, etc. — so the user can keep typing without clicking back in.
      const f = state.console?._restoreFocus;
      if (f?.id) {
        const node = document.getElementById(f.id);
        if (node) {
          node.focus();
          try { node.setSelectionRange(f.selStart ?? node.value.length, f.selEnd ?? node.value.length); } catch { /* */ }
        }
        state.console._restoreFocus = null;
      }
      // Restore scroll AFTER focus, since input.focus() can also nudge scroll.
      if (scrollY !== window.scrollY) window.scrollTo(0, scrollY);
    }

    function safeRender(name, fn) {
      try { fn(); }
      catch (err) {
        console.error(`render error in ${name}:`, err);
      }
    }

    function renderSideNav() {
      const nav = $('#sideNav');
      const title = state.tab === 'run' ? 'TestOps Command Center'
        : state.tab === 'project' ? 'Project Console'
        : 'Batch Live Monitor';
      nav.replaceChildren(
        el('div', { class: 'side-title' }, title),
        ...NAV[state.tab].map(([key, label]) => el('button', {
          class: 'side-btn' + (state.section === key ? ' active' : ''),
          onclick: () => { state.section = key; renderAll(); },
        }, label)),
      );
    }

    function renderMetrics() {
      const activeCount = state.active.length;
      // Recent pass rate (excluding aborted runs). Take up to state.recentSampleLimit
      // most recent NON-aborted passed/failed runs and divide passed by the total.
      const isAborted = (r) => {
        const s = String(r?.status || '').toLowerCase();
        if (s === 'aborted' || s === 'cancelled' || s === 'canceled') return true;
        const err = String(r?.errorMessage || '').toLowerCase();
        return err.includes('abort') || err.includes('cancel');
      };
      const eligible = (state.recent || [])
        .filter((r) => !isAborted(r) && (r.status === 'passed' || r.status === 'failed'))
        .slice(0, state.recentSampleLimit);
      const passCount = eligible.filter((r) => r.status === 'passed').length;
      const passRate = eligible.length ? Math.round((passCount / eligible.length) * 100) : null;
      const passRateStr = passRate == null ? '—' : `${passRate}%`;
      // Latest passed projects — driven by the full run history (state.recent),
      // not state.batches. state.batches only carries locally-saved projects,
      // so the old logic could show "5/8" even when the run report contained
      // dozens of past projects. Cluster the recent runs into batches, drop
      // single-case re-runs, then take the most recent N project batches.
      let projectsStr = '0/0';
      if (typeof clusterRunsIntoBatches === 'function') {
        // Local owner lookup (projectsForCase from renderReports is scoped
        // out of reach here; inline the same logic).
        const ownersForCase = (caseId) =>
          (state.batches || []).filter((b) => (b.caseIds || []).includes(caseId));
        const recentClusters = clusterRunsIntoBatches(state.recent || []);
        const recentProjectBatches = recentClusters
          .map((c) => {
            const caseIdsInBatch = [...new Set(c.runs.map((r) => r.caseId))];
            const ownerCounts = new Map();
            for (const r of c.runs) {
              for (const o of ownersForCase(r.caseId)) {
                ownerCounts.set(o.id, (ownerCounts.get(o.id) || 0) + 1);
              }
            }
            const topOwnerEntry = [...ownerCounts.entries()].sort((a, b) => b[1] - a[1])[0];
            const owner = topOwnerEntry ? state.batches.find((b) => b.id === topOwnerEntry[0]) : null;
            const ownerSize = owner ? (owner.caseIds || []).length : 0;
            const isPartial = ownerSize > 0 && caseIdsInBatch.length < ownerSize;
            return { cluster: c, isPartial };
          })
          .filter((a) => !a.isPartial)
          .slice(0, state.latestProjectsLimit);
        const passed = recentProjectBatches.filter((a) =>
          a.cluster.runs.length > 0 && a.cluster.runs.every((r) => r.status === 'passed')).length;
        projectsStr = recentProjectBatches.length ? `${passed}/${recentProjectBatches.length}` : '0/0';
      }

      // Build a metric card. `adj` is an optional { current, onPick, storageKey }
      // spec — when present, the card shows a small chip and clicking it
      // opens a popover that lets the user type any sample size.
      const metricCard = (v, label, adj) => {
        const card = el('div',
          { class: 'metric' + (adj ? ' metric-adjustable' : '') },
          el('b', {}, v),
          el('span', {}, label),
        );
        if (adj) {
          const chip = el('button', {
            class: 'metric-chip',
            title: '调整样本量',
            onclick: (ev) => { ev.stopPropagation(); openMetricPicker(chip, adj); },
          }, `${adj.current} ▾`);
          card.appendChild(chip);
          card.style.position = 'relative';
          card.onclick = () => openMetricPicker(chip, adj);
          card.style.cursor = 'pointer';
        }
        return card;
      };

      const metrics = [
        metricCard('11', 'validated project cases'),
        metricCard(passRateStr, `recent pass rate · ${eligible.length} runs (excl. aborted)`, {
          current: state.recentSampleLimit,
          storageKey: 'runCenter.metricLimits.recent',
          onPick: (n) => { state.recentSampleLimit = n; },
        }),
        metricCard(activeCount, 'active live channels'),
        metricCard(projectsStr, 'latest passed projects', {
          current: state.latestProjectsLimit,
          storageKey: 'runCenter.metricLimits.latest',
          onPick: (n) => { state.latestProjectsLimit = n; },
        }),
      ];
      $('#metricGrid').replaceChildren(...metrics);
    }

    // Popover that lets the user TYPE any sample size for an adjustable
    // metric card. Attached to document.body with position:fixed so the
    // periodic renderMetrics() call (which replaces #metricGrid children)
    // won't wipe it out mid-input. Enter commits; Escape / outside click
    // closes without saving.
    function openMetricPicker(chip, spec) {
      // Kill any existing picker first — only one open at a time.
      document.querySelectorAll('.metric-picker').forEach((n) => n.remove());

      const input = el('input', {
        class: 'metric-picker-input',
        type: 'number',
        min: '1',
        max: '999',
        step: '1',
        value: String(spec.current),
        onkeydown: (ev) => {
          if (ev.key === 'Enter') { ev.preventDefault(); commit(); }
          else if (ev.key === 'Escape') { ev.preventDefault(); close(); }
        },
      });
      const confirmBtn = el('button', {
        class: 'metric-picker-confirm',
        title: '确认 (Enter)',
        onclick: (ev) => { ev.stopPropagation(); commit(); },
      }, '✓');

      const picker = el('div', { class: 'metric-picker' },
        el('div', { class: 'metric-picker-title' }, '样本量 · 输入数字后回车'),
        el('div', { class: 'metric-picker-row' }, input, confirmBtn),
      );
      document.body.appendChild(picker);

      // Position under the chip using fixed coordinates so subsequent
      // #metricGrid re-renders never affect us.
      const r = chip.getBoundingClientRect();
      picker.style.top = Math.min(r.bottom + 6, window.innerHeight - 80) + 'px';
      picker.style.right = Math.max(8, window.innerWidth - r.right) + 'px';

      setTimeout(() => { input.focus(); input.select(); }, 0);

      function commit() {
        const raw = parseInt(input.value, 10);
        const n = Number.isFinite(raw) ? Math.max(1, Math.min(999, raw)) : spec.current;
        spec.onPick(n);
        try { localStorage.setItem(spec.storageKey, String(n)); } catch { /* ignore */ }
        close();
        renderMetrics();
      }
      function close() {
        picker.remove();
        document.removeEventListener('mousedown', outside, true);
      }
      function outside(ev) {
        if (picker.contains(ev.target) || chip.contains(ev.target)) return;
        close();
      }
      // Register outside-click on next tick so the current click
      // (the one that opened us) doesn't immediately close us.
      setTimeout(() => document.addEventListener('mousedown', outside, true), 0);
    }

    function renderCases() {
      const q = state.search.trim().toLowerCase();
      const filtered = state.cases.filter((c) => !q || c.id.toLowerCase().includes(q) || caseTitle(c).toLowerCase().includes(q));
      return el('div', { class: 'section-card' },
        el('div', { class: 'case-toolbar' },
          el('input', {
            type: 'search',
            value: state.search,
            placeholder: 'Search case',
            oninput: (ev) => { state.search = ev.target.value; renderMain(); },
          }),
          el('button', { class: 'btn primary', onclick: () => runCases([...state.selectedIds]) }, 'Run Selected'),
        ),
        el('ul', { class: 'case-list' }, ...filtered.map((c) => {
        const s = statusOf(c.id);
        const row = el('li', {
          class: 'case-row' + (state.selectedCaseId === c.id ? ' active' : ''),
          onclick: async () => {
            state.selectedCaseId = c.id;
            await loadDetail(c.id);
            if (state.tab === 'run') state.tab = 'project';
            renderAll();
          },
        },
          el('input', {
            type: 'checkbox',
            checked: state.selectedIds.has(c.id),
            onclick: (ev) => {
              ev.stopPropagation();
              if (ev.target.checked) state.selectedIds.add(c.id);
              else state.selectedIds.delete(c.id);
              renderAll();
            },
          }),
          el('div', {},
            el('div', { class: 'case-title' }, c.id, ' · ', caseTitle(c)),
            el('div', { class: 'case-meta' }, caseDesc(c) || 'Cached SAP case'),
          ),
          el('span', { class: `status ${s}` }, statusLabel(s)),
        );
        return row;
        })),
      );
    }

    function renderMain() {
      // Live button is hot whenever there are runs OR a case is selected
      // (idle case → opens cinema). Label flips to "LIVE" while runs are
      // active so the button reads obviously during a broadcast.
      // Watch Live + Run Case Cached topbar buttons were removed — sidebar
      // is the canonical nav now. project/live tabs were also removed; the
      // 'live' content is reachable via sidebar -> Live Channels.
      if (state.tab === 'run') renderRunSection();
      if (state.tab === 'project') renderProjectSection();
      if (state.tab === 'live') renderLiveSection();
    }

    function renderRunSection() {
      const titles = {
        'run-center': ['Run Center', '创建新 project · 从 Case Library 挑 case · 起跑前给本部门做参数覆盖'],
        'my-projects': ['My Projects', '所有 project 列表 · 每个挂部门 tag · 点开看 case 和参数'],
        'live-channels': ['Live Channels', '正在跑：实时转播 · 没在跑：最近 N 次 project 结果回放'],
        'case-library': ['Case Library', '只读 case 模板 · 看 NL + params · 看每个 case 被哪些 project 用'],
        reports: ['Run Reports', '按 project 整理的 HTML report · 点 Midscene Report 打开'],
        failures: ['Failure Analytics', '按 project + 部门组织的最近失败 case'],
      };
      const [title, sub] = titles[state.section] || titles['run-center'];
      $('#mainTitle').textContent = title;
      $('#mainSub').textContent = sub;
      const panel = $('#mainPanel');
      if (state.section === 'my-projects') return renderMyProjectsSection(panel);
      if (state.section === 'reports') return renderReportsSection(panel);
      if (state.section === 'failures') return renderFailuresSection(panel);
      if (state.section === 'live-channels') return renderLiveChannelsSection(panel);
      if (state.section === 'case-library') return renderCaseLibrarySection(panel);
      // Run Center home — always the Create CTA hero + step-by-step
      // illustrated tutorial. Live runs no longer hijack this view;
      // they live on the Live Channels tab. Kicking off a run from the
      // Create modal auto-navigates the user to Live Channels (see
      // runCases) so they see the broadcast immediately, while the Run
      // Center page itself stays a stable "compose" surface.
      panel.replaceChildren(renderProjectsHero(), renderRunCenterTutorial());
      enableTutorialCalloutEditor(panel);
      return;
      // (unreachable — kept below to preserve legacy error handlers for
      //  the previously rendered Run Console / Recent runs / My Projects
      //  fallbacks if we later want to bring them back.)
      // eslint-disable-next-line no-unreachable
      let consoleNode, projectsNode;
      try { consoleNode = renderRunConsole(); } catch (err) {
        console.error('renderRunConsole threw:', err);
        consoleNode = el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'Run Console · render error'),
          el('div', { class: 'section-content' },
            el('div', { class: 'hint' }, String(err?.message || err)),
            el('button', { class: 'btn', style: 'margin-top:8px;', onclick: () => loadInitial() }, '重新加载'),
          ),
        );
      }
      try { projectsNode = renderMyProjects(); } catch (err) {
        console.error('renderMyProjects threw:', err);
        projectsNode = el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, 'My Projects · render error'),
          el('div', { class: 'section-content' },
            el('div', { class: 'hint' }, String(err?.message || err)),
            el('button', { class: 'btn danger', style: 'margin-top:8px;', onclick: () => {
              if (!confirm('清空保存的 batches 缓存（仅本地存的列表，不影响 case 文件）？')) return;
              localStorage.removeItem('userRunCenter.batches');
              state.batches = [];
              renderAll();
            } }, '清空本地 batches 缓存'),
          ),
        );
      }
      // Recent Runs card sits between the active Run Console and saved
      // projects so the most recent runs are 1 scroll away — never make the
      // user hunt for "where did my last run go?".
      let recentNode = null;
      try { recentNode = renderRecentRunsOnHome(); } catch (err) {
        console.error('renderRecentRunsOnHome threw:', err);
      }
      // Run Center home — focused on creating a new project + recent runs
      // + case library quick-run. My Projects has its own sidebar tab now,
      // so we don't render the projects gallery here.
      const projectsHero = renderProjectsHero();
      const libraryCollapsible = wrapAsLibraryQuickRun(consoleNode);
      panel.replaceChildren(projectsHero, recentNode, libraryCollapsible);
    }

    // Hero card at the top of Run Center home — calls out the new
    // Project-centric model and offers a single big "+ Create Project" CTA.
    function renderProjectsHero() {
      const liveCount = state.batches.filter((b) => projectLiveCount(b) > 0).length;
      const totalProjects = state.batches.length;
      const allBiz = getAllBusinesses();
      const recentBiz = getRecentBusinesses(3);
      const totalBiz = allBiz.length;
      const isOpen = !!state._heroBizOpen;

      // Click toggles a panel below the stats row that lists every business.
      // The preview text always shows the most recent 3 (may truncate); the
      // panel is the full list for when the user wants to see all of them.
      const bizToggle = totalBiz === 0
        ? el('span', {}, el('b', {}, 0), ' businesses · no business yet')
        : el('button', {
            class: 'ph-biz-toggle' + (isOpen ? ' is-open' : ''),
            type: 'button',
            title: isOpen ? '收起' : '点开看全部 business',
            onclick: () => { state._heroBizOpen = !state._heroBizOpen; renderAll(); },
          },
            el('b', {}, totalBiz),
            ' businesses · ',
            recentBiz.join(' · '),
            totalBiz > recentBiz.length ? ' …' : '',
            el('span', { class: 'ph-biz-caret' }, '▾'),
          );

      const bizPanel = isOpen && totalBiz > 0

    function enableTutorialCalloutEditor(root = document) {
      try {
        const params = new URLSearchParams(window.location.search || '');
        if (params.get('tutorialCalloutEdit') === '0') {
          localStorage.setItem('tutorialCalloutEdit', '0');
        } else if (params.get('tutorialCalloutEdit') === '1') {
          localStorage.setItem('tutorialCalloutEdit', '1');
        }
        if (localStorage.getItem('tutorialCalloutEdit') === '0') return;
      } catch {
        return;
      }

      const storageKey = 'saptest.tutorialCalloutOverrides.v1';
      const loadOverrides = () => {
        try { return JSON.parse(localStorage.getItem(storageKey) || '{}') || {}; }
        catch { return {}; }
      };
      const saveOverrides = (next) => {
        try { localStorage.setItem(storageKey, JSON.stringify(next)); } catch {}
      };
      const overrides = loadOverrides();
      if (overrides['5d'] && overrides['5d'].size !== 22) {
        overrides['5d'].size = 22;
        saveOverrides(overrides);
      }

      root.querySelectorAll('.tut-callout[data-tut-callout]').forEach((node) => {
        const key = node.getAttribute('data-tut-callout');
        const saved = overrides[key];
        if (saved) {
          if (saved.left != null) node.style.left = saved.left;
          if (saved.top != null) node.style.top = saved.top;
          if (saved.right != null) node.style.right = saved.right;
          if (saved.bottom != null) node.style.bottom = saved.bottom;
          if (saved.size != null) {
            node.style.width = `${saved.size}px`;
            node.style.height = `${saved.size}px`;
            node.style.fontSize = `${Math.max(8, Math.round(saved.size * 0.45))}px`;
          }
        }
        node.classList.add('is-editing');

        const persist = () => {
          const next = loadOverrides();
          next[key] = {
            left: node.style.left || null,
            top: node.style.top || null,
            right: node.style.right || null,
            bottom: node.style.bottom || null,
            size: Math.round(parseFloat(node.style.width || getComputedStyle(node).width) || node.offsetWidth),
          };
          saveOverrides(next);
        };

        node.addEventListener('pointerdown', (ev) => {
          if (ev.button !== 0) return;
          ev.preventDefault();
          const parent = node.offsetParent;
          if (!parent) return;
          const parentRect = parent.getBoundingClientRect();
          const nodeRect = node.getBoundingClientRect();
          const startX = ev.clientX;
          const startY = ev.clientY;
          const startLeft = nodeRect.left - parentRect.left;
          const startTop = nodeRect.top - parentRect.top;
          let active = true;
          state.tutCalloutDragging = true;
          node.setPointerCapture?.(ev.pointerId);
          const onMove = (moveEv) => {
            if (!active || moveEv.pointerId !== ev.pointerId) return;
            moveEv.preventDefault();
            const nextLeft = startLeft + moveEv.clientX - startX;
            const nextTop = startTop + moveEv.clientY - startY;
            node.style.left = `${(nextLeft / parentRect.width) * 100}%`;
            node.style.top = `${(nextTop / parentRect.height) * 100}%`;
            node.style.right = 'auto';
            node.style.bottom = 'auto';
            persist();
          };
          const finish = (upEv) => {
            if (!active || (upEv?.pointerId != null && upEv.pointerId !== ev.pointerId)) return;
            active = false;
            state.tutCalloutDragging = false;
            document.removeEventListener('pointermove', onMove, true);
            document.removeEventListener('pointerup', finish, true);
            document.removeEventListener('pointercancel', finish, true);
            node.removeEventListener('lostpointercapture', finish);
            try { node.releasePointerCapture?.(ev.pointerId); } catch {}
            persist();
          };
          document.addEventListener('pointermove', onMove, true);
          document.addEventListener('pointerup', finish, true);
          document.addEventListener('pointercancel', finish, true);
          node.addEventListener('lostpointercapture', finish);
        });

        node.addEventListener('wheel', (ev) => {
          ev.preventDefault();
          const current = parseFloat(node.style.width || getComputedStyle(node).width) || node.offsetWidth || 22;
          const nextSize = Math.max(14, Math.min(36, current + (ev.deltaY < 0 ? 1 : -1)));
          node.style.width = `${nextSize}px`;
          node.style.height = `${nextSize}px`;
          node.style.fontSize = `${Math.max(8, Math.round(nextSize * 0.45))}px`;
          persist();
        }, { passive: false });
      });
    }

    // Live takeover — replaces the Run Center home content while ≥1 case is
    // actively running. Big broadcast screen + log + per-run controls.
    function renderLiveTakeover() {
      const c = state.console;
      const liveCases = state.cases.filter((cs) => state.active.some((a) => a.caseId === cs.id));
      // If no cases are running but the just-finished batch has results,
      // pivot to Results Review mode. This is what keeps the failed-case
      // row visible after the last case in a 2-case batch finishes
      // (previously the takeover collapsed to "No active runs" before the
      // finished panel could show, which is why failed cases appeared to
      // "disappear" once both finished).
      if (!liveCases.length) {
        const bp = state.batchProgress;
        if (bp && bp.seenFinishedIds.size > 0) return renderTakeoverReview(bp);
        return el('div', { class: 'empty' }, 'No active runs');
      }
      const active = state.active.filter((a) => liveCases.some((cs) => cs.id === a.caseId));
      if (!state.liveCaseId || !liveCases.some((cs) => cs.id === state.liveCaseId)) {
        state.liveCaseId = active[0]?.caseId || null;
      }
      const preview = active.find((a) => a.caseId === state.liveCaseId) || active[0] || null;
      const previewCase = liveCases.find((cs) => cs.id === preview?.caseId);

      // ── header: title + dept tag + abort all + compose-mode escape ──
      // Find the currently active project (= batch in state.batches whose
      // caseIds overlap state.active) so we can show project name + dept
      // tag in the takeover header.
      const activeProject = state.batches.find((b) => (b.caseIds || []).some((id) => state.active.some((a) => a.caseId === id)));
      const activeBiz = activeProject ? activeProject.business : null;
      const head = el('div', { class: 'takeover-head' },
        el('div', {},
          el('div', { class: 'takeover-title' },
            el('span', { class: 'pulse-dot' }),
            `${liveCases.length} case${liveCases.length === 1 ? '' : 's'} running live`,
            activeProject ? el('span', { style: 'font-size:14px;font-weight:700;color:var(--muted);margin-left:10px;' }, '· ' + (activeProject.name || activeProject.id)) : null,
            activeBiz ? el('span', { class: 'project-biz-tag', style: 'margin-left:8px;font-size:11px;' }, activeBiz) : null,
          ),
          el('div', { class: 'takeover-sub' }, 'Run Console 暂时隐藏 · 跑完自动回到选 case 视图，或者手动点 Compose new run'),
        ),
        el('div', { class: 'takeover-actions' },
          el('button', {
            class: 'btn ghost',
            onclick: () => {
              c.forceComposeMode = true;
              state.section = 'run-center';
              renderAll();
            },
          }, '＋ Compose new run'),
          el('button', {
            class: 'btn abort-big',
            onclick: () => openAbortModal(liveCases.map((cs) => cs.id)),
          }, `⏹ Abort ${liveCases.length}…`),
        ),
      );

      // ── flip chips ───────────────────────────────────────────────────
      const chips = el('div', { class: 'takeover-chips' },
        ...liveCases.map((cs) => {
          const a = state.active.find((x) => x.caseId === cs.id);
          const stepStr = a?.currentStep ? `${a.currentStep.order}/${a.totalSteps}` : '…';
          return el('button', {
            class: 'flip-chip' + (state.liveCaseId === cs.id ? ' active' : ''),
            onclick: () => { state.liveCaseId = cs.id; renderAll(); },
          },
            el('span', { class: 'pulse-dot' }),
            el('span', { class: 'flip-chip-id' }, cs.id),
            el('span', { class: 'flip-chip-step' }, `step ${stepStr}`),
          );
        }),
      );

      // ── screen ───────────────────────────────────────────────────────
      // Initial src = last cached shot for this runId (if any). Avoids the
      // blink-to-fallback that used to happen on every 2.5s poll re-render.
      const cachedShot = preview?.runId ? state.liveShotCache.get(preview.runId) : null;
      const screen = el('div', { class: 'takeover-screen', id: 'liveScreenBig' },
        el('img', { id: 'liveShot', alt: 'Live browser', src: cachedShot || FALLBACK_SCREENSHOT, onerror: (ev) => ev.target.remove() }),
        el('div', { class: 'takeover-overlay' },
          el('b', {}, preview?.caseTitle || (previewCase ? caseTitle(previewCase) : '?')),
          el('div', {}, preview?.currentStep
            ? `Step ${preview.currentStep.order}/${preview.totalSteps} · ${preview.currentStep.title || preview.currentStep.api || ''}`
            : 'Waiting for first step…'),
        ),
      );

      // ── Live log tail ────────────────────────────────────────────────
      // /api/midscene-js/runs/active returns logTail per run (last ~30 lines).
      // Show the current preview's tail, auto-scrolled to bottom after mount.
      // Wrapper ID is takeover-specific so it doesn't collide with the
      // smaller panel's #liveLogBox.
      const logLines = preview?.logTail || [];
      const logBox = el('div', { class: 'live-log-wrap' },
        el('div', { class: 'live-log-head' },
          el('span', {}, 'Live log'),
          preview ? el('span', { class: 'hint' }, `run: ${(preview.runId || '?').slice(0, 8)}… · 最近 ${logLines.length} 行`) : null,
        ),
        logLines.length
          ? el('div', { class: 'live-log', id: 'liveLogBoxTakeover' },
              ...logLines.map((entry) => el('div', { class: 'live-log-line' },
                el('span', { class: 'live-log-ts' }, entry.ts ? new Date(entry.ts).toLocaleTimeString() : ''),
                el('span', { class: 'live-log-msg' }, entry.line || entry.message || JSON.stringify(entry)),
              )),
            )
          : el('div', { class: 'live-log empty' }, preview ? '等待第一条 log…' : '启动 case 后这里实时输出 runner log'),
      );

      // ── Finished in this batch panel ─────────────────────────────────
      // Built by buildFinishedPanel() — shared between live takeover and
      // results-review takeover. Rows are clickable → openResultDetailModal.
      const bp = state.batchProgress;
      const finishedPanel = buildFinishedPanel(bp);

      // Defer screenshot hydration + log-tail scroll so DOM is mounted first.
      setTimeout(() => {
        hydrateLiveShot(preview);
        const lb = document.getElementById('liveLogBoxTakeover');
        if (lb) lb.scrollTop = lb.scrollHeight;
      }, 0);

      return el('div', { class: 'takeover' },
        head,
        liveCases.length > 1 ? chips : null,
        screen,
        logBox,
        finishedPanel,
      );
    }

    // ── Results Review takeover ─────────────────────────────────────────
    // Shown after a batch fully finishes, in place of the live broadcast.
    // Keeps the run-center page on the result set (no auto-jump) so the
    // user can click each case to see why it passed/failed.
    function renderTakeoverReview(bp) {
      let pass = 0; let fail = 0;
      for (const id of bp.seenFinishedIds) {
        const r = findBatchResult(id, bp);
        if (r?.status === 'passed') pass += 1; else fail += 1;
      }
      // ONE-TIME 5s celebration — animation-delay is set to negative
      // elapsed so the animation resumes (not restarts) on re-renders.
      const elapsedMs = bp.celebratedAt ? (Date.now() - bp.celebratedAt) : Infinity;
      const showCelebrate = elapsedMs < 5000;
      const head = el('div', {
        class: 'takeover-head' + (showCelebrate ? ' batch-done-flash' : ''),
        style: showCelebrate ? `animation-delay: -${elapsedMs}ms;` : '',
      },
        el('div', {},
          el('div', { class: 'takeover-title' },
            el('span', { class: 'finished-badge', style: 'width:22px;height:22px;font-size:13px;background:' + (fail ? '#dc2626' : '#16a34a') }, fail ? '✗' : '✓'),
            ` Batch done · ${pass} passed · ${fail} failed`,
          ),
          el('div', { class: 'takeover-sub' }, '点 case 查看 why · 看历史 batch 点右侧 ← Back · 跑下一批就点 Compose new run'),
        ),
        el('div', { class: 'takeover-actions' },
          // Back to the recent-broadcasts list (the 5/10/20 historical
          // batches view). Clears batchProgress so the Live Channels
          // idle render path takes over, but stays on this tab.
          el('button', {
            class: 'btn ghost',
            title: '回到最近 N 个 batch 的列表视图',
            onclick: () => {
              state.batchProgress = null;
              if (state.console) state.console.forceComposeMode = false;
              // Stay on 'live-channels' so we land on the idle list view.
              renderAll();
            },
          }, '← Back to recent broadcasts'),
          el('button', {
            class: 'btn ghost',
            onclick: () => {
              state.batchProgress = null;
              if (state.console) state.console.forceComposeMode = true;
              state.section = 'run-center';
              renderAll();
            },
          }, '＋ Compose new run'),
        ),
      );
      return el('div', { class: 'takeover' },
        head,
        // suppressAnimation = once the batch is done, every 2.5s poll
        // re-renders this view. Without no-anim the row-pop replays
        // every tick and the panel keeps flashing.
        buildFinishedPanel(bp, { reviewMode: true, suppressAnimation: true }),
      );
    }

    // Lookup helper — finds the run record that belongs to this batch
    // (caseId match + finishedAt after batch start). Centralised so live
    // and review modes agree on what "the result of case X" is.
    function findBatchResult(caseId, bp) {
      if (!bp) return null;
      return state.recent.find((r) => r.caseId === caseId
        && r.finishedAt
        && new Date(r.finishedAt).getTime() >= bp.startedAt) || null;
    }

    // Live outcome for a batch — derived from state.recent (the same source
    // the detail rows use) so the status pill agrees with what the user sees
    // when they expand the card. Falls back to the stored batch.passed /
    // batch.failed totals when state.recent has no data for any case in the
    // batch (e.g. very old batch that's rolled off the recent runs cache).
    //
    // This is what fixes the "I reran the single failed case and it passed,
    // but the title pill still says 1/2 case fail" gap — single-case reruns
    // never touched batch.passed / batch.failed (only the batch-aware
    // runCases path does), but the case's new passed run lands in
    // state.recent, so reading from there gives a consistent view.
    function computeBatchOutcome(batch) {
      const total = batch?.caseIds?.length || 0;
      const bp = {
        batchId: batch?.id,
        totalIds: new Set(batch?.caseIds || []),
        seenFinishedIds: new Set(batch?.caseIds || []),
        startedAt: new Date(batch?.createdAt || Date.now()).getTime(),
      };
      let livePassed = 0, liveFailed = 0, foundAny = 0;
      for (const id of (batch?.caseIds || [])) {
        const r = findBatchResult(id, bp);
        if (!r) continue;
        foundAny += 1;
        if (r.status === 'passed') livePassed += 1;
        else liveFailed += 1;
      }
      const passed = foundAny > 0 ? livePassed : (batch?.passed || 0);
      const failed = foundAny > 0 ? liveFailed : (batch?.failed || 0);
      const allPassed = total > 0 && failed === 0 && passed === total;
      return { passed, failed, total, allPassed };
    }

    // Shared builder for the "Finished in this batch" list — used by both
    // the live takeover (cases finishing while others still run) and the
    // results-review takeover (every case has finished). Rows are
    // clickable; the modal shows the why + last screenshot.
    // Per-row "just finished" highlight window — once a case finishes,
    // its row glows for this many ms, then goes quiet. State-driven via
    // bp.finishTimes so the highlight survives the 2.5s poll re-render
    // (we use animation-delay = -elapsed so the CSS animation resumes
    // at its current frame instead of restarting on each re-render).
    const FINISH_GLOW_MS = 4000;

    function buildFinishedPanel(bp, opts = {}) {
      if (!bp || bp.seenFinishedIds.size === 0) return null;
      const finishTimes = bp.finishTimes || new Map();
      // Entry-pop ("finished-pop") is ALWAYS suppressed now — it was
      // re-firing on every 2.5s poll, which is exactly the flashing
      // the user kept complaining about. The "just finished" signal
      // is the per-row glow below, which has a proper time-bounded
      // window via finishTimes + animation-delay.
      const finishedRows = [...bp.seenFinishedIds].map((id) => {
        const cs = state.cases.find((c) => c.id === id);
        const result = findBatchResult(id, bp);
        const passed = result?.status === 'passed';
        const detailHint = passed
          ? `跑成功 · ${result?.durationMs ? (Math.round(result.durationMs / 100) / 10) + 's' : ''} · 点击查看 why`
          : `失败原因: ${(result?.errorMessage || '未知').slice(0, 120)} · 点击查看 why`;
        // Resume-not-restart glow: if this case finished < 4s ago, add
        // the glow class and a negative animation-delay equal to the
        // elapsed time — the CSS animation will pick up where it left
        // off across re-renders, then settle into its "100% empty"
        // final state when the timer runs out.
        const finTime = finishTimes.get(id);
        const elapsed = finTime ? Date.now() - finTime : Infinity;
        const showGlow = elapsed < FINISH_GLOW_MS;
        const glowClass = showGlow ? (passed ? ' row-glow-pass' : ' row-glow-fail') : '';
        const styleStr = showGlow ? `animation-delay: -${elapsed}ms;` : '';
        return el('div', {
          class: 'finished-row is-clickable' + (passed ? ' is-pass' : ' is-fail') + glowClass,
          style: styleStr,
          dataset: { finishedId: id },
          onclick: () => openResultDetailModal({ caseId: id, caseObj: cs, result }),
        },
          el('div', { class: 'finished-badge' }, passed ? '✓' : '✗'),
          el('div', { style: 'min-width:0; flex:1;' },
            el('div', { style: 'font-weight:900; color:var(--navy); font-size:13px;' }, id, cs ? ` · ${caseTitle(cs)}` : ''),
            el('div', { class: 'hint', style: 'font-size:11px; margin-top:1px;' }, detailHint),
          ),
          result?.report?.url
            ? el('button', { class: 'btn mini', onclick: (ev) => { ev.stopPropagation(); window.open(result.report.url, '_blank'); } }, 'Report')
            : null,
          // Log button removed — feature is broken everywhere.
          el('button', { class: 'btn mini', onclick: (ev) => { ev.stopPropagation(); openRunModal([id], { name: `Re-run ${id}`, title: '重跑这一个 case' }); } }, '↺ Run again'),
        );
      });
      const headLabel = opts.reviewMode
        ? `Results · ${bp.seenFinishedIds.size} of ${bp.totalIds.size} done`
        : `Finished in this batch · ${bp.seenFinishedIds.size} of ${bp.totalIds.size}`;
      // ALWAYS apply .no-anim now (was conditional on suppressAnimation,
      // but the un-suppressed path was just a permanent flicker).
      return el('div', { class: 'finished-panel no-anim' },
        el('div', { class: 'finished-head' },
          el('span', { style: 'font-weight:900; color:var(--navy);' }, headLabel),
          el('span', { class: 'hint' }, '点 case 看 why · 跑完的 case 按完成顺序加到最下面'),
        ),
        ...finishedRows,
      );
    }

    // Compose a multi-line "why it passed" string. Pulls the real
    // assertion records (left/op/right + captured values), variables and
    // downloads out of runSummary so the user sees the actual reason the
    // case is green, not a placeholder "all steps passed" line.
    // `detail` (optional) is the full case detail fetched via /api/cases/:id.
    // When present, we can pull out aiAssert step titles to render in place
    // of "no explicit assertions" — see the `else` branch below.
    function buildPassSummary(result, durationStr, detail) {
      const sum = result?.runSummary || {};
      const asserts = Array.isArray(sum.assertions) ? sum.assertions : [];
      const vars = sum.variables && typeof sum.variables === 'object' ? sum.variables : {};
      const downloads = Array.isArray(sum.downloads) ? sum.downloads : [];
      const lines = [];

      if (asserts.length > 0) {
        lines.push(`✓ ${asserts.length} 个断言全部成立：`);
        for (const a of asserts) {
          const op = a.operator ?? (a.equal ? '==' : '!=');
          lines.push(`  • ${a.left} = ${a.leftValue}  ${op}  ${a.right} = ${a.rightValue}`);
        }
      } else {
        // No local-comparison assertions captured. Look at the case's
        // apiGuide for aiAssert steps — those don't write to
        // runSummary.assertions (Midscene's AI assert path doesn't push
        // to ctx.summary), but since the run passed, every aiAssert in
        // the case must have passed too. Pull the step's NL text so the
        // user sees what was actually verified, not just "no assertion".
        const apiSteps = detail?.parsed?.apiGuide?.steps
          || detail?.apiGuide?.steps
          || [];
        const aiAsserts = apiSteps.filter((s) =>
          String(s?.midsceneApi || '').toLowerCase().includes('aiassert'));
        if (aiAsserts.length > 0) {
          lines.push(`✓ ${aiAsserts.length} 个 AI 断言全部通过：`);
          for (const s of aiAsserts) {
            const instr = String(s.naturalLanguageInstruction || s.title || '').trim();
            const shown = instr.length > 100 ? instr.slice(0, 97) + '…' : instr;
            lines.push(`  • step ${s.order}: ${shown}`);
          }
        }
      }

      const varEntries = Object.entries(vars);
      if (varEntries.length > 0) {
        if (lines.length) lines.push('');
        lines.push(lines.length ? '页面采集到的变量：' : `✓ 页面采集到 ${varEntries.length} 个变量：`);
        for (const [k, v] of varEntries) lines.push(`  • ${k} = ${v}`);
      }

      if (downloads.length > 0) {
        if (lines.length) lines.push('');
        lines.push(`下载了 ${downloads.length} 个文件：`);
        for (const d of downloads) {
          const kb = d.sizeBytes != null ? (d.sizeBytes / 1024).toFixed(1) + ' KB' : '';
          lines.push(`  • ${d.fileName}${kb ? ' (' + kb + ')' : ''}`);
        }
      }

      if (!lines.length) lines.push('所有步骤执行完毕（既无显式断言也无变量 / 下载）。');

      if (lines.length) lines.push('');
      lines.push(`总用时 ${durationStr}`);
      return lines.join('\n');
    }

    // ── Result detail modal ─────────────────────────────────────────────
    // Pops on click of a finished row. Shows pass/fail badge, duration,
    // the why (full error message or rich pass summary), the last
    // screenshot, and the Report / Run again actions.
    function openResultDetailModal({ caseId, caseObj, result }) {
      const passed = result?.status === 'passed';
      const backdrop = el('div', { class: 'modal-backdrop', onclick: (ev) => {
        if (ev.target === backdrop) close();
      } });
      function close() { backdrop.remove(); document.removeEventListener('keydown', onKey); }
      function onKey(ev) { if (ev.key === 'Escape') close(); }
      document.addEventListener('keydown', onKey);

      const durationStr = result?.durationMs ? (Math.round(result.durationMs / 100) / 10) + 's' : '—';
      const finishedAt = result?.finishedAt ? new Date(result.finishedAt).toLocaleString() : '—';

      // The pass-summary text needs the case's parsed apiGuide to surface
      // aiAssert step titles (since AI assertions don't write to
      // runSummary.assertions). We render the summary into a node so we
      // can async-replace its text once the detail fetch lands.
      const reasonNode = el('div', { class: 'rd-reason' });
      const refreshReason = (detail) => {
        reasonNode.textContent = passed
          ? buildPassSummary(result, durationStr, detail)
          : (result?.errorMessage || '未知失败原因（runner 没有抛出 errorMessage）');
      };
      // Initial render with whatever detail is already cached (often null).
      refreshReason(state.details.get(caseId) || null);
      // Async-load the case detail so AI-assert step titles can appear.
      if (passed && !state.details.has(caseId)) {
        loadDetail(caseId).then((d) => refreshReason(d)).catch(() => {});
      }

      const screenshotImg = el('img', { class: 'rd-screenshot', alt: 'Last screenshot', src: FALLBACK_SCREENSHOT });
      // Async-fetch the run's last screenshot — same endpoint as live.
      (async () => {
        if (!result?.runId) return;
        try {
          const shots = await api('/api/midscene-js/runs/' + encodeURIComponent(result.runId) + '/screenshots');
          const latest = (shots.screenshots || []).slice().sort((a, b) => b.order - a.order)[0];
          if (latest?.url) screenshotImg.src = latest.url + '?t=' + Date.now();
        } catch {}
      })();

      const modal = el('div', { class: 'modal result-detail-modal' + (passed ? ' is-pass' : ' is-fail') },
        el('div', { class: 'rd-head' },
          el('div', { class: 'rd-badge' }, passed ? '✓' : '✗'),
          el('div', { style: 'flex:1; min-width:0;' },
            el('div', { class: 'rd-title' }, `${caseId}${caseObj ? ' · ' + caseTitle(caseObj) : ''}`),
            el('div', { class: 'rd-sub' }, passed ? `Passed · ${durationStr} · ${finishedAt}` : `Failed · ${durationStr} · ${finishedAt}`),
          ),
          el('button', { class: 'rd-close', onclick: close, 'aria-label': 'Close' }, '✕'),
        ),
        el('div', { class: 'rd-body' },
          el('div', { style: 'margin-bottom: 14px;' },
            el('div', { class: 'rd-section-title' }, passed ? 'Pass summary' : 'Why it failed'),
            reasonNode,
          ),
          el('div', { style: 'margin-bottom: 14px;' },
            el('div', { class: 'rd-section-title' }, 'Last screenshot'),
            screenshotImg,
          ),
          el('div', {},
            el('div', { class: 'rd-section-title' }, 'Run stats'),
            el('div', { class: 'rd-stats' },
              el('div', { class: 'rd-stat' }, el('b', {}, durationStr), el('span', {}, 'duration')),
              el('div', { class: 'rd-stat' }, el('b', {}, result?.runId?.slice(-12) || '—'), el('span', {}, 'run id (tail)')),
              el('div', { class: 'rd-stat' }, el('b', {}, finishedAt), el('span', {}, 'finished at')),
            ),
          ),
        ),
        el('div', { class: 'rd-foot' },
          result?.report?.url
            ? el('button', { class: 'btn primary', onclick: () => window.open(result.report.url, '_blank') }, 'Open Report')
            : null,
          el('button', { class: 'btn', onclick: () => { close(); openRunModal([caseId], { name: `Re-run ${caseId}`, title: '重跑这一个 case' }); } }, '↺ Run again'),
          el('button', { class: 'btn ghost', onclick: close }, 'Close'),
        ),
      );
      backdrop.appendChild(modal);
      document.body.appendChild(backdrop);
    }

    // Live Channels (sidebar section) — unified live/recent view.
    //   · Active runs → reuse the live takeover (broadcast + chips + log).
    //   · No active but a batch just finished → reuse the review takeover
    //     so the user still sees the last project's pass/fail breakdown,
    //     screenshots and per-case detail buttons.
    //   · Truly idle → show the last N completed batches (user-pickable
    //     count via the chip selector). suppressAnimation passes to
    //     buildFinishedPanel so the pop animation doesn't replay on each
    //     2.5s poll re-render.
    function renderLiveChannelsSection(panel) {
      const haveActive = state.active.length > 0;
      const haveReview = !haveActive && state.batchProgress && state.batchProgress.seenFinishedIds.size > 0;
      if (haveActive || haveReview) {
        try { panel.replaceChildren(renderLiveTakeover()); return; } catch (e) { console.error('renderLiveTakeover threw:', e); }
      }
      // Idle — show N most recent finished batches, newest first. Sort by
      // updatedAt (so reruns float to the top) falling back to createdAt
      // for batches that have never been rerun.
      const finishedBatches = state.batches
        .filter((b) => b.status === 'passed' || b.status === 'failed')
        .slice()
        .sort((a, b) => {
          const at = String(a.updatedAt || a.createdAt || '');
          const bt = String(b.updatedAt || b.createdAt || '');
          return bt.localeCompare(at);
        });
      if (!finishedBatches.length) {
        panel.replaceChildren(el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, el('span', {}, 'Live Channels'),
            el('span', { class: 'hint' }, '没在跑，也没有历史 batch')),
          el('div', { class: 'section-content' },
            el('div', { class: 'empty' }, '当前没有正在跑的 case，也没有历史回放可显示。',
              el('br', {}),
              '去 Run Center 跑一次试试。'),
          ),
        ));
        return;
      }
      // How many recent batches to show — persisted; default 5. "1" was
      // dropped as an option (too narrow for a useful overview), and any
      // saved value of 1 from before this change is normalized up to 5.
      if (!state.liveChannelsShow || state.liveChannelsShow < 5) state.liveChannelsShow = 5;
      const showOptions = [5, 10, 20];
      const limit = state.liveChannelsShow;
      const slice = finishedBatches.slice(0, limit);

      const selector = el('div', { class: 'lc-show-selector' },
        el('span', { style: 'font-size:12px;color:var(--muted);margin-right:8px;' }, '显示最近：'),
        ...showOptions.map((n) => el('button', {
          class: 'lc-show-chip' + (n === limit ? ' active' : ''),
          onclick: () => { state.liveChannelsShow = n; renderAll(); },
        }, String(n))),
        el('span', { style: 'margin-left:auto;font-size:11px;color:var(--muted);' }, `共 ${finishedBatches.length} 个历史 batch`),
      );

      // Each broadcast card is independently collapsible — defaults to
      // EXPANDED for the newest 1 (so the user always sees the latest
      // result), COLLAPSED for older ones to keep the page tidy.
      state.lcExpanded = state.lcExpanded || new Set();
      if (slice[0] && !state.lcExpanded.has('seen-' + slice[0].id)) {
        state.lcExpanded.add(slice[0].id);
        state.lcExpanded.add('seen-' + slice[0].id);
      }

      const cards = slice.map((batch) => {
        const bp = {
          batchId: batch.id,
          totalIds: new Set(batch.caseIds || []),
          seenFinishedIds: new Set(batch.caseIds || []),
          startedAt: new Date(batch.createdAt || Date.now()).getTime(),
        };
        const when = batch.updatedAt || batch.createdAt;
        const biz = batch.business;
        const isOpen = state.lcExpanded.has(batch.id);
        // Counts derived from state.recent so single-case reruns and
        // standalone "Run again" actions show up here without having to
        // re-run the full batch. See computeBatchOutcome doc above.
        const outcome = computeBatchOutcome(batch);
        const total = outcome.total;

        const title = el('div', {
          class: 'section-title lc-broadcast-title' + (isOpen ? ' is-open' : ''),
          onclick: () => {
            if (isOpen) state.lcExpanded.delete(batch.id);
            else state.lcExpanded.add(batch.id);
            renderAll();
          },
        },
          (() => {
            // Pass/fail pill that matches the My Projects card style:
            // green `all cases pass` when every case's latest run passes,
            // red `Recent run: N/M case fail` when anything failed.
            const resultPill = el('span', {
              class: 'pj-result-tag ' + (outcome.allPassed ? 'is-passed' : 'is-failed'),
              style: 'margin-left:10px; margin-top:0;',
            }, outcome.allPassed ? 'all cases pass' : `Recent run: ${outcome.failed}/${total} case fail`);
            return el('span', { class: 'lc-title-main' },
              el('span', { class: 'lc-caret' }, isOpen ? '▾' : '▸'),
              batch.name || batch.id,
              biz ? el('span', { class: 'project-biz-tag', style: 'margin-left:8px;' }, biz) : null,
              resultPill,
              when ? el('span', { class: 'hint', style: 'margin-left:10px;' },
                '· ' + new Date(when).toLocaleString()) : null,
            );
          })(),
          el('div', { class: 'lc-broadcast-actions' },
            // Re-run the whole batch (reuses the project/batch id so the
            // existing batch record gets a new run cycle).
            (batch.caseIds || []).length ? el('button', {
              class: 'btn mini primary',
              title: '用同样的 case 集合再跑一次',
              onclick: (ev) => {
                ev.stopPropagation();
