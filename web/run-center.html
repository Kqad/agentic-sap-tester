          el('th', {}, 'Project'), el('th', {}, '部门'), el('th', {}, 'Case'),
          el('th', {}, '状态'),   el('th', {}, '时间'),  el('th', {}, 'Report'))),
        el('tbody', {}, el('tr', {},
          el('td', {}, snap.project?.name || snap.project?.id || '—'),
          el('td', {}, snap.project?.business || '—'),
          el('td', {}, snap.caseLabel || '—'),
          el('td', {}, typeof statusLabel === 'function' ? statusLabel(snap.status || 'pending') : (snap.status || '—')),
          el('td', {}, snap.when || '—'),
          el('td', {}, snap.url
            ? el('button', {
                class: 'agent-query-jump-btn',
                onclick: () => window.open(snap.url, '_blank', 'noopener'),
              }, '打开 report')
            : '—'),
        )),
      ));
      const footer = el('div', { class: 'agent-query-footer' });
      if (snap.project?.id) {
        footer.appendChild(el('button', {
          class: 'agent-query-jump-btn',
          title: '切到 My Projects 并高亮这个 project 卡片',
          onclick: (ev) => {
            ev.currentTarget.blur();
            if (typeof workToggle === 'function') workToggle(false);
            state.tab = 'run'; state.section = 'my-projects'; renderAll();
            setTimeout(() => {
              agentHighlightNewProjects(
                [{ id: snap.project.id, name: snap.project.name }],
                { idsOnly: true },
              );
              window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 320);
          },
        }, '🎯 在 My Projects 中定位高亮'));
      }
      footer.appendChild(el('span', { class: 'agent-query-footer-count' },
        '快照 · Reports 视图可能已改变'));
      wrap.appendChild(footer);
      return wrap;
    }
    // Dispatcher — return a DOM node for a saved snapshot, or null for
    // unknown / malformed shapes. Falls back to null (silently drop)
    // rather than throwing so one bad snapshot doesn't break the chat.
    function renderAgentSnapshot(snap) {
      if (!snap || typeof snap !== 'object') return null;
      try {
        switch (snap.kind) {
          case 'queryTable':
            return snap.result ? agentRenderQueryTable(snap.result) : null;
          case 'projectRun':
            return Array.isArray(snap.projects)
              ? agentRenderProjectRunCard(snap.projects, snap.headline || '')
              : null;
          case 'liveRuns':
            return renderLiveRunsSnapshot(snap);
          case 'reportOpened':
            return renderReportOpenedSnapshot(snap);
          default:
            return null;
        }
      } catch (err) {
        console.warn('[agent] renderAgentSnapshot failed:', err);
        return null;
      }
    }

    // "YYYY-MM-DD HH:MM:SS" (local). Used by the CSV export path only —
    // cards keep the shorter locale date to save horizontal space.
    function formatDateTimeSec(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '';
      const p = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} `
           + `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
    }
    // Toggle an inline expansion row directly below the cell the user
    // clicked. Sits inside the same <table> so scroll / layout stays
    // anchored to the AI Workbench card — no floating modal.
    function agentToggleExpandRow(btn, cfg, colCount) {
      const currentTr = btn.closest('tr');
      if (!currentTr || !currentTr.parentNode) return;
      const next = currentTr.nextElementSibling;
      if (next && next.classList.contains('agent-query-expand-row')) {
        next.remove();
        btn.classList.remove('is-open');
        return;
      }
      const expansion = el('tr', { class: 'agent-query-expand-row' },
        el('td', {
          class: 'agent-query-expand-cell',
          colspan: String(colCount || 1),
        }, agentBuildInlineCaseList(cfg)),
      );
      currentTr.parentNode.insertBefore(expansion, currentTr.nextElementSibling);
      btn.classList.add('is-open');
    }
    // Case list content used by the inline expansion row. Mirrors the
    // modal renderer (id + resolved title + category) but no title bar /
    // close button — those are unnecessary inside the table. Each row
    // carries the category's original CATEGORY_RULES color so the visual
    // matches the chips users see everywhere else (Case Library, project
    // cards, workbench category picker).
    function agentBuildInlineCaseList(cfg) {
      const caseIds = Array.isArray(cfg?.caseIds) ? cfg.caseIds : [];
      const items = caseIds.map((id) => {
        const cs = (state.cases || []).find((c) => c.id === id);
        const t = cs && typeof caseTitle === 'function' ? caseTitle(cs) : (cs?.title || '');
        const catKey = cs && typeof categorizeCase === 'function' ? categorizeCase(cs) : '';
        const catInfo = catKey && typeof categoryMeta === 'function'
          ? (categoryMeta(catKey) || null) : null;
        return {
          id,
          title: t || '(未在 Case Library 中找到)',
          cat: catInfo?.label || catKey || '',
          catColor: catInfo?.color || 'var(--g-gray-50)',
        };
      });
      if (!items.length) {
        return el('div', { class: 'agent-query-expand-empty' }, '空列表');
      }
      return el('div', { class: 'agent-query-expand-inline' },
        cfg?.title
          ? el('div', { class: 'agent-query-expand-inline-title' }, cfg.title)
          : null,
        el('div', { class: 'agent-expand-list' },
          ...items.map((it) => el('div', {
            class: 'agent-expand-item',
            style: `border-left: 3px solid ${it.catColor};`,
          },
            el('span', { class: 'id', style: `color: ${it.catColor};` }, it.id),
            el('span', { class: 'title' }, it.title),
            it.cat
              ? el('span', {
                  class: 'cat cat-chip',
                  style: `background: ${it.catColor}; color: #fff;`,
                }, it.cat)
              : null,
          )),
        ),
      );
    }

    // Modal that lists the specific items behind a clickable number.
    // cfg = { title, subtitle, caseIds }  →  looks up state.cases so each
    // row shows id + title + category. Falls back gracefully when a case
    // no longer exists in the library (was renamed / deleted).
    // (Retained for other call sites; queryEntities / queryStats now use
    // the inline row expansion above.)
    function agentShowExpandPopover(cfg) {
      const caseIds = Array.isArray(cfg?.caseIds) ? cfg.caseIds : [];
      const items = caseIds.map((id) => {
        const cs = (state.cases || []).find((c) => c.id === id);
        const t = cs && typeof caseTitle === 'function' ? caseTitle(cs) : (cs?.title || '');
        const catKey = cs && typeof categorizeCase === 'function' ? categorizeCase(cs) : '';
        const catLabel = catKey && typeof categoryMeta === 'function'
          ? (categoryMeta(catKey)?.label || catKey) : catKey;
        return { id, title: t || '(未在 Case Library 中找到)', cat: catLabel || '' };
      });
      const backdrop = el('div', { class: 'modal-backdrop', onclick: (ev) => {
        if (ev.target === backdrop) close();
      }});
      function close() { backdrop.remove(); document.removeEventListener('keydown', onKey); }
      function onKey(ev) { if (ev.key === 'Escape') close(); }
      document.addEventListener('keydown', onKey);
      const modal = el('div', { class: 'modal', style: 'width:min(560px,calc(100vw - 28px));' },
        el('div', { class: 'modal-head' },
          el('div', {},
            el('div', { class: 'title' }, cfg?.title || '详情'),
            cfg?.subtitle ? el('div', { class: 'sub' }, cfg.subtitle) : null,
          ),
          el('button', { class: 'agent-query-jump-btn', onclick: close }, '关闭'),
        ),
        el('div', { class: 'modal-body', style: 'padding:0;' },
          items.length
            ? el('div', { class: 'agent-expand-list' }, ...items.map((it) => el('div', { class: 'agent-expand-item' },
                el('span', { class: 'id' }, it.id),
                el('span', { class: 'title' }, it.title),
                it.cat ? el('span', { class: 'cat' }, it.cat) : null,
              )))
            : el('div', { style: 'padding:20px;color:var(--muted);text-align:center;' }, '空列表'),
        ),
      );
      backdrop.appendChild(modal);
      document.body.appendChild(backdrop);
    }

    function agentExecuteQueryStats(args) {
      const groupBy = args?.groupBy;
      const countOf = args?.countOf;
      const filter = args?.filter || {};
      const title = args?.title || `统计 · ${groupBy} / ${countOf}`;
      const groups = new Map();
      let columns = [];
      let columnsExport = null;
      let rows = [];

      // Pre-filter batches once — every countOf branch reads from this.
      // (case-count case: we still walk state.cases for `category/case`,
      // where per-project filters don't apply.)
      const batchesFiltered = (state.batches || []).filter((b) => {
        if (!b || b.isPreset) return false;
        if (filter.business && !projectMatchesBusinessFilter(b, filter.business)) return false;
        if (filter.status && !projectMatchesStatus(b, filter.status)) return false;
        if ((filter.runDateStart || filter.runDateEnd)
            && !projectRunDateWithin(b, filter.runDateStart, filter.runDateEnd)) return false;
        if ((filter.createdDateStart || filter.createdDateEnd)
            && !projectCreatedDateWithin(b, filter.createdDateStart, filter.createdDateEnd)) return false;
        return true;
      });

      if (groupBy === 'category' && countOf === 'case') {
        // Cases don't have status/date of their own — only apply per-project
        // filters transitively: count cases that belong to at least one
        // matching project. Falls back to all cases when no filter given.
        const anyFilter = filter.business || filter.status
          || filter.runDateStart || filter.runDateEnd
          || filter.createdDateStart || filter.createdDateEnd;
        const scopedCaseIds = anyFilter
          ? new Set(batchesFiltered.flatMap((b) => b.caseIds || []))
          : null;
        for (const c of state.cases || []) {
          if (scopedCaseIds && !scopedCaseIds.has(c.id)) continue;
          const k = categorizeCase(c);
          groups.set(k, (groups.get(k) || 0) + 1);
        }
        columns = [{ key: 'group', label: '分类' }, { key: 'count', label: 'Case 数' }];
        rows = [...groups].sort((a, b) => b[1] - a[1]).map(([k, v]) => ({
          group: (typeof categoryMeta === 'function' ? categoryMeta(k)?.label : null) || k,
          count: v,
        }));
      } else if (groupBy === 'category' && countOf === 'project') {
        for (const b of batchesFiltered) {
          const cats = new Set();
          for (const id of (b.caseIds || [])) {
            const cs = (state.cases || []).find((c) => c.id === id);
            if (cs) cats.add(categorizeCase(cs));
          }
          for (const k of cats) groups.set(k, (groups.get(k) || 0) + 1);
        }
        columns = [{ key: 'group', label: '分类' }, { key: 'count', label: 'Project 数' }];
        rows = [...groups].sort((a, b) => b[1] - a[1]).map(([k, v]) => ({
          group: (typeof categoryMeta === 'function' ? categoryMeta(k)?.label : null) || k,
          count: v,
        }));
      } else if (groupBy === 'business' && countOf === 'project') {
        // Track {projectCount, caseSet} per business so the row can show
        // BOTH numbers (project count for the answer, case count as an
        // at-a-glance depth signal + drill-in to the specific case list).
        const stats = new Map();
        for (const b of batchesFiltered) {
          const biz = String(b.business || '(无部门)');
          const s = stats.get(biz) || { projectCount: 0, caseSet: new Set() };
          s.projectCount += 1;
          (b.caseIds || []).forEach((id) => s.caseSet.add(id));
          stats.set(biz, s);
        }
        columns = [
          { key: 'group',     label: '部门' },
          { key: 'count',     label: 'Project 数' },
          { key: 'caseCount', label: 'Case 数 (去重)' },
        ];
        columnsExport = [
          ...columns,
          { key: 'caseIdsJoined', label: 'Case IDs' },
        ];
        rows = [...stats]
          .sort((a, b) => b[1].projectCount - a[1].projectCount)
          .map(([biz, s]) => {
            const caseIds = [...s.caseSet];
            return {
              group: biz,
              count: s.projectCount,
              caseCount: caseIds.length,
              caseIdsJoined: caseIds.join(', '),
              _expand: caseIds.length
                ? { caseCount: { title: `${biz} · ${caseIds.length} cases`, caseIds } }
                : null,
            };
          });
      } else if (groupBy === 'business' && countOf === 'case') {
        const sets = new Map();
        for (const b of batchesFiltered) {
          const biz = String(b.business || '(无部门)');
          const set = sets.get(biz) || new Set();
          (b.caseIds || []).forEach((id) => set.add(id));
          sets.set(biz, set);
        }
        columns = [{ key: 'group', label: '部门' }, { key: 'count', label: 'Case 数 (去重)' }];
        columnsExport = [
          ...columns,
          { key: 'caseIdsJoined', label: 'Case IDs' },
        ];
        rows = [...sets].sort((a, b) => b[1].size - a[1].size).map(([k, v]) => {
          const caseIds = [...v];
          return {
            group: k,
            count: caseIds.length,
            caseIdsJoined: caseIds.join(', '),
            _expand: caseIds.length
              ? { count: { title: `${k} · ${caseIds.length} cases`, caseIds } }
              : null,
          };
        });
      }
      return { columns, columnsExport, rows, title };
    }

    // Render a query result as an animated table card. When the rows
    // carry project names (entity='project' or entity='business' with
    // _projectNames), add a footer button that navigates to My Projects
    // and pulse-highlights those exact cards.
    // Build a live-runs card for the AI Workbench: one row per case in
    // state.active, showing case id + title, owning project + business,
    // current step / total, and elapsed time. Reuses .agent-query-card
    // styling so it sits naturally in the plan timeline. If nothing is
    // running, the card says so instead of silently disappearing.
    function agentRenderLiveRunsCard() {
      const active = Array.isArray(state.active) ? state.active : [];
      const wrap = el('div', { class: 'agent-query-card' },
        el('div', { class: 'agent-query-title' }, '📡 当前正在跑的 test'),
      );
      if (!active.length) {
        wrap.appendChild(el('div', { class: 'agent-query-empty' },
          '现在没有 test 在跑。已切到 Live Channels 看最近几批的回放。'));
        return wrap;
      }
      const rows = active.map((a) => {
        const cs = (state.cases || []).find((c) => c.id === a.caseId) || null;
        const owningProject = (state.batches || []).find((b) =>
          !b.isPreset && (b.caseIds || []).includes(a.caseId));
        const step = a.currentStep
          ? `step ${a.currentStep.order || '?'}/${a.totalSteps || '?'}`
          : '启动中…';
        const startedAt = a.startedAt || a.createdAt || null;
        let elapsed = '';
        if (startedAt) {
          const sec = Math.max(0, Math.round((Date.now() - new Date(startedAt).getTime()) / 1000));
          elapsed = sec < 60 ? `${sec}s` : `${Math.floor(sec / 60)}m ${sec % 60}s`;
        }
        return {
          caseId: a.caseId,
          title: a.caseTitle || cs?.title || cs?.id || a.caseId,
          project: owningProject?.name || owningProject?.id || '—',
          business: owningProject?.business || '—',
          step,
          elapsed: elapsed || '—',
        };
      });
      const columns = [
        { key: 'caseId',   label: 'Case' },
        { key: 'title',    label: '标题' },
        { key: 'project',  label: 'Project' },
        { key: 'business', label: '部门' },
        { key: 'step',     label: '当前步骤' },
        { key: 'elapsed',  label: '已跑' },
      ];
      const table = el('table', { class: 'agent-query-table' },
        el('thead', {}, el('tr', {}, ...columns.map((c) => el('th', {}, c.label)))),
        el('tbody', {}, ...rows.map((row, i) => el('tr', {
          style: `animation-delay: ${Math.min(i, 30) * 35}ms;`,
        }, ...columns.map((c) => el('td', {}, String(row[c.key] ?? '—')))))),
      );
      wrap.appendChild(table);
      const footer = el('div', { class: 'agent-query-footer' });
      // Deduped owning-project ids from the currently-active runs — same
      // idsOnly pattern as the other cards.
      const jumpTargets = [];
      const seen = new Set();
      for (const a of active) {
        const p = (state.batches || []).find((b) =>
          !b.isPreset && (b.caseIds || []).includes(a.caseId));
        if (p?.id && !seen.has(p.id)) {
          seen.add(p.id);
          jumpTargets.push({ id: p.id, name: p.name });
        }
      }
      if (jumpTargets.length) {
        footer.appendChild(el('button', {
          class: 'agent-query-jump-btn',
          title: '切到 My Projects、收起 AI Workbench 并高亮这些正在跑的 project 卡片',
          onclick: (ev) => {
            ev.currentTarget.blur();
            if (typeof workToggle === 'function') workToggle(false);
            state.tab = 'run';
            state.section = 'my-projects';
            renderAll();
            setTimeout(() => {
              agentHighlightNewProjects(jumpTargets, { idsOnly: true });
              window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 320);
          },
        }, `🎯 在 My Projects 中定位高亮这 ${jumpTargets.length} 个 project`));
      }
      footer.appendChild(el('span', { class: 'agent-query-footer-count' },
        `共 ${rows.length} 个 test 在跑`));
      wrap.appendChild(footer);
      return wrap;
    }

    // Summary card shown after a runProject / runLatestProjects call kicks
    // off. One row per project the resolver matched — name, business, case
    // list, when it was created. Matters most when the resolver picked
    // multiple / ambiguous / wrong-department projects — the user can see
    // at a glance what actually started running.
    function agentRenderProjectRunCard(projects, headline) {
      const wrap = el('div', { class: 'agent-query-card' },
        el('div', { class: 'agent-query-title' }, '▶ ' + (headline || '开始运行 project')),
      );
      const columns = [
        { key: 'name',     label: 'Project' },
        { key: 'business', label: '部门' },
        { key: 'cases',    label: 'Cases' },
        { key: 'created',  label: '创建时间' },
      ];
      const fmtTime = (iso) => {
        if (!iso) return '—';
        const d = new Date(iso);
        return Number.isNaN(d.getTime()) ? '—' : d.toLocaleString();
      };
      const rows = projects.map((p) => ({
        name:     p.name || p.id || '—',
        business: p.business || '—',
        cases:    (p.caseIds || []).join(', ') || '—',
        created:  fmtTime(p.createdAt),
      }));
      const table = el('table', { class: 'agent-query-table' },
        el('thead', {}, el('tr', {}, ...columns.map((c) => el('th', {}, c.label)))),
        el('tbody', {}, ...rows.map((row, i) => el('tr', {
          style: `animation-delay: ${Math.min(i, 30) * 35}ms;`,
        }, ...columns.map((c) => el('td', {}, String(row[c.key] ?? '—')))))),
      );
      wrap.appendChild(table);
      const footer = el('div', { class: 'agent-query-footer' });
      // 🎯 button — jump to My Projects and pulse-highlight the exact
      // running project cards. Uses idsOnly so short names like "aaa"
      // don't accidentally highlight other cards with substring matches.
      const jumpTargets = projects
        .filter((p) => p && p.id)
        .map((p) => ({ id: p.id, name: p.name }));
      if (jumpTargets.length) {
        footer.appendChild(el('button', {
          class: 'agent-query-jump-btn',
          title: '切到 My Projects、收起 AI Workbench 并高亮这些正在跑的 project 卡片',
          onclick: (ev) => {
            // Release focus before hiding the panel — otherwise Chrome
            // refuses aria-hidden on the ancestor and warns / traps focus.
            ev.currentTarget.blur();
            if (typeof workToggle === 'function') workToggle(false);
            state.tab = 'run';
            state.section = 'my-projects';
            renderAll();
            setTimeout(() => {
              agentHighlightNewProjects(jumpTargets, { idsOnly: true });
              window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 320);
          },
        }, `🎯 在 My Projects 中定位高亮这 ${jumpTargets.length} 个 project`));
      }
      footer.appendChild(el('span', { class: 'agent-query-footer-count' },
        `共 ${rows.length} 个 project 开跑`));
      wrap.appendChild(footer);
      return wrap;
    }

    function agentRenderQueryTable(result) {
      const { columns, columnsExport, rows, title, entity } = result;
      const wrap = el('div', { class: 'agent-query-card' },
        el('div', { class: 'agent-query-title' }, '📊 ' + (title || '查询结果')),
      );
      if (!rows.length) {
        wrap.appendChild(el('div', { class: 'agent-query-empty' }, '没有匹配的结果。'));
        return wrap;
      }
      // Build each cell. If the row carries `_expand[col.key]` (a case-id
      // list keyed to that column) render the value as a small button that
      // inserts an inline expansion row directly below — same table, no
      // floating modal. User asked for this: drill-in stays anchored to
      // the row they clicked, inside the AI Workbench card.
      const colCount = columns.length;
      const cellFor = (row, c) => {
        const raw = String(row[c.key] ?? '—');
        const exp = row._expand && row._expand[c.key];
        if (!exp || !(exp.caseIds || []).length) return el('td', {}, raw);
        const btn = el('button', {
          class: 'agent-query-expand-btn',
          title: '点击展开这几个 case',
        }, raw);
        btn.addEventListener('click', () => agentToggleExpandRow(btn, exp, colCount));
        return el('td', {}, btn);
      };
      const table = el('table', { class: 'agent-query-table' },
        el('thead', {}, el('tr', {}, ...columns.map((c) => el('th', {}, c.label)))),
        el('tbody', {}, ...rows.map((row, i) => {
          const attrs = { style: `animation-delay: ${Math.min(i, 30) * 35}ms;` };
          // Optional row-level click handler — the run-history query uses
          // this to open the Midscene report in a new tab when the row
          // has one. Other entities leave `_rowClick` unset.
          if (typeof row._rowClick === 'function') {
            attrs.style += ' cursor: pointer;';
            attrs.onclick = row._rowClick;
            attrs.title = '点击打开 Midscene report';
          }
          return el('tr', attrs, ...columns.map((c) => cellFor(row, c)));
        })),
      );
      wrap.appendChild(table);

      // Collect project ids from query rows. Ids avoid false positives
      // when several projects share a short name like "a" or "6/30 Test".
      const projectsToHighlight = [];
      for (const row of rows) {
        if (Array.isArray(row._projectRefs)) {
          projectsToHighlight.push(...row._projectRefs);
        }
      }
      const seenProjectIds = new Set();
      const uniqProjects = projectsToHighlight.filter((p) => {
        const key = p?.id || `name:${p?.name || ''}`;
        if (!key || seenProjectIds.has(key)) return false;
        seenProjectIds.add(key);
        return true;
      });

      const footer = el('div', { class: 'agent-query-footer' });
      if (uniqProjects.length) {
        footer.appendChild(el('button', {
          class: 'agent-query-jump-btn',
          title: '切到 My Projects 并高亮这些精确 project 卡片',
          onclick: () => {
            state.tab = 'run';
            state.section = 'my-projects';
            renderAll();
            setTimeout(() => agentHighlightNewProjects(uniqProjects, { idsOnly: true }), 200);
            setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 250);
          },
        }, `🎯 在 My Projects 中高亮这 ${uniqProjects.length} 个 project`));
      }
      // Excel download — native .xlsx (Office Open XML package). Column
      // widths + inline strings travel in the file, so the behaviour is
      // identical to a workbook Excel saved itself. `columnsExport` is a
      // richer superset when the executor set one — Excel gets status /
      // precise timestamps / joined case-id list that the card hides to
      // stay readable.
      footer.appendChild(el('button', {
        class: 'agent-query-jump-btn',
        title: '导出为 Excel (.xlsx) — 含更多字段 + 预设列宽',
        onclick: () => downloadQueryTableAsExcel(
          columnsExport || columns, rows, title || 'query-result',
        ),
      }, '📥 下载 Excel'));
      footer.appendChild(el('span', { class: 'agent-query-footer-count' }, `共 ${rows.length} 条`));
      wrap.appendChild(footer);
      return wrap;
    }

    // ── CRC32 for ZIP entries (real .xlsx is a ZIP package) ────────
    let _crc32Table = null;
    function crc32(bytes) {
      if (!_crc32Table) {
        _crc32Table = new Uint32Array(256);
        for (let i = 0; i < 256; i += 1) {
          let c = i;
          for (let j = 0; j < 8; j += 1) c = (c >>> 1) ^ ((c & 1) ? 0xEDB88320 : 0);
          _crc32Table[i] = c >>> 0;
        }
      }
      let crc = 0xFFFFFFFF;
      for (let i = 0; i < bytes.length; i += 1) {
        crc = (crc >>> 8) ^ _crc32Table[(crc ^ bytes[i]) & 0xFF];
      }
      return (crc ^ 0xFFFFFFFF) >>> 0;
    }
    // Build a ZIP archive using STORED (uncompressed) method — .xlsx
    // opens fine without DEFLATE, and this stays ~40 lines instead of
    // pulling in a compression lib.
    //   files = [{ name: string, data: Uint8Array }]
    function makeZipBlob(files) {
      const enc = new TextEncoder();
      const parts = [];
      const centrals = [];
      let offset = 0;
      for (const f of files) {
        const nameBytes = enc.encode(f.name);
        const crc = crc32(f.data);
        const size = f.data.length;
        const lh = new Uint8Array(30 + nameBytes.length);
        const lv = new DataView(lh.buffer);
        lv.setUint32(0, 0x04034b50, true);
        lv.setUint16(4, 20, true);          // version needed
        lv.setUint16(6, 0, true);           // flags
        lv.setUint16(8, 0, true);           // method: stored
        lv.setUint16(10, 0, true);          // mod time
        lv.setUint16(12, 0x21, true);       // mod date = 1980-01-01
        lv.setUint32(14, crc, true);
        lv.setUint32(18, size, true);       // compressed size
        lv.setUint32(22, size, true);       // uncompressed size
        lv.setUint16(26, nameBytes.length, true);
        lv.setUint16(28, 0, true);          // extra length
        lh.set(nameBytes, 30);
        parts.push(lh);
        parts.push(f.data);
        const ce = new Uint8Array(46 + nameBytes.length);
        const cv = new DataView(ce.buffer);
        cv.setUint32(0, 0x02014b50, true);
        cv.setUint16(4, 20, true);
        cv.setUint16(6, 20, true);
        cv.setUint16(8, 0, true);
        cv.setUint16(10, 0, true);
        cv.setUint16(12, 0, true);
        cv.setUint16(14, 0x21, true);
        cv.setUint32(16, crc, true);
        cv.setUint32(20, size, true);
        cv.setUint32(24, size, true);
        cv.setUint16(28, nameBytes.length, true);
        cv.setUint16(30, 0, true);
        cv.setUint16(32, 0, true);
        cv.setUint16(34, 0, true);
        cv.setUint16(36, 0, true);
        cv.setUint32(38, 0, true);
        cv.setUint32(42, offset, true);
        ce.set(nameBytes, 46);
        centrals.push(ce);
        offset += lh.length + f.data.length;
      }
      let centralSize = 0;
      centrals.forEach((c) => { centralSize += c.length; });
      const centralOffset = offset;
      centrals.forEach((c) => parts.push(c));
      const eocd = new Uint8Array(22);
      const ev = new DataView(eocd.buffer);
      ev.setUint32(0, 0x06054b50, true);
      ev.setUint16(4, 0, true);
      ev.setUint16(6, 0, true);
      ev.setUint16(8, files.length, true);
      ev.setUint16(10, files.length, true);
      ev.setUint32(12, centralSize, true);
      ev.setUint32(16, centralOffset, true);
      ev.setUint16(20, 0, true);
      parts.push(eocd);
      return new Blob(parts, {
        type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
      });
    }
    // 0 → A, 25 → Z, 26 → AA …
    function xlsxColLetter(idx) {
      let s = '';
      let n = idx + 1;
      while (n > 0) {
        const r = (n - 1) % 26;
        s = String.fromCharCode(65 + r) + s;
        n = Math.floor((n - 1) / 26);
      }
      return s;
    }

    // Export the query result as a real .xlsx (Office Open XML) package.
    //
    // Earlier attempts (CSV, HTML-in-.xls, SpreadsheetML 2003) all had
    // problems — narrow date columns, format-mismatch warning dialogs,
    // click-anchor drifting to the wrong corner of a selection. A real
    // .xlsx is just a ZIP of a handful of XML parts, so we build them
    // inline. Behaves exactly like a workbook Excel saved itself.
    function downloadQueryTableAsExcel(columns, rows, title) {
      const xEsc = (v) => String(v == null ? '' : v)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      // Excel column width unit ≈ characters at the default font. Wider
      // than the CSV era because we can now request exactly what we want.
      const widthFor = (col) => {
        const s = (String(col.key || '') + '|' + String(col.label || '')).toLowerCase();
        if (/caseids|case ids|case_ids/.test(s))                return 42;
        if (/lastrunatsec|createdatsec|updatedat|时间/.test(s)) return 22;
        if (/createdat/.test(s))                                return 14;
        if (/name|title|project 名|标题|headline/.test(s))      return 26;
        if (/business|部门|group|分类|category/.test(s))        return 15;
        if (/status|状态/.test(s))                              return 11;
        if (/casecount|count|数/.test(s))                       return 10;
        return 14;
      };
      // ── xl/worksheets/sheet1.xml ─────────────────────────────────
      const colsXml = '<cols>' + columns.map((c, i) =>
        `<col min="${i + 1}" max="${i + 1}" width="${widthFor(c)}" customWidth="1"/>`,
      ).join('') + '</cols>';
      // Header row (row 1): every cell uses style s=1 (bold + fill).
      const headerCells = columns.map((c, i) =>
        `<c r="${xlsxColLetter(i)}1" t="inlineStr" s="1"><is><t xml:space="preserve">${xEsc(c.label)}</t></is></c>`,
      ).join('');
      const headerRow = `<row r="1">${headerCells}</row>`;
      // Data rows — inline strings across the board. Everything the
      // exporter emits upstream is already a human-readable label
      // (dates like "2026-07-02 14:30:45"), so no need for number/date
      // typing (which would just fight our precise formatting anyway).
      const bodyRowsXml = rows.map((r, ri) => {
        const rowNum = ri + 2;
        const cells = columns.map((c, ci) => {
          const val = xEsc(r[c.key]);
          return `<c r="${xlsxColLetter(ci)}${rowNum}" t="inlineStr"><is><t xml:space="preserve">${val}</t></is></c>`;
        }).join('');
        return `<row r="${rowNum}">${cells}</row>`;
      }).join('');
      // Explicit sheet dimensions + view / selection. Without a
      // <sheetViews><selection/></sheetViews> block, WPS/Excel picks an
      // undefined default active cell — clicking a bottom-right cell
      // then shows the anchor at top-left (or vice versa). Setting
      // activeCell="A1" / sqref="A1" tells the reader "start clean at
      // A1", and normal click behaviour follows from there.
      const lastRef = xlsxColLetter(columns.length - 1) + String(rows.length + 1);
      const sheetXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n'
        + '<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'
        + `<dimension ref="A1:${lastRef}"/>`
        + '<sheetViews>'
        +  '<sheetView tabSelected="1" workbookViewId="0">'
        +   '<selection activeCell="A1" sqref="A1"/>'
        +  '</sheetView>'
        + '</sheetViews>'
        + '<sheetFormatPr defaultRowHeight="15"/>'
        + colsXml
        + '<sheetData>' + headerRow + bodyRowsXml + '</sheetData>'
        + '</worksheet>';
      // ── xl/styles.xml — 2 styles: default (0) + header (1) ───────
      const stylesXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n'
        + '<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'
        + '<fonts count="2">'
        +  '<font><sz val="11"/><name val="Calibri"/></font>'
        +  '<font><b/><sz val="11"/><color rgb="FF0F172A"/><name val="Calibri"/></font>'
        + '</fonts>'
        + '<fills count="3">'
        +  '<fill><patternFill patternType="none"/></fill>'
        +  '<fill><patternFill patternType="gray125"/></fill>'
        +  '<fill><patternFill patternType="solid"><fgColor rgb="FFF1F5F9"/><bgColor indexed="64"/></patternFill></fill>'
        + '</fills>'
        + '<borders count="1"><border><left/><right/><top/><bottom/><diagonal/></border></borders>'
        + '<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>'
        + '<cellXfs count="2">'
        +  '<xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/>'
        +  '<xf numFmtId="0" fontId="1" fillId="2" borderId="0" xfId="0" applyFont="1" applyFill="1"/>'
        + '</cellXfs>'
        + '<cellStyles count="1"><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles>'
        + '</styleSheet>';
      // ── xl/workbook.xml ─────────────────────────────────────────
      const sheetName = xEsc(String(title || 'Sheet1').slice(0, 31)
        .replace(/[\\/:*?[\]]/g, '_')) || 'Sheet1';
      const workbookXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n'
        + '<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"'
        + ' xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">'
        + '<bookViews><workbookView xWindow="0" yWindow="0" '
        +   'windowWidth="20000" windowHeight="15000" activeTab="0"/></bookViews>'
        + `<sheets><sheet name="${sheetName}" sheetId="1" r:id="rId1"/></sheets>`
        + '</workbook>';
      // ── Relationship + content-type parts ────────────────────────
      const rootRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n'
        + '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
        + '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>'
        + '</Relationships>';
      const wbRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n'
        + '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
        + '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>'
        + '<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>'
        + '</Relationships>';
      const contentTypes = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n'
        + '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'
        + '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>'
        + '<Default Extension="xml" ContentType="application/xml"/>'
        + '<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>'
        + '<Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>'
        + '<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>'
        + '</Types>';
      const enc = new TextEncoder();
      const blob = makeZipBlob([
        { name: '[Content_Types].xml',        data: enc.encode(contentTypes) },
        { name: '_rels/.rels',                data: enc.encode(rootRels) },
        { name: 'xl/workbook.xml',            data: enc.encode(workbookXml) },
        { name: 'xl/_rels/workbook.xml.rels', data: enc.encode(wbRels) },
        { name: 'xl/styles.xml',              data: enc.encode(stylesXml) },
        { name: 'xl/worksheets/sheet1.xml',   data: enc.encode(sheetXml) },
      ]);
      const url  = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const safeTitle = String(title).replace(/[\\/:*?"<>|]/g, '_').slice(0, 60) || 'query-result';
      const stamp = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `${safeTitle}-${stamp}.xlsx`;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
    }

    // ── Human-readable description of what each tool will do.
    //    Used in the planning-timeline UI before/while/after execution.
    function agentDescribeTool(call) {
      const a = call?.args || {};
      switch (call?.tool) {
        case 'queryEntities':
          return `查询 ${a.entity || '?'}${a.filter && Object.keys(a.filter).length ? ' (有过滤)' : ''}`;
        case 'queryStats':
          return `统计 ${a.groupBy || '?'} / ${a.countOf || '?'}`;
        case 'highlightProjects': {
          const n = (a.names || []).length;
          return `高亮 ${n} 个 project${a.navigate !== false ? ' (并切到 My Projects)' : ''}`;
        }
        case 'createProjects': {
          const n = a.projects?.length || 0;
          const runCount = (a.projects || []).filter((p) => p.action === 'run').length;
          const saveCount = n - runCount;
          let suffix = '';
          if (runCount && saveCount) suffix = ` (${saveCount} 个保存 · ${runCount} 个创建后运行)`;
          else if (runCount) suffix = ` (创建后立即运行)`;
          else suffix = ' (仅保存)';
          const names = (a.projects || []).map((p) => p.name).filter(Boolean).slice(0, 3).join(', ');
          return `创建 ${n} 个 project${suffix}：${names}${n > 3 ? ' …' : ''}`;
        }
        case 'runLatestProjects': {
          const scope = a.business ? `${a.business} 部门` : '';
          return `顺序运行${scope}最近 ${a.count || 1} 个 project`;
        }
        case 'openProject': {
          // New rich selector shape wins. Legacy 'kind' still supported.
          if (a.business || a.name || a.createdSince || a.createdBefore || a.passedOnly || a.sortBy === 'oldest') {
            return `定位到${describeProjectSelector(a)}的 project`;
          }
          if (a.kind === 'latestByBusiness' && a.business) return `定位到 ${a.business} 部门最新的 project`;
          if (a.kind === 'byName' && a.name) return `定位到名字含 "${a.name}" 的 project`;
          return '定位到最新的 project';
        }
        case 'runProject': {
          const scope = describeProjectSelector(a);
          const n = Math.max(1, Math.min(10, Number(a.count) || 1));
          return `运行${scope}的 ${n === 1 ? '' : n + ' 个 '}project`;
        }
        case 'openLiveChannels':
          return '切到 Live Channels + 列出当前在跑的 test';
        case 'openLatestFailedReport':
          return '打开最新失败 run 的 Midscene report (新标签页)';
        case 'openLatestRunReport': {
          const s = a.status || 'any';
          const label = s === 'passed' ? '成功' : s === 'failed' ? '失败' : '最新';
          return `打开最新${label} run 的 Midscene report (新标签页)`;
        }
        case 'openFailureAnalytics':
          return a.caseId ? `切到 Failure Analytics 看 case ${a.caseId}` : '切到 Failure Analytics';
        case 'openSection':
          return `切到 ${a.section}`;
        default:
          return call?.tool || '(未知 tool)';
      }
    }

    // Build the planning timeline DOM: one explain header + one row
    // per tool call. The dispatcher patches each row's status as it
    // executes them.
    function agentRenderPlan(plan) {
      const wrap = el('div', { class: 'agent-plan' });
      wrap.appendChild(el('div', { class: 'agent-plan-explain' },
        el('span', { class: 'agent-plan-explain-icon' }, '🤖'),
        el('div', { style: 'flex:1; min-width:0;' },
          el('div', { class: 'agent-plan-explain-label' }, '我打算这样做'),
          el('div', { class: 'agent-plan-explain-text' }, plan.explain || '(无说明)'),
        ),
      ));
      const list = el('div', { class: 'agent-plan-steps' });
      (plan.toolCalls || []).forEach((call, i) => {
        list.appendChild(el('div', {
          class: 'agent-plan-step pending',
          dataset: { stepIdx: String(i) },
        },
          el('div', { class: 'agent-plan-step-num' }, String(i + 1)),
          el('div', { class: 'agent-plan-step-body' },
            el('div', { class: 'agent-plan-step-title' }, agentDescribeTool(call)),
            el('div', { class: 'agent-plan-step-status' }, '等待中…'),
          ),
          el('div', { class: 'agent-plan-step-icon' }, '○'),
        ));
      });
      wrap.appendChild(list);
      return wrap;
    }

    // Patch one step row's visual state. status ∈ 'running' | 'done' | 'failed'
    function agentMarkStep(planEl, idx, status, text, link) {
      const row = planEl?.querySelector(`[data-step-idx="${idx}"]`);
      if (!row) return;
      row.classList.remove('pending', 'running', 'done', 'failed');
      row.classList.add(status);
      const statusEl = row.querySelector('.agent-plan-step-status');
      const iconEl = row.querySelector('.agent-plan-step-icon');
      const fallbackText = ({
        running: '执行中…', done: '已完成 ✓', failed: '失败 ✗',
      })[status] || '';
      if (statusEl) {
        statusEl.replaceChildren();
        statusEl.appendChild(document.createTextNode(text || fallbackText));
        // If the tool produced a URL (e.g. a Midscene report we tried
        // to window.open but the browser popup-blocker swallowed), add
        // an inline link the user can click manually. Real <a> click
        // is whitelisted by every browser, popup is not.
        if (link?.url) {
          statusEl.appendChild(document.createTextNode(' · '));
          statusEl.appendChild(el('a', {
            href: link.url,
            target: '_blank',
            rel: 'noopener',
            class: 'agent-plan-step-link',
          }, link.label || '🔗 在新窗口打开'));
        }
      }
      if (iconEl) iconEl.textContent = ({
        running: '◐', done: '✓', failed: '✗',
      })[status] || '○';
    }

    // ── Dispatch a single tool call against the existing UI helpers ──
    // The tool surface here is a 1:1 mirror of automation-kb.md (7
    // tools); the server's sanitiser already dropped anything not in
    // this set, but be defensive — bad input shouldn't crash the panel.
    async function agentExecuteToolCall(call) {
      switch (call?.tool) {
        case 'createProjects': {
          const projects = (call.args?.projects || []).map((p) => ({
            name: p.name,
            business: p.business,
            categoryKey: p.categoryKey,
            caseIds: Array.isArray(p.caseIds) ? p.caseIds : [],
            runsPerCase: p.runsPerCase || 1,
            action: p.action || 'save',
            labels: p.labels || [],
          }));
          const result = await assistantExecuteProjectWorkflow({
            type: 'bulk_create_projects',
            projects,
            options: (typeof assistantCategoryOptions === 'function' ? assistantCategoryOptions() : []),
            created: false,
          }, null);
          // Visual feedback — flash the newly-added project cards in
          // My Projects so the user actually sees what just happened.
          // We use idsOnly so name-substring matches don't accidentally
          // highlight OTHER projects that share a name.
          const createdWithIds = (result?.projects || []).filter((p) => p && p.id);
          if (createdWithIds.length) {
            setTimeout(() => agentHighlightNewProjects(
              createdWithIds.map((p) => ({ id: p.id })),
              { idsOnly: true },
            ), 250);
          }
          // Force-scroll the panel to top so the new cards are in view.
          setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 350);
          return result?.message || (result?.ok ? '已创建。' : '创建失败。');
        }
        case 'runLatestProjects': {
          const count = Math.max(1, Math.min(10, Number(call.args?.count) || 1));
          const business = call.args?.business ? String(call.args.business).trim() : '';
          const projects = resolveProjects({ business, count });
          if (!projects.length) {
            return business
              ? `没有 ${business} 部门的 project 可运行。`
              : '没有可运行的 project。';
          }
          const headline = business ? `${business} 部门最近 ${projects.length} 个 project` : `最近 ${projects.length} 个 project`;
          // 2+ projects → require the user to confirm the execution order.
          // Single-match stays one-shot: unambiguous, no pop-up friction.
          if (projects.length >= 2) {
            const ok = await agentShowRunConfirmModal(projects,
              business
                ? `${business} 部门最近 ${projects.length} 个 project，按新→旧顺序运行。`
                : `最近 ${projects.length} 个 project，按新→旧顺序运行。`);
            if (!ok) return '已取消 · 未运行任何 project。';
          }
          // Make sure user lands on Live Channels so they SEE the run.
          state.tab = 'run'; state.section = 'live-channels';
          renderAll();
          // Fire-and-forget so the summary card appears immediately —
          // otherwise the tool call sits at "执行中…" for minutes while
          // runCases awaits every case. Errors surface as toasts.
          runProjectsSequentially(projects).catch((err) => console.error('[agent] run failed:', err));
          return {
            text: `已开始运行 ${projects.length} 个 project：${projects.map((p) => p.name || p.id).join(' → ')}`,
            renderNode: agentRenderProjectRunCard(projects, headline),
            snapshot: {
              kind: 'projectRun',
              headline,
              projects: projects.map(serializeProjectForSnapshot),
            },
          };
        }
        case 'runProject': {
          // Rich-selector run — the unified pipeline. Any subset of
          // {business, name, createdSince, createdBefore, passedOnly,
          // sortBy, count} lands here.
          const args = call.args || {};
          const projects = resolveProjects(args);
          if (!projects.length) {
            return `没找到${describeProjectSelector(args)}匹配的 project。`;
          }
          if (projects.length >= 2) {
            const ok = await agentShowRunConfirmModal(projects,
              `匹配到 ${projects.length} 个 project (${describeProjectSelector(args)})，按顺序运行。`);
            if (!ok) return '已取消 · 未运行任何 project。';
          }
          state.tab = 'run'; state.section = 'live-channels';
          renderAll();
          const headline = `${describeProjectSelector(args)} · ${projects.length} 个 project`;
          runProjectsSequentially(projects).catch((err) => console.error('[agent] run failed:', err));
          return {
            text: `已开始运行：${projects.map((p) => p.name || p.id).join(' → ')}`,
            renderNode: agentRenderProjectRunCard(projects, headline),
            snapshot: {
              kind: 'projectRun',
              headline,
              projects: projects.map(serializeProjectForSnapshot),
            },
          };
        }
        case 'openProject': {
          const args = call.args || {};
          // Route through the shared resolver whenever the LLM used the new
          // filter axes (business/name/createdSince/…). Fall back to the
          // legacy `kind` switch for older prompts / cached agent outputs.
          // sortBy='recent' is the sanitiser default, so it doesn't count
          // as an active selector — only 'oldest' does.
          const usesSelector = args.business || args.name || args.createdSince
            || args.createdBefore || args.passedOnly || args.sortBy === 'oldest';
          let target = null;
          if (usesSelector) {
            target = resolveProjects({ ...args, count: 1 })[0];
          } else if (args.kind === 'latestByBusiness' && args.business) {
            target = resolveProjects({ business: args.business, count: 1 })[0];
          } else if (args.kind === 'byName' && args.name) {
            target = resolveProjects({ name: args.name, count: 1 })[0];
          } else {
            target = resolveProjects({ count: 1 })[0];
          }
          if (!target) return `没找到${describeProjectSelector(args)}匹配的 project，已切到 My Projects。`;
          const msg = openProjectInMyProjects(target, '已打开');
          // Scroll the matched card into view and briefly highlight it.
          setTimeout(() => agentHighlightNewProjects([{ id: target.id, name: target.name }], { idsOnly: true }), 200);
          return msg;
        }
        case 'openLiveChannels': {
          // Navigate as before, then hand back a card summarising the
          // actually-running tests. The queryEntities / queryStats path
          // taught the timeline how to render a `renderNode` payload,
          // so we reuse the same shape here.
          goRunSection('live-channels', '');
          const activeCount = (state.active || []).length;
          const liveSnap = captureLiveRunsSnapshot();
          return {
            text: activeCount ? `现在有 ${activeCount} 个 test 在跑` : '现在没有 test 在跑',
            renderNode: agentRenderLiveRunsCard(),
            snapshot: { kind: 'liveRuns', ...liveSnap },
          };
        }
        case 'openLatestFailedReport':
          // Back-compat alias for old LLM outputs / cached prompts.
          // The server sanitiser also rewrites this into the new tool,
          // but if it slips through (e.g. fallback path), we still
          // honour the original intent.
          return await agentExecuteToolCall({
            tool: 'openLatestRunReport',
            args: { ...(call.args || {}), status: 'failed' },
          });
        case 'openLatestRunReport': {
          const selector = reportSelectorFromArgs(call.args || {});
          const wantPassed = selector.status === 'passed';
          const wantFailed = selector.status === 'failed';
          // Walk the recent list newest-first and grab the first run
          // matching the status/project filters that has a report URL we can
          // actually open. Falls through to a sensible navigation if
          // nothing matches.
          const { candidates, withReport, runToClusterOwner } = latestReportRun(selector);
          const label = wantPassed ? '成功' : wantFailed ? '失败' : '最新';
          if (withReport) {
            // Use the run's actual executing batch as the project shown
            // on the card AND highlighted on the Reports view. Fall back
            // to the old owner-picking only when we couldn't identify a
            // cluster owner (rare — run has no runId, or state.recent was
            // just wiped mid-render).
            // Label the card by the ACTUAL executing batch owner — the
            // same cluster the renderer will highlight. Filter matching
            // is now strict (see reportRunMatchesSelector), so if this
            // returns a run, its cluster owner IS the one that matches
            // the business/name filter. Card + highlight agree.
            const clusterOwner = withReport.runId
              ? runToClusterOwner.get(withReport.runId) || null
              : null;
            const project = clusterOwner || bestReportProjectForRun(withReport, selector);
            focusReportsOnRun(withReport, selector, { project });
            // Browsers block popups when the same task fires window.open
            // multiple times in a row (common when the user runs several
            // report-opening prompts back-to-back). window.open returns
            // null in that case → we surface an inline clickable link in
            // the timeline so the user can still get to the report
            // without re-typing the prompt.
            const opened = window.open(withReport.report.url, '_blank', 'noopener');
            const when = withReport.finishedAt ? new Date(withReport.finishedAt).toLocaleString() : '';
            const caseLabel = withReport.caseId || 'case';
            const resultCard = el('div', { class: 'agent-query-card' },
              el('div', { class: 'agent-query-title' }, '筛选出的 report'),
              el('table', { class: 'agent-query-table' },
                el('thead', {}, el('tr', {},
                  el('th', {}, 'Project'),
                  el('th', {}, '部门'),
                  el('th', {}, 'Case'),
                  el('th', {}, '状态'),
                  el('th', {}, '时间'),
                  el('th', {}, 'Report'),
                )),
                el('tbody', {}, el('tr', {},
                  el('td', {}, project?.name || project?.id || '—'),
                  el('td', {}, project?.business || '—'),
                  el('td', {}, caseLabel),
                  el('td', {}, statusLabel(withReport.status || 'pending')),
                  el('td', {}, when || '—'),
                  el('td', {},
                    withReport.report?.url
                      ? el('button', {
                          class: 'agent-query-jump-btn',
                          onclick: () => window.open(withReport.report.url, '_blank', 'noopener'),
                        }, '打开 report')
                      : '—'),
                )),
              ),
              el('div', { class: 'agent-query-footer' },
                el('button', {
                  class: 'agent-query-jump-btn',
                  title: '收起 AI Workbench 并高亮 Run Reports 里对应的 batch / 行',
                  onclick: (ev) => {
                    // Release focus BEFORE workToggle so the browser
                    // doesn't block aria-hidden=true on the panel (Chrome
                    // refuses to hide an ancestor of the focused node —
                    // shows a warning and can leave focus trapped, which
                    // interferes with subsequent event delivery).
                    ev.currentTarget.blur();
                    // Belt-and-suspenders: fire the normal focus path AND
                    // manually re-apply .agent-highlight on the batch/row
                    // by data-owner-id / data-run-id after render. The
                    // render-time focus branch has been silently missing
                    // its target in this exact flow — the DOM-query fallback
                    // guarantees the pulse regardless.
                    // Pass the same cluster-owner-based project so the
                    // agentFocus.projectId used by the render-time focus
                    // check matches the batch that actually contains this
                    // run. Otherwise agentFocus.projectId would drift to
                    // bestReportProjectForRun's guess again.
                    focusReportsOnRun(withReport, selector, { project });
                    if (typeof workToggle === 'function') workToggle(false);
                    const targetProjectId = project?.id || '';
                    const targetRunId = withReport?.runId || '';
                    // Wait for the panel slide-out (~280 ms) + one animation
                    // frame so the freshly-rendered Reports DOM has the new
                    // batch cards mounted. Then find + light them up.
                    setTimeout(() => {
                      // Use runId — GLOBALLY UNIQUE — to trace back to
                      // the exact row (and its enclosing batch). Do NOT
                      // fall back to owner-id: a project may own many
                      // clusters (past runs), so querying by owner would
                      // grab the wrong / additional batches and light
                      // them up too. If runId isn't in DOM, bail out.
                      if (!targetRunId) return;
                      const row = document.querySelector(`.rh-row[data-run-id="${targetRunId}"]`);
                      if (!row) return;
                      const batch = row.closest('.rh-batch');
                      if (batch) {
                        batch.classList.remove('agent-highlight');
                        void batch.offsetWidth; // reflow — restart animation
                        batch.classList.add('agent-highlight', 'agent-report-focus-batch');
                        batch.scrollIntoView({ behavior: 'smooth', block: 'center' });
                      }
                      row.classList.remove('agent-highlight');
                      void row.offsetWidth;
                      row.classList.add('agent-highlight', 'agent-report-focus');
                    }, 340);
                  },
                }, '重新定位 / 高亮'),
                // Same idsOnly My-Projects jump the other cards offer, so
                // the user can go straight to the project card (not the
                // Reports row) when that's what they actually want.
                project?.id
                  ? el('button', {
                      class: 'agent-query-jump-btn',
                      title: '切到 My Projects 并高亮这个 project 卡片',
                      onclick: (ev) => {
                        ev.currentTarget.blur();
                        if (typeof workToggle === 'function') workToggle(false);
                        state.tab = 'run';
                        state.section = 'my-projects';
                        renderAll();
                        setTimeout(() => {
                          agentHighlightNewProjects(
                            [{ id: project.id, name: project.name }],
                            { idsOnly: true },
                          );
                          window.scrollTo({ top: 0, behavior: 'smooth' });
                        }, 320);
                      },
                    }, '🎯 在 My Projects 中定位高亮')
                  : null,
                el('span', { class: 'agent-query-footer-count' }, 'Run Reports 已展开并高亮该结果'),
              ),
            );
            const projectLabel = project ? `${project.name || project.id} · ` : '';
            const text = opened
              ? `已打开最新有报告的${label} project/run：${projectLabel}${caseLabel}${when ? ' · ' + when : ''}。`
              : `找到最新有报告的${label} project/run：${projectLabel}${caseLabel}${when ? ' · ' + when : ''}（浏览器拦了自动弹窗）`;
            return {
              text,
              renderNode: resultCard,
              link: opened ? null : {
                url: withReport.report.url,
                label: '🔗 手动打开 report',
              },
              snapshot: {
                kind: 'reportOpened',
                project: project ? { id: project.id, name: project.name, business: project.business } : null,
                caseLabel,
                status: withReport.status || 'pending',
                when,
                url: withReport.report?.url || null,
                label,
              },
            };
          }
          if (candidates.length) {
            return goRunSection('reports', `有 ${candidates.length} 个${label} run，但都没有 Midscene report URL（runner 启动前就挂了）。已切到 Run Reports。`);
          }
          // Sensible fallback: failed → Failure Analytics, others → Reports.
          if (wantFailed) {
            return goRunSection('failures', `没有${label} run，已切到 Failure Analytics。`);
          }
          return goRunSection('reports', `没有${label} run，已切到 Run Reports。`);
        }
        case 'openFailureAnalytics': {
          const note = call.args?.caseId
            ? `已切到 Failure Analytics（看 case ${call.args.caseId}）。`
            : '已切到 Failure Analytics。';
          return goRunSection('failures', note);
        }
        case 'openSection': {
          const section = String(call.args?.section || '');
          if (!section) return '未知 section。';
          return goRunSection(section, `已切到 ${section}。`);
        }
        case 'queryEntities': {
          // Query tools return BOTH a status string AND a render node
          // (the table). The dispatcher hook below handles the DOM
          // append; here we just compute and return the render node.
          // `snapshot` is the JSON-serializable form persisted on the chat
          // message so reopening the conversation re-renders the full card
          // (not just the summary line).
          const result = agentExecuteQueryEntities(call.args || {});
          return {
            text: `查询完成 · ${result.rows.length} 条结果`,
            renderNode: agentRenderQueryTable(result),
            snapshot: { kind: 'queryTable', result },
          };
        }
        case 'queryStats': {
          const result = agentExecuteQueryStats(call.args || {});
          return {
            text: `统计完成 · ${result.rows.length} 组`,
            renderNode: agentRenderQueryTable(result),
            snapshot: { kind: 'queryTable', result },
          };
        }
        case 'highlightProjects': {
          const names = call.args?.names || [];
          if (call.args?.navigate !== false) {
            state.tab = 'run'; state.section = 'my-projects';
            renderAll();
            setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 150);
          }
          setTimeout(() => agentHighlightNewProjects(names), 250);
          return names.length
            ? `已高亮 ${names.length} 个 project：${names.slice(0, 3).join(', ')}${names.length > 3 ? ' …' : ''}`
            : '没有要高亮的 project。';
        }
        default:
          return `未识别的 tool：${call?.tool || '(空)'}`;
      }
    }

    let agentHighlightTimer = null;

    // Clear every existing highlight so a new agent task starts on a
    // clean slate. Also used by the auto-expiry timer after a few seconds.
    function agentClearHighlights() {
      if (agentHighlightTimer) {
        clearTimeout(agentHighlightTimer);
        agentHighlightTimer = null;
      }
      document.querySelectorAll('.agent-highlight').forEach((c) => c.classList.remove('agent-highlight'));
    }

    // After createProjects (or openProject) finishes, find the matched
    // cards in My Projects and pulse them briefly. The highlight auto-
    // clears after a few seconds so it guides attention without becoming
    // sticky visual noise.
    // Also auto-scrolls the first matched card into the middle of the
    // viewport — if the card was below the fold the user wouldn't see
    // the animation at all without this.
    function agentHighlightNewProjects(targets, opts = {}) {
      if (!Array.isArray(targets) || !targets.length) return;
      agentClearHighlights();
      const idsOnly = !!opts.idsOnly;
      const targetIds = new Set();
      const targetNames = new Set();
      targets.forEach((target) => {
        if (target && typeof target === 'object') {
          if (target.id) targetIds.add(String(target.id));
          if (!idsOnly && target.name) targetNames.add(String(target.name).trim().toLowerCase());
        } else if (!idsOnly) {
          const name = String(target || '').trim();
          if (name) targetNames.add(name.toLowerCase());
        }
      });
      const matched = [];
      const cards = document.querySelectorAll('[data-project-id]');
      cards.forEach((card) => {
        const id = card.dataset.projectId || '';
        const name = String(card.dataset.projectName || '').trim().toLowerCase();
        if ((id && targetIds.has(id)) || (!idsOnly && name && targetNames.has(name))) {
          card.classList.add('agent-highlight');
          matched.push(card);
        }
      });
      // Defer the scroll so the new DOM has settled (createProjects
      // triggers renderAll which re-mounts the cards).
      if (matched.length) {
        setTimeout(() => {
          matched[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 120);
        agentHighlightTimer = setTimeout(() => {
          document.querySelectorAll('.agent-highlight').forEach((c) => c.classList.remove('agent-highlight'));
          agentHighlightTimer = null;
        }, opts.durationMs || 7000);
      }
    }

    // Execute the full tool-call sequence with timeline updates.
    // Tools may return either a plain string OR an object
    // { text, renderNode } — the renderNode (a query result table,
    // etc.) is appended to the plan element so it sits below the
    // timeline.
    async function agentExecuteToolCalls(toolCalls, planEl) {
      if (!Array.isArray(toolCalls) || !toolCalls.length) return { results: [], snapshots: [] };
      const results = [];
      const snapshots = []; // JSON-serializable card data for chat rehydration
      for (let i = 0; i < toolCalls.length; i += 1) {
        agentMarkStep(planEl, i, 'running');
        try {
          const raw = await agentExecuteToolCall(toolCalls[i]);
          let text;
          let link = null;
          if (raw && typeof raw === 'object') {
            text = raw.text || '完成';
            if (raw.renderNode) planEl?.appendChild(raw.renderNode);
            if (raw.link) link = raw.link;
            if (raw.snapshot) snapshots.push(raw.snapshot);
          } else {
            text = (typeof raw === 'string') ? raw : '完成';
          }
          agentMarkStep(planEl, i, 'done', text, link);
          if (text) results.push(text);
        } catch (err) {
          console.error('[agent] tool failed:', toolCalls[i], err);
          const text = err?.message || String(err);
          agentMarkStep(planEl, i, 'failed', text);
          results.push(`第 ${i + 1} 步 (${toolCalls[i]?.tool}) 出错：${text}`);
        }
      }
      return { results, snapshots };
    }

    // ── Run-confirm modal — safety gate before firing a bulk
    //    sequential run. Only shown when the resolver matched ≥ 2 projects
    //    (a single match is unambiguous; skip the modal there so 1-project
    //    runs stay one-shot). Returns Promise<bool> — true = go, false = cancel.
    function agentShowRunConfirmModal(projects, headline) {
      return new Promise((resolve) => {
        let decided = false;
        const backdrop = el('div', { class: 'modal-backdrop' });
        function close(decision) {
          if (decided) return;
          decided = true;
          backdrop.remove();
          document.removeEventListener('keydown', onKey);
          resolve(decision);
        }
        function onKey(ev) {
          if (ev.key === 'Escape') close(false);
          if (ev.key === 'Enter')  close(true);
        }
        document.addEventListener('keydown', onKey);
        backdrop.addEventListener('click', (ev) => {
          if (ev.target === backdrop) close(false);
        });

        const list = el('ol', {
          style: 'margin:8px 0 0 0; padding-left:26px; display:flex; flex-direction:column; gap:6px;',
        });
        projects.forEach((p) => {
          list.appendChild(el('li', {
            style: 'line-height:1.5;',
          },
            el('span', { style: 'font-weight:600;' }, p.name || p.id),
            p.business
              ? el('span', { class: 'project-biz-tag', style: 'margin-left:8px;' }, p.business)
              : null,
            (p.caseIds || []).length
              ? el('span', { style: 'margin-left:8px; color:var(--muted); font-size:12px;' },
                  `${(p.caseIds || []).length} case${(p.caseIds || []).length === 1 ? '' : 's'}`)
              : null,
          ));
        });

        const modal = el('div', { class: 'modal agent-clarify-modal' },
          el('div', { class: 'modal-head' },
            el('div', { style: 'flex:1; min-width:0;' },
              el('div', { class: 'title' }, '🤖 确认要按顺序运行以下 ' + projects.length + ' 个 project 吗？'),
              el('div', { class: 'sub' }, headline || '将从第 1 个开始，一个跑完再跑下一个。'),
            ),
            el('button', { class: 'btn ghost', onclick: () => close(false), title: '取消' }, '✕'),
          ),
          el('div', { class: 'modal-body' }, list),
          el('div', { class: 'modal-foot', style: 'display:flex; gap:8px; justify-content:flex-end;' },
            el('button', {
              class: 'btn ghost',
              title: '不运行 (Esc)',
              onclick: () => close(false),
            }, 'Cancel'),
            el('button', {
              class: 'btn primary',
              title: '按上面的顺序运行 (Enter)',
              onclick: () => close(true),
            }, '▶ 确认运行'),
          ),
        );

        backdrop.appendChild(modal);
        document.body.appendChild(backdrop);
      });
    }

    // ── Category picker for the clarification modal ────────────────
    //    Category-level clarification is more complex than a simple
    //    chip choice: the user often wants to peek at what cases are in
    //    each category, or hand-pick cases across categories. This
    //    builds a two-mode UI:
    //      · Chips mode (default) — each category is a chip with a ▸
    //        expand arrow. Click chip to select/deselect; click arrow
    //        to reveal all cases in that category (read-only preview).
    //      · Individual pick mode — full scrollable case library with
    //        checkboxes + a per-row category tag. Selected case IDs
    //        get injected into the answer so the planner can populate
    //        `caseIds` instead of `categoryKey`.
    //    Both modes coexist — the user can mix them if they want (rare
    //    but harmless; the KB parser handles both signals).
    function agentBuildCategoryPicker(clar, selectedCats, collectAnswer, submit, getInput) {
      // Single source of truth for the whole picker: which case IDs the
      // user has selected. Both tabs read AND write this Set — flipping
      // a category chip in the Category tab mass-toggles all its cases;
      // ticking a checkbox in the Individual tab updates the same Set;
      // switching tabs preserves everything.
      const state_ = {
        tab: 'category',       // 'category' | 'individual'
        selectedCaseIds: new Set(),
        caseSearch: '',
        // Which category chips are currently expanded to show their
        // case rows. Default = collapsed so long lists don't dominate
        // the modal; users open just the ones they want to peek at.
        expandedCats: new Set(),
      };
      selectedCats.clear();     // categories are derived from selectedCaseIds now
      const container = el('div', { class: 'agent-clarify-catpicker' });

      const allCases = (state.cases || []).slice().sort((a, b) => {
        const ka = categorizeCase(a) || '';
        const kb = categorizeCase(b) || '';
        if (ka !== kb) return ka.localeCompare(kb);
        return String(a.id || '').localeCompare(String(b.id || ''));
      });
      const casesByCat = {};
      for (const c of allCases) {
        const k = categorizeCase(c) || 'other';
        (casesByCat[k] = casesByCat[k] || []).push(c);
      }
      const labelToKey = (label) => {
        const s = String(label).trim().toLowerCase();
        for (const rule of (typeof CATEGORY_RULES !== 'undefined' ? CATEGORY_RULES : [])) {
          if (rule.label.toLowerCase() === s) return rule.key;
          if (rule.key.toLowerCase() === s) return rule.key;
        }
        return null;
      };
      // A category is "fully selected" iff ALL its cases are in the Set.
      // "Partially selected" iff at least one but not all are.
      const catState = (label) => {
        const key = labelToKey(label);
        if (!key) return { key: null, cases: [], full: false, partial: false };
        const cases = casesByCat[key] || [];
        if (!cases.length) return { key, cases, full: false, partial: false };
        let inSet = 0;
        for (const c of cases) if (state_.selectedCaseIds.has(c.id)) inSet += 1;
        return {
          key, cases,
          full: inSet === cases.length,
          partial: inSet > 0 && inSet < cases.length,
          count: inSet,
        };
      };
      const toggleCategory = (label) => {
        const s = catState(label);
        if (!s.key) return;
        if (s.full) s.cases.forEach((c) => state_.selectedCaseIds.delete(c.id));
        else s.cases.forEach((c) => state_.selectedCaseIds.add(c.id));
      };

      // ── Tab bar (always visible) ─────────────────────────────────
      function renderTabBar() {
        return el('div', { class: 'agent-cat-tabs' },
          el('button', {
            class: 'agent-cat-tab' + (state_.tab === 'category' ? ' is-active' : ''),
            type: 'button',
            onclick: (ev) => { ev.preventDefault(); state_.tab = 'category'; render(); },
          }, 'By Primary Category'),
          el('button', {
            class: 'agent-cat-tab' + (state_.tab === 'individual' ? ' is-active' : ''),
            type: 'button',
            onclick: (ev) => { ev.preventDefault(); state_.tab = 'individual'; render(); },
          }, 'Individual pick'),
          el('div', { class: 'agent-cat-tabs-count' },
            state_.selectedCaseIds.size
              ? `已选 ${state_.selectedCaseIds.size} 个 case`
              : '还没选'),
        );
      }

      // ── Category tab body ─────────────────────────────────────────
      function renderCategoryBody() {
        return el('div', { class: 'agent-cat-tab-body' },
          el('div', { class: 'agent-clarify-modal-help' },
            '点分类整块勾/取消（该分类下所有 case 一起选）。旁边 ▸ 展开可以看包含哪些 case。已选中的 case 在 Individual pick 里也是同步打勾的。',
          ),
          el('div', { class: 'agent-cat-chip-list' },
            ...(clar.suggestions || []).map((label) => renderCatChipBlock(label)),
          ),
        );
      }

      function renderCatChipBlock(label) {
        const s = catState(label);
        const stateClass = s.full ? ' is-selected' : (s.partial ? ' is-partial' : '');
        const isExpanded = state_.expandedCats.has(label);
        const chipLabel = s.key
          ? el('button', {
              class: 'agent-clarify-modal-chip agent-cat-chip-select' + stateClass,
              type: 'button',
              onclick: (ev) => { ev.preventDefault(); toggleCategory(label); render(); },
            },
              // Tri-state indicator box
              el('span', { class: 'agent-cat-tri-box' + stateClass },
                s.full ? '✓' : (s.partial ? '−' : '')),
              label,
              el('span', { class: `cat-tag cat-${s.key}`, style: 'margin-left:8px;' },
                s.partial ? `${s.count}/${s.cases.length}` : `${s.cases.length}`),
            )
          : el('span', { class: 'agent-cat-chip-empty' }, `${label}（未知分类）`);

        const block = el('div', { class: 'agent-cat-chip-block' + (isExpanded ? ' is-expanded' : '') },
          el('div', { class: 'agent-cat-chip-head' },
            chipLabel,
            s.key ? el('button', {
              class: 'agent-cat-chip-expand',
              type: 'button',
              title: isExpanded ? '收起 case 列表' : '展开看这个分类下的 case',
              onclick: (ev) => {
                ev.preventDefault();
                if (isExpanded) state_.expandedCats.delete(label);
                else state_.expandedCats.add(label);
                render();
              },
            }, isExpanded ? '▾' : '▸') : null,
          ),
        );
        // Case rows are hidden by default — the user opens the block
        // explicitly with the arrow. Individual tab is still the place
        // for scanning all cases; this expansion is for a quick peek.
        if (isExpanded) {
          block.appendChild(el('div', { class: 'agent-cat-chip-cases' },
            s.cases.length
              ? s.cases.map((c) => renderCaseRow(c, 'compact'))
              : el('div', { class: 'agent-cat-chip-empty' }, '这个分类下暂时没有 case。'),
          ));
        }
        return block;
      }

      // ── Individual tab body ────────────────────────────────────────
      function renderIndividualBody() {
        const q = state_.caseSearch.trim().toLowerCase();
        const filtered = allCases.filter((c) => {
          if (!q) return true;
          return (c.id || '').toLowerCase().includes(q)
            || (caseTitle(c) || '').toLowerCase().includes(q);
        });
        const bulkBtn = (label, action) => el('button', {
          class: 'btn mini', type: 'button',
          onclick: (ev) => { ev.preventDefault(); action(); render(); },
        }, label);
        return el('div', { class: 'agent-cat-tab-body' },
          el('div', { class: 'agent-clarify-modal-help' },
            '按 case 一个一个勾。 Category tab 里选中的会在这里显示成打勾，取消也是双向同步。',
          ),
          el('div', { class: 'agent-cat-ind-toolbar' },
            el('input', {
              type: 'search',
              class: 'agent-cat-ind-search',
              placeholder: '搜 case id / 标题…',
              value: state_.caseSearch,
              oninput: (ev) => {
                state_.caseSearch = ev.target.value;
                render();
                setTimeout(() => document.querySelector('.agent-cat-ind-search')?.focus(), 0);
              },
            }),
            bulkBtn('全选可见', () => filtered.forEach((c) => state_.selectedCaseIds.add(c.id))),
            bulkBtn('清空', () => state_.selectedCaseIds.clear()),
          ),
          el('div', { class: 'agent-cat-ind-scroll' },
            filtered.length
              ? filtered.map((c) => renderCaseRow(c, 'full'))
              : el('div', { class: 'agent-cat-chip-empty' }, '没有匹配的 case。'),
          ),
        );
      }

      // ── Shared case row (used by both tabs) ────────────────────────
      function renderCaseRow(c, variant) {
        const key = categorizeCase(c) || 'other';
        const meta = categoryMeta(key);
        const isChecked = state_.selectedCaseIds.has(c.id);
        return el('label', {
          class: `agent-cat-ind-row${isChecked ? ' is-checked' : ''} agent-cat-ind-row--${variant}`,
        },
          el('input', {
            type: 'checkbox',
            checked: isChecked ? '' : null,
            onchange: (ev) => {
              if (ev.target.checked) state_.selectedCaseIds.add(c.id);
              else state_.selectedCaseIds.delete(c.id);
              render();
            },
          }),
          el('span', { class: 'agent-cat-ind-id' }, '#' + c.id),
          el('span', { class: 'agent-cat-ind-title' }, caseTitle(c) || '—'),
          el('span', { class: `cat-tag cat-${key}` }, meta?.label || key),
        );
      }

      function render() {
        container.replaceChildren(
          renderTabBar(),
          state_.tab === 'category' ? renderCategoryBody() : renderIndividualBody(),
        );
      }

      render();

      // Expose selected case IDs to the outer collectAnswer wrapper.
      container._collectExtras = () => {
        if (!state_.selectedCaseIds.size) return '';
        return `使用 case: ${[...state_.selectedCaseIds].join(', ')}`;
      };
      // Raw accessor — used by the direct-execute path in the clarification
      // modal (skips the LLM retry when the create-project plan is already
      // fully specified via the params editor above the picker).
      container._getSelectedCaseIds = () => [...state_.selectedCaseIds];

      return container;
    }

    // Collapsible parameter editor rendered above the case picker when a
