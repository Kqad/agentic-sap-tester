      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red);
      animation: pulse-live-tut 1.2s infinite;
    }
    .tut-mock-sap-screen {
      background: #0b2542; border: 1px solid #1c3a5c;
      min-height: 180px;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .tut-mock-sap-topbar {
      background: #003253;
      display: flex; align-items: center; gap: 10px;
      padding: 6px 12px;
    }
    .tut-mock-sap-logo {
      background: #fff; color: #003253;
      font-weight: 900; font-size: 11px;
      padding: 3px 8px;
    }
    .tut-mock-sap-body {
      flex: 1; display: grid;
      grid-template-columns: 200px 1fr;
      background:
        radial-gradient(circle at 70% 50%, rgba(125, 204, 255, 0.25) 0%, transparent 50%),
        repeating-radial-gradient(circle at 70% 50%, rgba(255,255,255,0.04) 0px, rgba(255,255,255,0.04) 16px, transparent 16px, transparent 32px),
        #0b2542;
      padding: 10px;
      gap: 12px;
    }
    .tut-mock-sap-dropdown {
      background: #fff;
      padding: 4px 0;
      align-self: flex-start;
      min-width: 160px;
      box-shadow: 2px 4px 8px rgba(0,0,0,0.3);
    }
    .tut-mock-sap-dd-item {
      padding: 4px 12px;
      font-size: 11px;
      color: #333;
    }
    .tut-mock-sap-dd-item.is-active {
      background: #d1e4ff;
      color: #003253; font-weight: 700;
    }
    .tut-mock-sap-tree {
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      align-self: flex-end;
      line-height: 1.8;
    }
    .tut-mock-sap-water {
      grid-column: 2;
      position: absolute; pointer-events: none;
    }

    /* Fake button — visually identical to real .a-button */
    .tut-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 8px 14px; font-size: 13px; font-weight: 800;
      border: 1px solid transparent;
    }
    .tut-btn--brand-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
    .tut-btn--brand-secondary { background: #fff; color: var(--blue); border-color: var(--blue); }
    .tut-btn--neutral-secondary { background: #fff; color: var(--ink); border-color: var(--line); }

    /* Fake input — empty placeholder vs filled value */
    .tut-input {
      display: block; padding: 8px 12px;
      background: #fff; border: 1px solid var(--line);
      font-size: 13px;
      color: var(--muted);
      font-family: ui-monospace, Consolas, monospace;
    }
    .tut-input.is-filled { color: var(--ink); font-weight: 600; }

    /* Numbered red callout — same shape as case-studio's Cache Debug guide */
    .tut-callout {
      position: absolute;
      width: 24px; height: 24px;
      background: var(--red); color: #fff;
      border-radius: 50%;
      display: grid; place-items: center;
      border: 1px solid rgba(255,255,255,0.92);
      font-size: 11px; font-weight: 900;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.7), 0 3px 8px rgba(237,0,7,0.28);
      z-index: 10;
      pointer-events: none;
    }
    /* Variant for callouts overlaid on real screenshots — slightly larger
       + a wider white halo so they pop against any background pixel-art. */
    .tut-callout--on-shot {
      width: 22px; height: 22px;
      font-size: 10px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.72), 0 3px 8px rgba(237,0,7,0.28);
    }
    .tut-callout.is-editing {
      pointer-events: auto;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }
    .tut-callout.is-editing:active { cursor: grabbing; }

    /* Real-screenshot mockup wrapper — image fills width, callouts get
       positioned over it via top/left % so they scale with the image. */
    .tut-mock--shot {
      padding: 0;
      overflow: hidden;
      background: #fafafa;
    }
    .tut-shot-img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 1px;
    }

    .tut-after {
      background: #fff;
      border: 1px solid var(--g-gray-90);
      border-left: 3px solid var(--signal-success);
      padding: 14px 18px;
      border-radius: 4px;
      margin-top: 4px;
    }

    /* Failure Analytics — project + dept tagged failure rows */
    .fa-failure-row {
      background: #fff; border: 1px solid var(--line);
      border-left: 4px solid var(--red);
      padding: 12px 14px; margin-bottom: 10px;
      display: grid; gap: 6px;
    }
    .fa-tag-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .fa-project-pill {
      background: var(--g-blue-95); color: var(--g-blue-30);
      padding: 2px 10px; font-size: 11px; font-weight: 800;
      border: 1px solid #b8d6f0;
    }
    .fa-no-project {
      background: var(--g-gray-95); color: var(--muted);
      padding: 2px 10px; font-size: 11px; font-weight: 700;
      font-style: italic;
    }
    .fa-case-line {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 10px; font-size: 13px; color: var(--navy);
    }
    .fa-when { font-size: 11px; color: var(--muted); }
    .fa-error {
      font-family: ui-monospace, Consolas, monospace; font-size: 11.5px;
      color: #7c2d12; background: #fef2f2;
      padding: 8px 10px; border-left: 3px solid var(--red);
      white-space: pre-wrap; word-break: break-word;
    }
    .fa-actions { display: flex; gap: 6px; margin-top: 4px; }

    /* Read-only param value display (project inline editor) */
    .inline-ro-value {
      background: var(--g-gray-95);
      padding: 6px 10px;
      font-family: ui-monospace, Consolas, monospace;
      font-size: 12px;
      color: var(--ink);
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid var(--line);
    }
    .inline-ro-value.is-override {
      background: #fff7ed;
      border-color: #fdba74;
      color: #7c2d12;
    }
    .inline-ro-value code {
      background: transparent; padding: 0;
      font-family: inherit; color: inherit;
    }
    .inline-ro-tag {
      font-size: 9px; font-weight: 900; letter-spacing: 0.06em;
      background: var(--amber); color: #5b3f00;
      padding: 1px 5px;
    }

    /* Reports — project-grouped layout */
    .rp-project-card {
      border: 1px solid var(--line); background: #fff;
      margin-bottom: 10px;
    }
    .rp-project-card.is-open { box-shadow: 0 2px 12px rgba(11, 107, 220, 0.1); }
    .rp-project-head {
      padding: 12px 14px;
      display: flex; gap: 10px; align-items: flex-start;
      cursor: pointer;
    }
    .rp-project-head:hover { background: #f8fbff; }
    .rp-project-name { font-weight: 900; color: var(--navy); font-size: 14px; }
    .rp-project-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
    .rp-project-body {
      border-top: 1px dashed var(--line);
      background: #fbfcfe; padding: 4px 14px 12px;
    }
    .rp-case-row {
      display: flex; gap: 10px; align-items: center;
      padding: 9px 0; border-bottom: 1px dashed var(--g-gray-95);
    }
    .rp-case-row:last-child { border-bottom: 0; }
    .rp-case-name { font-weight: 700; color: var(--navy); font-size: 12.5px; }
    .rp-case-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Case Library — read-only catalog with per-case usage drilldown */
    .cl-case-card {
      border: 1px solid var(--line);
      background: #fff;
      margin-bottom: 8px;
      transition: box-shadow 0.15s;
    }
    .cl-case-card.is-open { box-shadow: 0 2px 12px rgba(11, 107, 220, 0.1); }
    .cl-case-head {
      padding: 10px 12px;
      display: flex; gap: 10px; align-items: flex-start;
      cursor: pointer;
    }
    .cl-case-head:hover { background: #f8fbff; }
    .cl-expand-btn {
      width: 24px; height: 24px;
      background: transparent; border: 1px solid var(--line);
      color: var(--navy); font-weight: 800; cursor: pointer;
      border-radius: 0;
    }
    .cl-case-name {
      font-weight: 800; color: var(--navy); font-size: 13px;
    }
    .cl-readonly-badge {
      font-size: 9px; font-weight: 900; letter-spacing: 0.1em;
      background: var(--g-gray-95); color: var(--g-gray-50);
      padding: 3px 7px; border-radius: 0;
      align-self: center;
    }
    /* Tag rows — two visually distinct hierarchies (category vs dept).
     * Each row has a small label on the left + flexible tag area on the
     * right. Category row uses the existing colored cat-tag (intrinsic
     * to the case); dept row uses filled pills (extrinsic — usage). */
    /* Case Library — calm but legible. Dept chips have a clear outline so
     * users see them as clickable; the row labels carry the 🏷 / 🏢 icon
     * back (user explicitly asked for them — they help anchor each row's
     * meaning at a glance). */
    .cl-tags-row {
      display: flex; gap: 12px; align-items: baseline;
      margin-top: 6px; flex-wrap: wrap;
    }
    .cl-row-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      color: #94a3b8; text-transform: uppercase;
      min-width: 56px;
    }
    .cl-tags-row--category .cl-row-label::before { content: '🏷  '; opacity: 0.7; }
    .cl-tags-row--dept     .cl-row-label::before { content: '🏢  '; opacity: 0.7; }
    .cl-cat-tag {
      font-size: 11px !important;
      padding: 2px 9px !important;
      font-weight: 700 !important;
      border-radius: 3px !important;
    }
    .cl-tags {
      display: flex; gap: 6px;
      flex-wrap: wrap;
    }
    .cl-tag-wrap { display: inline-flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    /* Outline chip — clearly clickable now (1.5px border + subtle bg tint),
     * but the color stays restrained until hover/open. */
    .cl-biz-chip {
      background: #f8fafc;
      color: var(--navy);
      border: 1.5px solid #94a3b8;
      padding: 4px 10px;
      font-size: 12px; font-weight: 700;
      letter-spacing: 0;
      cursor: pointer;
      border-radius: 4px;
      display: inline-flex; align-items: center; gap: 6px;
      transition: all 0.12s;
    }
    .cl-biz-chip:hover {
      border-color: var(--blue);
      color: var(--blue);
      background: #eff6ff;
    }
    .cl-biz-chip.is-open {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
      box-shadow: 0 2px 6px rgba(0,123,192,0.25);
    }
    .cl-biz-text { font-weight: 700; }
    .cl-biz-count {
      background: #fff;
      color: #475569;
      border: 1px solid #cbd5e1;
      padding: 0 6px; font-size: 10.5px; font-weight: 700;
      min-width: 18px; text-align: center;
      border-radius: 9px;
      line-height: 14px;
    }
    .cl-biz-chip.is-open .cl-biz-count {
      background: rgba(255,255,255,0.22);
      border-color: rgba(255,255,255,0.4);
      color: #fff;
    }
    /* Project drop-row — lives BELOW the dept chip row, on its own line,
       so opening a chip doesn't squeeze it sideways. Each entry shows
       "#N project-name · dept" in a compact button. */
    .cl-proj-drop {
      margin-top: 4px;
      margin-left: 56px;  /* align with chip area, skip the row-label gutter */
      padding-left: 12px;
      border-left: 2px solid #cbd5e1;
    }
    .cl-proj-drop .cl-row-label { display: none; }
    .cl-proj-drop-list {
      display: flex; gap: 6px;
      flex-wrap: wrap;
    }
    .cl-proj-entry {
      background: #f8fafc; color: var(--navy);
      border: 1px solid #cbd5e1;
      padding: 4px 10px; font-size: 12px; font-weight: 600;
      cursor: pointer; border-radius: 4px;
      display: inline-flex; align-items: center; gap: 6px;
      transition: all 0.12s;
    }
    .cl-proj-entry:hover {
      background: #eff6ff;
      border-color: var(--blue);
      color: var(--blue);
    }
    .cl-proj-entry-seq {
      font-family: ui-monospace, Consolas, monospace;
      background: #fff;
      color: #475569;
      border: 1px solid #cbd5e1;
      padding: 0 5px;
      font-size: 10.5px; font-weight: 800;
      border-radius: 3px;
      line-height: 16px;
    }
    .cl-proj-entry-name { font-weight: 700; }
    .cl-proj-entry-biz {
      font-size: 10px; font-weight: 700;
      color: #94a3b8;
      padding-left: 4px;
      border-left: 1px solid #cbd5e1;
      margin-left: 2px;
    }
    /* Case Library toolbar — search widget on the left, Sort segmented
       buttons on the right. Matches the My Projects / Run Reports
       search style so the page reads consistently. */
    .cl-toolbar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .cl-search-group { display: inline-flex; align-items: center; gap: 8px; }
    .cl-search-input {
      width: 320px;
      height: 32px; box-sizing: border-box;
      padding: 0 12px;
      font-size: 13px; line-height: 1;
      border: 1px solid var(--line); border-radius: 4px;
      background: #fff; font-family: inherit;
    }
    .cl-search-input::placeholder { color: var(--muted); font-size: 12.5px; }
    .cl-search-input:focus {
      outline: 2px solid var(--blue); outline-offset: -1px;
      border-color: var(--blue);
    }
    .cl-search-btn {
      height: 32px; box-sizing: border-box;
      padding: 0 16px;
      font-size: 13px; font-weight: 700; line-height: 1;
      white-space: nowrap;
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--blue); border-radius: 4px;
      background: var(--blue); color: #fff;
      cursor: pointer;
    }
    .cl-search-btn:hover { background: var(--blue-pressed, #0a5fc4); }
    .cl-sort {
      display: inline-flex; align-items: center; gap: 4px;
      margin-left: auto;
    }
    .cl-sort-label {
      font-size: 10px; font-weight: 800; letter-spacing: 0.06em;
      color: #94a3b8; text-transform: uppercase;
      margin-right: 4px;
    }
    .cl-sort-btn {
      background: #fff; color: var(--navy);
      border: 1px solid #cbd5e1;
      padding: 4px 12px;
      font-size: 12px; font-weight: 700;
      cursor: pointer; border-radius: 4px;
      transition: all 0.12s;
    }
    .cl-sort-btn:hover { border-color: var(--blue); color: var(--blue); }
    .cl-sort-btn.active {
      background: var(--blue); color: #fff; border-color: var(--blue);
    }
    .cl-no-dept {
      font-size: 11px; color: var(--muted); font-style: italic;
    }
    .cl-case-body { border-top: 1px dashed var(--line); padding: 14px; background: #fbfcfe; }
    .cl-params-list { display: flex; flex-direction: column; gap: 6px; }
    .cl-param-row { display: flex; gap: 10px; align-items: center; font-size: 12px; }
    .cl-param-key { color: var(--navy); font-weight: 700; min-width: 200px; }
    .cl-param-val {
      background: var(--g-gray-95); padding: 2px 8px;
      font-family: ui-monospace, Consolas, monospace; font-size: 12px;
    }

    /* Live Channels — "show last N" selector chips */
    .lc-show-selector {
      display: flex; align-items: center; gap: 4px;
    }
    .lc-show-chip {
      background: #fff; color: var(--muted);
      border: 1px solid var(--line);
      padding: 4px 12px;
      font-size: 12px; font-weight: 700;
      border-radius: 0; cursor: pointer;
      transition: all 0.12s;
    }
    .lc-show-chip:hover { border-color: var(--blue); color: var(--blue); }
    .lc-show-chip.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    .lc-broadcast-card { margin-bottom: 12px; }
    .lc-broadcast-title {
      cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px;
      transition: background 0.12s ease;
    }
    .lc-broadcast-title:hover { background: #f1f5f9; }
    .lc-broadcast-card.is-open .lc-broadcast-title { border-bottom: 1px solid var(--line); }
    .lc-title-main {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      min-width: 0; flex: 1;
    }
    .lc-caret { color: var(--muted); font-weight: 900; margin-right: 4px; }
    .lc-broadcast-actions {
      display: flex; gap: 6px; align-items: center; flex-shrink: 0;
    }
    @keyframes finished-pop {
      0%   { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .finished-row.is-pass {
      background: #f0fdf4;
      border-color: #86efac;
      box-shadow: 0 2px 8px rgba(34, 197, 94, 0.10);
    }
    .finished-row.is-fail {
      background: #fef2f2;
      border-color: #fca5a5;
      box-shadow: 0 2px 8px rgba(239, 68, 68, 0.10);
    }
    .finished-badge {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: grid; place-items: center;
      color: #fff;
      font-weight: 900;
      font-size: 15px;
      flex: 0 0 auto;
    }
    .finished-row.is-pass .finished-badge { background: #16a34a; }
    .finished-row.is-fail .finished-badge { background: #dc2626; }

    /* Shake animation for failed rows — same vibe as the dev console
     * .is-fail card pulse. Plays once when a case fails, then leaves the
     * sustained `.row-glow-fail` pulse below to keep the row prominent. */
    @keyframes shake-fail {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-3px, 0, 0); }
      40%, 60% { transform: translate3d(3px, 0, 0); }
    }
    .shake-fail {
      animation: shake-fail 1.1s cubic-bezier(.36,.07,.19,.97) both;
      box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.25) !important;
    }
    /* Per-case "just finished" pulse — single play, 4 seconds, fades
     * to neutral and stays there. animation-fill-mode: forwards holds
     * the final keyframe so it doesn't snap back to the start. Inline
     * negative animation-delay (set in buildFinishedPanel) resumes the
     * animation across re-renders instead of restarting it. */
    @keyframes row-glow-pass {
      0%   { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.55), 0 2px 8px rgba(34, 197, 94, 0.10); }
      30%  { box-shadow: 0 0 0 16px rgba(34, 197, 94, 0),   0 2px 18px rgba(34, 197, 94, 0.35); }
      100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0),      0 2px 8px rgba(34, 197, 94, 0); }
    }
    @keyframes row-glow-fail {
      0%   { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.55), 0 2px 8px rgba(239, 68, 68, 0.10); }
      30%  { box-shadow: 0 0 0 16px rgba(239, 68, 68, 0),  0 2px 18px rgba(239, 68, 68, 0.35); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0),     0 2px 8px rgba(239, 68, 68, 0); }
    }
    .row-glow-pass { animation: row-glow-pass 4s ease-out 1 forwards; }
    .row-glow-fail { animation: row-glow-fail 4s ease-out 1 forwards; }
    /* Batch-done one-shot celebration on the takeover header — gently
     * pulses ~5s after every case finished. animation-delay is set
     * inline based on elapsed time so re-renders during the 5s window
     * resume the animation at the right point instead of restarting. */
    @keyframes batch-done-flash {
      0%   { box-shadow: 0 0 0 0 rgba(11,107,220,0); }
      8%   { box-shadow: 0 0 0 22px rgba(11,107,220,0.40); }
      40%  { box-shadow: 0 0 0 30px rgba(11,107,220,0); }
      100% { box-shadow: 0 0 0 0 rgba(11,107,220,0); }
    }
    .batch-done-flash {
      animation: batch-done-flash 5s ease-out 1 both;
      border-radius: 4px;
    }
    /* Whole-row cursor + hover when clickable (opens result detail modal). */
    .finished-row.is-clickable { cursor: pointer; transition: transform 0.12s ease, filter 0.12s ease; }
    .finished-row.is-clickable:hover { transform: translateY(-1px); filter: brightness(1.02); }

    /* ── Result detail modal — pops on click of a finished row. Shows
     * the why (pass summary / fail reason), last screenshot, and the
     * usual Report/Log/Run-again actions. */
    .result-detail-modal {
      width: min(720px, 92vw);
      max-height: 88vh;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .result-detail-modal .rd-head {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #fff;
    }
    .result-detail-modal.is-pass .rd-head { background: linear-gradient(135deg, #15803d, #16a34a); }
    .result-detail-modal.is-fail .rd-head { background: linear-gradient(135deg, #b91c1c, #dc2626); }
    .result-detail-modal .rd-badge {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.18);
      display: grid; place-items: center;
      font-weight: 900; font-size: 22px;
    }
    .result-detail-modal .rd-title { font-size: 17px; font-weight: 900; line-height: 1.2; }
    .result-detail-modal .rd-sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .result-detail-modal .rd-close {
      margin-left: auto;
      background: rgba(255,255,255,0.18);
      border: 0; color: #fff; font-weight: 800;
      width: 32px; height: 32px; border-radius: 6px;
      cursor: pointer;
    }
    .result-detail-modal .rd-body {
      padding: 18px 20px;
      overflow-y: auto;
      flex: 1;
    }
    .result-detail-modal .rd-section-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); font-weight: 800; margin: 0 0 6px;
    }
    .result-detail-modal .rd-reason {
      background: #fff7ed; border: 1px solid #fed7aa;
      padding: 10px 12px; border-radius: 8px;
      font-size: 13px; line-height: 1.55; color: #7c2d12;
      white-space: pre-wrap; word-break: break-word;
    }
    .result-detail-modal.is-pass .rd-reason {
      background: #f0fdf4; border-color: #bbf7d0; color: #14532d;
    }
    .result-detail-modal .rd-screenshot {
      width: 100%; border-radius: 8px; border: 1px solid var(--line);
      background: #0b1f35;
      display: block;
      max-height: 340px; object-fit: contain;
    }
    .result-detail-modal .rd-stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px; margin-top: 6px;
    }
    .result-detail-modal .rd-stat {
      background: var(--soft); padding: 8px 10px; border-radius: 6px;
    }
    .result-detail-modal .rd-stat b { display: block; font-size: 14px; color: var(--navy); }
    .result-detail-modal .rd-stat span { font-size: 11px; color: var(--muted); }
    .result-detail-modal .rd-foot {
      padding: 12px 20px;
      border-top: 1px solid var(--line);
      display: flex; gap: 8px; justify-content: flex-end;
      background: #fafafa;
    }

    /* Confetti canvas — pinned over its parent (takeover screen or
     * finished row). pointer-events: none so user can still click. */
    .confetti-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 30;
    }

    /* ── Run-history report modal ────────────────────────────────────
     * Two segmented controls (Scope + Group) at the top; below either a
     * flat list or grouped chunks of rows. Each row is a click-target
     * that opens the Midscene report for that single run. */
    .rh-modal {
      width: min(880px, 94vw);
      max-height: 86vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .rh-modal-body {
      overflow-y: auto;
      padding: 0;
      background: #f8fafc;
    }
    .rh-toolbar {
      display: flex; gap: 18px; align-items: center; flex-wrap: wrap;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .rh-toolbar-group { display: flex; align-items: center; gap: 8px; }
    .rh-toolbar-label {
      font-size: 11px; font-weight: 800; letter-spacing: 0.05em;
      color: var(--muted); text-transform: uppercase;
    }
    .rh-groups { display: grid; gap: 10px; padding: 14px 16px; }
    .rh-group { background: #fff; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .rh-group-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px;
      background: #f1f5f9; border-bottom: 1px solid var(--line);
    }
    .rh-group-name { font-weight: 900; color: var(--navy); font-size: 13px; }
    .rh-group-count { font-size: 11px; color: var(--muted); }
    /* Batch (clustered run) — the parent row; caret + timestamp + summary.
     * Header is clickable; expand reveals the per-case rh-list below. */
    .rh-batch {
      background: #fff; border: 1px solid var(--line); border-radius: 8px;
      overflow: hidden;
    }
    .rh-batch-head {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      background: #f8fafc;
      cursor: pointer;
      transition: background 0.12s ease;
    }
    .rh-batch-head:hover { background: #eff6ff; }
    .rh-batch.is-open .rh-batch-head { border-bottom: 1px solid var(--line); }
    .rh-batch-caret {
      color: var(--muted); font-weight: 900; font-size: 12px;
      display: grid; place-items: center;
    }
    .rh-batch-main { min-width: 0; }
    /* TITLE — project name + dept tag, the lead identifier of the row. */
    .rh-batch-title {
      font-weight: 900; color: var(--navy); font-size: 14px;
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    /* SUBTITLE — runtime (slightly emphasised, monospaced) + cases. */
    .rh-batch-sub {
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
      margin-top: 3px;
      font-size: 11.5px;
    }
    .rh-batch-when {
      color: #334155; font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .rh-batch-sep { color: var(--muted); }
    .rh-batch-cases {
      color: var(--muted);
      font-family: ui-monospace, Consolas, monospace;
    }
    .rh-batch-multi-pj-note { color: var(--muted); font-weight: 500; font-size: 11px; }
    .rh-batch-partial {
      color: #92400e; font-weight: 700;
      background: #fef3c7; padding: 2px 7px; border-radius: 3px;
      font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    /* Legacy alias — kept for the per-project history modal still uses it. */
    .rh-batch-time {
      font-weight: 900; color: var(--navy); font-size: 14px;
      font-variant-numeric: tabular-nums;
    }
    .rh-batch-summary { display: flex; gap: 10px; align-items: center; }
    .rh-batch-count { font-size: 11px; color: var(--muted); }
    .rh-batch-pass {
      font-size: 11px; font-weight: 800;
      background: #f0fdf4; color: #15803d;
      border: 1px solid #86efac; padding: 2px 8px; border-radius: 4px;
    }
    .rh-batch-fail {
      font-size: 11px; font-weight: 800;
      background: #fef2f2; color: #b91c1c;
      border: 1px solid #fca5a5; padding: 2px 8px; border-radius: 4px;
    }
    .rh-list { display: grid; }
    .rh-modal-body > .rh-list { background: #fff; margin: 14px 16px; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .rh-row {
      display: grid;
      grid-template-columns: 80px 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      border-top: 1px solid var(--g-gray-95);
      background: #fff;
      transition: background 0.12s ease;
    }
    .rh-list .rh-row:first-child { border-top: 0; }
    .rh-row.is-clickable { cursor: pointer; }
    .rh-row.is-clickable:hover { background: #eff6ff; }
    .rh-row.is-passed { box-shadow: inset 3px 0 0 0 #16a34a; }
    .rh-row.is-failed { box-shadow: inset 3px 0 0 0 #dc2626; }
    .rh-row.is-running { box-shadow: inset 3px 0 0 0 #2563eb; }
    .rh-batch.agent-highlight { overflow: visible; }
    .rh-row.agent-highlight {
      border-color: #0084d6;
      box-shadow:
        inset 3px 0 0 0 #0b7bd3,
        inset 0 0 0 999px rgba(0, 132, 214, 0.08),
        0 8px 22px rgba(0, 132, 214, 0.18) !important;
    }
    .rh-row-status { justify-self: start; font-size: 11px; }
    .rh-row-main { min-width: 0; }
    .rh-row-case { font-weight: 800; color: var(--navy); font-size: 13px; }
    .rh-row-title { color: var(--muted); font-weight: 500; }
    .rh-row-meta { font-size: 11px; color: var(--muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rh-row-pj-tag {
      background: #fef3c7; color: #92400e;
      font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px;
      border: 1px solid #fde68a;
      white-space: nowrap;
    }
    .rh-row-open {
      font-size: 11px; font-weight: 800; color: var(--blue);
      padding: 4px 10px; border: 1px solid var(--g-blue-90); border-radius: 4px;
      background: #eff6ff;
    }
    .rh-row.is-clickable:hover .rh-row-open { background: var(--blue); color: #fff; border-color: var(--blue); }
    .rh-row-noreport {
      font-size: 11px; color: var(--muted); padding: 4px 10px;
      border: 1px dashed var(--g-gray-85); border-radius: 4px;
    }
    .rh-batch-delete {
      width: 28px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      font-size: 18px;
      line-height: 1;
      font-weight: 900;
      color: #b91c1c;
      background: #fff;
      border: 1px solid #fecaca;
      border-radius: 50%;
      cursor: pointer;
    }
    .rh-batch-delete:hover { background: #fef2f2; border-color: #ef4444; }
    .rh-row-delete { display: none !important; }

    /* ── Run Reports toolbar — sub-tabs + search + date range
     * Every interactive element is forced to the same height (34px)
     * and same border so the row reads as a single coherent control bar
     * instead of a pile of mismatched boxes. */
    .rp-toolbar {
      display: flex; gap: 10px; align-items: center; flex-wrap: nowrap;
      padding: 12px 14px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
      white-space: nowrap;
    }
    /* Combined search input + button — no gap between them so they
     * read as one widget; bordered + radius shared. */
    .rp-search-group { display: inline-flex; align-items: center; }
    .rp-toolbar .rp-search-input,
    .rp-toolbar .rp-search-btn,
    .rp-toolbar .rp-date-input,
    .rp-toolbar .rp-clear-btn { height: 30px; box-sizing: border-box; }
    /* Search input — wide enough for the full bilingual placeholder
     * plus actual typing room. flex-shrink:0 prevents the toolbar's
     * flex layout from squishing this back down to a truncated state
     * when the date group on the right needs space. */
    .rp-search-input {
      width: 480px;
      flex-shrink: 0;
      padding: 0 12px;
      font-size: 12.5px;
      border: 1px solid var(--line); border-radius: 4px;
      background: #fff;
      font-family: inherit;
    }
    .rp-search-input::placeholder { font-size: 12px; color: var(--muted); }
    .rp-search-input:focus {
      outline: 2px solid var(--blue); outline-offset: -1px;
      border-color: var(--blue); position: relative; z-index: 1;
    }
    /* Search button — small gap from the input so it breathes. */
    .rp-search-btn {
      padding: 0 14px; font-size: 12px; font-weight: 700;
      margin-left: 8px;
      white-space: nowrap;
      display: inline-flex; align-items: center; gap: 4px;
      border: 1px solid var(--blue);
      border-radius: 4px;
      background: var(--blue); color: #fff;
      cursor: pointer;
    }
    .rp-search-btn:hover { background: var(--blue-pressed, #0a5fc4); }
    /* Filter icon — same role as in My Projects: tells users the date
     * inputs are a filter, not a "type your date here" form. Made bold
     * + boxed so it reads as an actual UI element, not a faint label. */
    .rp-filter-icon {
      display: inline-flex; align-items: center; gap: 6px;
      height: 30px; padding: 0 12px;
      font-size: 12.5px; font-weight: 900;
      color: var(--blue);
      letter-spacing: 0.04em;
      white-space: nowrap;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 4px;
    }
    .rp-filter-icon::before {
      content: '⚲'; font-size: 16px;
      font-weight: 900;
      transform: rotate(45deg); display: inline-block;
    }
    /* Spacer eats the slack so the date group docks to the far right. */
    .rp-toolbar-spacer { flex: 1; }
    .rp-date-group {
      display: inline-flex; gap: 6px; align-items: center;
      height: 30px;
    }
    .rp-date-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .rp-date-input {
      padding: 0 10px;
      border: 1px solid var(--line); border-radius: 4px;
      font-size: 12px;
      background: #fff; color: var(--ink);
      font-family: inherit;
    }
    .rp-date-input:focus {
      outline: 2px solid var(--blue); outline-offset: -1px;
      border-color: var(--blue);
    }
    .rp-clear-btn {
      padding: 0 10px; font-size: 12px;
      display: inline-flex; align-items: center;
      border: 1px solid var(--line); border-radius: 4px;
      background: #fff; color: var(--muted);
      cursor: pointer;
    }
    .rp-clear-btn:hover { background: #fef2f2; color: #b91c1c; border-color: #fca5a5; }

    /* ── My Projects filter bar — two rows so nothing gets squished.
     * Row 1: search widget + From/To dates + Clear.
     * Row 2: status chips on the left + AI search badge on the right.
     * Every interactive control is height:32, padding consistent. */
    .mp-filter-bar {
      display: grid; gap: 12px;
      padding: 14px 16px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }
    .mp-filter-row {
      display: flex; gap: 16px; align-items: center;
      flex-wrap: wrap; min-height: 32px;
    }
    .mp-search-group {
      display: inline-flex; align-items: stretch;
      flex-shrink: 0; height: 32px;
    }
    .mp-search-input {
      width: 360px;
      flex-shrink: 0;
      height: 32px; box-sizing: border-box;
      padding: 0 12px;
      font-size: 13px; line-height: 1;
      border: 1px solid var(--line); border-radius: 4px;
      background: #fff; font-family: inherit;
    }
    .mp-search-input:focus {
      outline: 2px solid var(--blue); outline-offset: -1px;
      border-color: var(--blue); position: relative; z-index: 1;
    }
    .mp-search-input::placeholder { color: var(--muted); font-size: 12.5px; }
    .mp-search-btn {
      height: 32px; box-sizing: border-box;
      padding: 0 16px;
      margin-left: 8px;
      font-size: 13px; font-weight: 700; line-height: 1;
      white-space: nowrap;
      flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--blue);
      border-radius: 4px;
      background: var(--blue); color: #fff;
      cursor: pointer;
    }
    .mp-search-btn:hover { background: var(--blue-pressed, #0a5fc4); }
    /* Filter icon badge — sits before the date group as a clear,
     * actionable visual cue that this is a filter region. */
    .mp-filter-icon {
      display: inline-flex; align-items: center;
      gap: 6px;
      height: 32px; padding: 0 12px;
      font-size: 12.5px; font-weight: 900;
      color: var(--blue);
      letter-spacing: 0.04em;
      white-space: nowrap;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 4px;
    }
    .mp-filter-icon::before {
      content: '⚲';
      font-size: 16px;
      transform: rotate(45deg);
      display: inline-block;
      font-weight: 900;
    }
    /* Status chip row — multi-select. Chip colours match the project
     * status pills so users can pattern-match by sight. */
    .mp-status-group {
      display: inline-flex; gap: 8px; align-items: center;
      flex-wrap: wrap; min-width: 0;
    }
    .mp-status-label {
      font-size: 11px; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-right: 6px;
    }
    .mp-status-chip {
      height: 28px; padding: 0 12px;
      font-size: 12px; font-weight: 700; line-height: 1;
      white-space: nowrap;
      border: 1px solid; border-radius: 999px;
      background: #fff; cursor: pointer;
      transition: background 0.12s ease, transform 0.08s ease;
      display: inline-flex; align-items: center;
    }
    .mp-status-chip:hover { transform: translateY(-1px); }
    .mp-status-chip.is-passed  { border-color: #86efac; color: #15803d; }
    .mp-status-chip.is-failed  { border-color: #fca5a5; color: #b91c1c; }
    .mp-status-chip.is-pending { border-color: #cbd5e1; color: #475569; }
    .mp-status-chip.is-running { border-color: #93c5fd; color: #1d4ed8; }
    .mp-status-chip.is-on.is-passed  { background: #dcfce7; box-shadow: inset 0 0 0 1px #15803d; }
    .mp-status-chip.is-on.is-failed  { background: #fee2e2; box-shadow: inset 0 0 0 1px #b91c1c; }
    .mp-status-chip.is-on.is-pending { background: #e2e8f0; box-shadow: inset 0 0 0 1px #475569; }
    .mp-status-chip.is-on.is-running { background: #dbeafe; box-shadow: inset 0 0 0 1px #1d4ed8; }
    .mp-clear-btn {
      margin-left: auto;
      height: 32px; padding: 0 12px; font-size: 12.5px;
      white-space: nowrap;
      display: inline-flex; align-items: center;
      border: 1px solid var(--line); border-radius: 4px;
      background: #fff; color: var(--muted);
      cursor: pointer; flex-shrink: 0;
    }
    .mp-clear-btn:hover { background: #fef2f2; color: #b91c1c; border-color: #fca5a5; }
    /* Date filter pair — From / To. */
    .mp-date-group {
      display: inline-flex; gap: 8px; align-items: center;
      height: 32px; flex-shrink: 0;
    }
    .mp-date-label {
      font-size: 11px; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .mp-date-input {
      height: 32px; box-sizing: border-box;
      padding: 0 10px;
      border: 1px solid var(--line); border-radius: 4px;
      font-size: 12.5px; line-height: 1;
      background: #fff; color: var(--ink);
      font-family: inherit;
    }
    .mp-date-input:focus {
      outline: 2px solid var(--blue); outline-offset: -1px;
      border-color: var(--blue);
    }
    /* Spacer eats slack so the date group hugs the right edge. */
    .mp-filter-spacer { flex: 1; min-width: 0; }
    /* AI search badge — sits between search widget and date group on
     * row 1, so it reads as the search's status indicator. */
    .mp-ai-badge {
      display: inline-flex; gap: 6px; align-items: center;
      height: 28px; box-sizing: border-box;
      padding: 0 12px; border-radius: 999px;
      font-size: 12px; font-weight: 700;
      white-space: nowrap; flex-shrink: 0;
    }
    .mp-ai-loading {
      background: #eff6ff; color: #1d4ed8; border: 1px solid #93c5fd;
    }
    .mp-ai-done {
      background: #f0fdf4; color: #15803d; border: 1px solid #86efac;
    }
    .mp-ai-error {
      background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5;
    }
    .mp-ai-spinner {
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid #93c5fd; border-top-color: transparent;
      animation: mp-ai-spin 0.8s linear infinite;
    }
    @keyframes mp-ai-spin {
      to { transform: rotate(360deg); }
    }

    /* ── Abort modal rows ────────────────────────────────────────── */
    .abort-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      background: #fff;
    }
    .abort-row.checked {
      background: #fff5f5;
      border-color: #fecaca;
    }
    .abort-row strong { font-size: 13px; display: block; color: var(--ink); }
    .abort-row .hint { display: block; margin-top: 1px; }

    /* ── Run Confirmation modal ────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(8, 22, 39, 0.52);
      backdrop-filter: blur(2px);
      display: grid;
      place-items: center;
      z-index: 60;
      animation: modal-in 0.14s ease-out;
    }
    @keyframes modal-in { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 24px 60px rgba(8, 22, 39, 0.32);
      width: min(540px, calc(100vw - 28px));
      max-height: calc(100vh - 60px);
      overflow: auto;
      border: 1px solid var(--line);
    }
    .modal-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f8fafc;
    }
    .modal-head .title {
      font-weight: 900;
      font-size: 17px;
      color: var(--navy);
    }
    .modal-head .sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }
    .modal-body { padding: 18px 20px; }
    .modal-body label.field {
      display: block;
      margin-bottom: 14px;
    }
    .modal-body label.field span {
      display: block;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.5px;
      color: #475467;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .modal-body input[type="text"] { height: 40px; font-size: 14px; }
    .modal-cases {
      max-height: 200px;
      overflow: auto;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fbfcfe;
      margin-bottom: 14px;
    }
    .modal-cases .item {
      font-size: 12px;
      color: #344054;
      padding: 4px 0;
      border-bottom: 1px dashed #e5ebf2;
    }
    .modal-cases .item:last-child { border: none; }
    .modal-foot {
      padding: 14px 20px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      background: #f8fafc;
    }
    .modal-foot .run-cta {
      padding: 12px 22px;
      min-height: 48px;
      font-size: 15px;
    }

    /* ── My Projects (expandable cards) ────────────────────────────── */
    /* Final Create Project modal overrides. These live after the generic
     * modal rules so the project picker keeps its Bosch spacing instead of
     * inheriting the compact confirmation-modal layout. */
    body .modal.cp-modal {
      border-radius: 0 !important;
      border-left: 0.25rem solid var(--blue) !important;
      overflow: hidden !important;
    }
    body .modal.cp-modal .modal-head {
      padding: var(--space-4) var(--space-6) !important;
      background: var(--g-gray-100) !important;
      border-bottom: 1px solid var(--line) !important;
      align-items: flex-start !important;
    }
    body .modal.cp-modal .modal-head .title {
      font-size: var(--text-xl) !important;
      line-height: 1.25 !important;
      font-weight: 700 !important;
      color: var(--ink) !important;
    }
    body .modal.cp-modal .modal-head .sub {
      font-size: var(--text-sm) !important;
      color: var(--muted) !important;
      margin-top: var(--space-1) !important;
    }
    body .modal.cp-modal .modal-body {
      padding: var(--space-4) var(--space-6) !important;
      background: var(--g-gray-100) !important;
    }
    body .modal.cp-modal .modal-foot {
      padding: var(--space-4) var(--space-6) !important;
      background: var(--g-gray-95) !important;
    }

    .project-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
      margin-bottom: 8px;
      box-shadow: 0 4px 10px rgba(21, 48, 79, 0.04);
    }
    .project-card.expanded {
      border-color: #93c0f5;
      box-shadow: 0 8px 20px rgba(11, 107, 220, 0.10);
    }
    .project-card.preset { border-style: dashed; }
    .project-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      cursor: pointer;
    }
    .project-head > .pj-info {
      flex: 1;
      min-width: 0;
    }
    .project-head:hover { background: #f7fbff; }
    .project-head .pc-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      font-size: 15px;
    }
    .project-head .pj-name {
      font-weight: 900;
      color: var(--navy);
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Sequence rail — large #N stamp on the far left of each project
       card. Eye-catching but neutral palette so it doesn't compete with
       the dept tag or run status pill. Oldest = #1, newest = #N. */
    .pj-seq-rail {
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      min-width: 44px;
      padding: 4px 8px;
      background: #f1f5f9;
      color: #334155;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      font-family: ui-monospace, Consolas, monospace;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    /* View-mode segmented control in the My Projects title row. Sized
     * to match the neighbouring "Select" / "+ New project" a-button.-small
     * buttons so the row reads as a coherent control bar. */
    .pj-view-seg {
      display: inline-flex;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      overflow: hidden;
      margin-right: 6px;
    }
    .pj-view-btn {
      background: #fff;
      color: var(--navy);
      border: 0;
      height: 2rem;                  /* match .a-button.-small (32px) */
      padding: 0 14px;
      font-size: var(--text-sm);     /* 14px — same as -small buttons */
      font-weight: 700;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .pj-view-btn + .pj-view-btn { border-left: 1px solid #cbd5e1; }
    .pj-view-btn:hover { background: #f1f5f9; color: var(--blue); }
    .pj-view-btn.active { background: var(--blue); color: #fff; }
    /* Department group card — only shown in "By department" view. Head
       row is the dept tag + project count + pass/fail aggregates. Body
       lists the regular project cards. */
    .pj-dept-group {
      border: 1px solid var(--g-gray-90);
      border-radius: 8px;
      background: #fff;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .pj-dept-group.is-open { border-color: #93c0f5; box-shadow: 0 4px 14px rgba(11,107,220,0.08); }
    .pj-dept-head {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
      background: #f8fafc;
    }
    .pj-dept-head:hover { background: #eff6ff; }
    .pj-dept-group.is-open .pj-dept-head { background: #eff6ff; border-bottom: 1px solid var(--g-gray-90); }
    .pj-dept-chev {
      font-size: 12px; font-weight: 800;
      color: var(--navy);
      width: 14px; text-align: center;
    }
    .pj-dept-name { margin-left: 0 !important; }
    .pj-dept-count {
      font-size: 11px; font-weight: 700;
      color: #64748b;
      background: #fff;
      border: 1px solid #cbd5e1;
      padding: 1px 8px;
      border-radius: 9px;
    }
    .pj-dept-stat {
      font-size: 11px; font-weight: 800;
      padding: 2px 9px;
      border-radius: 3px;
    }
    .pj-dept-stat--pass { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
    .pj-dept-stat--fail { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .pj-dept-body {
      padding: 10px 12px;
    }
    /* Drop project-card spacing inside the dept group so it looks tucked. */
    .pj-dept-body .project-card { margin-bottom: 6px; }
    .pj-dept-body .project-card:last-child { margin-bottom: 0; }
    /* Inline legend (mini tutorial) — sits above the project list and
       labels each visual piece a new user sees. Dismissable. */
    .pj-legend {
      background: linear-gradient(180deg, #eff6ff 0%, #fff 90%);
      border: 1px solid #bfdbfe;
      border-left: 4px solid var(--blue);
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #334155;
    }
    .pj-legend-title {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 10px; font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--blue);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .pj-legend-dismiss {
      background: transparent;
      border: 1px solid #bfdbfe;
      color: var(--blue);
      padding: 2px 9px;
      font-size: 11px; font-weight: 700;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: 0;
      text-transform: none;
    }
    .pj-legend-dismiss:hover { background: var(--blue); color: #fff; }
    .pj-legend-row {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 0;
      border-top: 1px dashed #cbd5e1;
      flex-wrap: wrap;
    }
    .pj-legend-row:first-of-type { border-top: 0; }
    .pj-legend-mono {
      background: #fff;
      border: 1px solid #cbd5e1;
      padding: 1px 7px;
      font-family: ui-monospace, Consolas, monospace;
      font-size: 11px;
      font-weight: 800;
      color: var(--navy);
      border-radius: 3px;
    }
    .pj-legend-chip {
      background: #fff;
      border: 1px solid;
      padding: 1px 7px;
      font-size: 10.5px;
      font-weight: 800;
      border-radius: 3px;
    }
    .project-head .pj-meta {
      color: var(--muted);
      font-size: 11px;
      margin-top: 1px;
    }
    /* Project-level business tag — sits next to the project name. One
     * tag per project replaces the old per-case tags inside expanded
     * project bodies. */
    /* Department tag — used across My Projects, Live Channels, Reports,
     * Failure Analytics, takeover header. Solid amber-fill instead of pale
     * tint so it pops against any background; uppercase + tracking for
     * extra visual weight. */
    .project-biz-tag {
      display: inline-block;
      margin-left: 10px;
      padding: 2px 8px 2px 7px;
      background: #fef3c7;
      color: #92400e;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.01em;
      border-radius: 3px;
      vertical-align: middle;
      border: 1px solid #fcd34d;
      border-left: 3px solid #d97706;
      text-transform: none;
    }
    /* Pass/Fail result tag — green when the whole project passed,
     * red+failed-count when any case failed. Shown below pj-meta only
     * for finished (non-running) projects. */
    .pj-result-tag {
      display: inline-block;
      margin-top: 3px;
      padding: 2px 8px;
      font-size: 11px; font-weight: 800;
      border-radius: 3px;
      letter-spacing: 0.02em;
    }
    .pj-result-tag.is-passed { background: #e5f6ed; color: #0b6a43; border: 1px solid #bfe8d2; }
    .pj-result-tag.is-failed { background: #ffe4e8; color: #9f1d2a; border: 1px solid #fecdd3; }
    /* Neutral "Not run yet · Ready to run" — gray so it doesn't compete
       visually with finished pass/fail tags. */
    .pj-result-tag.is-pending { background: #f1f4f9; color: #475569; border: 1px solid #cbd5e1; }
    /* My Projects row-level checkbox (select mode) and inline ✕ delete.
       Both live on .project-head — keep them compact so they don't push
       the Run / status / expand controls out of alignment. */
    .pj-row-check {
      width: 18px; height: 18px;
      margin: 0;
      cursor: pointer;
      accent-color: var(--g-blue-50);
      flex-shrink: 0;
    }
    /* Slot wrappers — the project-head is flexbox, so these only need to
       collapse cleanly when empty. Checkbox slot animates open in select
       mode; delete slot just disappears for presets (no width reserved). */
    .pj-check-slot {
      width: 0;
      transition: width 0.18s ease, margin-right 0.18s ease;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .pj-check-slot.is-active { width: 22px; margin-right: 6px; }
    .pj-del-slot {
      display: flex; align-items: center; justify-content: flex-end;
      flex-shrink: 0;
    }
    .pj-del-slot:empty { display: none; }
    /* Read-only project name in the Confirm Run modal — looks like a chip
       rather than a text input, so users don't try to click + retype. */
    .run-name-locked {
      display: inline-block;
      padding: 7px 12px;
      background: #f8fafc;
      border: 1px solid var(--g-gray-90);
      border-left: 3px solid var(--blue);
      color: var(--navy);
      font-weight: 700; font-size: 13px;
      border-radius: 3px;
    }
    .project-body {
      border-top: 1px dashed var(--line);
      padding: 12px 14px;
      background: #fbfcfe;
    }
    .pj-cases {
      display: grid;
      gap: 5px;
      margin-bottom: 10px;

    .pj-case-line {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
      transition: background 0.12s, border-color 0.12s;
    }
    /* Whole row click-to-expand affordance — pointer cursor + soft hover
       tint so the user knows they can click anywhere, not just on the
       Params chip. */
    .pj-case-line.is-clickable { cursor: pointer; }
    .pj-case-line.is-clickable:hover {
      background: #f8fafc;
      border-color: #cbd5e1;

    .pj-case-title-cell {

    /* Params indicator (used to be a real <button>, now a span — the row

    .pj-case-params-tag {

    .pj-case-line .pj-case-actions { display: flex; gap: 4px; }
    .pj-case-line .pj-case-actions .btn.mini {
