        .map((m) => m[1].trim())
        .filter(Boolean);
      if (quoted.length) return quoted;

      const qMatches = [...raw.matchAll(/\bQ\s*([1-4])\s*(?:test|测试|測試)?\b/gi)]
        .map((m) => `QE Q${m[1]} Test`);
      if (qMatches.length >= 2) return [...new Set(qMatches)];

      const marker = /(?:分别是|分別是|名字是|名称是|名稱是|叫做|叫|named?|names? are)(.+)$/i.exec(raw);
      if (!marker) return [];
      return marker[1]
        .split(/[,，、;；\n]|和|以及|and/i)
        .map((x) => x.trim())
        .map((x) => x.replace(/^(这个|這個|project|项目|專案)\s*/i, '').trim())
        .filter((x) => x.length >= 2 && x.length <= 80)
        .filter((x) => !/^(business|department|部门|部門|category|label)$/i.test(x));
    }

    function assistantParseExplicitCaseIds(text) {
      const raw = assistantNormalizeProjectText(text);
      const valid = new Set((state.cases || []).map((c) => c.id));
      const out = new Set();
      const add = (n) => {
        const id = `saptest${Number(n)}`;
        if (!valid.size || valid.has(id)) out.add(id);
      };
      for (const m of raw.matchAll(/\bsap\s*test\s*(\d{1,3})\b/gi)) add(m[1]);
      for (const m of raw.matchAll(/\bsaptest\s*(\d{1,3})\b/gi)) add(m[1]);
      for (const m of raw.matchAll(/\btest\s*case\s*(\d{1,3})\b/gi)) add(m[1]);
      for (const m of raw.matchAll(/\bcase\s*(\d{1,3})\b/gi)) add(m[1]);
      for (const m of raw.matchAll(/(?:cases?|test\s*cases?|saptests?|选\s*case|选择\s*case|包含\s*case)\s*((?:\d{1,3}\s*(?:[,，、]|和|and)?\s*){1,20})/gi)) {
        for (const n of m[1].matchAll(/\d{1,3}/g)) add(n[0]);
      }
      return [...out];
    }

    function assistantBuildProjectWorkflow(text) {
      if (!assistantLooksLikeProjectWorkflow(text)) return null;
      const count = assistantParseCount(text);
      let names = assistantParseProjectNames(text);
      const explicitCaseIds = assistantParseExplicitCaseIds(text);
      if (!names.length && count && /q|quarter|季度|q[1-4]/i.test(text)) {
        names = Array.from({ length: count }, (_, i) => `QE Q${i + 1} Test`);
      }
      if (count && names.length > 0 && names.length < count && names.some((n) => /\bQ[1-4]\b/i.test(n))) {
        names = Array.from({ length: count }, (_, i) => `QE Q${i + 1} Test`);
      }
      if (count && names.length === 1) {
        const base = names[0].replace(/\s*q\s*[1-4]\s*/i, ' ').replace(/\s+/g, ' ').trim();
        names = Array.from({ length: count }, (_, i) => `${base || 'QE'} Q${i + 1} Test`);
      }
      if (count && names.length > count) names = names.slice(0, count);
      const business = assistantParseBusiness(text);
      const cat = assistantCategoryFromText(text);
      const runNow = /create\s*&\s*run|创建.*跑|建立.*跑|run now|马上跑|立即跑|起跑/.test(text);
      const runFirstCount = Number((/(?:前|first)\s*(\d+)\s*(?:个|個)?[^,，;；。]*?(?:run|跑|create\s*&\s*run)/i.exec(text) || [])[1] || 0);
      const runLastCount = Number((/(?:后|後|last)\s*(\d+)\s*(?:个|個)?[^,，;；。]*?(?:run|跑|create\s*&\s*run)/i.exec(text) || [])[1] || 0);
      const options = assistantCategoryOptions();
      const projectCount = names.length || count || 1;
      const hasPartialRunPlan = runFirstCount > 0 || runLastCount > 0;
      const projects = (names.length ? names : Array.from({ length: count || 1 }, () => '')).map((name, idx) => ({
        name,
        business,
        categoryKey: explicitCaseIds.length ? '' : (assistantCategoryWasExplicit(text, cat.key) ? cat.key : ''),
        caseIds: explicitCaseIds,
        runsPerCase: 1,
        action: hasPartialRunPlan
          ? ((runFirstCount && idx < runFirstCount) || (runLastCount && idx >= projectCount - runLastCount) ? 'run' : 'save')
          : (runNow ? 'run' : 'save'),
        labels: [
          /regression|回归|回歸/i.test(text) ? 'regression' : '',
          business ? business.toLowerCase() : '',
          /q\s*([1-4])|q([1-4])|季度/i.test(name) ? (name.match(/q\s*([1-4])|q([1-4])/i)?.[0] || '').toUpperCase().replace(/\s+/g, '') : '',
        ].filter(Boolean),
      }));
      return {
        type: 'bulk_create_projects',
        sourceText: text,
        runNow,
        options,
        projects,
        needsReview: projects.some((p) => !p.name || !p.business || (!p.categoryKey && !(p.caseIds || []).length)),
        created: false,
      };
    }

    function assistantResolveWorkflowCaseIds(categoryKey) {
      if (!categoryKey) return [];
      if (Array.isArray(state.cases) && state.cases.length) {
        return state.cases.filter((c) => categorizeCase(c) === categoryKey).map((c) => c.id);
      }
      return Object.entries(FALLBACK_BUCKETS)
        .filter(([, bucket]) => bucket === categoryKey)
        .map(([id]) => id)
        .filter((id) => SUCCESS_CASE_IDS.includes(id));
    }

    // Resolve a draft project's case list — explicit caseIds win over
    // categoryKey. Lets the LLM emit `{ caseIds: ['saptest2'] }` for an
    // "Individual pick" style request without having to pick a category.
    function assistantResolveDraftCaseIds(p) {
      if (Array.isArray(p?.caseIds) && p.caseIds.length) {
        const valid = new Set((state.cases || []).map((c) => c.id));
        const filtered = p.caseIds.map(String).filter((id) => valid.has(id));
        if (filtered.length) return filtered;
      }
      return assistantResolveWorkflowCaseIds(p?.categoryKey);
    }

    async function assistantExecuteProjectWorkflow(plan, statusNode = null) {
      if (!plan || plan.created) return { ok: false, message: '这个计划已经执行过了。' };
      const drafts = plan.projects || [];
      const problems = [];
      drafts.forEach((p, i) => {
        if (!String(p.name || '').trim()) problems.push(`第 ${i + 1} 个 project 缺 project name`);
        if (!String(p.business || '').trim()) problems.push(`第 ${i + 1} 个 project 缺 business`);
        const ids = assistantResolveDraftCaseIds(p);
        if (!ids.length) problems.push(`第 ${i + 1} 个 project 没有可用 case (categoryKey + caseIds 都空)`);
      });
      if (problems.length) return { ok: false, message: problems.join('；') };

      const now = Date.now();
      const created = [];
      for (const [idx, p] of drafts.entries()) {
        const name = String(p.name || '').trim();
        const ids = assistantResolveDraftCaseIds(p);
        const runsPerCase = Number(p.runsPerCase) || 1;
        const dup = findDuplicateBatch(name, ids, runsPerCase);
        if (dup) {
          dup.business = String(p.business || '').trim();
          dup.labels = p.labels || [];
          dup.action = p.action || 'save';
          dup.updatedAt = new Date().toISOString();
          state.batches = [dup, ...state.batches.filter((x) => x.id !== dup.id)];
          created.push(dup);
          continue;
        }
        const batch = {
          id: `batch-${now}-${idx}`,
          name,
          business: String(p.business || '').trim(),
          labels: p.labels || [],
          createdAt: new Date(now + idx).toISOString(),
          caseIds: ids,
          runsPerCase,
          status: 'pending',
          passed: 0,
          failed: 0,
          caseOverrides: {},
          assistantCreated: true,
          action: p.action || 'save',
        };
        created.push(batch);
      }
      state.batches = [...created, ...state.batches.filter((b) => !created.some((c) => c.id === b.id))];
      saveBatches();
      plan.created = true;
      state.section = 'my-projects';
      renderAll();
      const toRun = created.filter((p) => p.action === 'run');
      if (toRun.length) {
        for (let i = 0; i < toRun.length; i += 1) {
          const p = toRun[i];
          if (statusNode) statusNode.textContent = `已创建 ${created.length} 个 project；正在按顺序运行 ${i + 1}/${toRun.length}: ${p.name}`;
          await runCases(p.caseIds || [], {
            name: p.name,
            runsPerCase: p.runsPerCase || 1,
            batchId: p.id,
          });
        }
        return { ok: true, message: `已创建 ${created.length} 个 project；${toRun.length} 个已按顺序运行完成。`, projects: created };
      }
      return { ok: true, message: `已创建 ${created.length} 个 project，放到 My Projects 顶部。`, projects: created };
    }

    function assistantWorkflowMissingFields(plan) {
      const missing = new Set();
      for (const p of plan?.projects || []) {
        if (!String(p.name || '').trim()) missing.add('name');
        if (!String(p.business || '').trim()) missing.add('business');
        if (!String(p.categoryKey || '').trim() && !(p.caseIds || []).length) missing.add('category');
      }
      return [...missing];
    }

    function assistantWorkflowQuestion(missing) {
      if (missing.includes('business')) return '这个 project 的部门 / business 是什么？填好后我就能继续创建。';
      if (missing.includes('category')) return '这些 project 要选哪个 Primary Category？如果不确定，先看截图里的分类位置。';
      if (missing.includes('name')) return '这些 project 分别叫什么名字？请在每一行填 project name。';
      return '我已经整理好计划了，请确认后创建。';
    }

    function assistantPrimaryMissingField(missing) {
      if (missing.includes('business')) return 'business';
      if (missing.includes('category')) return 'category';
      if (missing.includes('name')) return 'name';
      return '';
    }

    function chatRenderProjectWorkflowMessage(message, chat) {
      const plan = message.plan;
      const n = el('div', { class: 'chat-msg ai', style: 'max-width:96%;' });
      const categoryOptions = plan.options?.length ? plan.options : assistantCategoryOptions();
      const missing = assistantWorkflowMissingFields(plan);
      const primaryMissing = assistantPrimaryMissingField(missing);
      const grid = el('div', { class: 'chat-workflow-grid' });
      const syncFromInputs = () => {
        [...grid.querySelectorAll('.chat-workflow-row')].forEach((row, idx) => {
          const p = plan.projects[idx];
          if (!p) return;
          p.name = row.querySelector('[data-field="name"]')?.value || '';
          p.business = row.querySelector('[data-field="business"]')?.value || '';
          p.categoryKey = row.querySelector('[data-field="category"]')?.value || '';
          p.action = row.querySelector('[data-field="action"]')?.value || 'save';
        });
      };
      const renderRows = () => {
        grid.replaceChildren(...(plan.projects || []).map((p, idx) => el('div', { class: 'chat-workflow-row' },
          el('label', {},
            el('span', { class: 'chat-workflow-label' }, `Project ${idx + 1}`),
            el('input', { 'data-field': 'name', type: 'text', value: p.name || '', placeholder: 'Project name' }),
          ),
          el('label', {},
            el('span', { class: 'chat-workflow-label' }, 'Business'),
            el('input', { 'data-field': 'business', type: 'text', value: p.business || '', placeholder: 'e.g. Finance' }),
          ),
          el('label', { class: 'chat-workflow-field-wide' },
            el('span', { class: 'chat-workflow-label' }, 'Primary Category'),
            el('select', { 'data-field': 'category' },
              el('option', { value: '' }, 'Select category...'),
              ...categoryOptions.map((opt) => el('option', {
                value: opt.key,
                selected: p.categoryKey === opt.key,
              }, `${opt.label} · ${opt.count} cases`)),
            ),
          ),
          el('label', { class: 'chat-workflow-field-wide' },
            el('span', { class: 'chat-workflow-label' }, 'Action'),
            el('select', { 'data-field': 'action' },
              el('option', { value: 'save', selected: (p.action || 'save') === 'save' }, 'Save only'),
              el('option', { value: 'run', selected: p.action === 'run' }, 'Create & run in sequence'),
            ),
          ),
        )));
      };
      renderRows();

      const status = el('div', { class: 'chat-workflow-status', style: plan.created ? '' : 'display:none;' }, message.status || '');
      const createBtn = el('button', {
        class: 'a-button a-button--brand-primary -small',
        disabled: plan.created,
        onclick: async () => {
          syncFromInputs();
          createBtn.disabled = true;
          status.style.display = '';
          status.textContent = '正在执行计划...';
          const result = await assistantExecuteProjectWorkflow(plan, status);
          message.status = result.message;
          status.style.display = '';
          status.textContent = result.message;
          if (result.ok) {
            createBtn.textContent = 'Created';
            chatSaveChats();
          } else {
            createBtn.disabled = false;
          }
        },
      }, plan.created ? 'Created' : 'Confirm create');
      const cancelBtn = el('button', {
        class: 'a-button a-button--neutral-secondary -small',
        onclick: () => {
          message.status = '已取消，未创建 project。';
          status.style.display = '';
          status.textContent = message.status;
          createBtn.disabled = true;
          chatSaveChats();
        },
      }, 'Cancel');

      n.appendChild(el('div', { class: 'chat-workflow' + (missing.length ? ' needs-review' : '') },
        el('div', { class: 'chat-workflow-title' }, 'Project automation plan'),
        el('div', { class: 'chat-workflow-sub' },
          missing.length
            ? '我先整理成计划了。请补齐或确认 project name、business 和 Primary Category，再点 Confirm create。'
            : '我识别到了批量创建 project 的意图。确认下面信息后会直接写入 My Projects。',
        ),
        missing.length ? el('div', { class: 'chat-workflow-question' }, assistantWorkflowQuestion(missing)) : null,
        el('div', { class: 'chat-workflow-visual' },
          el('img', { class: 'chat-workflow-shot', src: '/tut-img/step3-primary-category.png', alt: 'Primary Category reference' }),
          el('span', { class: 'chat-arrow ' + (primaryMissing || 'category') }, '➜'),
        ),
        grid,
        status,
        el('div', { class: 'chat-workflow-actions' }, cancelBtn, createBtn),
      ));
      return n;
    }

    function chatRender() {
      const body = document.getElementById('chatBody');
      if (!body) return;
      const c = chatActive();
      const nodes = c.messages.length
        ? c.messages.map((m) => {
            if (m.kind === 'projectWorkflow') return chatRenderProjectWorkflowMessage(m, c);
            const n = el('div', { class: 'chat-msg ' + m.role });
            if (m.role === 'ai') n.innerHTML = chatMdToHtml(m.content);
            else if (m.content) n.appendChild(document.createTextNode(m.content));
            // Visible proof that the screenshot really got attached and
            // sent — render it as a thumbnail inside the user bubble,
            // click to open full-size in a lightbox.
            if (m.role === 'user' && m.screenshot) {
              const thumb = el('img', {
                class: 'chat-msg-shot',
                src: m.screenshot,
                alt: 'attached screenshot',
                title: '点击放大查看 · 这是发送给 AI 的截图',
              });
              thumb.addEventListener('click', (ev) => {
                ev.stopPropagation();
                chatLightbox(m.screenshot);
              });
              n.appendChild(thumb);
            }
            return n;
          })
        : [chatBuildWelcome()];
      if (chatState.busy) nodes.push(el('div', { class: 'chat-msg sys' }, 'AI 在想…'));
      body.replaceChildren(...nodes);
      body.scrollTop = body.scrollHeight;
    }

    // Lightbox for tapping the inline screenshot thumbnail. Click anywhere
    // or press Esc to close. Re-mounted each open so the listener cleanup
    // is straightforward.
    function chatLightbox(src) {
      const existing = document.getElementById('chatLightbox');
      if (existing) existing.remove();
      const wrap = el('div', { id: 'chatLightbox', class: 'chat-lightbox' },
        el('img', { src, alt: 'attached screenshot · full size' }),
        el('div', { class: 'chat-lightbox-close', title: '关闭 (Esc)' }, '✕'),
      );
      const close = () => {
        wrap.remove();
        document.removeEventListener('keydown', onKey);
      };
      const onKey = (e) => { if (e.key === 'Escape') close(); };
      wrap.addEventListener('click', close);
      document.addEventListener('keydown', onKey);
      document.body.appendChild(wrap);
    }

    function chatToggle(open) {
      chatState.open = open;
      document.getElementById('chatPanel').classList.toggle('open', open);
      document.getElementById('chatPanel').setAttribute('aria-hidden', !open);
      document.getElementById('chatFab').classList.toggle('is-hidden', open);
      if (open) {
        chatRenderHeader();
        chatRender();
        setTimeout(() => document.getElementById('chatInput').focus(), 100);
      } else {
        chatState.historyOpen = false;
        chatRenderHistory();
      }
    }

    const AI_WORK_PROMPTS = [
      { title: 'Project creation', prompts: [
        '新建1个 project，名字是 Finance Smoke Test，business 是 Finance，label finance，只保存',
        '新建2个 project，分别叫 AP Q1 Test、AP Q2 Test，business 是 Finance，label AP Report，全部保存',
        '新建4个财务 regression project，名字是 QE Q1 Test 到 QE Q4 Test，label finance；前两个保存，后两个 create and run',
      ]},
      { title: 'Run sequencing', prompts: [
        '把最新创建的2个 project 按顺序跑，一个跑完再跑下一个',
        '新建4个 project，Q1/Q2 只保存，Q3/Q4 创建后按顺序运行',
        '创建一个 Finance Report project，然后 create and run',
      ]},
      { title: 'My Projects', prompts: [
        '打开 My Projects 里最新的 project',
        '帮我找 Finance 部门最近创建的 project',
        '把最新 project 的 cases 展开给我看',
      ]},
      { title: 'Live / Reports', prompts: [
        '去 Live Channels 看现在哪个 test 正在跑',
        '查看最新失败 project 的 report',
        '在 Failure Analytics 里找某个 test 集最近的 fail',
      ]},
    ];
    const AI_WORK_PROMPTS_KEY = 'runCenter.aiWorkPrompts.v1';
    let aiWorkPromptGroups = null;

    function cloneWorkPromptDefaults() {
      return AI_WORK_PROMPTS.map((group) => ({
        title: group.title,
        prompts: (group.prompts || []).slice(),
      }));
    }

    function workPromptGroups() {
      if (aiWorkPromptGroups) return aiWorkPromptGroups;
      try {
        const parsed = JSON.parse(localStorage.getItem(AI_WORK_PROMPTS_KEY) || 'null');
        if (Array.isArray(parsed) && parsed.length) {
          aiWorkPromptGroups = parsed.map((group, idx) => ({
            title: String(group?.title || AI_WORK_PROMPTS[idx]?.title || `Group ${idx + 1}`),
            prompts: Array.isArray(group?.prompts)
              ? group.prompts.map((p) => String(p || '')).slice(0, 30)
              : [],
          }));
          return aiWorkPromptGroups;
        }
      } catch { /* ignore malformed saved templates */ }
      aiWorkPromptGroups = cloneWorkPromptDefaults();
      return aiWorkPromptGroups;
    }

    function saveWorkPromptGroups() {
      try { localStorage.setItem(AI_WORK_PROMPTS_KEY, JSON.stringify(workPromptGroups())); }
      catch { /* storage may be unavailable */ }
    }

    function runWorkPromptText(text) {
      const input = document.getElementById('aiWorkInput');
      if (!input) return;
      input.value = String(text || '').trim();
      if (input.value) workSend();
    }

    function workPromptRow(groupIdx, promptIdx, text) {
      const field = el('textarea', {
        class: 'work-prompt-input',
        // rows=1 gives a single-line intrinsic height; the oninput /
        // setTimeout below then grows it to fit multi-line content via
        // scrollHeight. rows=2 was silently forcing every row to look
        // 2-line tall even when the prompt fit in one line.
        rows: 1,
        dataset: { promptKey: `${groupIdx}-${promptIdx}` },
        oninput: () => {
          field.style.height = 'auto';
          field.style.height = field.scrollHeight + 'px';
        },
        onkeydown: (ev) => {
          if (ev.key === 'Enter' && (ev.ctrlKey || ev.metaKey)) {
            ev.preventDefault();
            runWorkPromptText(field.value);
          }
        },
      }, text || '');
      field.value = text || '';
      setTimeout(() => {
        field.style.height = 'auto';
        field.style.height = field.scrollHeight + 'px';
      }, 0);
      const saveBtn = el('button', {
        class: 'work-prompt-action save',
        title: '保存这条常用任务',
        onclick: () => {
          const groups = workPromptGroups();
          groups[groupIdx].prompts[promptIdx] = field.value.trim();
          saveWorkPromptGroups();
          toast('常用任务已保存');
        },
      }, 'Save');
      const sendBtn = el('button', {
        class: 'work-prompt-action send',
        title: '发送这条任务',
        onclick: () => runWorkPromptText(field.value),
      }, 'Send');
      const deleteBtn = el('button', {
        class: 'work-prompt-action delete',
        title: '删除这条常用任务',
        onclick: () => {
          const groups = workPromptGroups();
          const list = groups[groupIdx]?.prompts;
          if (!Array.isArray(list)) return;
          list.splice(promptIdx, 1);
          saveWorkPromptGroups();
          workRenderWelcome();
        },
      }, '×');
      return el('div', { class: 'work-prompt-row' },
        field,
        el('div', { class: 'work-prompt-actions' }, sendBtn, saveBtn, deleteBtn),
      );
    }

    function workRenderWelcome() {
      const body = document.getElementById('aiWorkBody');
      if (!body) return;
      const groups = workPromptGroups();
      body.replaceChildren(el('div', { class: 'work-welcome' },
        el('div', { class: 'work-welcome-title' }, 'AI Workbench · 让 AI 帮你做事'),
        el('div', { class: 'work-welcome-sub' },
          '选一个任务模板，或者直接输入自然语言。AI 会先生成计划；缺 project name、business、Primary Category 时会用卡片问你补齐。',
        ),
        ...groups.map((group, groupIdx) => el('div', { class: 'work-prompt-group' },
          el('div', { class: 'work-prompt-group-title' }, group.title),
          ...group.prompts.map((p, promptIdx) => workPromptRow(groupIdx, promptIdx, p)),
          el('div', { class: 'work-prompt-add-wrap' },
            el('button', {
              class: 'work-prompt-add',
              title: '新增一条自定义常用任务',
              onclick: () => {
                const target = workPromptGroups()[groupIdx];
                target.prompts.push('');
                saveWorkPromptGroups();
                workRenderWelcome();
                const nextIdx = target.prompts.length - 1;
                setTimeout(() => {
                  document.querySelector(`[data-prompt-key="${groupIdx}-${nextIdx}"]`)?.focus();
                }, 30);
              },
            }, '+'),
          ),
        )),
      ));
    }

    // ── Workbench multi-conversation state (mirrors chatState) ──────
    // Each chat keeps a flat list of messages for the transcript. We
    // store only the TEXT shapes (user prompt / ai explain / ai summary
    // / clarification stub) — the interactive plan-card with live
    // running/done state is only rendered for the *current* turn and
    // is replaced by its text snapshot once the turn settles.
    // Importantly the request to /api/agent/plan is still single-turn;
    // we never send `messages` history back to the model (the user
    // explicitly said the prompt context would balloon).
    const workState = {
      chats: [],
      activeChatId: null,
      historyOpen: false,
    };
    const RUN_CENTER_WORK_CHATS_KEY = 'runCenter.workChats.v1';

    function workLoadChats() {
      try {
        const raw = JSON.parse(localStorage.getItem(RUN_CENTER_WORK_CHATS_KEY) || '[]');
        if (Array.isArray(raw) && raw.length) {
          workState.chats = raw;
          workState.activeChatId = raw[0].id;
          return;
        }
      } catch {}
      workCreateNew(/*silent*/ true);
    }
    function workSaveChats() {
      try {
        // Cap each chat's messages at 100 for storage hygiene.
        const slim = workState.chats.map((c) => ({
          ...c,
          messages: (c.messages || []).slice(-100),
        }));
        localStorage.setItem(RUN_CENTER_WORK_CHATS_KEY, JSON.stringify(slim));
      } catch {}
    }
    function workCreateNew(silent) {
      const c = {
        id: 'w-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
        title: 'New task',
        messages: [],
        createdAt: Date.now(),
      };
      workState.chats.unshift(c);
      workState.activeChatId = c.id;
      workState.historyOpen = false;
      workSaveChats();
      if (!silent) {
        // New conversation = clean slate. Drop any active highlight
        // from the previous task so the page doesn't carry visual
        // baggage into the new session.
        if (typeof agentClearHighlights === 'function') agentClearHighlights();
        workRenderHeader();
        workRenderHistory();
        workRenderActive();
      }
      return c;
    }
    function workSwitch(id) {
      workState.activeChatId = id;
      workState.historyOpen = false;
      workRenderHeader();
      workRenderHistory();
      workRenderActive();
    }
    function workDelete(id) {
      workState.chats = workState.chats.filter((c) => c.id !== id);
      if (workState.activeChatId === id) {
        workState.activeChatId = workState.chats[0]?.id || null;
        if (!workState.activeChatId) workCreateNew(/*silent*/ true);
      }
      workSaveChats();
      workRenderHeader();
      workRenderHistory();
      workRenderActive();
    }
    function workActive() {
      let c = workState.chats.find((x) => x.id === workState.activeChatId);
      if (!c) c = workCreateNew(/*silent*/ true);
      return c;
    }
    function workFmtAgo(ts) {
      const diff = (Date.now() - ts) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }
    function workRenderHeader() {
      const c = workActive();
      const title = document.getElementById('aiWorkHeaderTitle');
      if (title) title.textContent = c.title === 'New task' ? 'AI Workbench' : c.title;
      const cnt = document.getElementById('aiWorkHistoryCount');
      if (cnt) cnt.textContent = String(workState.chats.length);
    }
    function workRenderHistory() {
      const wrap = document.getElementById('aiWorkHistoryList');
      const drop = document.getElementById('aiWorkHistoryDrop');
      if (!wrap || !drop) return;
      drop.classList.toggle('open', !!workState.historyOpen);
      if (!workState.historyOpen) return;
      wrap.replaceChildren(...workState.chats.map((c) => {
        const isActive = c.id === workState.activeChatId;
        const firstUser = (c.messages || []).find((m) => m.role === 'user');
        const lastAi = (c.messages || []).slice().reverse().find((m) => m.role === 'ai');
        const preview = (lastAi?.summary || lastAi?.explain || firstUser?.text || '').slice(0, 80) || '(空)';
        return el('div', { class: 'chat-thread-item' + (isActive ? ' is-active' : '') },
          el('div', { class: 'thread-main', onclick: () => workSwitch(c.id) },
            el('div', { class: 'thread-title' }, isActive ? '● ' : '', c.title),
            el('div', { class: 'thread-meta' }, workFmtAgo(c.updatedAt || c.createdAt), ' · ', (c.messages?.length || 0) + ' msgs'),
            (c.messages?.length) ? el('div', { class: 'thread-preview' }, preview) : null,
          ),
          el('button', {
            class: 'thread-del', title: '删除',
            onclick: (ev) => { ev.stopPropagation(); if (confirm(`删除 "${c.title}"？`)) workDelete(c.id); },
          }, '✕'),
        );
      }));
    }

    // Render the active chat's transcript. Used when switching chats
    // OR on initial open. Live plan cards (with running/done state)
    // only exist for the currently-executing turn — past turns appear
    // as plain text snapshots.
    function workRenderActive() {
      const body = document.getElementById('aiWorkBody');
      if (!body) return;
      const chat = workActive();
      if (!chat.messages?.length) {
        workRenderWelcome();
        return;
      }
      body.replaceChildren(
        el('button', {
          class: 'work-prompt',
          style: 'width:auto;align-self:flex-start;margin-bottom:6px;',
          onclick: workRenderWelcome,
        }, '← Task templates'),
        ...chat.messages.map((m) => workRenderMessageSnapshot(m)),
      );
      body.scrollTop = body.scrollHeight;
    }

    // Plain-text snapshot of a stored message. The live plan card with
    // step ticks only renders for the in-flight turn — replaying that
    // animation for history would be both heavy and confusing. But the
    // *result* cards (query tables, run summaries, report inline) DO
    // rehydrate from `m.snapshots` so the user sees the same 21-row
    // table when they come back to a past conversation.
    function workRenderMessageSnapshot(m) {
      if (m.role === 'user') {
        return el('div', {
          class: 'work-msg',
          style: 'align-self:flex-end;background:var(--blue);color:#fff;border-color:var(--blue);max-width:100%;',
        }, m.text || '');
      }
      // ai snapshot — explain on top, summary below if any
      const lines = [];
      if (m.explain) lines.push('🤖 ' + m.explain);
      if (m.summary) lines.push('✓ ' + m.summary);
      if (m.error)   lines.push('✗ ' + m.error);
      if (m.clarificationQ) lines.push('❓ ' + m.clarificationQ + (m.clarificationAnswer ? ` → 「${m.clarificationAnswer}」` : ' （未回答）'));
      const bubble = el('div', { class: 'work-msg', style: 'max-width:100%;white-space:pre-wrap;' },
        lines.length ? lines.join('\n') : (m.text || ''));
      // Rebuild the rich cards from stored snapshots. Wrap in a
      // display:contents container so the bubble + each card lay out at
      // the same level as siblings in aiWorkBody (no extra bubble padding
      // around the table).
      if (!Array.isArray(m.snapshots) || !m.snapshots.length) return bubble;
      const snapshotNodes = m.snapshots.map(renderAgentSnapshot).filter(Boolean);
      if (!snapshotNodes.length) return bubble;
      return el('div', { style: 'display:contents;' }, bubble, ...snapshotNodes);
    }

    function workPushMessage(msg) {
      const chat = workActive();
      chat.messages = chat.messages || [];
      chat.messages.push({ ...msg, createdAt: Date.now() });
      chat.updatedAt = Date.now();
      workState.chats = [chat, ...workState.chats.filter((c) => c.id !== chat.id)];
      // Set chat title from the first user message.
      if (chat.title === 'New task' && msg.role === 'user' && msg.text) {
        chat.title = msg.text.slice(0, 32) + (msg.text.length > 32 ? '…' : '');
        workRenderHeader();
      }
      workSaveChats();
      workRenderHeader();
      if (workState.historyOpen) workRenderHistory();
    }

    function workUpdateMessage(id, patch = {}) {
      if (!id) return;
      const chat = workActive();
      const msg = (chat.messages || []).find((m) => m.id === id);
      if (!msg) return;
      Object.assign(msg, patch, { updatedAt: Date.now() });
      chat.updatedAt = Date.now();
      workState.chats = [chat, ...workState.chats.filter((c) => c.id !== chat.id)];
      workSaveChats();
      workRenderHeader();
      if (workState.historyOpen) workRenderHistory();
    }

    function workToggleHistory() {
      workState.historyOpen = !workState.historyOpen;
      workRenderHistory();
    }

    function workToggle(open) {
      const panel = document.getElementById('aiWorkPanel');
      panel.classList.toggle('open', open);
      panel.setAttribute('aria-hidden', !open);
      document.getElementById('aiWorkFab')?.classList.toggle('is-hidden', open);
      if (open) {
        workRenderHeader();
        // Show welcome / transcript depending on whether the active
        // chat has any messages yet.
        if (!document.getElementById('aiWorkBody')?.children.length) {
          workRenderActive();
        }
        setTimeout(() => document.getElementById('aiWorkInput')?.focus(), 80);
      } else {
        // Close the history dropdown when the panel hides.
        if (workState.historyOpen) {
          workState.historyOpen = false;
          workRenderHistory();
        }
      }
    }

    function openAiWorkAssistant() {
      workToggle(true);
    }

    function workAppend(node) {
      const body = document.getElementById('aiWorkBody');
      body.appendChild(node);
      body.scrollTop = body.scrollHeight;
    }

    // Append nodes to the panel WITHOUT wiping prior turns. Used during
    // a single planner round-trip: user bubble + thinking placeholder
    // get appended, then the placeholder is swapped for a plan card.
    function workSetMain(...nodes) {
      const body = document.getElementById('aiWorkBody');
      // First turn of an empty chat needs the "← Task templates" pill.
      if (!body.children.length) {
        body.appendChild(el('button', {
          class: 'work-prompt',
          style: 'width:auto;align-self:flex-start;margin-bottom:6px;',
          onclick: workRenderWelcome,
        }, '← Task templates'));
      }
      // If the welcome screen is showing, replace it with the templates
      // pill so we land in transcript mode.
      const welcome = body.querySelector('.work-welcome');
      if (welcome) {
        body.replaceChildren(el('button', {
          class: 'work-prompt',
          style: 'width:auto;align-self:flex-start;margin-bottom:6px;',
          onclick: workRenderWelcome,
        }, '← Task templates'));
      }
      for (const n of nodes) body.appendChild(n);
      body.scrollTop = body.scrollHeight;
    }

    function workResultCard(text) {
      return el('div', { class: 'work-msg', style: 'max-width:100%;' }, text);
    }

    function latestRunMatching(predicate) {
      return (state.recent || [])
        .filter(predicate)
        .slice()
        .sort((a, b) => String(b.finishedAt || b.startedAt || '').localeCompare(String(a.finishedAt || a.startedAt || '')))[0] || null;
    }

    function reportStatusFromText(message) {
      const s = String(message || '').toLowerCase();
      if (/fail|failed|失败|失敗|挂|掛/.test(s)) return 'failed';
      if (/pass|passed|success|successful|成功|通过|通過/.test(s)) return 'passed';
      return 'any';
    }

    function reportProjectsForRun(run) {
      const caseId = run?.caseId;
      if (!caseId) return [];
      return (state.batches || []).filter((p) => !p.isPreset && (p.caseIds || []).includes(caseId));
    }

    function reportNameFromText(message) {
      const raw = String(message || '').trim();
      const quoted = raw.match(/["“”'「『](.+?)["“”'」』]/);
      if (quoted?.[1]) return quoted[1].trim();
      const m = raw.match(/(?:名字|名称|名稱|name|called|叫|名为|名為|名叫)\s*(?:是|为|為|=|:)?\s*([^，,。；;\n]{2,80})/i);
      if (!m?.[1]) return '';
      return m[1]
        .replace(/\s*(?:的)?\s*(?:project|项目|項目|report|报告|報告).*$/i, '')
        .trim();
    }

    function reportSelectorFromArgs(args = {}, message = '') {
      const allowed = new Set(['passed', 'failed', 'any']);
      const status = allowed.has(args.status) ? args.status : reportStatusFromText(message);
      const business = args.business ? String(args.business).trim() : assistantParseBusiness(message);
      const name = args.name ? String(args.name).trim() : reportNameFromText(message);
      const categoryKey = args.categoryKey || args.category || assistantCategoryFromText(message).key || '';
      const search = args.search || args.query || '';
      return { status, business, name, categoryKey, search: String(search || '').trim() };
    }

    function reportProjectHaystack(project) {
      if (!project) return '';
      const caseBits = (project.caseIds || []).flatMap((id) => {
        const cs = state.cases.find((c) => c.id === id);
        const cat = cs ? categorizeCase(cs) : '';
        return [id, cs?.title, cs?.summary, cat, cat ? categoryMeta(cat).label : ''];
      });
      return [
        project.id,
        project.name,
        project.business,
        dominantBusinessOf(project),
        ...caseBits,
      ].filter(Boolean).join(' ').toLowerCase();
    }

    function reportRunHaystack(run) {
      const owners = reportProjectsForRun(run);
      const cs = state.cases.find((c) => c.id === run?.caseId);
      const cat = cs ? categorizeCase(cs) : '';
      return [
        run?.caseId,
        run?.caseTitle,
        run?.status,
        run?.runId,
        run?.errorMessage,
        cs?.title,
        cs?.summary,
        cat,
        cat ? categoryMeta(cat).label : '',
        ...owners.map(reportProjectHaystack),
      ].filter(Boolean).join(' ').toLowerCase();
    }

    function reportRunMatchesSelector(run, selector, runToClusterOwner = null) {
      if (!run) return false;
      if (selector.status === 'passed' && run.status !== 'passed') return false;
      if (selector.status === 'failed' && run.status !== 'failed') return false;
      const owners = reportProjectsForRun(run);
      const hay = reportRunHaystack(run);
      // STRICT match — a run counts only when its ACTUAL executing batch
      // owner matches the filter. Was loose (any containing project OK)
      // → the card labelled by filter target but the highlight lived
      // inside a different batch. Consistent = card and highlight both
      // reflect the same cluster owner. When we can't determine the
      // cluster owner (run has no runId, or the map wasn't passed), fall
      // back to the old any-container match rather than false-negative.
      const clusterOwner = (run.runId && runToClusterOwner)
        ? runToClusterOwner.get(run.runId) || null
        : null;
      if (selector.business) {
        if (clusterOwner) {
          if (!assistantProjectMatchesBusiness(clusterOwner, selector.business)) return false;
        } else {
          if (!owners.some((p) => assistantProjectMatchesBusiness(p, selector.business))) return false;
        }
      }
      if (selector.name) {
        const n = selector.name.toLowerCase();
        if (clusterOwner) {
          if (!String(clusterOwner.name || clusterOwner.id || '').toLowerCase().includes(n)) return false;
        } else {
          if (!owners.some((p) => String(p.name || p.id || '').toLowerCase().includes(n))) return false;
        }
      }
      if (selector.categoryKey) {
        const key = String(selector.categoryKey).toLowerCase();
        const caseMatches = categorizeCase(state.cases.find((c) => c.id === run.caseId)) === key;
        const ownerMatches = owners.some((p) => (p.caseIds || []).some((id) => {
          const cs = state.cases.find((c) => c.id === id);
          return cs && categorizeCase(cs) === key;
        }));
        if (!caseMatches && !ownerMatches) return false;
      }
      if (selector.search) {
        const tokens = selector.search.toLowerCase().split(/\s+/).filter(Boolean);
        if (!tokens.every((t) => hay.includes(t))) return false;
      }
      return true;
    }

    function latestReportRun(selector = {}) {
      // Build the same clusters the Reports view uses so we can drop
      // "partial" batches (single-case re-runs) — the user was clear
      // that when they ask for a *project's* report we shouldn't hand
      // back a lone re-run of one case from that project.
      const allRuns = (state.recent || []).slice();
      const clusters = (typeof clusterRunsIntoBatches === 'function')
        ? clusterRunsIntoBatches(allRuns)
        : [];
      const partialRunIds = new Set();
      const partialRunPairs = new Set(); // fallback key when runId missing
      // Every run's *actual* executing batch owner — the same owner-vote
      // the renderer uses. This is what should drive selector.business
      // / selector.name matching too, so the card and the highlight
      // agree on which project the run belongs to. Without this the
      // card ends up naming "a" (仓储) because "a" happens to contain
      // saptest7 in its caseIds — even though Finance Smoke Test is what
      // actually kicked off that specific run.
      const runToClusterOwner = new Map();
      for (const c of clusters) {
        const caseIdsInBatch = [...new Set(c.runs.map((r) => r.caseId))];
        const ownerCounts = new Map();
        for (const r of c.runs) {
          for (const o of (state.batches || [])) {
            if (o.isPreset) continue;
            if ((o.caseIds || []).includes(r.caseId)) {
              ownerCounts.set(o.id, (ownerCounts.get(o.id) || 0) + 1);
            }
          }
        }
        const topOwnerEntry = [...ownerCounts.entries()].sort((a, b) => b[1] - a[1])[0];
        const owner = topOwnerEntry ? (state.batches || []).find((b) => b.id === topOwnerEntry[0]) : null;
        for (const r of c.runs) {
          if (r.runId && owner) runToClusterOwner.set(r.runId, owner);
        }
        const ownerSize = owner ? (owner.caseIds || []).length : 0;
        const isPartial = ownerSize > 0 && caseIdsInBatch.length < ownerSize;
        if (!isPartial) continue;
        for (const r of c.runs) {
          if (r.runId) partialRunIds.add(r.runId);
          else if (r.caseId && r.finishedAt) partialRunPairs.add(`${r.caseId}|${r.finishedAt}`);
        }
      }
      const isPartialRun = (r) => {
        if (r.runId && partialRunIds.has(r.runId)) return true;
        if (r.caseId && r.finishedAt && partialRunPairs.has(`${r.caseId}|${r.finishedAt}`)) return true;
        return false;
      };

      const candidates = allRuns
        .filter((r) => reportRunMatchesSelector(r, selector, runToClusterOwner))
        .filter((r) => !isPartialRun(r))
        .sort((a, b) => String(b.finishedAt || b.startedAt || '').localeCompare(String(a.finishedAt || a.startedAt || '')));
      return {
        candidates,
        withReport: candidates.find((r) => r.report?.url) || null,
        runToClusterOwner,
      };
    }

    function bestReportProjectForRun(run, selector = {}) {
      const owners = reportProjectsForRun(run);
      if (!owners.length) return null;
      if (selector.business) {
        const hit = owners.find((p) => assistantProjectMatchesBusiness(p, selector.business));
        if (hit) return hit;
      }
      if (selector.name) {
        const n = selector.name.toLowerCase();
        const hit = owners.find((p) => String(p.name || p.id || '').toLowerCase().includes(n));
        if (hit) return hit;
      }
      return owners[0];
    }

    let agentReportFocusTimer = null;
    function setReportAgentFocus(run, project) {
      state.reportsView = state.reportsView || {};
      state.reportsView.agentFocus = {
        runId: run?.runId || '',
        caseId: run?.caseId || '',
        projectId: project?.id || '',
        projectName: project?.name || project?.id || '',
        at: Date.now(),
      };
      if (agentReportFocusTimer) clearTimeout(agentReportFocusTimer);
      agentReportFocusTimer = setTimeout(() => {
        if (state.reportsView?.agentFocus?.runId === (run?.runId || '')) {
          state.reportsView.agentFocus = null;
          renderAll();
        }
        agentReportFocusTimer = null;
      }, 7000);
    }

    function focusReportsOnRun(run, selector = {}, options = {}) {
      // Caller can pass the pre-computed cluster owner via options — the
      // Reports view's own owner-vote is what gets highlighted, so pinning
      // agentFocus.projectId to that same owner keeps card + highlight
      // consistent. Falls back to the containing-project heuristic if no
      // cluster owner was passed (older call sites).
      const project = options.project || bestReportProjectForRun(run, selector);
      state.reportsView = state.reportsView || {};
      // DON'T shove a short project name into `search` — that field is
      // a plain substring filter, so name "a" would match every case
      // whose id contains "a" (i.e. every "saptest*") and blow the
      // batch list wide open. agentFocus is a targeted key (projectId
      // + runId) that the renderer honours directly, so it's the only
      // thing we need here.
      state.reportsView.search = '';
      setReportAgentFocus(run, project);
      state.tab = 'run';
      state.section = 'reports';
      renderAll();
      return project;
    }

    function goRunSection(section, note) {
      state.tab = 'run';
      state.section = section;
      renderAll();
      return note;
    }

    function latestProjects(count = 1, predicate = null) {
      const list = (state.batches || [])
        .filter((b) => b && !b.isPreset && (!predicate || predicate(b)))
        .slice()
        .sort((a, b) => String(b.updatedAt || b.createdAt || '').localeCompare(String(a.updatedAt || a.createdAt || '')));
      return list.slice(0, count);
    }

    // ── AI agent project resolver ─────────────────────────────────────
    // One pipeline that both `openProject` and `runProject` route through.
    // The LLM emits a selector (any subset of these axes); this function
    // walks the pipeline: filter → sort → truncate. Empty result is fine —
    // callers show a friendly "nothing matched" message.
    //
    // Selector fields (all optional):
    //   business      — exact match on project.business (case-insensitive)
    //   name          — case-insensitive substring match on name/id
    //   createdSince  — 'today' | 'yesterday' | 'last-N-days' | ISO string
    //   createdBefore — same shape as createdSince (upper bound, exclusive)
    //   passedOnly    — only projects whose last-run status === 'passed'
    //   sortBy        — 'recent' (default) | 'oldest'
    //   count         — how many to return (default 1, capped at 10)
    //
    // Relative dates resolve against local midnight of "now":
    //   today       → today 00:00
    //   yesterday   → yesterday 00:00
    //   last-7-days → 7 days ago 00:00
    function resolveProjectDate(spec) {
      if (!spec) return null;
      const s = String(spec).trim().toLowerCase();
      if (!s) return null;
      const now = new Date();
      const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      if (s === 'today')     return midnight;
      if (s === 'yesterday') return new Date(midnight.getTime() - 86400 * 1000);
      const m = /^last-?(\d+)-?days?$/.exec(s);
      if (m) return new Date(midnight.getTime() - Number(m[1]) * 86400 * 1000);
      const iso = new Date(spec);
      return Number.isNaN(iso.getTime()) ? null : iso;
    }

    function resolveProjects(selector = {}) {
      const {
        business = null,
        name = null,
        createdSince = null,
        createdBefore = null,
        passedOnly = false,
        sortBy = 'recent',
        count = 1,
      } = selector || {};
      const since = resolveProjectDate(createdSince);
      const before = resolveProjectDate(createdBefore);
      const bizNeedle = business ? String(business).toLowerCase() : '';
      const nameNeedle = name ? String(name).toLowerCase() : '';

      const filtered = (state.batches || []).filter((b) => {
        if (!b || b.isPreset) return false;
        if (bizNeedle && !assistantProjectMatchesBusiness(b, business)) return false;
        if (nameNeedle && !String(b.name || b.id || '').toLowerCase().includes(nameNeedle)) return false;
        if (passedOnly && b.status !== 'passed') return false;
        const created = new Date(b.createdAt || b.updatedAt || 0);
        if (since && !(created >= since)) return false;
        if (before && !(created < before)) return false;
        return true;
      });

      const cmpRecent = (a, b) =>
        String(b.updatedAt || b.createdAt || '').localeCompare(String(a.updatedAt || a.createdAt || ''));
      filtered.sort(sortBy === 'oldest' ? (a, b) => cmpRecent(b, a) : cmpRecent);
      return filtered.slice(0, Math.max(1, Math.min(10, Number(count) || 1)));
    }

    // Human-readable version of the selector for timeline captions and
    // "nothing matched" errors. Kept in one place so plan text stays consistent.
    function describeProjectSelector(sel = {}) {
      const parts = [];
      if (sel.business)      parts.push(`${sel.business} 部门`);
      if (sel.name)          parts.push(`名字含 "${sel.name}"`);
      if (sel.passedOnly)    parts.push('已 passed');
      if (sel.createdSince)  parts.push(`${sel.createdSince} 之后`);
      if (sel.createdBefore) parts.push(`${sel.createdBefore} 之前`);
      if (sel.sortBy === 'oldest') parts.push('最早');
      return parts.join(' · ') || '所有 project';
    }

    function parseWorkCount(message, fallback = 1) {
      const normalized = assistantNormalizeProjectText(message);
      const m = /(\d+)\s*(?:个|個)?\s*(?:project|项目|項目|batch)/i.exec(normalized)
        || /(?:最新|最近|latest|newest)\s*(\d+)/i.exec(normalized);
      return m ? Math.max(1, Math.min(10, Number(m[1]))) : fallback;
    }

    function openProjectInMyProjects(project, notePrefix = '已切到 My Projects') {
      state.console._projectExpand = state.console._projectExpand || new Set();
      if (project?.id) state.console._projectExpand.add(project.id);
      state.tab = 'run';
      state.section = 'my-projects';
      renderAll();
      return project ? `${notePrefix}，并展开：${project.name || project.id}。` : `${notePrefix}。`;
    }

    async function runProjectsSequentially(projects) {
      if (!projects.length) return '没有找到可运行的 project。';
      for (let i = 0; i < projects.length; i += 1) {
        const p = projects[i];
        toast(`AI Workbench: running ${i + 1}/${projects.length} · ${p.name || p.id}`);
        await runCases(p.caseIds || [], {
          name: p.name || p.id,
          runsPerCase: p.runsPerCase || 1,
          batchId: p.id,
        });
      }
      return `已按顺序运行 ${projects.length} 个 project：${projects.map((p) => p.name || p.id).join(' → ')}。`;
    }

    function assistantExecuteNavigationTask(message) {
      const s = String(message || '').toLowerCase();
      const wantsReport = /report|报告|報告/.test(s);
      const wantsFail = /fail|failed|失败|失敗|挂|掛/.test(s);
      const wantsPass = /pass|passed|success|successful|成功|通过|通過/.test(s);
      const wantsLatest = /latest|newest|recent|最新|最近/.test(s);

      if (wantsReport && (wantsLatest || /project|项目|項目/.test(s))) {
        const selector = reportSelectorFromArgs({
          status: wantsFail ? 'failed' : wantsPass ? 'passed' : 'any',
        }, message);
        const { candidates, withReport } = latestReportRun(selector);
        const label = selector.status === 'passed' ? '成功' : selector.status === 'failed' ? '失败' : '最新';
        if (withReport?.report?.url) {
          const project = focusReportsOnRun(withReport, selector);
          const opened = window.open(withReport.report.url, '_blank', 'noopener');
          const projectText = project ? `${project.name || project.id} · ` : '';
          const blocked = opened ? '' : '（浏览器拦了自动弹窗，请点步骤里的手动打开 report）';
          return `已找到最新${label} project/run：${projectText}${withReport.caseId || 'case'}。页面已定位到 Run Reports。${blocked}`;
        }
        if (candidates.length) {
          return goRunSection('reports', `找到 ${candidates.length} 个${label} run，但都没有 Midscene report URL。已切到 Run Reports。`);
        }
        return selector.status === 'failed'
          ? goRunSection('failures', `没有找到符合条件的${label} project report，已切到 Failure Analytics。`)
          : goRunSection('reports', `没有找到符合条件的${label} project report，已切到 Run Reports。`);
      }

      if (/live channels|live channel|正在跑|当前运行|當前運行|现在.*跑|現在.*跑/.test(s)) {
        return goRunSection('live-channels', '已切到 Live Channels。');
      }

      if (/my projects|my project|我的项目|我的項目|最新.*project|最近.*project|打开.*project|打開.*project/.test(s)) {
        const business = assistantParseBusiness(message);
        const latest = business
          ? latestProjects(1, (b) => assistantProjectMatchesBusiness(b, business))[0]
          : state.batches?.[0];
        state.console._projectExpand = state.console._projectExpand || new Set();
        if (latest?.id) state.console._projectExpand.add(latest.id);
        return goRunSection('my-projects', latest ? `已切到 My Projects，并展开最新${business ? ' ' + business : ''} project：${latest.name || latest.id}。` : '已切到 My Projects。');
      }

      if (/failure analytics|失败分析|失敗分析|failure|failures|最近.*fail|最新.*fail/.test(s)) {
        return goRunSection('failures', '已切到 Failure Analytics。');
      }

      if (/run reports|reports|report|报告|報告/.test(s)) {
        return goRunSection('reports', '已切到 Run Reports。');
      }

      return null;
    }

    async function assistantExecuteWorkbenchTask(message) {
      const s = String(message || '').toLowerCase();

      if (/(按顺序|順序|one.*next|sequential|queue|一个.*下一个|一個.*下一個)/.test(s)
          && /(最新|最近|latest|newest).*project/.test(s)
          && /(跑|run|运行|運行)/.test(s)) {
        const count = parseWorkCount(message, 2);
        const business = assistantParseBusiness(message);
        return await runProjectsSequentially(latestProjects(count, business ? (b) => assistantProjectMatchesBusiness(b, business) : null));
      }

      if (/(打开|打開|open|展开|展開).*(最新|最近|latest|newest).*project|最新.*project.*cases|最近.*project.*cases/.test(s)) {
        const business = assistantParseBusiness(message);
        const p = latestProjects(1, business ? (b) => assistantProjectMatchesBusiness(b, business) : null)[0];
        return openProjectInMyProjects(p, business ? `已打开最新 ${business} project` : '已打开最新 project');
      }

      if (/finance/.test(s) && /(最近|最新|latest|newest).*project|project.*finance/.test(s)) {
        const p = latestProjects(1, (b) => /finance/i.test(String(b.business || b.name || '')))[0];
        return openProjectInMyProjects(p, p ? '已打开最近的 Finance project' : '没有找到 Finance project，已切到 My Projects');
      }

      if (/(live channels|live channel|正在跑|当前运行|當前運行|现在.*跑|現在.*跑)/.test(s)) {
        return goRunSection('live-channels', '已切到 Live Channels。');
      }

      if (/(failure analytics|失败分析|失敗分析|最近.*fail|最新.*fail|failure|failures)/.test(s)) {
        const failed = latestRunMatching((r) => r.status === 'failed');
        if (/report|报告|報告/.test(s)) return assistantExecuteNavigationTask(message);
        return goRunSection('failures', failed ? `已切到 Failure Analytics。最新失败：${failed.caseId || 'case'}。` : '已切到 Failure Analytics。');
      }

      return assistantExecuteNavigationTask(message);
    }

    // ── AI Workbench: LLM planner integration ─────────────────────────
    // Build the context block we ship to /api/agent/plan. Same shape the
    // KB tells the model to expect: availableBusinesses + categories +
    // recentProjects. Slimmed so the prompt stays small.
    function agentBuildContext() {
      const businesses = new Set();
      for (const b of state.batches || []) {
        if (b.business) businesses.add(String(b.business).trim());
      }
      // Add a few common ones so a brand-new install still works.
      ['财务', '物流', '仓储', '销售', '人力', '研发', 'Finance', 'Logistics', 'R&D', 'HR', 'Warehouse', 'Sales'].forEach((b) => businesses.add(b));

      const catCounts = {};
      for (const c of state.cases || []) {
        const k = categorizeCase(c);
        if (k) catCounts[k] = (catCounts[k] || 0) + 1;
      }
      const categories = (typeof CATEGORY_RULES !== 'undefined' ? CATEGORY_RULES : [])
        .map((r) => ({ key: r.key, label: r.label, caseCount: catCounts[r.key] || 0 }));

      const recentProjects = (state.batches || [])
        .filter((b) => b && !b.isPreset)
        .slice(0, 8)
        .map((b) => ({
          name: b.name || b.id || '',
          business: b.business || '',
          createdAt: b.createdAt || b.updatedAt || '',
        }));

      // Case roster — id + a short title + category. Lets the model
      // fuzzy-match natural phrases like "test case 2" or "case2" to
      // the actual id "saptest2", and validate explicit caseIds it
      // wants to pass to createProjects.
      const cases = (state.cases || []).slice(0, 60).map((c) => ({
        id: c.id,
        title: (typeof caseTitle === 'function' ? caseTitle(c) : (c.title || '')).slice(0, 80),
        category: (typeof categorizeCase === 'function' ? categorizeCase(c) : '') || '',
      })).filter((c) => c.id);

      // Today's date + IANA timezone. Without these the planner has to
      // guess what "yesterday / 昨天" means and often lands on the wrong
      // absolute day — resulting in yesterday+today mixed together in
      // the filter output.
      const now = new Date();
      const currentDate = `${now.getFullYear()}-`
        + `${String(now.getMonth() + 1).padStart(2, '0')}-`
        + `${String(now.getDate()).padStart(2, '0')}`;
      let timezone = '';
      try { timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || ''; }
      catch { /* older browsers — leave blank, server prompt still works */ }

      return {
        availableBusinesses: [...businesses],
        categories,
        recentProjects,
        cases,
        currentSection: state.section || '',
        currentDate,
        timezone,
      };
    }

    // ── Local query engine (no LLM round-trip after the planner).
    //    Both queryEntities and queryStats run entirely against
    //    state.cases / state.batches / CATEGORY_RULES — the dataset
    //    is small (~hundreds at most) so this is cheap and lets us
    //    show results in a few ms with no extra network hop.
    function agentExecuteQueryEntities(args) {
      const entity = args?.entity || 'case';
      const filter = args?.filter || {};
      const sort = args?.sort || null;
      const limit = Math.max(1, Math.min(200, Number(args?.limit) || 100));
      const title = args?.title || `查询 · ${entity}`;
      let columns = [];
      let columnsExport = null; // superset used only by CSV export path
      let rows = [];

      if (entity === 'case') {
        let list = (state.cases || []).slice();
        if (filter.category) {
          list = list.filter((c) => categorizeCase(c) === filter.category);
        }
        if (filter.business) {
          const allowed = new Set();
          for (const b of state.batches || []) {
            if (b.isPreset) continue;
            if (projectMatchesBusinessFilter(b, filter.business)) {
              (b.caseIds || []).forEach((id) => allowed.add(id));
            }
          }
          list = list.filter((c) => allowed.has(c.id));
        }
        if (filter.projectId) {
          const proj = (state.batches || []).find((b) => b.id === filter.projectId);
          if (proj) {
            const allowed = new Set(proj.caseIds || []);
            list = list.filter((c) => allowed.has(c.id));
          }
        }
        if (filter.search) {
          const q = filter.search.toLowerCase();
          list = list.filter((c) =>
            c.id.toLowerCase().includes(q)
            || (caseTitle(c) || '').toLowerCase().includes(q));
        }
        if (sort === 'name') {
          list.sort((a, b) => (caseTitle(a) || '').localeCompare(caseTitle(b) || ''));
        }
        list = list.slice(0, limit);
        columns = [
          { key: 'id',       label: 'Case ID' },
          { key: 'title',    label: '标题' },
          { key: 'category', label: '分类' },
        ];
        rows = list.map((c) => {
          const catKey = categorizeCase(c);
          const catLabel = (typeof categoryMeta === 'function'
            ? categoryMeta(catKey)?.label
            : null) || catKey || '—';
          return { id: c.id, title: caseTitle(c) || '—', category: catLabel };
        });
      } else if (entity === 'project') {
        let list = (state.batches || []).filter((b) => b && !b.isPreset);
        if (filter.business) {
          list = list.filter((b) => projectMatchesBusinessFilter(b, filter.business));
        }
        if (filter.category) {
          list = list.filter((b) => (b.caseIds || []).some((id) => {
            const cs = (state.cases || []).find((c) => c.id === id);
            return cs && categorizeCase(cs) === filter.category;
          }));
        }
        if (filter.caseId) {
          list = list.filter((b) => (b.caseIds || []).includes(filter.caseId));
        }
        if (filter.search) {
          const q = filter.search.toLowerCase();
          list = list.filter((b) => String(b.name || b.id || '').toLowerCase().includes(q));
        }
        if (filter.status) {
          list = list.filter((b) => projectMatchesStatus(b, filter.status));
        }
        if (filter.runDateStart || filter.runDateEnd) {
          list = list.filter((b) => projectRunDateWithin(b, filter.runDateStart, filter.runDateEnd));
        }
        if (filter.createdDateStart || filter.createdDateEnd) {
          list = list.filter((b) => projectCreatedDateWithin(b, filter.createdDateStart, filter.createdDateEnd));
        }
        if (sort === 'recent') {
          list.sort((a, b) => String(b.updatedAt || b.createdAt || '').localeCompare(String(a.updatedAt || a.createdAt || '')));
        } else if (sort === 'name') {
          list.sort((a, b) => String(a.name || a.id || '').localeCompare(String(b.name || b.id || '')));
        }
        list = list.slice(0, limit);
        columns = [
          { key: 'name',      label: 'Project 名' },
          { key: 'business',  label: '部门' },
          { key: 'caseCount', label: 'Case 数' },
          { key: 'createdAt', label: '创建时间' },
        ];
        // Excel export gets everything the card hides: status, precise
        // creation + last-run timestamps, and the full case ids list.
        columnsExport = [
          { key: 'name',          label: 'Project 名' },
          { key: 'business',      label: '部门' },
          { key: 'status',        label: '状态' },
          { key: 'caseCount',     label: 'Case 数' },
          { key: 'caseIdsJoined', label: 'Case IDs' },
          { key: 'createdAtSec',  label: '创建时间' },
          { key: 'lastRunAtSec',  label: '最近运行时间' },
        ];
        rows = list.map((b) => {
          const caseIds = b.caseIds || [];
          const hasRun = b.status && b.status !== 'pending' && b.status !== 'ready';
          return {
            name: b.name || b.id,
            business: b.business || '—',
            caseCount: caseIds.length,
            createdAt: b.createdAt ? new Date(b.createdAt).toLocaleDateString() : '—',
            // ── export-only fields ──
            status: b.status || 'pending',
            caseIdsJoined: caseIds.join(', ') || '',
            createdAtSec: formatDateTimeSec(b.createdAt) || '',
            lastRunAtSec: hasRun ? (formatDateTimeSec(b.updatedAt) || '') : 'not run yet',
            // ── click-to-drill: `caseCount` cell opens the case list ──
            _expand: caseIds.length
              ? { caseCount: { title: `${b.name || b.id} · ${caseIds.length} cases`, caseIds } }
              : null,
            _projectRefs: [{ id: b.id, name: b.name || b.id }],
          };
        });
      } else if (entity === 'run') {
        // Run-history query — "xx project 运行过几次 / 都跑了哪些 / 上周
        // 跑的哪些成功了". Source of truth is state.recent (same feed
        // the per-project Run history modal reads), so a run that shows
        // up here is exactly one the user can also see there.
        //
        // Scope: caller MUST identify a project (projectId or projectName
        // substring, case-insensitive). Without that the answer would be
        // "every run of every project", which is never what the user
        // asked. We drop the query gracefully with 0 rows so the
        // planner can re-prompt.
        const projects = (state.batches || []).filter((b) => b && !b.isPreset);
        let targetProjects = [];
        if (filter.projectId) {
          const p = projects.find((b) => b.id === filter.projectId);
          if (p) targetProjects.push(p);
        }
        if (!targetProjects.length && filter.projectName) {
          const q = String(filter.projectName).toLowerCase();
          targetProjects = projects.filter((b) =>
            String(b.name || b.id || '').toLowerCase().includes(q));
        }
        // For each target project, decide which runs belong to it.
        // Mirrors openRunHistoryReportModal (batchId primary,
        // createdAt fallback for legacy records w/o batchId).
        const projectOf = new Map(); // runIndex -> project ref
        const projectStartCache = new Map();
        const projectCaseIdCache = new Map();
        for (const p of targetProjects) {
          projectStartCache.set(p.id, p.createdAt ? new Date(p.createdAt).getTime() : 0);
          projectCaseIdCache.set(p.id, new Set(p.caseIds || []));
        }
        const runList = [];
        for (const r of (state.recent || [])) {
          if (!r) continue;
          let owner = null;
          if (r.batchId) {
            owner = targetProjects.find((p) => p.id === r.batchId) || null;
          } else {
            for (const p of targetProjects) {
              if (!projectCaseIdCache.get(p.id).has(r.caseId)) continue;
              const t = new Date(r.finishedAt || r.startedAt || 0).getTime();
              if (t >= (projectStartCache.get(p.id) || 0)) { owner = p; break; }
            }
          }
          if (!owner) continue;
          projectOf.set(runList.length, owner);
          runList.push(r);
        }
        // Filter by status. state.recent uses 'passed'|'failed'|'running'|
        // 'pending'|'aborted'; the KB constrains callers to the first three.
        let filtered = runList.filter((r) => {
          if (filter.status && r.status !== filter.status) return false;
          return true;
        });
        // Date filter — inclusive both bounds (matches queryEntities
        // project runDate semantics). Uses finishedAt when present, else
        // startedAt; runs without either timestamp are dropped from a
        // date-scoped query.
        if (filter.runDateStart || filter.runDateEnd) {
          const startMs = filter.runDateStart
            ? new Date(filter.runDateStart + 'T00:00:00').getTime()
            : -Infinity;
          const endMs = filter.runDateEnd
            ? new Date(filter.runDateEnd + 'T23:59:59.999').getTime()
            : Infinity;
          filtered = filtered.filter((r) => {
            const iso = r.finishedAt || r.startedAt;
            if (!iso) return false;
            const t = new Date(iso).getTime();
            return t >= startMs && t <= endMs;
          });
        }
        // Newest first — matches how the Run history modal shows them.
        filtered.sort((a, b) => {
          const ta = new Date(a.finishedAt || a.startedAt || 0).getTime();
          const tb = new Date(b.finishedAt || b.startedAt || 0).getTime();
          return tb - ta;
        });
        filtered = filtered.slice(0, limit);
        const fmtT = (r) => {
          const iso = r.finishedAt || r.startedAt;
          return iso ? new Date(iso).toLocaleString() : '—';
        };
        const fmtD = (r) => r.durationMs != null
          ? `${(Math.round(r.durationMs / 100) / 10)}s`
          : (r.status === 'running' ? 'running…' : '—');
        columns = [
          { key: 'time',     label: '时间' },
          { key: 'status',   label: '状态' },
          { key: 'caseId',   label: 'Case' },
          { key: 'duration', label: '耗时' },
          { key: 'report',   label: 'Report' },
        ];
        columnsExport = [
          { key: 'projectName', label: 'Project 名' },
          { key: 'time',        label: '时间' },
          { key: 'status',      label: '状态' },
          { key: 'caseId',      label: 'Case ID' },
          { key: 'caseTitle',   label: 'Case 标题' },
          { key: 'duration',    label: '耗时' },
          { key: 'reportUrl',   label: 'Report URL' },
          { key: 'errorMessage', label: '错误信息' },
        ];
        // Track the unique projects the runs cover — enables the "在 My
        // Projects 中高亮" footer button when the query scoped to just one.
        const runProjectRefs = [];
        const seenProjRef = new Set();
        rows = filtered.map((r, idx) => {
          // owner comes from the pre-filter index; find it again via the
          // originally-cached projectOf map keyed by the pre-filter runList
          // index. Rebuild here to survive filter/sort/slice.
          const owner = (state.batches || []).find((b) => b.id === r.batchId)
            || targetProjects[0]
            || null;
          if (owner && !seenProjRef.has(owner.id)) {
            seenProjRef.add(owner.id);
            runProjectRefs.push({ id: owner.id, name: owner.name || owner.id });
          }
          const reportUrl = r.report?.url || '';
          return {
            time: fmtT(r),
            status: r.status || 'pending',
            caseId: r.caseId || '—',
            duration: fmtD(r),
            report: reportUrl ? '打开 report ↗' : '—',
            // export-only ------------------------------------------
            projectName: owner ? (owner.name || owner.id) : '—',
            caseTitle: r.caseTitle || '',
            reportUrl,
            errorMessage: r.errorMessage || '',
            _projectRefs: owner ? [{ id: owner.id, name: owner.name || owner.id }] : [],
            // Row click-through: open the Midscene report in a new tab.
            _rowClick: reportUrl ? () => window.open(reportUrl, '_blank') : null,
          };
        });
      } else if (entity === 'business') {
        // Enumerate businesses from batches AND capture the actual
        // project names / case ids so the table can spell them out
        // instead of just showing counts.
        const bizMap = new Map();
        for (const b of state.batches || []) {
          if (b.isPreset) continue;
          const biz = String(b.business || '').trim();
          if (!biz) continue;
          if (filter.caseId && !(b.caseIds || []).includes(filter.caseId)) continue;
          const entry = bizMap.get(biz) || { projectNames: [], projectRefs: [], caseIds: new Set() };
          entry.projectNames.push(b.name || b.id);
          entry.projectRefs.push({ id: b.id, name: b.name || b.id });
          (b.caseIds || []).forEach((id) => entry.caseIds.add(id));
          bizMap.set(biz, entry);
        }
        let entries = [...bizMap.entries()];
        if (sort === 'name') {
          entries.sort((a, b) => a[0].localeCompare(b[0]));
        } else {
          // Default for businesses is count_desc — most-active first.
          entries.sort((a, b) => b[1].projectNames.length - a[1].projectNames.length);
        }
        entries = entries.slice(0, limit);
        const fmtList = (arr, n = 5) => {
          if (!arr.length) return '—';
          if (arr.length <= n) return arr.join(', ');
          return `${arr.slice(0, n).join(', ')} (+${arr.length - n})`;
        };
        columns = [
          { key: 'business',    label: '部门' },
          { key: 'projectList', label: 'Projects' },
          { key: 'caseList',    label: '关联 Cases' },
        ];
        rows = entries.map(([biz, info]) => {
          // The bizMap entry was built with two slightly different
          // shapes during refactor — handle both so the merge is safe.
          const names = info.projectNames || [];
          const refs = info.projectRefs || names.map((name) => ({ name }));
          const projectCount = info.projects ?? refs.length;
          return {
            business: `${biz}  ·  ${projectCount} project / ${info.caseIds.size} case`,
            projectList: fmtList(names),
            caseList: fmtList([...info.caseIds]),
            _projectNames: names,
            _projectRefs: refs,
          };
        });
      }
      return { columns, columnsExport, rows, title, entity };
    }

    // Match a project against `filter.business` — either a single string
    // (substring on b.business, case-insensitive) OR an array (OR semantics:
    // matches if any element matches). Multi-select clarification chips
    // land here as arrays; single-tag entries still work as before.
    // Also honours `b.businesses[]` if the schema ever grows a multi-tag
    // field alongside the current single `b.business`.
    function projectMatchesBusinessFilter(b, needle) {
      if (!needle) return true;
      const haystacks = [];
      if (b.business) haystacks.push(String(b.business).toLowerCase());
      if (Array.isArray(b.businesses)) {
        b.businesses.forEach((t) => t && haystacks.push(String(t).toLowerCase()));
      }
      const test = (n) => {
        const low = String(n || '').trim().toLowerCase();
        if (!low) return false;
        return haystacks.some((h) => h.includes(low));
      };
      if (Array.isArray(needle)) return needle.some(test);
      return test(needle);
    }

    // Match `b.status` against a filter status. Live "running" bucket is
    // derived (a batch may still be tagged passed/failed while cases are
    // rerunning), so consult projectLiveCount for that case.
    function projectMatchesStatus(b, status) {
      if (!status) return true;
      if (status === 'running') return projectLiveCount(b) > 0;
      if (status === 'passed')  return b.status === 'passed'  && projectLiveCount(b) === 0;
      if (status === 'failed')  return b.status === 'failed'  && projectLiveCount(b) === 0;
      if (status === 'pending') return !b.status || b.status === 'pending' || b.status === 'ready';
      return true;
    }

    // Run-date filter: match `b.updatedAt` (project's most-recent activity)
    // against an inclusive ISO YYYY-MM-DD range. Either bound may be null.
    function projectRunDateWithin(b, startIso, endIso) {
      return dateWithinInclusive(b.updatedAt || b.createdAt, startIso, endIso);
    }
    // Same shape but keyed on createdAt — "created between X and Y".
    function projectCreatedDateWithin(b, startIso, endIso) {
      return dateWithinInclusive(b.createdAt, startIso, endIso);
    }
    function dateWithinInclusive(iso, startIso, endIso) {
      if (!startIso && !endIso) return true;
      const t = new Date(iso || 0).getTime();
      if (Number.isNaN(t) || t === 0) return false;
      if (startIso) {
        const s = new Date(startIso + 'T00:00:00').getTime();
        if (t < s) return false;
      }
      if (endIso) {
        const e = new Date(endIso + 'T23:59:59.999').getTime();
        if (t > e) return false;
      }
      return true;
    }
    // ── AI Workbench snapshot helpers ────────────────────────────────
    // Reopening a chat previously left only the summary line — the rich
    // cards (tables, run summaries, report inline) were built as live DOM
    // and never persisted. We now stash a JSON-serializable snapshot on
    // the ai message so rehydration can rebuild the exact card.

    // Slim projection of a project that survives batch mutations after the
    // fact. The run cards only need name/business/caseIds/createdAt to
    // render — no reason to bloat storage with reports/runs/history refs.
    function serializeProjectForSnapshot(p) {
      if (!p) return null;
      return {
        id: p.id || null,
        name: p.name || p.id || '',
        business: p.business || '',
        caseIds: Array.isArray(p.caseIds) ? p.caseIds.slice() : [],
        createdAt: p.createdAt || null,
        updatedAt: p.updatedAt || null,
      };
    }
    // Snapshot the currently-running tests. Later renderLiveRunsSnapshot
    // reads this back — no longer looks at state.active — so past turns
    // stay frozen at their capture time instead of morphing when the
    // active set changes.
    function captureLiveRunsSnapshot() {
      const active = Array.isArray(state.active) ? state.active : [];
      const rows = active.map((a) => {
        const cs = (state.cases || []).find((c) => c.id === a.caseId) || null;
        const owningProject = (state.batches || []).find((b) =>
          !b.isPreset && (b.caseIds || []).includes(a.caseId));
        const startedAt = a.startedAt || a.createdAt || null;
        let elapsed = '';
        if (startedAt) {
          const sec = Math.max(0, Math.round((Date.now() - new Date(startedAt).getTime()) / 1000));
          elapsed = sec < 60 ? `${sec}s` : `${Math.floor(sec / 60)}m ${sec % 60}s`;
        }
        return {
          caseId: a.caseId,
          title: a.caseTitle || cs?.title || cs?.id || a.caseId,
          project: owningProject?.name || owningProject?.id || '—',
          business: owningProject?.business || '—',
          step: a.currentStep
            ? `step ${a.currentStep.order || '?'}/${a.totalSteps || '?'}`
            : '启动中…',
          elapsed: elapsed || '—',
          _ownerProjectId: owningProject?.id || null,
        };
      });
      const seen = new Set();
      const jumpTargets = [];
      for (const r of rows) {
        if (r._ownerProjectId && !seen.has(r._ownerProjectId)) {
          seen.add(r._ownerProjectId);
          const p = (state.batches || []).find((b) => b.id === r._ownerProjectId);
          jumpTargets.push({ id: r._ownerProjectId, name: p?.name || '' });
        }
      }
      return { rows, jumpTargets, capturedAt: Date.now() };
    }
    // Static replay of a live-runs snapshot. Same visual as the live card
    // but flagged as historic ("snapshot at HH:MM") since the runs it
    // shows may have finished ages ago.
    function renderLiveRunsSnapshot(snap) {
      const wrap = el('div', { class: 'agent-query-card' },
        el('div', { class: 'agent-query-title' },
          '📡 当前正在跑的 test',
          snap.capturedAt
            ? el('span', { style: 'font-weight:400;color:var(--muted);margin-left:8px;font-size:11px;' },
                `· 快照 ${new Date(snap.capturedAt).toLocaleString()}`)
            : null,
        ),
      );
      const rows = snap.rows || [];
      if (!rows.length) {
        wrap.appendChild(el('div', { class: 'agent-query-empty' },
          '（该时刻没有 test 在跑）'));
        return wrap;
      }
      const columns = [
        { key: 'caseId',   label: 'Case' },
        { key: 'title',    label: '标题' },
        { key: 'project',  label: 'Project' },
        { key: 'business', label: '部门' },
        { key: 'step',     label: '当前步骤' },
        { key: 'elapsed',  label: '已跑' },
      ];
      wrap.appendChild(el('table', { class: 'agent-query-table' },
        el('thead', {}, el('tr', {}, ...columns.map((c) => el('th', {}, c.label)))),
        el('tbody', {}, ...rows.map((row) => el('tr', {},
          ...columns.map((c) => el('td', {}, String(row[c.key] ?? '—')))))),
      ));
      const footer = el('div', { class: 'agent-query-footer' });
      const jumpTargets = snap.jumpTargets || [];
      if (jumpTargets.length) {
        footer.appendChild(el('button', {
          class: 'agent-query-jump-btn',
          title: '切到 My Projects 并高亮这些 project 卡片',
          onclick: (ev) => {
            ev.currentTarget.blur();
            if (typeof workToggle === 'function') workToggle(false);
            state.tab = 'run'; state.section = 'my-projects'; renderAll();
            setTimeout(() => {
              agentHighlightNewProjects(jumpTargets, { idsOnly: true });
              window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 320);
          },
        }, `🎯 在 My Projects 中定位高亮这 ${jumpTargets.length} 个 project`));
      }
      footer.appendChild(el('span', { class: 'agent-query-footer-count' },
        `共 ${rows.length} 个 test 在跑`));
      wrap.appendChild(footer);
      return wrap;
    }
    // Rebuild the "report opened" inline card. The Reports-focus button
    // is dropped (the run context is stale — Reports view may have moved
    // on) but the direct report URL + My-Projects highlight remain useful.
    function renderReportOpenedSnapshot(snap) {
      const wrap = el('div', { class: 'agent-query-card' },
        el('div', { class: 'agent-query-title' }, '筛选出的 report'),
      );
      wrap.appendChild(el('table', { class: 'agent-query-table' },
        el('thead', {}, el('tr', {},
