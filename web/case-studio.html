        if (state.section === 'cache' && state.activeId) {
          // Cache Inspector lists per-run snapshots and needs each snap's
          // run record to render the report Preview / Open buttons (the
          // `report.url` lives on the run record, not on the snapshot
          // itself). Without loadRuns the rows fall back to "Missing
          // report" even when the report file exists on disk.
          if (!state.cacheFiles) loadCacheData(state.activeId).then(renderAll);
          if (!state.runs.length) loadRuns(state.activeId).then(renderAll);
        }
        if (state.section === 'run' && state.activeId) {
          loadRuns(state.activeId).then(renderAll);
          loadCacheData(state.activeId).then(renderAll);
          loadActiveRuns().then(renderAll);
        }
        if (state.activeId) location.hash = `#/${encodeURIComponent(state.activeId)}/${state.section}`;
        renderAll();
      });
    }
    function wireTopbar() {
      $('#refreshBtn').addEventListener('click', async () => {
        if (!state.activeId) return;
        await loadCaseDetail(state.activeId);
        if (state.section === 'cache') await loadCacheData(state.activeId);
        if (state.section === 'run') await loadRuns(state.activeId);
        renderAll();
        toast('Case 数据已刷新');
      });
      $('#globalRefreshBtn').addEventListener('click', () => globalRefresh());
    }
    function wireSidebar() {
      $('#caseSearch').addEventListener('input', (ev) => {
        state.filter = ev.target.value.trim().toLowerCase();
        renderSidebar();
      });
    }
    function wireChat() {
      loadChats();
      $('#chatFab').addEventListener('click', () => toggleChat(true));
      $('#chatClose').addEventListener('click', () => toggleChat(false));
      $('#chatNewBtn').addEventListener('click', () => { createNewChat(); renderChatHeader(); renderChatMessages(); });
      $('#chatHistoryBtn').addEventListener('click', () => {
        state.chatHistoryOpen = !state.chatHistoryOpen;
        renderChatHistory();
      });
      $('#chatClearAllBtn').addEventListener('click', () => {
        if (!confirm('清空所有对话历史？这一步不可恢复。')) return;
        state.chats = [];
        createNewChat();
        renderChatHeader();
        renderChatHistory();
        renderChatMessages();
      });
      $('#chatSend').addEventListener('click', sendChat);
      // Plain Enter sends; Shift+Enter inserts newline (standard chat UX).
      // IME composition (e.g. Chinese input) is excluded so picking a
      // candidate with Enter doesn't accidentally fire send.
      $('#chatInput').addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter' && !ev.shiftKey && !ev.isComposing) {
          ev.preventDefault();
          sendChat();
        }
      });
      // The screenshot toggle is a styled chip — sync the .is-on class and
      // the ✓ checkmark whenever the (hidden) checkbox flips.
      const cb = $('#chatIncludeScreenshot');
      const lab = $('#chatShotToggleLabel');
      const mark = $('#chatShotCheck');
      const syncShot = () => {
        lab.classList.toggle('is-on', cb.checked);
        mark.textContent = cb.checked ? '✓' : '';
      };
      cb.addEventListener('change', syncShot);
      syncShot();

      // Esc closes the chat panel. Two-level behaviour: if the thread
      // history dropdown is open, the first Esc collapses it; the second
      // Esc closes the whole panel. Mirrors run-center.html. Listener is
      // global because the panel/textarea may swallow keys otherwise.
      document.addEventListener('keydown', (ev) => {
        if (ev.key !== 'Escape') return;
        if (!state.chatOpen) return;
        // If a lightbox is open, let it handle Esc itself (it self-removes).
        if (document.getElementById('chatLightbox')) return;
        if (state.chatHistoryOpen) {
          state.chatHistoryOpen = false;
          renderChatHistory();
          ev.preventDefault();
          return;
        }
        toggleChat(false);
        ev.preventDefault();
      });
    }

    // ── Multi-chat thread management ──────────────────────────────────
    // Each chat lives in state.chats with { id, title, messages, createdAt }.
    // Persisted to localStorage so threads survive reloads. Welcome screen
    // shows whenever activeChat().messages is empty — that's how "+ New"
    // brings the example questions back without extra plumbing.
    const CHATS_KEY = 'caseStudio.chats';

    function loadChats() {
      try {
        const raw = JSON.parse(localStorage.getItem(CHATS_KEY) || '[]');
        if (Array.isArray(raw) && raw.length) {
          state.chats = raw;
          state.activeChatId = raw[0].id;
          return;
        }
      } catch {}
      createNewChat();
    }
    function saveChats() {
      try { localStorage.setItem(CHATS_KEY, JSON.stringify(state.chats)); } catch {}
    }

    // ── Video → Case persistence ───────────────────────────────────────
    // Everything the user needs to survive a refresh: title / assertion,
    // status text, the queue id (so we can resume polling), the finished
    // case JSON (with conversionMeta) and log.md notes. The File blob
    // itself can't be serialized — but if the queue id is set, the server
    // still has it, so we don't need the local copy anyway.
    const VIDEO_KEY = 'caseStudio.videoWork';
    function saveVideoWork() {
      try {
        localStorage.setItem(VIDEO_KEY, JSON.stringify({
          videoTitle:               state.videoTitle,
          videoAssert:              state.videoAssert,
          videoStatus:              state.videoStatus,
          videoStatusMsg:           state.videoStatusMsg,
          videoQueueId:             state.videoQueueId,
          videoCandidate:           state.videoCandidate,
          videoFileMeta:            state.videoFileMeta,
          videoConversionStartedAt: state.videoConversionStartedAt,
          videoConversionNotes:     state.videoConversionNotes,
          videoExcludeRef:          state.videoExcludeRef,
        }));
      } catch {}
    }
    function loadVideoWork() {
      try {
        const raw = JSON.parse(localStorage.getItem(VIDEO_KEY) || 'null');
        if (raw && typeof raw === 'object') {
          state.videoTitle               = raw.videoTitle               || '';
          state.videoAssert              = raw.videoAssert              || '';
          state.videoStatus              = raw.videoStatus              || 'idle';
          state.videoStatusMsg           = raw.videoStatusMsg           || '';
          state.videoQueueId             = raw.videoQueueId             || null;
          state.videoCandidate           = raw.videoCandidate           || null;
          state.videoFileMeta            = raw.videoFileMeta            || null;
          state.videoConversionStartedAt = raw.videoConversionStartedAt || null;
          state.videoConversionNotes     = raw.videoConversionNotes     || '';
          state.videoExcludeRef          = raw.videoExcludeRef          || '';
        }
      } catch {}
    }
    function clearVideoWork() {
      try { localStorage.removeItem(VIDEO_KEY); } catch {}
    }
    // If we bounced mid-conversion (page was closed while the queue entry
    // was still cooking), restart the same 5s poll on load — the server
    // holds the queue entry independently of the browser.
    function resumeVideoPollingIfNeeded() {
      if (!state.videoQueueId || state.videoCandidate) return;
      if (state.videoPollTimer) clearInterval(state.videoPollTimer);
      const id = state.videoQueueId;
      state.videoPollTimer = setInterval(async () => {
        try {
          const r = await api('/api/case-agent/video-to-case/status/' + encodeURIComponent(id));
          if (r.status === 'ready' && r.case) {
            clearInterval(state.videoPollTimer);
            state.videoPollTimer = null;
            state.videoStatus = 'ready';
            state.videoStatusMsg = '';
            state.videoCandidate = r.case;
            state.videoConversionNotes = r.notes || '';
            saveVideoWork();
            toast('转换完成');
            renderAll();
          } else if (r.status === 'error') {
            clearInterval(state.videoPollTimer);
            state.videoPollTimer = null;
            state.videoStatus = 'error';
            state.videoStatusMsg = r.error || '未知错误';
            saveVideoWork();
            renderAll();
          }
        } catch (err) {
          if (String(err.message).includes('404')) {
            clearInterval(state.videoPollTimer);
            state.videoPollTimer = null;
            state.videoStatus = 'error';
            state.videoStatusMsg = err.message;
            saveVideoWork();
            renderAll();
          }
        }
      }, 5000);
    }

    // ── Simple full-screen text modal (for viewing log.md / case.json) ─
    // Minimal markdown → HTML renderer covering exactly the constructs
    // our log.md files use (headers, bold/italic, inline code, code fence,
    // bullet + ordered lists, simple pipe tables, horizontal rule, links,
    // blockquotes). No external library — keeps the SPA a single file.
    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }
    function renderMarkdownToHtml(md) {
      const src = String(md || '');
      // Extract fenced code blocks first so their content isn't touched
      // by later regex passes. Replace with sentinels, restore at end.
      const codeBlocks = [];
      let s = src.replace(/```(\w*)\r?\n([\s\S]*?)```/g, (_m, lang, body) => {
        const idx = codeBlocks.length;
        codeBlocks.push(`<pre class="md-code"><code>${escapeHtml(body)}</code></pre>`);
        return `␀CODE${idx}␀`;
      });
      // Tables — very rough: any block of consecutive `| ... |` lines
      // where the second line is a `|---|---|` separator.
      s = s.replace(/(^\|.*\|\s*\n\|[\s:|-]+\|\s*\n(?:^\|.*\|\s*\n?)+)/gm, (block) => {
        const rows = block.trim().split(/\r?\n/).map((r) => r.trim());
        if (rows.length < 2) return block;
        const header = rows[0].replace(/^\||\|$/g, '').split('|').map((c) => c.trim());
        const bodyRows = rows.slice(2).map((r) => r.replace(/^\||\|$/g, '').split('|').map((c) => c.trim()));
        let html = '<table class="md-table"><thead><tr>';
        html += header.map((c) => `<th>${inlineMd(c)}</th>`).join('');
        html += '</tr></thead><tbody>';
        for (const row of bodyRows) {
          html += '<tr>' + row.map((c) => `<td>${inlineMd(c)}</td>`).join('') + '</tr>';
        }
        html += '</tbody></table>';
        return html;
      });
      // Line-by-line: headers, blockquote, lists, horizontal rule, para.
      const lines = s.split(/\r?\n/);
      const out = [];
      let inUl = false, inOl = false;
      const closeLists = () => {
        if (inUl) { out.push('</ul>'); inUl = false; }
        if (inOl) { out.push('</ol>'); inOl = false; }
      };
      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i];
        // Code-block sentinel — pass through unchanged.
        if (/^␀CODE\d+␀$/.test(line)) { closeLists(); out.push(line); continue; }
        // Table HTML — pass through.
        if (/^<table\b/.test(line) || /^<\/table>/.test(line) || /^<t[hb]ody\b/.test(line)) { closeLists(); out.push(line); continue; }
        // Horizontal rule
        if (/^\s*---+\s*$/.test(line)) { closeLists(); out.push('<hr />'); continue; }
        // Headers 1-4
        let m;
        if ((m = /^(#{1,4})\s+(.*)$/.exec(line))) {
          closeLists();
          const lvl = m[1].length;
          out.push(`<h${lvl} class="md-h${lvl}">${inlineMd(m[2])}</h${lvl}>`);
          continue;
        }
        // Blockquote
        if (/^>\s+/.test(line)) {
          closeLists();
          out.push(`<blockquote class="md-quote">${inlineMd(line.replace(/^>\s+/, ''))}</blockquote>`);
          continue;
        }
        // Ordered list
        if ((m = /^\s*(\d+)\.\s+(.*)$/.exec(line))) {
          if (!inOl) { closeLists(); out.push('<ol class="md-list">'); inOl = true; }
          out.push(`<li>${inlineMd(m[2])}</li>`);
          continue;
        }
        // Unordered list
        if ((m = /^\s*[-*+]\s+(.*)$/.exec(line))) {
          if (!inUl) { closeLists(); out.push('<ul class="md-list">'); inUl = true; }
          out.push(`<li>${inlineMd(m[1])}</li>`);
          continue;
        }
        // Blank line → close lists, emit spacer
        if (/^\s*$/.test(line)) { closeLists(); out.push(''); continue; }
        // Paragraph
        closeLists();
        out.push(`<p class="md-p">${inlineMd(line)}</p>`);
      }
      closeLists();
      // Restore code blocks
      let html = out.join('\n').replace(/␀CODE(\d+)␀/g, (_m, idx) => codeBlocks[Number(idx)] || '');
      return html;

      // Inline formatters: **bold**, *italic*, `code`, [text](url).
      function inlineMd(t) {
        return escapeHtml(t)
          .replace(/`([^`]+)`/g, '<code class="md-icode">$1</code>')
          .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
          .replace(/(?<![*\w])\*([^*\n]+)\*(?!\w)/g, '<i>$1</i>')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      }
    }

    // opts: {
    //   filename: 'suggested-name.md'   → shows Download button
    //   mode:     'markdown' | 'text'   → markdown renders with headers/lists
    //   mimeType: 'text/markdown'       → download blob MIME
    // }
    function showTextModal(title, text, opts = {}) {
      document.getElementById('__csModal')?.remove();
      const overlay = el('div', {
        id: '__csModal',
        style: 'position:fixed;inset:0;background:rgba(15,30,50,0.55);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;',
        onclick: (ev) => { if (ev.target === overlay) overlay.remove(); },
      });
      const copyBtn = el('button', {
        class: 'a-button a-button--neutral-tertiary',
        style: 'padding:4px 10px;margin-right:6px;',
        onclick: async () => {
          try { await navigator.clipboard.writeText(text || ''); toast('已复制'); }
          catch { toast('复制失败'); }
        },
      }, '📋 Copy');
      const downloadBtn = opts.filename ? el('button', {
        class: 'a-button a-button--neutral-secondary',
        style: 'padding:4px 10px;margin-right:6px;',
        onclick: () => {
          try {
            const blob = new Blob([text || ''], { type: opts.mimeType || 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = opts.filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
            toast('已下载 ' + opts.filename);
          } catch (err) {
            toast('下载失败: ' + err.message);
          }
        },
      }, '⬇ Download') : null;
      let toggleBtn = null;
      const closeBtn = el('button', {
        class: 'a-button a-button--neutral-tertiary',
        style: 'padding:4px 10px;',
        onclick: () => overlay.remove(),
      }, '✕ Close');
      // Body content — either markdown-rendered or plain pre.
      let renderMode = opts.mode || 'text';
      const bodyContainer = el('div', {
        style: 'flex:1;overflow:auto;margin:0;',
      });
      const paintBody = () => {
        bodyContainer.replaceChildren();
        if (renderMode === 'markdown') {
          const div = el('div', {
            class: 'md-body',
            style: 'padding:20px 26px;background:#fff;color:var(--navy);font-size:14px;line-height:1.7;',
            html: renderMarkdownToHtml(text || ''),
          });
          bodyContainer.appendChild(div);
        } else {
          const pre = el('pre', {
            style: 'margin:0;padding:16px 20px;font-family:var(--mono);font-size:12px;line-height:1.55;background:var(--g-gray-10);color:var(--g-gray-95);white-space:pre-wrap;word-break:break-word;',
          }, text || '(empty)');
          bodyContainer.appendChild(pre);
        }
      };
      // Only offer the toggle if content actually looks like markdown OR
      // if the caller explicitly opened in markdown mode.
      const looksLikeMd = /^#\s+|^##\s+|^```/m.test(String(text || ''));
      if (opts.mode === 'markdown' || looksLikeMd) {
        toggleBtn = el('button', {
          class: 'a-button a-button--neutral-tertiary',
          style: 'padding:4px 10px;margin-right:6px;',
          onclick: () => {
            renderMode = renderMode === 'markdown' ? 'text' : 'markdown';
            toggleBtn.textContent = renderMode === 'markdown' ? '⌨ Raw' : '📖 Render';
            paintBody();
          },
        }, renderMode === 'markdown' ? '⌨ Raw' : '📖 Render');
      }
      const dialog = el('div', {
        style: 'background:#fff;border-radius:8px;max-width:1000px;width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.35);',
      },
        el('div', { style: 'padding:12px 18px;border-bottom:1px solid var(--g-gray-90);display:flex;align-items:center;gap:10px;' },
          el('div', { style: 'font-weight:800;color:var(--navy);flex:1;font-size:14px;' }, title),
          toggleBtn,
          copyBtn,
          downloadBtn,
          closeBtn,
        ),
        bodyContainer,
      );
      paintBody();
      overlay.appendChild(dialog);
      document.body.appendChild(overlay);
      const escHandler = (ev) => {
        if (ev.key === 'Escape') {
          overlay.remove();
          document.removeEventListener('keydown', escHandler);
        }
      };
      document.addEventListener('keydown', escHandler);
    }
    function createNewChat() {
      const c = {
        id: 'c-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
        title: 'New chat',
        messages: [],
        createdAt: Date.now(),
      };
      state.chats.unshift(c);   // newest first
      state.activeChatId = c.id;
      state.chatHistoryOpen = false;
      saveChats();
      return c;
    }
    function switchChat(id) {
      if (state.activeChatId === id) { state.chatHistoryOpen = false; renderChatHistory(); return; }
      state.activeChatId = id;
      state.chatHistoryOpen = false;
      renderChatHeader();
      renderChatHistory();
      renderChatMessages();
    }
    function deleteChat(id) {
      state.chats = state.chats.filter((c) => c.id !== id);
      if (state.activeChatId === id) {
        state.activeChatId = state.chats[0]?.id || null;
        if (!state.activeChatId) createNewChat();
      }
      saveChats();
      renderChatHeader();
      renderChatHistory();
      renderChatMessages();
    }
    function activeChat() {
      let c = state.chats.find((x) => x.id === state.activeChatId);
      if (!c) { c = createNewChat(); }
      return c;
    }
    function fmtAgo(ts) {
      const diff = (Date.now() - ts) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    function renderChatHeader() {
      const c = activeChat();
      const titleEl = $('#chatHeaderTitle');
      if (titleEl) titleEl.textContent = c.title;
      const countEl = $('#chatHistoryCount');
      if (countEl) countEl.textContent = state.chats.length;
    }
    function renderChatHistory() {
      const wrap = $('#chatHistoryList');
      const drop = $('#chatHistoryDrop');
      if (!wrap || !drop) return;
      drop.classList.toggle('open', !!state.chatHistoryOpen);
      if (!state.chatHistoryOpen) return;
      wrap.replaceChildren(...state.chats.map((c) => {
        const isActive = c.id === state.activeChatId;
        const preview = c.messages[0]?.content?.slice(0, 60) || '(empty)';
        return el('div', { class: 'chat-thread-item' + (isActive ? ' is-active' : '') },
          el('div', { class: 'thread-main', onclick: () => switchChat(c.id) },
            el('div', { class: 'thread-title' }, isActive ? '● ' : '', c.title),
            el('div', { class: 'thread-meta' }, fmtAgo(c.createdAt), ' · ', c.messages.length + ' msgs'),
            c.messages.length ? el('div', { class: 'thread-preview' }, preview) : null,
          ),
          el('button', {
            class: 'thread-del', title: 'Delete this chat',
            onclick: (ev) => { ev.stopPropagation(); if (confirm(`删除 "${c.title}"？`)) deleteChat(c.id); },
          }, '✕'),
        );
      }));
    }

    async function globalRefresh(opts = {}) {
      const btn = $('#globalRefreshBtn');
      if (btn) { btn.disabled = true; btn.classList.add('is-refreshing'); }
      try {
        const [casesRes, validRes] = await Promise.all([
          api('/api/cases').catch(() => ({ cases: [] })),
          api('/api/validated').catch(() => ({ ids: [] })),
        ]);
        state.cases = casesRes.cases || casesRes || [];
        state.validatedIds = Array.isArray(validRes?.ids) ? validRes.ids : [];
        renderSidebar();
        if (state.activeId) { await loadCaseDetail(state.activeId); renderAll(); }
        if (!opts.silent) toast('全部刷新完成');
      } catch (err) {
        if (!opts.silent) toast('刷新失败: ' + err.message);
      } finally {
        if (btn) { btn.disabled = false; btn.classList.remove('is-refreshing'); }
      }
    }

    async function loadTemplate() {
      if (state.createTemplateBody || state.createTemplateLoading) return;
      state.createTemplateLoading = true;
      try {
        const tpl = await api('/api/cases/_meta/template');
        state.createTemplateBody = tpl;
      } catch { /* best-effort; create-template will show "no template" */ }
      finally {
        state.createTemplateLoading = false;
        if (state.section === 'create') renderAll();
      }
    }

    async function selectCase(id) {
      state.activeId = id;
      state.detail = null;
      state.runLog = [];
      state.lastRun = null;
      state.cacheFiles = null;
      state.cacheDebug = null;
      state.runs = [];
      state.stepDrafts = {};
      // If we were on Create, jump to Run & Debug — that's the natural
      // landing for someone debugging an existing case.
      if (state.section === 'create' || state.section === 'video' || state.section === 'howto') state.section = 'run';
      location.hash = `#/${encodeURIComponent(id)}/${state.section}`;
      renderSidebar(); renderAll();
      await loadCaseDetail(id);
      // Cache Inspector also needs `state.runs` populated — its per-run
      // snapshot rows look up each runId in `state.runs` to find the
      // Midscene report URL. Without this, every snapshot row falls back
      // to "Missing report" even when the report file exists on disk.
      if (state.section === 'run' || state.section === 'cache') {
        await Promise.all([
          loadRuns(id),
          loadCacheData(id),
          loadActiveRuns(),
        ]);
      }
      renderAll();
    }
    async function loadCaseDetail(id) {
      try { state.detail = await api('/api/cases/' + encodeURIComponent(id)); }
      catch (err) { toast('case 加载失败: ' + err.message); state.detail = null; }
    }
    async function loadRuns(id) {
      try {
        const r = await api('/api/cases/' + encodeURIComponent(id) + '/runs?limit=20');
        state.runs = r.runs || r || [];
      } catch { state.runs = []; }
    }
    async function loadCacheData(id) {
      try {
        const [files, debug] = await Promise.all([
          api('/api/midscene-js/cases/' + encodeURIComponent(id) + '/cache'),
          api('/api/midscene-js/cases/' + encodeURIComponent(id) + '/cache-debug'),
        ]);
        state.cacheFiles = files; state.cacheDebug = debug;
      } catch (err) { toast('cache 数据加载失败: ' + err.message); }
    }

    // Fetch active runs for the whole server; renderRunDebug filters to
    // the current case. Called from the 2s poll loop while Run & Debug
    // is in view. Even runs started from Run Center / another dev show
    // up here so we can attach + abort them.
    async function loadActiveRuns() {
      try {
        const r = await api('/api/midscene-js/runs/active');
        state.activeRuns = r.active || [];
      } catch { state.activeRuns = []; }
    }

    // POST /api/midscene-js/runs/:runId/abort for each selected runId.
    // Best-effort: errors are swallowed individually so one stuck run
    // doesn't block the whole batch.
    async function abortRuns(runIds) {
      if (!runIds.length) return;
      toast(`正在中止 ${runIds.length} 个 run…`);
      await Promise.all(runIds.map(async (rid) => {
        try {
          await api('/api/midscene-js/runs/' + encodeURIComponent(rid) + '/abort', { method: 'POST' });
        } catch { /* surfaced via refresh */ }
      }));
      await loadActiveRuns();
      renderAll();
      toast(`已发送 ${runIds.length} 个 abort 请求`);
    }

    // Bulk-abort picker. Preselects whatever caller passes; user can
    // toggle. Ported from run-center's openAbortModal — same shape, just
    // styled to match Case Studio.
    function openAbortModal(caseIdsHint) {
      const live = state.activeRuns.slice();
      if (!live.length) return toast('没有正在 run 的 case');
      const hinted = new Set(caseIdsHint || []);
      const selected = new Set(live
        .filter((a) => hinted.size ? hinted.has(a.caseId) : true)
        .map((a) => a.runId));

      const overlay = el('div', { class: 'modal-backdrop', onclick: (ev) => { if (ev.target === overlay) close(); } });
      function close() { overlay.remove(); document.removeEventListener('keydown', onKey); }
      function onKey(ev) { if (ev.key === 'Escape') close(); }
      document.addEventListener('keydown', onKey);

      const list = el('div', { style: 'padding:8px 0;max-height:50vh;overflow-y:auto;' });
      let confirmBtn;
      function paintList() {
        list.replaceChildren(...live.map((a) => {
          const checked = selected.has(a.runId);
          return el('label', { class: 'abort-row' + (checked ? ' checked' : '') },
            el('input', {
              type: 'checkbox', checked: checked ? '' : null,
              onchange: (ev) => {
                if (ev.target.checked) selected.add(a.runId);
                else selected.delete(a.runId);
                paintList(); paintBtn();
              },
            }),
            el('div', { class: 'ab-main' },
              el('div', { class: 'ab-title' }, a.caseId, a.caseTitle ? ' · ' + a.caseTitle : ''),
              el('div', { class: 'ab-meta' },
                a.currentStep ? `Step ${a.currentStep.order}/${a.totalSteps} · ${a.currentStep.title || a.currentStep.api || ''}` : 'starting…',
                ' · ', el('code', { style: 'font-size:10.5px;' }, a.runId.slice(-12)),
              ),
            ),
          );
        }));
      }
      function paintBtn() {
        if (!confirmBtn) return;
        const n = selected.size;
        confirmBtn.disabled = n === 0;
        confirmBtn.textContent = n === 0 ? 'Select runs to abort'
          : n === live.length ? `⏹ Abort all ${n}`
          : `⏹ Abort selected (${n})`;
      }
      confirmBtn = el('button', {
        class: 'a-button a-button--destructive-primary -small',
        onclick: () => { close(); abortRuns([...selected]); },
      });
      paintList(); paintBtn();

      const modal = el('div', { class: 'modal' },
        el('div', { class: 'modal-head' },
          el('div', {},
            el('div', { class: 'title' }, 'Abort runs'),
            el('div', { class: 'sub' }, '勾选要 kill 的 run。runner 会清掉浏览器 + 页面句柄。'),
          ),
          el('button', { class: 'close', onclick: close }, '✕'),
        ),
        el('div', { class: 'modal-body' },
          list,
          el('div', { style: 'display:flex;gap:8px;margin-top:14px;justify-content:flex-end;' },
            el('button', { class: 'a-button a-button--neutral-tertiary -small', onclick: close }, 'Cancel'),
            confirmBtn,
          ),
        ),
      );
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
    }

    // Crossfade screenshot updater — looks up the active run's latest
    // screenshot, mounts a transient <img> over the current one, fades
    // in once loaded. Avoids the blink-to-fallback that hurt the user UI.
    async function hydrateLiveShot(activeRun) {
      const img = $('#liveShot');
      const screen = $('#liveScreen');
      if (!img || !screen) return;
      let nextUrl = null;
      if (activeRun?.runId) {
        try {
          const shots = await api('/api/midscene-js/runs/' + encodeURIComponent(activeRun.runId) + '/screenshots');
          const latest = (shots.screenshots || []).slice().sort((a, b) => b.order - a.order)[0];
          if (latest?.url) nextUrl = latest.url;
        } catch {}
      }
      if (!nextUrl) return;
      const cached = state.liveShotCache.get(activeRun.runId);
      if (cached === nextUrl) return;
      state.liveShotCache.set(activeRun.runId, nextUrl);
      const cacheBusted = nextUrl + (nextUrl.includes('?') ? '&' : '?') + 't=' + Date.now();
      const swap = document.createElement('img');
      swap.className = 'is-swap'; swap.alt = ''; swap.src = cacheBusted;
      swap.addEventListener('load', () => {
        requestAnimationFrame(() => requestAnimationFrame(() => swap.classList.add('swap-in')));
        setTimeout(() => { img.src = cacheBusted; swap.remove(); }, 480);
      }, { once: true });
      swap.addEventListener('error', () => swap.remove(), { once: true });
      screen.appendChild(swap);
    }

    // Cache Debug modal — ported from app.js#openCacheDebugModal. Two
    // columns (PASS / FAIL slot), each with: source-run picker,
    // exclude-step checkboxes with Include-all / Exclude-all helpers,
    // and (FAIL only) a dropTailCount input. Saves to PUT /cache-debug.
    async function openCacheDebugModal(caseId) {
      let data;
      try {
        data = await api('/api/midscene-js/cases/' + encodeURIComponent(caseId) + '/cache-debug');
      } catch (e) { return toast('cache-debug 加载失败: ' + e.message); }

      // Mutable working copies of the two slot configs.
      const draft = {
        pass: { source: data.pass?.source || 'auto', excludeSteps: new Set(data.pass?.excludeSteps || []) },
        fail: {
          source: data.fail?.source || 'auto',
          excludeSteps: new Set(data.fail?.excludeSteps || []),
          dropTailCount: Number(data.fail?.dropTailCount ?? 2),
        },
      };

      // Build a select dropdown listing all snapshots, ordered preferred-status first.
      function buildSourceOptions(slot) {
        const preferStatus = slot === 'pass' ? 'passed' : 'failed';
        const opts = [el('option', { value: 'auto' }, slot === 'pass' ? 'Auto (latest passed snapshot)' : 'Auto (latest failed snapshot)')];
        const snaps = (data.snapshots || []).filter((s) => s.hasFile);
        const fmt = (s) => {
          const when = s.finishedAt ? new Date(s.finishedAt).toISOString().slice(5, 16).replace('T', ' ') : '?';
          const sz = s.sizeBytes != null ? `${Math.round(s.sizeBytes / 1024)}kB` : '?';
          return `${s.runId.slice(-12)} · ${when} · ${s.status} · ${sz}`;
        };
        const preferred = snaps.filter((s) => s.status === preferStatus);
        const others    = snaps.filter((s) => s.status !== preferStatus);
        if (preferred.length) {
          const g = el('optgroup', { label: `── ${preferStatus} runs ──` });
          preferred.forEach((s) => g.appendChild(el('option', { value: s.runId }, fmt(s))));
          opts.push(g);
        }
        if (others.length) {
          const g = el('optgroup', { label: '── other runs ──' });
          others.forEach((s) => g.appendChild(el('option', { value: s.runId }, fmt(s))));
          opts.push(g);
        }
        return opts;
      }

      function buildCol(slot) {
        const cfg = draft[slot];
        const isPass = slot === 'pass';
        const currentFile = isPass ? data.currentPassFile : data.currentFailFile;
        const fileNote = currentFile?.exists
          ? `${Math.round(currentFile.sizeBytes / 1024)} kB · ${currentFile.mtime ? new Date(currentFile.mtime).toLocaleString() : '?'}`
          : '(not yet created — runs in this slot will start from empty)';

        const sourceSel = el('select', {
          class: 'cdm-select',
          onchange: (ev) => { cfg.source = ev.target.value; },
        }, ...buildSourceOptions(slot));
        sourceSel.value = cfg.source;

        const countLabel = el('span', { style: 'font-size:11px;color:var(--muted);' });
        function paintCount() {
          countLabel.textContent = `${cfg.excludeSteps.size} of ${(data.apiGuideSteps || []).length} excluded`;
        }
        paintCount();

        const stepRows = (data.apiGuideSteps || []).map((s) => {
          const cb = el('input', {
            type: 'checkbox',
            checked: cfg.excludeSteps.has(s.order) ? '' : null,
            onchange: (ev) => {
              if (ev.target.checked) cfg.excludeSteps.add(s.order);
              else cfg.excludeSteps.delete(s.order);
              paintCount();
            },
          });
          return el('label', { class: 'cdm-step-row', title: s.midsceneApi || '' },
            cb,
            el('span', { class: 'step-num' }, String(s.order).padStart(2, '0')),
            el('span', { class: 'step-text' }, s.title || s.midsceneApi || '(step)'),
            el('span', { class: 'step-api' }, (s.midsceneApi || '').replace(/^agent\./, '')),
          );
        });
        const stepList = el('div', { class: 'cdm-step-list' }, ...stepRows);

        const excludeAllBtn = el('button', {
          class: 'a-button a-button--neutral-tertiary -small',
          onclick: () => {
            (data.apiGuideSteps || []).forEach((s) => cfg.excludeSteps.add(s.order));
            stepRows.forEach((row) => { row.querySelector('input').checked = true; });
            paintCount();
          },
        }, 'Exclude all');
        const includeAllBtn = el('button', {
          class: 'a-button a-button--neutral-tertiary -small',
          onclick: () => {
            cfg.excludeSteps.clear();
            stepRows.forEach((row) => { row.querySelector('input').checked = false; });
            paintCount();
          },
        }, 'Include all');

        const dropTail = !isPass ? el('input', {
          type: 'number', min: '0', max: '20', step: '1',
          class: 'cdm-num', style: 'width: 80px;',
          value: String(cfg.dropTailCount),
          onchange: (ev) => {
            const n = Number(ev.target.value);
            if (Number.isFinite(n) && n >= 0) cfg.dropTailCount = n;
          },
        }) : null;

        return el('div', { class: 'cdm-col ' + (isPass ? 'is-pass' : 'is-fail') },
          el('div', { class: 'cdm-col-head' },
            el('div', { class: 'cdm-col-tag' }, isPass ? 'PASS CACHE · gold' : 'FAIL CACHE · scratchpad'),
            el('div', { class: 'cdm-col-blurb' }, isPass
              ? '"Run with cache" reads this. Conservative — only updated by passing runs.'
              : '"Run raw" writes here. Work-in-progress; runner can drop the failing tail.'),
            el('div', { class: 'cdm-col-file' }, fileNote),
          ),
          el('div', { class: 'cdm-field' },
            el('div', { class: 'cdm-field-label' }, 'Source snapshot'),
            sourceSel,
          ),
          !isPass ? el('div', { class: 'cdm-field' },
            el('div', { class: 'cdm-field-label' }, 'Drop last N steps from snapshot'),
            el('div', { class: 'cdm-actions-row' },
              dropTail,
              el('span', { style: 'font-size:11px;color:var(--muted);' }, '(default 2 · scrubs bad xpaths near the failure point)'),
            ),
          ) : null,
          el('div', { class: 'cdm-field' },
            el('div', { class: 'cdm-actions-row' },
              el('div', { class: 'cdm-field-label', style: 'flex:1;' }, 'Exclude these steps from cache (force re-plan)'),
              countLabel,
              includeAllBtn,
              excludeAllBtn,
            ),
            stepList,
          ),
        );
      }

      const passCol = buildCol('pass');
      const failCol = buildCol('fail');

      const overlay = el('div', { class: 'modal-backdrop', onclick: (ev) => { if (ev.target === overlay) close(); } });
      function close() { overlay.remove(); document.removeEventListener('keydown', onKey); }
      function onKey(ev) { if (ev.key === 'Escape') close(); }
      document.addEventListener('keydown', onKey);

      const saveBtn = el('button', { class: 'a-button a-button--brand-primary -small' }, 'Save');
      const resetBtn = el('button', { class: 'a-button a-button--neutral-tertiary -small' }, 'Reset to defaults');

      saveBtn.addEventListener('click', async () => {
        saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
        try {
          await api('/api/midscene-js/cases/' + encodeURIComponent(caseId) + '/cache-debug', {
            method: 'PUT',
            body: JSON.stringify({
              pass: { source: draft.pass.source, excludeSteps: [...draft.pass.excludeSteps] },
              fail: {
                source: draft.fail.source,
                excludeSteps: [...draft.fail.excludeSteps],
                dropTailCount: draft.fail.dropTailCount,
              },
            }),
          });
          toast('Cache slot config saved');
          close();
          if (state.section === 'cache') { await loadCacheData(caseId); renderAll(); }
        } catch (e) {
          toast('保存失败: ' + e.message);
          saveBtn.disabled = false; saveBtn.textContent = 'Save';
        }
      });
      resetBtn.addEventListener('click', () => {
        if (!confirm('两个 slot 都恢复默认（Auto source · 无 exclude · fail dropTail=2）？')) return;
        close();
        api('/api/midscene-js/cases/' + encodeURIComponent(caseId) + '/cache-debug', {
          method: 'PUT',
          body: JSON.stringify({
            pass: { source: 'auto', excludeSteps: [] },
            fail: { source: 'auto', excludeSteps: [], dropTailCount: 2 },
          }),
        }).then(() => { toast('已重置'); openCacheDebugModal(caseId); }).catch((e) => toast('重置失败: ' + e.message));
      });

      const modal = el('div', { class: 'modal cdm' },
        el('div', { class: 'modal-head' },
          el('div', {},
            el('div', { class: 'title' }, 'Cache Debug · ' + caseId),
            el('div', { class: 'sub' }, '下次跑用哪份 cache · 排除哪些 step · trim 几步 · 改完点 Save 立即生效'),
          ),
          el('button', { class: 'close', onclick: close }, '✕'),
        ),
        el('div', { class: 'modal-body', style: 'padding:0;' },
          el('div', { class: 'cdm-grid' }, passCol, failCol),
          el('div', { style: 'padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;background:#fafafa;' },
            resetBtn, saveBtn,
          ),
        ),
      );
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
    }

    function renderSidebar() {
      // Case counts by scope. Demo prefix = seeded/example content that
      // clutters the list once real cases exist — hidden from All by
      // default, still visible under its own scope pill.
      const isDemo = (c) => /^demo-/i.test(c.id || '');
      const nonDemoCount = state.cases.filter((c) => !isDemo(c)).length;
      const demoCount    = state.cases.filter((c) =>  isDemo(c)).length;
      $('#caseCount').textContent = state.cases.length + ' total · '
        + state.validatedIds.length + ' validated · '
        + demoCount + ' demo';

      const scopeBar = $('#caseScopeBar');
      if (scopeBar) {
        const make = (key, label, count) => el('button', {
          class: 'scope-pill' + (state.sidebarScope === key ? ' active' : ''),
          onclick: () => { state.sidebarScope = key; renderSidebar(); },
        }, label, ' · ', String(count));
        scopeBar.replaceChildren(
          make('all',       'All',       nonDemoCount),
          make('validated', 'Validated', state.validatedIds.length),
          make('demo',      'Demo',      demoCount),
        );
      }
      const ul = $('#caseList');
      const filtered = state.cases.filter((c) => {
        if (state.sidebarScope === 'validated' && !state.validatedIds.includes(c.id)) return false;
        if (state.sidebarScope === 'demo' && !isDemo(c)) return false;
        // 'all' scope hides demo-* to keep the working list focused.
        if (state.sidebarScope === 'all' && isDemo(c)) return false;
        if (!state.filter) return true;
        const t = titleOf(c).toLowerCase();
        return c.id.toLowerCase().includes(state.filter) || t.includes(state.filter);
      });
      // Newest-first ordering. The API surfaces `modifiedAt` (mtime) per
      // case. Fallback to id descending so demo/seeded content still
      // orders predictably. Active case pinned to top so a hash-linked
      // case doesn't scroll out of view after a refresh.
      filtered.sort((a, b) => {
        if (a.id === state.activeId) return -1;
        if (b.id === state.activeId) return 1;
        const ma = a.modifiedAt || '';
        const mb = b.modifiedAt || '';
        if (ma && mb) return mb.localeCompare(ma);
        return (b.id || '').localeCompare(a.id || '');
      });
      if (!filtered.length) {
        const hint = state.sidebarScope === 'validated'
          ? '没有 validated case 匹配 — 切到 All 试试'
          : state.sidebarScope === 'demo'
            ? '没有 demo case'
            : '没有 case — 试试上方 ✦ Create new case';
        ul.replaceChildren(el('li', { style: 'cursor:default;opacity:0.55;font-size:11px;font-style:italic;' },
          el('div', { style: 'flex:1;' }, hint),
        ));
        return;
      }
      // "Bulk delete all demo" affordance — ONLY when Demo scope active.
      // Sits at the top of the list as a distinct-looking row. Prompts
      // for a typed confirmation before firing the DELETE calls.
      const demoBulkDelete = state.sidebarScope === 'demo'
        ? el('li', {
            style: 'background:#fef2f2;border-left:3px solid #dc2626;cursor:pointer;padding:8px 12px;',
            onclick: async () => {
              const demos = state.cases.filter(isDemo).map((c) => c.id);
              if (!demos.length) return;
              const typed = prompt(`⚠ 即将永久删除 ${demos.length} 个 demo case：\n\n${demos.join('\n')}\n\n输入 DELETE 确认（大小写敏感）：`);
              if (typed !== 'DELETE') { toast('已取消'); return; }
              let ok = 0, fail = 0;
              for (const id of demos) {
                try {
                  await api('/api/cases/' + encodeURIComponent(id), { method: 'DELETE' });
                  ok += 1;
                } catch { fail += 1; }
              }
              toast(`✓ 删了 ${ok} 个 demo${fail ? ` · 失败 ${fail} 个` : ''}`);
              await globalRefresh({ silent: true });
            },
          },
            el('div', { style: 'font-weight:800;color:#991b1b;font-size:12px;' },
              '🗑 全部删除 (' + demoCount + ' 个 demo case)'),
            el('div', { style: 'font-size:10.5px;color:#7f1d1d;margin-top:2px;' },
              '需要输入 DELETE 确认 · 不可撤销'),
          )
        : null;

      ul.replaceChildren(...[demoBulkDelete].filter(Boolean), ...filtered.map((c) => {
        const validated = state.validatedIds.includes(c.id);
        return el('li', {
          class: c.id === state.activeId ? 'active' : '',
          onclick: () => selectCase(c.id),
        },
          el('div', { style: 'flex:1;min-width:0;' },
            el('div', { class: 'cid' }, c.id, validated ? el('span', { class: 'v-pill', title: 'In user Run Center' }, 'USER') : null),
            el('div', { class: 'ctitle' }, titleOf(c) || '—'),
          ),
        );
      }));
    }

    // ── Top-level render dispatch ───────────────────────────────────────
    function renderAll() {
      $('#sectionTabs').querySelectorAll('button').forEach((b) => {
        b.classList.toggle('active', b.dataset.sec === state.section);
      });
      // Update title + actions
      const c = state.detail;
      const p = parsedOf(c);
      const showsCase = c && ['nl','run','cache'].includes(state.section);

      if (state.section === 'create') {
        $('#mainTitle').textContent = '✦ Create new case';
        $('#mainSub').textContent = '模板 + 默认 NL → 一键创建 → 立即可以 Run with cache';
        $('#mainActions').replaceChildren();
      } else if (state.section === 'howto') {
        $('#mainTitle').textContent = 'How-to · 痛点对照表';
        $('#mainSub').textContent = '"我遇到 X，该点哪里" — 任务驱动的说明';
        $('#mainActions').replaceChildren();
      } else if (state.section === 'cdguide') {
        $('#mainTitle').textContent = '⚙ Cache Debug 教程';
        $('#mainSub').textContent = '逐控件讲解 Pass/Fail slot 配置模态 · 含图解 + 工作流';
        $('#mainActions').replaceChildren();
      } else if (state.section === 'ciguide') {
        $('#mainTitle').textContent = '📋 Cache Inspector 教程';
        $('#mainSub').textContent = '怎么用 Cache Inspector 看哪个 run 是当前 cache · 看 report · 钉下次 cache';
        $('#mainActions').replaceChildren();
      } else if (c) {
        $('#mainTitle').textContent = c.id + ' · ' + (titleOf(c) || p.title || '—');
        const validated = state.validatedIds.includes(c.id);
        $('#mainSub').textContent = (p.apiGuide?.steps?.length || 0) + ' steps · '
          + (validated ? '已在用户界面 (Run Center)' : '只在开发者侧')
          + (p.transactionCode ? ' · tcode ' + p.transactionCode : '');
        renderMainActions(c, validated);
      } else if (state.activeId) {
        $('#mainTitle').textContent = state.activeId + ' · 加载中…';
        $('#mainSub').textContent = ''; $('#mainActions').replaceChildren();
      } else {
        $('#mainTitle').textContent = 'No case selected';
        $('#mainSub').textContent = '从左侧选 case，或去 Create 开新 case';
        $('#mainActions').replaceChildren();
      }

      const panel = $('#mainPanel');
      if (state.section === 'create') return panel.replaceChildren(renderCreate());
      if (state.section === 'video')  return panel.replaceChildren(renderVideoToCase());
      if (state.section === 'howto')  return panel.replaceChildren(renderHowTo());
      if (state.section === 'cdguide') return panel.replaceChildren(renderCacheDebugGuide());
      if (state.section === 'ciguide') return panel.replaceChildren(renderCacheInspectorGuide());
      if (!state.activeId) return panel.replaceChildren(renderEmpty());
      if (!state.detail)   return panel.replaceChildren(el('div', { class: 'empty' }, '加载 case…'));
      // 'guide' was the old standalone tab — silently redirect to 'nl' so
      // bookmarks and #/<id>/guide URLs keep working after the merge.
      if (state.section === 'guide') state.section = 'nl';
      if (state.section === 'nl')    return panel.replaceChildren(renderMetadata(), renderNL(), renderGuide());
      if (state.section === 'run')   return panel.replaceChildren(renderRunDebug());
      if (state.section === 'cache') return panel.replaceChildren(renderCacheInspector());
    }

    function renderMainActions(c, validated) {
      $('#mainActions').replaceChildren(
        validated
          ? el('button', { class: 'a-button a-button--destructive-primary -small', onclick: () => demoteCase(c.id) }, '⊖ Demote')
          : el('button', { class: 'a-button a-button--success-primary -small', onclick: () => promoteCase(c.id), title: '已经跑通了吗？丢到用户界面' }, '✓ Promote to user UI'),
      );

    function renderEmpty() {
      return el('div', { class: 'empty' },
        el('div', { style: 'font-size:32px;opacity:0.4;margin-bottom:10px;' }, '◧'),
        el('div', {}, '左侧选 case 开始 debug，或点上面 ✦ Create 新建一个'),

    async function promoteCase(id) {
      if (!confirm(`把 ${id} 加入用户界面 (Run Center)？\n用户那边不会自动刷新 — 他们需要点 Run Center 顶上的 ↻ Global Sync。`)) return;
      try {
        const r = await api('/api/validated/' + encodeURIComponent(id), { method: 'POST' });
        state.validatedIds = r.ids || [];
        renderSidebar(); renderAll();
        toast(`已 promote ${id}`);
      } catch (err) { toast('Promote 失败: ' + err.message); }
    }
    async function demoteCase(id) {
      if (!confirm(`从用户界面 (Run Center) 移除 ${id}？case 本身不会删。`)) return;
      try {
        const r = await api('/api/validated/' + encodeURIComponent(id), { method: 'DELETE' });
        state.validatedIds = r.ids || [];
        renderSidebar(); renderAll();
        toast(`已 demote ${id}`);
      } catch (err) { toast('Demote 失败: ' + err.message); }
    }

    function renderCreateTemplate() {
      const tplLoaded = state.createTemplateBody?.parsed;
      const idInput = el('input', {
        class: 'a-input', type: 'text', placeholder: 'kebab-case e.g. saptest12',
        value: state.createIdInput,
        oninput: (ev) => { state.createIdInput = ev.target.value; updateValid(); },
      });
      const nlArea = el('textarea', {
        class: 'a-input nl-area', spellcheck: 'false',
        style: 'min-height:160px;',
      });
      nlArea.value = state.createNLDraft || state.createDefaultNL;
      nlArea.addEventListener('input', () => { state.createNLDraft = nlArea.value; });

      const validation = el('div', { class: 'id-validation' }, '');
      function updateValid() {
        const id = state.createIdInput.trim();
        if (!id) { validation.textContent = ''; validation.className = 'id-validation'; createBtn.disabled = true; return; }
        if (!/^[a-zA-Z0-9_\-]+$/.test(id)) {
          validation.textContent = '✗ 只能包含字母/数字/-/_';
          validation.className = 'id-validation is-err';
          createBtn.disabled = true; return;
        }
        if (state.cases.some((c) => c.id === id)) {
          validation.textContent = '✗ id 已存在';
          validation.className = 'id-validation is-err';
          createBtn.disabled = true; return;
        }
        validation.textContent = '✓ 可用';
        validation.className = 'id-validation';
        validation.style.color = 'var(--green)';
        createBtn.disabled = false;
      }

      const createBtn = el('button', {
        class: 'a-button a-button--brand-primary -big',
        disabled: true,
        onclick: async () => {
          const id = state.createIdInput.trim();
          if (!id) return;
          createBtn.disabled = true; createBtn.textContent = 'Creating…';
          try {
            const body = buildTemplateBody(state.createTemplateBody?.parsed, state.createNLDraft || state.createDefaultNL);
            const r = await api('/api/cases/' + encodeURIComponent(id), {
              method: 'PUT', body: JSON.stringify(body),
            });
            const cacheNote = r?.templateCache?.copied ? ' · template cache seeded ✓' : '';
            toast('✓ ' + id + ' 已创建' + cacheNote);
            state.createIdInput = ''; state.createNLDraft = '';
            await globalRefresh({ silent: true });
            selectCase(id);
          } catch (err) {
            toast('创建失败: ' + err.message);
            createBtn.disabled = false;
            createBtn.textContent = '✦ Create from template';
          }
        },
      }, '✦ Create from template');

      return el('div', {},
        el('div', { class: 'field-row' },
          el('label', {}, 'Case id',
            el('div', { class: 'field-hint' }, 'kebab-case · 例如 <code>saptest12</code> / <code>fi-posting-check</code>'),
          ),
          el('div', { class: 'field-value' },
            el('div', { class: 'id-input-row' }, idInput),
            validation,
          ),
        ),
        el('div', { class: 'field-row' },
          el('label', {}, 'Initial NL',
            el('div', { class: 'field-hint' }, '模板默认的 2 步 — Menu → setting → enable Ok code → 输入 TC。你可以在这里改或多写几步。'),
          ),
          el('div', { class: 'field-value' }, nlArea),
        ),
        el('div', { style: 'margin-top:12px;padding:10px 12px;background:var(--g-blue-95);border-left:3px solid var(--blue);font-size:12px;' },
          tplLoaded
            ? el('span', {},
                '✓ 模板已加载 (', el('code', {}, state.createTemplateBody.templateId || 'saptest1'), ')',
                ' · cacheStrategy = ', el('code', {}, 'first-5-only'),
                ' · 创建后自动 seed cache。')
            : (state.createTemplateLoading
                ? '加载模板中…'
                : '⚠ 模板未配置 (SAPTEST_TEMPLATE_CASE_ID 没设) — 仍可创建空 case'),
        ),
        el('div', { style: 'margin-top:18px;display:flex;gap:10px;align-items:center;' },
          createBtn,
          el('span', { style: 'font-size:11px;color:var(--muted);' }, '创建后自动跳到 Natural Language tab 继续编辑'),
        ),
      );
    }

    function renderCreateBatch() {
      const ta = el('textarea', {
        class: 'a-input batch-area', spellcheck: 'false',
        placeholder: '每行一个 case id，例如:\nsaptest12\nsaptest13\nfi-posting-check',
        value: state.createBatchInput,
        oninput: (ev) => { state.createBatchInput = ev.target.value; },
      });
      return el('div', {},
        el('div', { class: 'field-row' },
          el('label', {}, 'Case ids (一行一个)'),
          el('div', { class: 'field-value' }, ta),
        ),
        el('div', { style: 'margin-top:12px;padding:10px 12px;background:#fffbeb;border-left:3px solid var(--amber);font-size:12px;' },
          '每个 id 都用同一个模板 + 默认 NL 创建。创建后请逐个进去改 NL。'),
        el('div', { style: 'margin-top:18px;display:flex;gap:10px;align-items:center;' },
          el('button', {
            class: 'a-button a-button--brand-primary -big',
            onclick: async () => {
              const ids = state.createBatchInput.split('\n').map((s) => s.trim()).filter(Boolean);
              if (!ids.length) { toast('一行一个 id'); return; }
              const bad = ids.filter((id) => !/^[a-zA-Z0-9_\-]+$/.test(id) || state.cases.some((c) => c.id === id));
              if (bad.length) { toast(`这些 id 不合法或已存在: ${bad.slice(0,3).join(', ')}`); return; }
              if (!confirm(`确认创建 ${ids.length} 个 case？`)) return;
              const body = buildTemplateBody(state.createTemplateBody?.parsed, state.createDefaultNL);
              let ok = 0; let fail = 0;
              for (const id of ids) {
                try {
                  await api('/api/cases/' + encodeURIComponent(id), { method: 'PUT', body: JSON.stringify(body) });
                  ok += 1;
                } catch { fail += 1; }
              }
              state.createBatchInput = '';
              await globalRefresh({ silent: true });
              renderAll();
              toast(`Batch 完成 · ${ok} 创建成功 · ${fail} 失败`);
            },
          }, '✦ Create all'),
        ),
      );
    }

    function renderCreateAI() {
      const ta = el('textarea', {
        class: 'a-input batch-area', spellcheck: 'false',
        style: 'min-height:180px;',
        placeholder: '描述新 case 的自然语言步骤，例如:\n\n1. 在 左上角输入框 输入 VA03\n2. 按 Enter\n3. 在 Sales document 输入框 输入 SO-0001234\n4. 按 Display\n5. 验证页面显示 Customer name = "ROBERT BOSCH"',
        value: state.createAIInput,
        oninput: (ev) => { state.createAIInput = ev.target.value; },
      });
      const genBtn = el('button', { class: 'a-button a-button--brand-primary -big', onclick: async () => {
        if (!state.createAIInput.trim()) { toast('写点 prompt 再 Generate'); return; }
        genBtn.disabled = true; genBtn.textContent = 'Generating… (~60s)';
        try {
          const r = await api('/api/generate/case', {
            method: 'POST', body: JSON.stringify({ prompt: state.createAIInput }),
          });
          // /api/generate/case returns { parsed, suggestedId } — does NOT save.
          // We pop a confirm modal showing the suggested id, let the user edit it.
          const suggested = r.suggestedId || 'ai-generated-' + Date.now().toString(36).slice(-5);
          const finalId = prompt('LLM 生成完成。给这个 case 起个 id：', suggested);
          if (!finalId) { toast('已取消'); genBtn.disabled = false; genBtn.textContent = '✦ Generate via AI'; return; }
          if (state.cases.some((c) => c.id === finalId)) {
            toast('id 已存在'); genBtn.disabled = false; genBtn.textContent = '✦ Generate via AI'; return;
          }
          await api('/api/cases/' + encodeURIComponent(finalId), {
            method: 'PUT', body: JSON.stringify(r.parsed || {}),
          });
          state.createAIInput = '';
          await globalRefresh({ silent: true });
          selectCase(finalId);
          toast('✓ ' + finalId + ' 已创建');
        } catch (err) {
          toast('生成失败: ' + err.message);
        } finally {
          genBtn.disabled = false; genBtn.textContent = '✦ Generate via AI';
        }
      } }, '✦ Generate via AI');
      return el('div', {},
        el('div', { class: 'field-row' },
          el('label', {}, 'Prompt',
            el('div', { class: 'field-hint' }, '调 LLM 生成 case JSON（包括 apiGuide）。比模板模式慢但更贴合自定义场景。'),
          ),
          el('div', { class: 'field-value' }, ta),
        ),
        el('div', { style: 'margin-top:18px;' }, genBtn),
      );
    }

    // Build the new-case body from the template + a user-provided NL.
    // Strips heavy fields, sets cacheStrategy=first-5-only.
    function buildTemplateBody(tplParsed, nl) {
      const body = tplParsed ? { ...tplParsed } : { $schema: 'Parameters for new-case.spec.ts' };
      body.title = '';
      body.description = '';
      body.transactionCode = '';
      body.cacheStrategy = 'first-5-only';
      body.naturalLanguage = nl;
      // Slice apiGuide to keep just the first 7 sub-steps the template's first
      // 2 NL lines expand to. Anything past that doesn't match the new NL.
      if (body.apiGuide?.steps?.length) {
        body.apiGuide = { ...body.apiGuide, steps: body.apiGuide.steps.slice(0, 7).map((s) => ({ ...s })) };
      }
      delete body.jsSource;
      delete body.params;
      delete body.source;
      body.$schema = `Cloned from template — edit NL then Regen API Guide.`;
      return body;
    }

    // ══════════════════════════════════════════════════════════════════
    // 1b. VIDEO → CASE (record-and-replay import)
    // ══════════════════════════════════════════════════════════════════
    // 目的：用户录一段完整跑通的操作视频（2-3 min），上传后 server 抽关键
    // 帧 · LLM 结合关键帧 + KB 转换指南（server/data/kb/conversion/
    // video-to-case-guide.md）产出 case JSON 草稿。视频里没有的东西：
    // 「最终什么算成功」→ 让用户直接填 aiAssert 描述。
    //
    // v0 UI 只做入口：视频上传 + assertion 输入 + 状态显示。转换的
    // 后端 pipeline 是 P1，先把 tab 摆出来让用户能提交。
    // Extract the queue id from a case's source.videoPath. Path shape:
    //   _frames/video-queue/pending/<id>/<filename>.mp4
    // Returns null if the path doesn't match. Needed so we can hit the
    // status endpoint to fetch log.md + case.json even after the case
    // was long since saved.
    function extractQueueIdFromVideoPath(vp) {
      if (!vp) return null;
      const m = String(vp).match(/video-queue\/(?:pending|done)\/([^\/]+)/);
      return m ? m[1] : null;
    }

    // "Previously converted" recap panel — appears on the Video → Case
    // tab when the currently-active case was produced by a video import.
    // Shows: stats card (from case.conversionMeta), View log.md, View
    // case.json, and a hint that the upload form below is for a NEW case.
    function renderVideoPastRecap(detail, parsed) {
      const meta   = parsed?.conversionMeta || null;
      const queueId = extractQueueIdFromVideoPath(parsed?.source?.videoPath);

      // Normalize old + new metric field names so old cases (that used
      // `elapsedSec` / `totalTokens` / `cost` directly) render the same
      // as new ones that carry `estimated*` fields alongside a `measured`
      // flag. When measured=false we badge the card so the numbers
      // aren't mistaken for real API measurements.
      const isMeasured = meta && meta.measured === true;
      const isEstimated = meta && meta.measured === false;
      const elapsedSec  = meta ? (meta.elapsedSec  ?? meta.wallClockElapsedSec ?? 0) : 0;
      const totalTokens = meta ? (meta.totalTokens ?? meta.estimatedTotalTokens ?? 0) : 0;
      const inputTokens = meta ? (meta.inputTokens ?? meta.estimatedInputTokens ?? 0) : 0;
      const outputTokens= meta ? (meta.outputTokens?? meta.estimatedOutputTokens?? 0) : 0;
      const cost        = meta ? (meta.cost        ?? meta.estimatedCost        ?? 0) : 0;

      const statsCard = meta ? el('div', { style: 'padding:16px 20px;background:linear-gradient(135deg,#eef2ff 0%,#f0fdf4 100%);border:1px solid #c7d2fe;border-radius:10px;margin-bottom:0;' },
        el('div', { style: 'font-size:11px;font-weight:800;letter-spacing:1px;color:#4338ca;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;' },
          el('span', {}, '✦ 这个 case 是从视频转出来的'),
          isEstimated ? el('span', {
            style: 'padding:2px 8px;border-radius:3px;background:#fef3c7;color:#92400e;font-size:10px;letter-spacing:0.5px;',
            title: meta.measurementNote || '数字是估算 · 不是真实测量',
          }, '⚠ EST · 估算') : null,
          isMeasured ? el('span', {
            style: 'padding:2px 8px;border-radius:3px;background:#dcfce7;color:#166534;font-size:10px;letter-spacing:0.5px;',
          }, '✓ MEASURED') : null,
        ),
        el('div', { style: 'display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;' },
          el('div', {},
            el('div', { style: 'font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;' }, isEstimated ? '耗时 (est.)' : '耗时'),
            el('div', { style: 'font-size:22px;font-weight:800;color:var(--navy);margin-top:2px;' },
              elapsedSec.toFixed(1),
              el('span', { style: 'font-size:13px;color:var(--muted);margin-left:3px;' }, 's')),
            meta.wallClockElapsedSec && meta.wallClockElapsedSec !== elapsedSec ? el('div', {
              style: 'font-size:10.5px;color:var(--muted);margin-top:2px;',
              title: meta.wallClockNote || '',
            }, `wall clock: ${Math.round(meta.wallClockElapsedSec / 60)} min`) : null,
          ),
          el('div', {},
            el('div', { style: 'font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;' }, isEstimated ? 'Tokens (est.)' : 'Tokens'),
            el('div', { style: 'font-size:22px;font-weight:800;color:var(--navy);margin-top:2px;' },
              totalTokens.toLocaleString()),
            el('div', { style: 'font-size:10.5px;color:var(--muted);margin-top:2px;' },
              `input ${inputTokens.toLocaleString()} · output ${outputTokens.toLocaleString()}`),
          ),
          el('div', {},
            el('div', { style: 'font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;' }, isEstimated ? 'Cost (est.)' : 'Cost'),
            el('div', { style: 'font-size:22px;font-weight:800;color:#166534;margin-top:2px;' },
              '$', cost.toFixed(3)),
            el('div', { style: 'font-size:10.5px;color:var(--muted);margin-top:2px;' },
              `${meta.model || ''}`),
          ),
          el('div', {},
            el('div', { style: 'font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;' }, '步骤'),
            el('div', { style: 'font-size:22px;font-weight:800;color:var(--navy);margin-top:2px;' },
              meta.stepsGenerated || parsed.apiGuide?.steps?.length || 0,
              el('span', { style: 'font-size:13px;color:var(--muted);margin-left:3px;' }, 'steps')),
            meta.framesUsed ? el('div', { style: 'font-size:10.5px;color:var(--muted);margin-top:2px;' },
              `from ${meta.framesUsed} frames`) : null,
          ),
        ),
        isEstimated && meta.measurementNote ? el('div', {
          style: 'margin-top:12px;padding:10px 12px;background:#fef3c7;border-left:3px solid #f59e0b;border-radius:0 4px 4px 0;font-size:11.5px;color:#78350f;line-height:1.55;',
        }, meta.measurementNote) : null,
      ) : el('div', { style: 'padding:14px 18px;background:#f0fdf4;border-left:3px solid #16a34a;border-radius:0 6px 6px 0;font-size:13px;color:var(--navy);' },
        el('div', { style: 'font-weight:800;margin-bottom:3px;' }, '✦ 这个 case 是从视频转出来的'),
        el('div', { style: 'color:var(--muted);' }, '（没有 conversionMeta · 可能是早期版本转出、没记录 tokens/cost）'),
      );

      // Build a filename base like "video-mxg5h_2026-07-06" so downloads
      // for different cases and runs don't overwrite each other.
      const stamp = new Date().toISOString().slice(0, 10);
      const fbase = String(detail.id || 'case').replace(/[^\w.\-]/g, '_') + '_' + stamp;

      const viewLogBtn = el('button', {
        class: 'a-button a-button--neutral-secondary',
        onclick: async () => {
          if (!queueId) {
            toast('这个 case 没有可关联的 queue id');
            return;
          }
          try {
            const r = await api('/api/case-agent/video-to-case/status/' + encodeURIComponent(queueId));
            const notes = r.notes || '(log.md 未找到 · queue 目录可能已清理)';
            showTextModal('log.md · ' + (parsed.title || detail.id), notes, {
              filename: fbase + '_log.md',
              mimeType: 'text/markdown;charset=utf-8',
              mode: 'markdown',
            });
          } catch (err) {
            toast('读取失败: ' + err.message);
          }
        },
      }, '📄 View log.md');

      const viewCaseJsonBtn = el('button', {
        class: 'a-button a-button--neutral-secondary',
        onclick: () => {
          showTextModal('case.json · ' + (parsed.title || detail.id), JSON.stringify(parsed, null, 2), {
            filename: fbase + '_case.json',
            mimeType: 'application/json;charset=utf-8',
          });
        },
      }, '📋 View case.json');

      const gotoNlBtn = el('button', {
        class: 'a-button a-button--brand-primary',
        onclick: () => {
          state.section = 'nl';
          renderAll();
        },
      }, '→ 打开 NL / Step 编辑器');

      const startNewBtn = el('button', {
        class: 'a-button a-button--neutral-tertiary',
        title: '清掉当前 case 关联，开始上传一段新的视频（下面表单会激活）',
        onclick: () => {
          state.activeId = null;
          state.detail = null;
          state.videoFile = null; state.videoFileMeta = null;
          state.videoTitle = ''; state.videoAssert = '';
          state.videoCandidate = null; state.videoStatus = 'idle'; state.videoStatusMsg = '';
          state.videoQueueId = null; state.videoConversionNotes = '';
          clearVideoWork();
          renderAll();
        },
      }, '＋ 开始上传新视频（清掉当前 case）');

      const queueBanner = queueId ? el('div', { style: 'font-size:11.5px;color:var(--muted);margin-top:10px;font-family:var(--mono);' },
        '📦 queue id: ', queueId,
        parsed.source?.videoSha ? el('span', {}, ' · sha256=', String(parsed.source.videoSha).slice(0, 12), '…') : null,
      ) : null;

      return el('div', { class: 'section-card', style: 'margin-bottom:14px;border:1px solid #c7d2fe;' },
        el('div', { class: 'section-title', style: 'background:linear-gradient(90deg,#eef2ff,#f0fdf4);' },
          el('span', {}, '📋 上一次转换结果 · ', detail.id),
          el('span', { class: 'head-sub' }, wasFromVideoTag(parsed)),
        ),
        el('div', { class: 'section-content' },
          statsCard,
          el('div', { style: 'display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;' },
            gotoNlBtn,
            viewLogBtn,
            viewCaseJsonBtn,
            el('span', { style: 'flex:1;' }),
            startNewBtn,
          ),
          queueBanner,
        ),
      );
    }

    // Tiny helper for the recap header tag.
    function wasFromVideoTag(parsed) {
      const g = parsed?.source?.generator || '';
      if (/cold-read/i.test(g)) return 'cold-read · manual';
      if (/video-/i.test(g))    return 'video pipeline';
      if (parsed?.conversionMeta?.model) return String(parsed.conversionMeta.model);
      return 'video-generated';
    }

    function renderVideoToCase() {
      // If the currently-active case was itself produced by a Video →
      // Case conversion, show a "past conversion" recap first (log.md +
      // case.json viewers + stats card) — then still let the user upload
      // a NEW video from the same tab if they want. Detection:
      //   parsed.conversionMeta present  → definite
      //   parsed.source.generator starts with 'cold-read' or 'video-'
      //   parsed.source.videoPath present
      const detail = state.detail;
      const parsedDetail = detail ? parsedOf(detail) : null;
      const wasFromVideo = parsedDetail && (
        parsedDetail.conversionMeta
        || /^(?:cold-read|video-)/i.test(parsedDetail.source?.generator || '')
        || parsedDetail.source?.videoPath
        || parsedDetail.source?.videoSha
      );
      const pastRecap = wasFromVideo ? renderVideoPastRecap(detail, parsedDetail) : null;

      const hero = el('div', { class: 'create-hero' },
        el('h2', {}, el('div', { class: 'hero-icon' }, '🎬'), 'Video → Case'),
        el('p', {},
          '录一段完整的成功操作 (2-3 分钟)，上传，让 AI 结合 SAP 操作知识库转成能跑的 case。',
          el('br', {}),
          el('span', { style: 'opacity:0.75;' },
            '关键帧抽取（scene change + 每 2s 一帧）· 视觉模型分析每帧的 UI 状态 · 结合 KB 里 Midscene API 映射规则出 JSON。')),
      );

      // ── File picker ────────────────────────────────────────────
      const fileLabel = el('label', {
        class: 'a-button a-button--brand-secondary',
        style: 'cursor:pointer;display:inline-flex;gap:8px;align-items:center;',
      },
        el('span', { style: 'font-size:16px;' }, '📼'),
        (state.videoFile || state.videoFileMeta) ? '换一个视频' : '选择视频文件 (mp4 / webm / mov)',
        el('input', {
          type: 'file',
          accept: 'video/mp4,video/webm,video/quicktime,video/*',
          style: 'display:none;',
          onchange: (ev) => {
            const f = ev.target.files?.[0];
            if (!f) return;
            state.videoFile = f;
            state.videoFileMeta = { name: f.name, size: f.size, type: f.type || '' };
            // Best-effort filename → title
            if (!state.videoTitle) {
              state.videoTitle = f.name.replace(/\.[^.]+$/, '').replace(/[_-]+/g, ' ');
            }
            state.videoStatus = 'idle';
            state.videoStatusMsg = '';
            saveVideoWork();
            renderAll();
          },
        }),
      );
      // Prefer the live File; fall back to persisted meta so the user can
      // still see "which video" after a refresh (server has the bytes; the
      // browser lost the blob).
      const shownMeta = state.videoFile
        ? { name: state.videoFile.name, size: state.videoFile.size, type: state.videoFile.type }
        : state.videoFileMeta;
      const fileInfo = shownMeta
        ? el('div', { style: 'margin-top:10px;font-size:12.5px;color:var(--muted);font-family:var(--mono);' },
            '📎 ', shownMeta.name,
            ' · ', (shownMeta.size / (1024 * 1024)).toFixed(1), ' MB',
            ' · ', shownMeta.type || '(unknown)',
            state.videoFile ? null : el('span', { style: 'margin-left:8px;color:var(--amber);' },
              '（刷新后浏览器丢了本地副本 · 后端仍有 · 转换不受影响）'),
          )
        : el('div', { style: 'margin-top:10px;font-size:12px;color:var(--muted);' },
            '⚠ 视频要求：完整走通一次的录屏 · 2-3 分钟内 · 光标最好显示成高亮圈（Windows 光标高亮或 recordkey 类工具）便于 AI 识别点击位置。');

      // canSubmit needs to be re-evaluated on every keystroke — the button
      // is created ONCE per render but state changes as user types.
      // recheckReady() below patches the button's disabled attribute live
      // without a full re-render (which would blow away focus / caret).
      const recheckReady = () => {
        const ok = !!state.videoFile
          && state.videoAssert.trim().length >= 5
          && state.videoTitle.trim().length >= 3;
        if (convertBtn) {
          convertBtn.disabled = !ok;
          convertBtn.style.opacity = ok ? '' : '0.55';
          convertBtn.style.cursor  = ok ? 'pointer' : 'not-allowed';
        }
      };

      // ── Title input ───────────────────────────────────────────
      const titleInput = el('input', {
        type: 'text',
        class: 'a-input',
        placeholder: '给 case 起个名字，比如 "SAP VF03 · Display Billing BX00000028"',
        value: state.videoTitle,
        oninput: (ev) => { state.videoTitle = ev.target.value; saveVideoWork(); recheckReady(); },
      });

      // ── Assertion input (the required "how do we know it passed" field) ─
      const assertBox = el('textarea', {
        class: 'a-input',
        style: 'min-height:110px;font-family:var(--mono);font-size:13px;line-height:1.5;',
        placeholder:
          '视频没法告诉 AI「什么算成功」— 你补一句判断条件，会放到 case 的最后一步 aiAssert。\n\n' +
          '例：\n' +
          '页面标题是 "Print Preview, Document 1 of 1" 且能看到 Bosch 发票的 PDF 内容\n' +
          '页面底部出现绿色 ✓ 加 "download xxx" 字样即为下载成功\n' +
          '表格里能看到 Reference Key 1 和 Reference Key 2 两列即为通过',
        value: state.videoAssert,
        oninput: (ev) => { state.videoAssert = ev.target.value; saveVideoWork(); recheckReady(); },
      });

      // ── Advanced · exclude reference case ids ──────────────
      // A/B experiment aid: when comparing pipeline optimizations, the
      // reference-skeleton retriever will otherwise find the previously-
      // saved answer and hand it back as a template. Pass its id here
      // to force a cold(er) run.
      const excludeInput = el('input', {
        type: 'text',
        class: 'a-input',
        placeholder: '（可选）排除的参考 case id，逗号分隔。例：saptest9  或  saptest9,video-saptest9-friday',
        value: state.videoExcludeRef,
        oninput: (ev) => { state.videoExcludeRef = ev.target.value; saveVideoWork(); },
      });

      // ── Status ─────────────────────────────────────────────
      const canSubmit = !!state.videoFile && state.videoAssert.trim().length >= 5 && state.videoTitle.trim().length >= 3;
      const statusColor = state.videoStatus === 'error' ? 'var(--red)'
        : state.videoStatus === 'ready' ? 'var(--green)'
        : state.videoStatus === 'idle' ? 'var(--muted)'
        : 'var(--blue)';
      const statusBox = el('div', {
        style: `padding:12px 14px;background:#f8fafc;border-left:3px solid ${statusColor};border-radius:0 6px 6px 0;font-size:13px;color:var(--navy);margin-top:12px;`,
      },
        el('div', { style: 'font-weight:800;color:' + statusColor + ';margin-bottom:4px;' },
          {
            idle:       '就绪 · 等你点 Convert',
            preparing:  '⏳ 上传中…',
            extracting: '⏳ 抽帧中…',
            analyzing:  '⏳ AI 解析每帧 + 生成步骤…',
            ready:      '✓ 转换完成',
            error:      '✗ 出错',
          }[state.videoStatus] || state.videoStatus),
        state.videoStatusMsg ? el('div', { style: 'font-size:12px;color:var(--muted);' }, state.videoStatusMsg) : null,
      );

      // ── Convert button + placeholder wiring ─────────────────
      // v0 只提交到 /api/case-agent/video-to-case（后端还没写；先在 UI 里
      // 演示交互 + 校验），失败会 fallback 成 toast 提示。P1 会接到真正
      // 的关键帧抽取 + LLM 转换 pipeline。
      const convertBtn = el('button', {
        class: 'a-button a-button--brand-primary -big',
        disabled: !canSubmit,
        onclick: async () => {
          // Recompute readiness at click time — canSubmit was captured
          // when the panel was first rendered (before the user filled in
          // title/assertion); recheckReady() has been keeping the button's
          // .disabled attribute in sync, but this closure was still guarding
          // on the stale value and silently returning.
          const readyNow = !!state.videoFile
            && state.videoAssert.trim().length >= 5
            && state.videoTitle.trim().length >= 3;
          if (!readyNow) return;
          const t0 = Date.now();
          state.videoConversionStartedAt = t0;
          try {
            state.videoStatusMsg = '开始转换…';
            state.videoStatus = 'preparing';
            saveVideoWork();
            renderAll();
            const buf = await state.videoFile.arrayBuffer();
            const qsBody = {
              title: state.videoTitle,
              assertion: state.videoAssert,
              filename: state.videoFile.name,
            };
            const excludeRefClean = String(state.videoExcludeRef || '').trim();
            if (excludeRefClean) qsBody.excludeRef = excludeRefClean;
            const qs = new URLSearchParams(qsBody);
            const resp = await fetch('/api/case-agent/video-to-case?' + qs.toString(), {
              method: 'POST',
              headers: { 'Content-Type': state.videoFile.type || 'application/octet-stream' },
              body: buf,
              credentials: 'include',
            });
            if (!resp.ok) {
              const t = await resp.text().catch(() => '');
              throw new Error(`HTTP ${resp.status}: ${t.slice(0, 300)}`);
            }
            const data = await resp.json();
            if (!data.id) throw new Error('server did not return an id');
            state.videoQueueId = data.id;
            state.videoStatus = 'analyzing';
            // Don't imply anything is running — the video is queued, but
            // conversion doesn't start until user pings me in Claude Code.
            // ("Analyzing…" made the user think it was auto-processing.)
            state.videoStatusMsg = data.framesExtracted
              ? `已上传 · 抽了 ${data.framesExtracted} 帧（${data.extractStats?.baseline || 0} baseline + ${data.extractStats?.scene || 0} scene-change）· 等待转换开始`
              : '已上传 · 等待转换开始';
            saveVideoWork();
            renderAll();
            // Kick off polling. Cancel previous if user re-clicks.
            if (state.videoPollTimer) clearInterval(state.videoPollTimer);
            state.videoPollTimer = setInterval(async () => {
              try {
                const r = await api('/api/case-agent/video-to-case/status/' + encodeURIComponent(data.id));
                if (r.status === 'ready' && r.case) {
                  clearInterval(state.videoPollTimer);
                  state.videoPollTimer = null;
                  state.videoStatus = 'ready';
                  state.videoStatusMsg = '';
                  state.videoCandidate = r.case;
                  state.videoConversionNotes = r.notes || '';
                  saveVideoWork();
                  toast('转换完成');
                  renderAll();
                } else if (r.status === 'error') {
                  clearInterval(state.videoPollTimer);
                  state.videoPollTimer = null;
                  state.videoStatus = 'error';
                  state.videoStatusMsg = r.error || '未知错误';
                  saveVideoWork();
                  renderAll();
                }
                // else pending — poll silently, don't touch UI.
              } catch (err) {
                if (String(err.message).includes('404')) {
                  clearInterval(state.videoPollTimer);
                  state.videoPollTimer = null;
                  state.videoStatus = 'error';
                  state.videoStatusMsg = err.message;
                  saveVideoWork();
                  renderAll();
                }
              }
            }, 5000);
          } catch (err) {
            state.videoStatus = 'error';
            state.videoStatusMsg = err.message;
            saveVideoWork();
            renderAll();
          }
        },
      }, '🚀 Convert to Case Draft');

      // ── Stats card — shown right after conversion. Numbers come from
