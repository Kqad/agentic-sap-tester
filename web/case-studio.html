    function renderCreateTemplate() {
      const tplLoaded = state.createTemplateBody?.parsed;
      const idInput = el('input', {
        class: 'a-input', type: 'text', placeholder: 'kebab-case e.g. saptest12',
        value: state.createIdInput,
        oninput: (ev) => { state.createIdInput = ev.target.value; updateValid(); },
      });
      const nlArea = el('textarea', {
        class: 'a-input nl-area', spellcheck: 'false',
        style: 'min-height:160px;',
      });
      nlArea.value = state.createNLDraft || state.createDefaultNL;
      nlArea.addEventListener('input', () => { state.createNLDraft = nlArea.value; });

      const validation = el('div', { class: 'id-validation' }, '');
      function updateValid() {
        const id = state.createIdInput.trim();
        if (!id) { validation.textContent = ''; validation.className = 'id-validation'; createBtn.disabled = true; return; }
        if (!/^[a-zA-Z0-9_\-]+$/.test(id)) {
          validation.textContent = '✗ 只能包含字母/数字/-/_';
          validation.className = 'id-validation is-err';
          createBtn.disabled = true; return;
        }
        if (state.cases.some((c) => c.id === id)) {
          validation.textContent = '✗ id 已存在';
          validation.className = 'id-validation is-err';
          createBtn.disabled = true; return;
        }
        validation.textContent = '✓ 可用';
        validation.className = 'id-validation';
        validation.style.color = 'var(--green)';
        createBtn.disabled = false;
      }

      const createBtn = el('button', {
        class: 'a-button a-button--brand-primary -big',
        disabled: true,
        onclick: async () => {
          const id = state.createIdInput.trim();
          if (!id) return;
          createBtn.disabled = true; createBtn.textContent = 'Creating…';
          try {
            const body = buildTemplateBody(state.createTemplateBody?.parsed, state.createNLDraft || state.createDefaultNL);
            const r = await api('/api/cases/' + encodeURIComponent(id), {
              method: 'PUT', body: JSON.stringify(body),
            });
            const cacheNote = r?.templateCache?.copied ? ' · template cache seeded ✓' : '';
            toast('✓ ' + id + ' 已创建' + cacheNote);
            state.createIdInput = ''; state.createNLDraft = '';
            await globalRefresh({ silent: true });
            selectCase(id);
          } catch (err) {
            toast('创建失败: ' + err.message);
            createBtn.disabled = false;
            createBtn.textContent = '✦ Create from template';
          }
        },
      }, '✦ Create from template');

      return el('div', {},
        el('div', { class: 'field-row' },
          el('label', {}, 'Case id',
            el('div', { class: 'field-hint' }, 'kebab-case · 例如 <code>saptest12</code> / <code>fi-posting-check</code>'),
          ),
          el('div', { class: 'field-value' },
            el('div', { class: 'id-input-row' }, idInput),
            validation,
          ),
        ),
        el('div', { class: 'field-row' },
          el('label', {}, 'Initial NL',
            el('div', { class: 'field-hint' }, '模板默认的 2 步 — Menu → setting → enable Ok code → 输入 TC。你可以在这里改或多写几步。'),
          ),
          el('div', { class: 'field-value' }, nlArea),
        ),
        el('div', { style: 'margin-top:12px;padding:10px 12px;background:var(--g-blue-95);border-left:3px solid var(--blue);font-size:12px;' },
          tplLoaded
            ? el('span', {},
                '✓ 模板已加载 (', el('code', {}, state.createTemplateBody.templateId || 'saptest1'), ')',
                ' · cacheStrategy = ', el('code', {}, 'first-5-only'),
                ' · 创建后自动 seed cache。')
            : (state.createTemplateLoading
                ? '加载模板中…'
                : '⚠ 模板未配置 (SAPTEST_TEMPLATE_CASE_ID 没设) — 仍可创建空 case'),
        ),
        el('div', { style: 'margin-top:18px;display:flex;gap:10px;align-items:center;' },
          createBtn,
          el('span', { style: 'font-size:11px;color:var(--muted);' }, '创建后自动跳到 Natural Language tab 继续编辑'),
        ),
      );
    }

    function renderCreateBatch() {
      const ta = el('textarea', {
        class: 'a-input batch-area', spellcheck: 'false',
        placeholder: '每行一个 case id，例如:\nsaptest12\nsaptest13\nfi-posting-check',
        value: state.createBatchInput,
        oninput: (ev) => { state.createBatchInput = ev.target.value; },
      });
      return el('div', {},
        el('div', { class: 'field-row' },
          el('label', {}, 'Case ids (一行一个)'),
          el('div', { class: 'field-value' }, ta),
        ),
        el('div', { style: 'margin-top:12px;padding:10px 12px;background:#fffbeb;border-left:3px solid var(--amber);font-size:12px;' },
          '每个 id 都用同一个模板 + 默认 NL 创建。创建后请逐个进去改 NL。'),
        el('div', { style: 'margin-top:18px;display:flex;gap:10px;align-items:center;' },
          el('button', {
            class: 'a-button a-button--brand-primary -big',
            onclick: async () => {
              const ids = state.createBatchInput.split('\n').map((s) => s.trim()).filter(Boolean);
              if (!ids.length) { toast('一行一个 id'); return; }
              const bad = ids.filter((id) => !/^[a-zA-Z0-9_\-]+$/.test(id) || state.cases.some((c) => c.id === id));
              if (bad.length) { toast(`这些 id 不合法或已存在: ${bad.slice(0,3).join(', ')}`); return; }
              if (!confirm(`确认创建 ${ids.length} 个 case？`)) return;
              const body = buildTemplateBody(state.createTemplateBody?.parsed, state.createDefaultNL);
              let ok = 0; let fail = 0;
              for (const id of ids) {
                try {
                  await api('/api/cases/' + encodeURIComponent(id), { method: 'PUT', body: JSON.stringify(body) });
                  ok += 1;
                } catch { fail += 1; }
              }
              state.createBatchInput = '';
              await globalRefresh({ silent: true });
              renderAll();
              toast(`Batch 完成 · ${ok} 创建成功 · ${fail} 失败`);
            },
          }, '✦ Create all'),
        ),
      );
    }

    function renderCreateAI() {
      const ta = el('textarea', {
        class: 'a-input batch-area', spellcheck: 'false',
        style: 'min-height:180px;',
        placeholder: '描述新 case 的自然语言步骤，例如:\n\n1. 在 左上角输入框 输入 VA03\n2. 按 Enter\n3. 在 Sales document 输入框 输入 SO-0001234\n4. 按 Display\n5. 验证页面显示 Customer name = "ROBERT BOSCH"',
        value: state.createAIInput,
        oninput: (ev) => { state.createAIInput = ev.target.value; },
      });
      const genBtn = el('button', { class: 'a-button a-button--brand-primary -big', onclick: async () => {
        if (!state.createAIInput.trim()) { toast('写点 prompt 再 Generate'); return; }
        genBtn.disabled = true; genBtn.textContent = 'Generating… (~60s)';
        try {
          const r = await api('/api/generate/case', {
            method: 'POST', body: JSON.stringify({ prompt: state.createAIInput }),
          });
          // /api/generate/case returns { parsed, suggestedId } — does NOT save.
          // We pop a confirm modal showing the suggested id, let the user edit it.
          const suggested = r.suggestedId || 'ai-generated-' + Date.now().toString(36).slice(-5);
          const finalId = prompt('LLM 生成完成。给这个 case 起个 id：', suggested);
          if (!finalId) { toast('已取消'); genBtn.disabled = false; genBtn.textContent = '✦ Generate via AI'; return; }
          if (state.cases.some((c) => c.id === finalId)) {
            toast('id 已存在'); genBtn.disabled = false; genBtn.textContent = '✦ Generate via AI'; return;
          }
          await api('/api/cases/' + encodeURIComponent(finalId), {
            method: 'PUT', body: JSON.stringify(r.parsed || {}),
          });
          state.createAIInput = '';
          await globalRefresh({ silent: true });
          selectCase(finalId);
          toast('✓ ' + finalId + ' 已创建');
        } catch (err) {
          toast('生成失败: ' + err.message);
        } finally {
          genBtn.disabled = false; genBtn.textContent = '✦ Generate via AI';
        }
      } }, '✦ Generate via AI');
      return el('div', {},
        el('div', { class: 'field-row' },
          el('label', {}, 'Prompt',
            el('div', { class: 'field-hint' }, '调 LLM 生成 case JSON（包括 apiGuide）。比模板模式慢但更贴合自定义场景。'),
          ),
          el('div', { class: 'field-value' }, ta),
        ),
        el('div', { style: 'margin-top:18px;' }, genBtn),
      );
    }

    // Build the new-case body from the template + a user-provided NL.
    // Strips heavy fields, sets cacheStrategy=first-5-only.
    function buildTemplateBody(tplParsed, nl) {
      const body = tplParsed ? { ...tplParsed } : { $schema: 'Parameters for new-case.spec.ts' };
      body.title = '';
      body.description = '';
      body.transactionCode = '';
      body.cacheStrategy = 'first-5-only';
      body.naturalLanguage = nl;
      // Slice apiGuide to keep just the first 7 sub-steps the template's first
      // 2 NL lines expand to. Anything past that doesn't match the new NL.
      if (body.apiGuide?.steps?.length) {
        body.apiGuide = { ...body.apiGuide, steps: body.apiGuide.steps.slice(0, 7).map((s) => ({ ...s })) };
      }
      delete body.jsSource;
      delete body.params;
      delete body.source;
      body.$schema = `Cloned from template — edit NL then Regen API Guide.`;
      return body;
    }

    // ══════════════════════════════════════════════════════════════════
    // 2. NATURAL LANGUAGE
    // ══════════════════════════════════════════════════════════════════
    function renderNL() {
      const c = state.detail;
      const p = parsedOf(c);
      const diskNL = p.naturalLanguage || '';
      // Use live edit buffer if present (so step-edits or partial NL edits
      // survive renderAll() rebuilds). Wiped on case switch + on save.
      const liveNL = (state.nlEditing && state.nlEditing._caseId === c.id)
        ? state.nlEditing.value
        : diskNL;
      const ta = el('textarea', { class: 'a-input nl-area', spellcheck: 'false' });
      ta.value = liveNL;
      let saveBtn, regenBtn;
      const computeDirty = () => ta.value !== diskNL;
      ta.addEventListener('input', () => {
        state.nlEditing = { _caseId: c.id, value: ta.value };
        updateSave();
      });
      function updateSave() {
        if (saveBtn) {
          const dirty = computeDirty();
          saveBtn.disabled = !dirty;
          saveBtn.textContent = dirty ? '✓ Save changes' : 'No changes';
        }
      }
      saveBtn = el('button', {
        class: 'a-button a-button--brand-primary -small', disabled: !computeDirty(),
        onclick: async () => {
          try {
            saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
            const next = { ...p, naturalLanguage: ta.value };
            await api('/api/cases/' + encodeURIComponent(c.id), { method: 'PUT', body: JSON.stringify(next) });
            state.nlEditing = null;
            await loadCaseDetail(c.id);
            updateSave();
            toast('NL 已保存 · 记得 Regen API Guide');
          } catch (err) {
            toast('保存失败: ' + err.message);
            saveBtn.disabled = false; saveBtn.textContent = '✓ Save changes';
          }
        },
      }, computeDirty() ? '✓ Save changes' : 'No changes');
      regenBtn = el('button', {
        class: 'a-button a-button--brand-secondary -small',
        onclick: async () => {
          if (!confirm('用当前 NL 重生 apiGuide？会调 LLM ~30s 并覆盖现有步骤。')) return;
          try {
            regenBtn.disabled = true; regenBtn.textContent = 'Regenerating…';
            await api('/api/midscene-js/cases/' + encodeURIComponent(c.id) + '/api-guide', { method: 'POST' });
            await loadCaseDetail(c.id);
            toast('apiGuide 已重生 · cacheId 滚到新 hash');
            renderAll();
          } catch (err) { toast('重生失败: ' + err.message); }
          finally { regenBtn.disabled = false; regenBtn.textContent = '✦ Regen API Guide'; }
        },
      }, '✦ Regen API Guide');

      const isEmpty = !p.naturalLanguage;
      return el('div', { class: 'section-card' },
        el('div', { class: 'section-title' },
          el('span', {}, 'Natural Language source · ' + (p.naturalLanguage?.length || 0) + ' chars'),
          el('span', { class: 'head-sub' }, '改完先 Save → 再 Regen'),
        ),
        el('div', { class: 'section-content' },
          isEmpty
            ? el('div', {
                style: 'border-left:3px solid var(--amber);background:#fffbeb;padding:10px 14px;margin-bottom:12px;font-size:12.5px;color:#7c2d12;',
              },
                el('b', {}, '这个 case 没有 NL'), '。可能因为是早期格式（直接写 apiGuide）',
                '或刚用空模板创建。写几行步骤再 Regen 就能生成 apiGuide。')
            : el('div', {
                style: 'border-left:3px solid var(--blue);background:var(--g-blue-95);padding:10px 14px;margin-bottom:12px;font-size:12.5px;',
              },
                '改这里 → ', el('b', {}, '必须点 Regen API Guide'), ' 才会重生 apiGuide.steps。',
                '重生后 cacheId 滚到新 hash → 见 How-to 第 4 条。'),
          ta,
          el('div', { style: 'display:flex;gap:8px;margin-top:12px;align-items:center;' },
            saveBtn, regenBtn,
            el('span', { style: 'font-size:11px;color:var(--muted);margin-left:auto;' },
              'Save 只写 NL 到磁盘 · 步骤同步要点 Regen'),
          ),
        ),
      );
    }

    // ══════════════════════════════════════════════════════════════════
    // 3. API GUIDE (editable)
    // ══════════════════════════════════════════════════════════════════
    // ── Local rule-based API type detector ────────────────────────────
    // Mirrors how the server's local apiGuide generator picks midsceneApi
    // from NL text. Order matters — keyword that wins is tested first.
    // No LLM call. Used both for live editing (real-time badge) and on
    // save (to persist the inferred type).
    function detectMidsceneApi(text) {
      if (!text || typeof text !== 'string') return 'agent.aiTap()';
      const t = text.trim();
      // sleep — "等N秒" / "等N s" / 显式 sleep(...)
      if (/^[\s\d.]*\.?\s*等\s*\d+\s*(s|秒|sec)/i.test(t) || /^等\s*\d+\s*(s|秒|sec)/i.test(t) || /sleep\s*\(/i.test(t)) {
        return 'sleep()';
      }
      // keyboard press — "按 Enter / Tab / Esc / Ctrl+S / F5..."
      if (/(^|\s)按\s*(Enter|回车|Tab|Esc|Escape|Space|空格|Backspace|退格|Ctrl|Alt|Shift|F\d+)/i.test(t)
        || /press\s+key/i.test(t) || /keyboardPress/i.test(t)) {
        return 'agent.aiKeyboardPress()';
      }
      // input — "输入" / "填" / "type" / "enter X in"
      if (/输入|填(?:写|入)|type\s+|enter\s+.+(?:in|into)/i.test(t)) {
        return 'agent.aiInput()';
      }
      // assert — "验证" / "断言" / "检查" / "确认" / "确保" / verify / assert / check
      if (/验证|断言|检查|确认|确保|检验|核验|assert|verify|expect|check\s+(?:that|if)/i.test(t)) {
        return 'agent.aiAssert()';
      }
      // scroll — "滚动" / "scroll"
      if (/滚动|向[下上左右]滑|scroll/i.test(t)) {
        return 'agent.aiScroll()';
      }
      // query — "提取" / "读取" / "extract"
      if (/提取|读取|抓取|获取(?:页面|文本|内容|数值)|extract|read\s+the/i.test(t)) {
        return 'agent.aiQuery()';
      }
      // default: tap (clicks / select / 点击 / 选择 / 按下按钮 etc.)
      return 'agent.aiTap()';
    }

    // ── Steps → NL reverse parser ─────────────────────────────────────
    // Generates a numbered NL text from the current editing steps. Each
    // step becomes one line "N.<text>". User can keep this generated NL
    // as-is or hand-edit grouping later. Inserted steps just become an
    // extra numbered line — no fancy "merge into paragraph" attempts.
    function stepsToNL(steps) {
      return steps.map((s, i) => {
        const text = (s.naturalLanguageInstruction || s.title || '').trim();
        // Strip any leading number-dot the editor may have left in title
        const cleaned = text.replace(/^\s*\d+\s*[.、:：]\s*/, '');
        // Carry the xpath through so an editing round-trip doesn't lose it.
        const xpathSuffix = s.xpath ? ` xpath= ${s.xpath}` : '';
        return `${i + 1}. ${cleaned}${xpathSuffix}`;
      }).join('\n');
    }
    // The textarea shows the full step verbatim — NL + " xpath= …" when
    // an xpath was generated. Helps you tell "点击图标 #7" from "点击图标 #8".
    function stepDisplayText(s) {
      const base = (s.naturalLanguageInstruction || s.title || '');
      return s.xpath ? `${base} xpath= ${s.xpath}` : base;
    }
    // Inverse of stepDisplayText — split " xpath= …" off the user-typed
    // text so we update s.xpath as a real field, not just append to title.
    function parseStepText(raw) {
      const m = raw.match(/^([\s\S]*?)\s+xpath\s*=\s*(.*)$/i);
      if (m) return { text: m[1].trim(), xpath: m[2].trim() };
      return { text: raw.trim(), xpath: '' };
    }

    // ── Baseline initialization / drift detection ─────────────────────
    // Called from renderGuide. Sets up the three guide* state slots the
    // first time a case is opened, OR re-initializes if the server-side
    // apiGuide has drifted (e.g. NL Regen happened) and the user has no
    // unsaved local edits.
    function initGuideBaselines(caseId, liveSteps) {
      const fresh = JSON.parse(JSON.stringify(liveSteps));
      // First visit OR case switch — wipe undo-save snapshots and live NL
      if (!state.guideOriginal || state.guideOriginal._caseId !== caseId) {
        state.guideOriginal = { _caseId: caseId, steps: fresh };
        state.guideBefore   = { _caseId: caseId, steps: JSON.parse(JSON.stringify(fresh)) };
        state.guideEditing  = JSON.parse(JSON.stringify(fresh));
        state.guideBeforeLastSave = null;
        state.nlEditing = null;
        state.nlBeforeLastSave = null;
        return { drift: false };
      }
      // Same case — check for server-side drift
      const liveSig = JSON.stringify(fresh);
      const beforeSig = JSON.stringify(state.guideBefore.steps);
      const editSig = JSON.stringify(state.guideEditing);
      if (liveSig !== beforeSig) {
        // Server has new data. If the user hadn't made any local edits,
        // silently re-init to the new baseline. Otherwise flag drift so
        // the UI can prompt.
        if (editSig === beforeSig) {
          state.guideOriginal = { _caseId: caseId, steps: fresh };
          state.guideBefore   = { _caseId: caseId, steps: JSON.parse(JSON.stringify(fresh)) };
          state.guideEditing  = JSON.parse(JSON.stringify(fresh));
          return { drift: false };
        }
        return { drift: true, liveSteps: fresh };
      }
      return { drift: false };
    }

    function renderGuide() {
      const c = state.detail;
      const p = parsedOf(c);
      const liveSteps = p.apiGuide?.steps || [];
      const driftInfo = initGuideBaselines(c.id, liveSteps);
      const editing = state.guideEditing;

      // Helpers — all mutate state.guideEditing in place + re-render
      const renumber = () => editing.forEach((s, i) => { s.order = i + 1; });
      const blankStep = () => ({
        order: 0,
        title: '点击 …（在这里写新步骤的描述）',
        naturalLanguageInstruction: '点击 …',
        midsceneApi: 'agent.aiTap()',
        reason: '手工新插入的步骤',
      });
      const insertAt = (idx) => {
        editing.splice(idx, 0, blankStep());
        renumber();
        // Persist new NL into edit buffer BEFORE renderAll so the
        // re-rendered NL textarea picks it up.
        state.nlEditing = { _caseId: c.id, value: stepsToNL(editing) };
        renderAll();
      };
      const deleteStep = (i) => {
        if (!confirm(`删除 #${editing[i].order} "${(editing[i].title || '').slice(0, 30)}…"？`)) return;
        editing.splice(i, 1);
        renumber();
        state.nlEditing = { _caseId: c.id, value: stepsToNL(editing) };
        renderAll();
      };


      // Dirty detection — has guideEditing diverged from guideBefore?
      const isDirty = () => JSON.stringify(editing) !== JSON.stringify(state.guideBefore.steps);

      // ── Empty state ─────────────────────────────────────────────────
      if (!editing.length) {
        return el('div', { class: 'section-card' },
          el('div', { class: 'section-title' }, el('span', {}, 'API Guide')),
          el('div', { class: 'section-content' },
            el('div', { class: 'empty' },
              el('div', {}, '还没有 apiGuide。'),
              el('div', { style: 'margin-top:6px;font-size:11px;' },
                '在上面 NL 区域写步骤 → 点 ✦ Regen API Guide → 步骤会出现在这里；',
                el('br', {}),
                '或者点下面 + 手工添加第一步。'),
              el('button', { class: 'a-button a-button--brand-primary -small', style: 'margin-top:14px;', onclick: () => insertAt(0) }, '＋ 加第一步'),
            ),
          ),
        );
      }

      // ── Build save / reset / sync controls ─────────────────────────
      let saveBtn, resetBeforeBtn, resetOriginalBtn, syncNlBtn;
      // Reset button is enabled when EITHER we have in-flight edits to
      // discard OR we have a previous saved state we can undo back to.
      const canUndoLastSave = () =>
        state.guideBeforeLastSave && state.guideBeforeLastSave._caseId === c.id;
      function paintFootState() {
        if (!saveBtn) return;
        const dirty = isDirty();
        saveBtn.disabled = !dirty;
        saveBtn.textContent = dirty ? '✓ Save changes' : 'No changes';
        resetBeforeBtn.disabled = !dirty && !canUndoLastSave();
        resetBeforeBtn.textContent = (!dirty && canUndoLastSave())
          ? '↶ Undo last save'
          : '↩ Reset to before editing';
      }

      saveBtn = el('button', {
        class: 'a-button a-button--brand-primary -small',
        onclick: async () => {
          try {
            saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
            // Pin order field + auto-detect midsceneApi one more time before persisting
            renumber();
            editing.forEach((s) => { s.midsceneApi = detectMidsceneApi(s.title || s.naturalLanguageInstruction); });
            // Persist BOTH apiGuide AND NL — they're kept in sync in the
            // UI, so the disk write must match. NL value comes from the
            // live edit buffer if present (it's auto-synced from steps).
            const nlValue = (state.nlEditing && state.nlEditing._caseId === c.id)
              ? state.nlEditing.value
              : (p.naturalLanguage || '');
            const next = { ...p, apiGuide: { ...p.apiGuide, steps: editing }, naturalLanguage: nlValue };
            await api('/api/cases/' + encodeURIComponent(c.id), { method: 'PUT', body: JSON.stringify(next) });
            // Snapshot the pre-save state so "Undo last save" can revert it.
            state.guideBeforeLastSave = state.guideBefore;
            state.nlBeforeLastSave = { _caseId: c.id, value: p.naturalLanguage || '' };
            // Successful save → before becomes current (original stays sticky)
            state.guideBefore = { _caseId: c.id, steps: JSON.parse(JSON.stringify(editing)) };
            state.nlEditing = null;
            await loadCaseDetail(c.id);
            toast('apiGuide + NL 已保存 · cacheId 可能滚动了');
            renderAll();
          } catch (err) {
            toast('保存失败: ' + err.message);
            saveBtn.disabled = false; saveBtn.textContent = '✓ Save changes';
          }
        },
      }, isDirty() ? '✓ Save changes' : 'No changes');
      saveBtn.disabled = !isDirty();

      resetBeforeBtn = el('button', {
        class: 'a-button a-button--neutral-secondary -small',
        title: 'Dirty: 撤销本次编辑前的所有改动。\nClean: 回撤到上次 Save 之前的状态（同时回撤 NL）— 你需要再 Save 才会落盘。',
        onclick: () => {
          const dirty = isDirty();
          if (dirty) {
            if (!confirm('恢复到本次编辑开始前的状态？\n（你本次还没 Save 的所有改动都会丢失。已 Save 过的改动会保留。）')) return;
            state.guideEditing = JSON.parse(JSON.stringify(state.guideBefore.steps));
            // NL also reverts — guideBefore's NL is whatever was on disk
            // at the time of last save (== current p.naturalLanguage).
            state.nlEditing = null;
            toast('已恢复到本次编辑前');
          } else if (canUndoLastSave()) {
            if (!confirm('回撤到上次 Save 之前的状态？\n步骤 + NL 都会回到那个版本，按钮会标红需要你再 Save 才会写到磁盘。')) return;
            state.guideEditing = JSON.parse(JSON.stringify(state.guideBeforeLastSave.steps));
            state.nlEditing = state.nlBeforeLastSave
              ? { _caseId: c.id, value: state.nlBeforeLastSave.value }
              : null;
            // Consume the snapshot — one undo per save.
            state.guideBeforeLastSave = null;
            state.nlBeforeLastSave = null;
            toast('已回撤到上次 Save 之前 · 记得再 Save');
          } else {
            return;
          }
          renderAll();
        },
      }, '↩ Reset to before editing');
      // Initial label + disabled state (paintFootState runs on input only).
      {
        const dirty0 = isDirty();
        resetBeforeBtn.disabled = !dirty0 && !canUndoLastSave();
        resetBeforeBtn.textContent = (!dirty0 && canUndoLastSave())
          ? '↶ Undo last save'
          : '↩ Reset to before editing';
      }

      resetOriginalBtn = el('button', {
        class: 'a-button a-button--destructive-primary -small',
        title: '恢复到这个 case 最初打开时的样子（清除所有累计编辑）',
        onclick: () => {
          if (!confirm('恢复到 case 最初打开时的版本？\n\n⚠ 这会撤销所有累计修改 — 包括之前已经 Save 过的。建议只在搞砸了想从头来的时候用。')) return;
          state.guideEditing = JSON.parse(JSON.stringify(state.guideOriginal.steps));
          toast('已恢复到最初版本（记得 Save 才会持久化）');
          renderAll();
        },
      }, '⏮ Reset to original');

      syncNlBtn = el('button', {
        class: 'a-button a-button--brand-secondary -small',
        title: '把当前步骤反向生成自然语言，写到上面 NL 区域（覆盖原 NL）',
        onclick: () => {
          if (!confirm('把当前步骤反向生成 NL，写到上方 Natural Language 区域？\n（会覆盖现在的 NL 文本。记得然后 Save NL 才会持久化。）')) return;
          const nl = stepsToNL(editing);
          const nlTa = document.querySelector('textarea.nl-area');
          if (nlTa) {
            nlTa.value = nl;
            nlTa.dispatchEvent(new Event('input', { bubbles: true }));
            nlTa.focus();
            nlTa.scrollIntoView({ behavior: 'smooth', block: 'start' });
            toast('已反向同步 NL — 别忘了 ✓ Save changes');
          } else {
            toast('找不到 NL textarea');
          }
        },
      }, '↑ Sync NL from steps');

      // ── Drift banner if server-side apiGuide diverged ─────────────
      const driftBanner = driftInfo.drift ? el('div', { class: 'guide-stale-banner' },
        el('span', { style: 'flex:1;' },
          el('b', {}, '⚠ 服务器端 apiGuide 变了'),
          ' — 可能你刚刚在 NL tab Regen 了，或者另一个 tab 改过。',
          el('br', {}),
          '当前显示的是你的本地编辑版本。',
        ),
        el('button', {
          onclick: () => {
            if (!confirm('用服务器最新版替换你本地的编辑（你本地的修改会丢失）？')) return;
            state.guideOriginal = { _caseId: c.id, steps: JSON.parse(JSON.stringify(driftInfo.liveSteps)) };
            state.guideBefore   = { _caseId: c.id, steps: JSON.parse(JSON.stringify(driftInfo.liveSteps)) };
            state.guideEditing  = JSON.parse(JSON.stringify(driftInfo.liveSteps));
            renderAll();
          },
        }, '丢弃本地，用服务器版'),
        el('button', { onclick: () => {
          state.guideBefore = { _caseId: c.id, steps: JSON.parse(JSON.stringify(driftInfo.liveSteps)) };
          renderAll();
        } }, '保留本地，关掉提示'),
      ) : null;

      // ── Step rows + inserter buttons ─────────────────────────────
      // Auto-grow textarea so long step text wraps onto multiple lines
      // instead of being clipped/ellipsised. Called on mount + on input.
      const autoGrow = (ta) => {
        ta.style.height = 'auto';
        ta.style.height = (ta.scrollHeight + 2) + 'px';
      };
      // Steps and NL textarea are bi-bound: any change to a step's text
      // immediately rewrites the NL textarea above so users see both
      // views agree at all times. NL→Steps is heavier (LLM regen) and
      // stays as a manual button. We persist the value in state.nlEditing
      // so it survives any renderAll() rebuild of renderNL.
      const syncNlFromSteps = () => {
        const newNL = stepsToNL(editing);
        state.nlEditing = { _caseId: c.id, value: newNL };
        const nlTa = document.querySelector('textarea.nl-area');
        if (!nlTa) return;
        nlTa.value = newNL;
        // Trigger the NL tab's dirty tracker so its Save button lights up
        nlTa.dispatchEvent(new Event('input', { bubbles: true }));
      };
      // Show the FULL step in the textarea: NL + " xpath= …" if present.
      // Without this, two "点击图标" rows look identical even though they
      // click different elements via different xpaths.
      const textOf = stepDisplayText;

      // ── Drag state — pointer-events + live DOM reorder with FLIP.
      //    The dragged row physically moves through the list as you
      //    pull the cursor up/down — other rows animate to make room
      //    via FLIP (First-Last-Invert-Play). On drop we read the
      //    final DOM order and commit it to editing[].
      let draggedEl = null;       // the <li> being dragged
      let draggedOrigIdx = null;  // index in editing[] when drag began
      const FLIP_MS = 200;

      const stepRows = editing.map((s, i) => {
        const text = textOf(s);
        const input = el('textarea', {
          class: 'step-text-input',
          rows: 1,
          spellcheck: 'false',
          oninput: (ev) => {
            const newText = ev.target.value;
            // Split " xpath= …" off into the dedicated field so the
            // runner picks it up — title/NL only hold the human-readable
            // instruction.
            const { text: instruction, xpath } = parseStepText(newText);
            editing[i].title = instruction;
            editing[i].naturalLanguageInstruction = instruction;
            if (xpath) editing[i].xpath = xpath;
            else delete editing[i].xpath;
            // Auto-update midsceneApi via rules — inline DOM update so
            // the textarea keeps focus mid-typing.
            const newApi = detectMidsceneApi(instruction);
            editing[i].midsceneApi = newApi;
            const row = ev.target.closest('li');
            const badge = row?.querySelector('.step-api');
            if (badge) badge.textContent = newApi.replace(/^agent\./, '');
            const originalText = textOf(state.guideBefore.steps[i] || {});
            ev.target.classList.toggle('dirty', newText !== originalText);
            autoGrow(ev.target);
            // Steps ↔ NL are kept in sync at all times — push the
            // regenerated NL into the textarea above.
            syncNlFromSteps();
            paintFootState();
          },
        }, text);
        const originalText = textOf(state.guideBefore.steps[i] || {});
        if (text !== originalText) input.classList.add('dirty');
        // Defer until in DOM so scrollHeight is accurate.
        setTimeout(() => autoGrow(input), 0);

        const dragHandle = el('button', {
          class: 'step-action-btn drag',
          title: '拖动调整顺序 · 可放到任意两步之间（按住后只能上下移动）',
          onpointerdown: (ev) => {
            ev.preventDefault();
            draggedEl = li;
            draggedOrigIdx = i;
            li.classList.add('drag-source');
            stepListEl.classList.add('drag-active');
            document.body.style.cursor = 'grabbing';
            document.body.style.userSelect = 'none';
            const onMove = (e) => maybeReorderDOM(e.clientY);
            const onUp = () => {
              document.removeEventListener('pointermove', onMove);
              document.removeEventListener('pointerup', onUp);
              document.removeEventListener('pointercancel', onUp);
              commitDragOrder();
            };
            document.addEventListener('pointermove', onMove);
            document.addEventListener('pointerup', onUp);
            document.addEventListener('pointercancel', onUp);
          },
        }, '☰ Reorder');

        const parseBtn = el('button', {
          class: 'step-action-btn parse',
          title: '解析这一步 · 拆分 xpath / 重新识别 API 类型 / 同步 NL',
          onclick: (ev) => {
            const ta = ev.currentTarget.closest('li')?.querySelector('.step-text-input');
            const raw = ta ? ta.value : stepDisplayText(editing[i]);
            const { text: instruction, xpath } = parseStepText(raw);
            editing[i].title = instruction;
            editing[i].naturalLanguageInstruction = instruction;
            if (xpath) editing[i].xpath = xpath; else delete editing[i].xpath;
            const newApi = detectMidsceneApi(instruction);
            editing[i].midsceneApi = newApi;
            const badge = ev.currentTarget.closest('li')?.querySelector('.step-api');
            if (badge) badge.textContent = newApi.replace(/^agent\./, '');
            syncNlFromSteps();
            paintFootState();
            toast('已重新解析 step #' + s.order);
          },
        }, '↻ Parse');

        const li = el('li', {},
          el('div', { class: 'step-n' }, '#' + s.order),
          input,
          el('div', { class: 'step-api' }, (s.midsceneApi || '').replace(/^agent\./, '')),
          el('div', { class: 'step-actions' },
            dragHandle,
            parseBtn,
            el('button', { class: 'step-action-btn add-below', onclick: () => insertAt(i + 1), title: '在这一步下面插入一步' }, '+ Add below'),
            el('button', { class: 'step-action-btn delete',    onclick: () => deleteStep(i),    title: '删除这一步' }, 'Delete'),
          ),
        );

        return li;
      });

      const stepListEl = el('ul', { class: 'step-list', style: 'margin:0;' }, ...stepRows);

      // Where would the dragged row land if dropped at clientY? Returns
      // the desired DOM index AMONG THE OTHER (non-dragged) rows.
      const slotAmongOthers = (clientY) => {
        const others = [...stepListEl.children].filter((r) => r !== draggedEl);
        for (let j = 0; j < others.length; j++) {
          const rect = others[j].getBoundingClientRect();
          if (clientY < rect.top + rect.height / 2) return j;
        }
        return others.length;
      };

      // FLIP: animate every row from its previous Y to its new Y so the
      // DOM swap looks like a fluid slide instead of a jump.
      const flipReorder = (mutateDOM) => {
        const rows = [...stepListEl.children];
        const firstTop = new Map();
        rows.forEach((r) => firstTop.set(r, r.getBoundingClientRect().top));
        mutateDOM();
        rows.forEach((r) => {
          const delta = firstTop.get(r) - r.getBoundingClientRect().top;
          if (!delta) return;
          // First freeze it back to its old position…
          r.style.transition = 'none';
          r.style.transform = `translateY(${delta}px)`;
        });
        // …then in the next frame let CSS transition slide it to the new spot.
        requestAnimationFrame(() => {
          rows.forEach((r) => {
            r.style.transition = `transform ${FLIP_MS}ms cubic-bezier(0.2, 0.8, 0.2, 1)`;
            r.style.transform = '';
          });
          // Cleanup so future drags don't inherit the inline transition rule.
          setTimeout(() => {
            rows.forEach((r) => { r.style.transition = ''; });
          }, FLIP_MS + 20);
        });
        // Refresh visible #N badges to match new DOM order.
        [...stepListEl.children].forEach((r, k) => {
          const numEl = r.querySelector('.step-n');
          if (numEl) numEl.textContent = '#' + (k + 1);
        });
      };

      // Move draggedEl in the DOM to the slot under the cursor (if needed).
      const maybeReorderDOM = (clientY) => {
        if (!draggedEl) return;
        const others = [...stepListEl.children].filter((r) => r !== draggedEl);
        const slot = slotAmongOthers(clientY);
        const target = others[slot] || null; // null → append to end
        // No-op if draggedEl is already at the desired DOM position.
        const currentNext = draggedEl.nextElementSibling;
        if (target === currentNext || (target === null && currentNext === null)) return;
        flipReorder(() => {
          if (target) stepListEl.insertBefore(draggedEl, target);
          else stepListEl.appendChild(draggedEl);
        });
      };

      // Pointerup: read final DOM order, rebuild editing[] to match.
      const commitDragOrder = () => {
        if (!draggedEl) return;
        const li = draggedEl;
        const orig = draggedOrigIdx;
        draggedEl = null;
        draggedOrigIdx = null;
        li.classList.remove('drag-source');
        stepListEl.classList.remove('drag-active');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        const newIdx = [...stepListEl.children].indexOf(li);
        if (newIdx < 0 || newIdx === orig) return; // no-op
        const [moved] = editing.splice(orig, 1);
        editing.splice(newIdx, 0, moved);
        renumber();
        state.nlEditing = { _caseId: c.id, value: stepsToNL(editing) };
        renderAll();
      };

      return el('div', { class: 'section-card' },
        el('div', { class: 'section-title' },
          el('span', {}, `API Guide · ${editing.length} steps`),
          el('span', { class: 'head-sub' }, '改 / 调顺序 / 插入 / 删除都可以 · API 类型本地规则自动识别'),
        ),
        driftBanner,
        el('div', { class: 'section-content', style: 'padding:0;' },
          el('div', { class: 'guide-inserter' },
            el('button', { onclick: () => insertAt(0) }, '+ 在最前面插入一步'),
          ),
          stepListEl,
        ),
        el('div', { style: 'padding:12px;border-top:1px solid var(--line);background:#f8fafc;display:flex;gap:8px;align-items:center;flex-wrap:wrap;' },
          saveBtn,
          resetBeforeBtn,
          resetOriginalBtn,
          syncNlBtn,
          el('span', { style: 'font-size:11px;color:var(--muted);margin-left:auto;max-width:260px;text-align:right;line-height:1.4;' },
            '改完按 Save 才落盘 · Sync NL 把步骤反写回上方 NL 区域 · API 类型按本地关键词规则自动识别'),
        ),
      );
    }

    // ══════════════════════════════════════════════════════════════════
    // 4. RUN & DEBUG — with History + pin + trim-tail
    // ══════════════════════════════════════════════════════════════════
    function renderRunDebug() {
      const c = state.detail;
      const p = parsedOf(c);
      const stepCount = p.apiGuide?.steps?.length || 0;
      const cfg = state.cacheDebug || {};
      const passSrc = cfg.pass?.source ?? 'auto';
      const failSrc = cfg.fail?.source ?? 'auto';
      const failDropTail = cfg.fail?.dropTailCount ?? 2;
      // Any active run for THIS case (from /runs/active poll). Drives the
      // live broadcast banner + live screen + abort button. Multiple
      // concurrent runs of the same case are possible — we show the
      // first one and abort all of them when user clicks Abort.
      const activeForCase = state.activeRuns.filter((a) => a.caseId === c.id);
      const liveActive = activeForCase[0] || null;

      const modeCard = (key, title, code, desc, tag, recommended) => el('div', {
        class: 'mode-card' + (state.runMode === key ? ' active' : ''),
        onclick: () => { state.runMode = key; renderAll(); },
      },
        el('div', { class: 'mode-title' }, title, recommended ? el('span', { class: 'mode-recommended' }, recommended) : null),
        el('div', { class: 'mode-code' }, code),
        el('div', { class: 'mode-desc' }, desc),
        el('span', { class: 'mode-tag' }, tag),
      );
      const modePicker = el('div', { class: 'mode-grid' },
        modeCard('write', '▶ Run raw', 'cache=write',
          '每步现场 AI plan — 看 AI 怎么找 xpath。新 case 调通的 default。结果写 fail slot。',
          'cache slot: fail',
          '推荐'),
        modeCard('read', '▶ Run with cache', 'cache=read',
          '读 pass slot 的 xpath，秒级跑通。case 调通后用这个验证。',
          'cache slot: pass'),
      );

      const headed = el('input', { type: 'checkbox', checked: state.runHeaded ? '' : null, onchange: (ev) => { state.runHeaded = ev.target.checked; } });
      const keep   = el('input', { type: 'checkbox', checked: state.keepCacheOnFailure ? '' : null, onchange: (ev) => { state.keepCacheOnFailure = ev.target.checked; } });
      const noCache = el('input', { type: 'text', class: 'a-input', placeholder: 'e.g. 7,10,16', value: state.noCacheSteps, oninput: (ev) => { state.noCacheSteps = ev.target.value; }, style: 'max-width:200px;' });

      const runBtn = el('button', {
        class: 'a-button -big ' + (state.runMode === 'read' ? 'a-button--success-primary' : 'a-button--brand-primary'),
        disabled: state.isRunning,
        onclick: triggerRun,
      }, state.isRunning ? '● Running…' : (state.runMode === 'read' ? '▶ Run with cache' : '▶ Run raw'));

      const tailBox = el('div', { class: 'live-tail', id: 'liveTail' },
        state.isRunning ? el('span', {}, el('span', { class: 'live-dot' }), 'LIVE · ') : null,
        state.runLog.length ? state.runLog.join('\n') : '点 ▶ Run 之后这里实时显示 runner log',
      );

      // Live broadcast section — visible whenever there's an active run
      // for this case (whether kicked off from this UI or elsewhere).
      let liveSection = null;
      if (liveActive) {
        const cachedShot = state.liveShotCache.get(liveActive.runId);
        const stepStr = liveActive.currentStep
          ? `Step ${liveActive.currentStep.order} / ${liveActive.totalSteps} · ${liveActive.currentStep.title || liveActive.currentStep.api || ''}`
          : 'Waiting for first step…';
        // Defer hydration so the <img> is mounted before we touch it.
        setTimeout(() => hydrateLiveShot(liveActive), 0);
        liveSection = el('div', {},
          el('div', { class: 'live-banner' },
            el('div', { class: 'lb-dot' }),
            el('div', { class: 'lb-text' },
              el('div', { class: 'lb-title' }, '● LIVE · ' + c.id + ' is running'),
              el('div', { class: 'lb-sub' },
                stepStr, ' · runId ', el('code', { style: 'font-size:11px;' }, liveActive.runId.slice(-12)),
              ),
            ),
            el('button', {
              class: 'a-button a-button--destructive-primary -small',
              onclick: () => openAbortModal([c.id]),
            }, '⏹ Abort'),
            liveActive.runId ? el('button', {
              class: 'a-button a-button--neutral-tertiary -small',
              onclick: () => { state.tab = 'live'; }, /* future: deep link to logs */
              title: 'Open run logs',
            }, 'Log') : null,
          ),
          el('div', { class: 'section-card' },
            el('div', { class: 'section-title' },
              el('span', {}, 'Live broadcast'),
              el('span', { class: 'head-sub' }, 'screenshot polls every 2s · 自动 crossfade'),
            ),
            el('div', { class: 'section-content' },
              el('div', { class: 'live-screen', id: 'liveScreen' },
                el('span', { class: 'pulse-dot' }),
                el('img', { id: 'liveShot', alt: 'Live browser', src: cachedShot || '', onerror: (ev) => { ev.target.style.opacity = '0.3'; } }),
                el('div', { class: 'live-overlay' },
                  el('b', {}, c.id + ' · ' + (titleOf(c) || p.title || '—')),
                  el('div', {}, stepStr),
                ),
              ),
            ),
          ),
        );
      }

      return el('div', {},
        liveSection,
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' },
            el('span', {}, 'Pick a run mode'),
            el('span', { class: 'head-sub' }, stepCount + ' steps · ' + (state.validatedIds.includes(c.id) ? '已上线' : '调试中')),
          ),
          el('div', { class: 'section-content' },
            modePicker,
            el('details', { style: 'margin-bottom:12px;' },
              el('summary', { style: 'cursor:pointer;font-size:12px;color:var(--muted);font-weight:700;' }, '高级参数'),
              el('div', { style: 'padding:12px 0;' },
                el('div', { class: 'field-row' },
                  el('label', {}, 'Headed'),
                  el('div', { class: 'field-value' }, headed, ' Show browser window'),
                ),
                el('div', { class: 'field-row' },
                  el('label', {}, 'keepCacheOnFailure', el('div', { class: 'field-hint' }, '默认 false。开 = 失败也保留 xpath')),
                  el('div', { class: 'field-value' }, keep, ' Don’t rollback on failure'),
                ),
                el('div', { class: 'field-row' },
                  el('label', {}, 'noCacheSteps', el('div', { class: 'field-hint' }, '逗号分隔的 step.order — 这些步强制 AI plan')),
                  el('div', { class: 'field-value' }, noCache),
                ),
              ),
            ),
            el('div', { style: 'display:flex;gap:14px;align-items:center;flex-wrap:wrap;' }, runBtn,
              // Cache Debug — opens the full slot config modal. Bright
              // amber-orange so it stands out from blue (Run) and red
              // (Abort) — visually unique amongst the three actions.
              el('button', {
                class: 'a-button cache-debug-cta',
                onclick: () => openCacheDebugModal(c.id),
                title: '弹出 Pass/Fail slot 配置：选 source run、勾 exclude steps、设 dropTailCount',
              }, '⚙ Cache Debug'),
              state.activeRuns.length ? el('button', {
                class: 'a-button a-button--destructive-primary -small',
                onclick: () => openAbortModal(),
                title: `${state.activeRuns.length} active runs server-wide`,
              }, `⏹ Abort runs (${state.activeRuns.length})`) : null,
              state.lastRun ? el('span', { style: 'font-size:12px;color:var(--muted);' },
                'Last: ',
                el('span', { class: 'status ' + (state.lastRun.status || 'pending') }, state.lastRun.status || '?'),
                ' · ' + fmtDur(state.lastRun.durationMs),
                state.lastRun.report?.url ? el('a', { class: 'a-button a-button--brand-tertiary -small', href: state.lastRun.report.url, target: '_blank', style: 'margin-left:8px;' }, 'Open Report →') : null,
              ) : null,
            ),
          ),
        ),

        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' },
            el('span', {}, state.isRunning ? '● Live tail · 2s polling' : 'Output'),
            el('span', { class: 'head-sub' }, '/api/midscene-js/runs/active'),
          ),
          tailBox,
        ),

        // ── History with pin + trim-tail ────────────────────────────
        el('div', { class: 'section-card' },
          el('div', { class: 'section-title' },
            el('span', {}, 'Run history · ' + state.runs.length),
            el('button', { class: 'a-button a-button--neutral-tertiary -small', onclick: () => loadRuns(c.id).then(renderAll) }, 'Refresh'),
          ),
          el('div', { class: 'section-content' },
            el('div', {
              style: 'background:#fffbeb;border-left:3px solid var(--amber);padding:10px 14px;margin-bottom:14px;font-size:12px;',
            },
              el('b', {}, '⚠ 失败救援：trim tail'),
              el('br', {}),
              '如果某次 run 跑到一半才挂，前面的步骤是好的 — 把这次 run ',
              el('b', {}, '钉为下次 FAIL cache'),
              ' (☆ fail)，再设 ', el('b', {}, 'drop trailing N'),
              ' 让 runner 把最后 N 步的 cache 剃掉。下次 Run with cache 就只用前面好的部分。'),
            renderHistoryList(c.id, stepCount, passSrc, failSrc, failDropTail),
          ),
        ),
      );
    }

    function renderHistoryList(caseId, stepCount, passSrc, failSrc, currentDropTail) {
      if (!state.runs.length) {
        return el('div', { class: 'empty' }, '还没有 run 历史 — 上面点 ▶ Run 跑一次');
      }
      return el('div', {}, ...state.runs.map((r) => {
        const isPass = r.status === 'passed';
        const isPinnedPass = passSrc === r.runId;
        const isPinnedFail = failSrc === r.runId;
        const slot = r.cacheSlot || (r.useCache === true ? 'pass' : r.useCache === false ? 'fail' : '—');
        const reached = lastReachedStep(r);
        const progressText = isPass
          ? `✓ 全部 ${stepCount} 步通过`
          : reached != null
            ? `✗ 跑到 step ${reached} / ${stepCount} 挂了`
            : (r.errorMessage ? `✗ ${r.errorMessage.slice(0,120)}` : '✗ 失败');

        const head = el('div', { class: 'history-head' },
          el('span', { class: 'status ' + (r.status || 'pending') }, r.status || '?'),
          el('span', { class: 'runid' }, r.runId?.slice(-12) || '?'),
          el('span', { class: 'meta' }, slot + ' · ' + fmtDate(r.finishedAt) + ' · ' + fmtDur(r.durationMs)),
          el('span', { class: 'actions' },
            el('button', {
              class: 'pin-btn slot-pass' + (isPinnedPass ? ' is-pinned' : ''),
              title: isPinnedPass ? '当前 PASS cache — 点击恢复 auto' : '钉为下次 PASS cache（Run with cache 读这次的 snapshot）',
              onclick: () => togglePin(caseId, r, 'pass', isPinnedPass, currentDropTail),
            }, isPinnedPass ? '★ pass' : '☆ pass'),
            el('button', {
              class: 'pin-btn slot-fail' + (isPinnedFail ? ' is-pinned' : ''),
              title: isPinnedFail ? '当前 FAIL cache — 点击恢复 auto' : '钉为下次 FAIL cache（用于 trim-tail）',
              onclick: () => togglePin(caseId, r, 'fail', isPinnedFail, currentDropTail),
            }, isPinnedFail ? '★ fail' : '☆ fail'),
            r.report?.url ? el('a', { class: 'a-button a-button--brand-tertiary -small', href: r.report.url, target: '_blank' }, 'Report') : null,
            r.runId ? el('button', { class: 'a-button a-button--neutral-tertiary -small', onclick: () => openLogModal(r) }, 'Log') : null,
          ),
        );

        const progress = el('div', {
          class: 'history-progress ' + (isPass ? 'is-pass' : 'is-fail'),
        }, progressText);

        // Show trim-tail UI when this run is pinned as the next FAIL cache.
        let trim = null;
        if (isPinnedFail) {
          const trimInput = el('input', { type: 'number', min: 0, max: stepCount, value: currentDropTail });
          const suggested = (reached != null && stepCount && reached < stepCount)
            ? Math.max(0, stepCount - reached + 1)
            : currentDropTail;
          trim = el('div', { class: 'trim-tail-box' },
            el('div', { class: 'trim-label' },
              el('b', {}, '剃掉尾部 N 步'),
              el('br', {}),
              `runner 会把这个 snapshot 后 N 步的 xpath 删掉再用。建议: 跑到 step ${reached || '?'}/${stepCount} 挂的 → 试试 ${suggested}。`),
            trimInput,
            el('button', { class: 'a-button a-button--brand-primary -small', onclick: async () => {
              const n = Math.max(0, Number(trimInput.value) || 0);
              try {
                await api('/api/midscene-js/cases/' + encodeURIComponent(caseId) + '/cache-debug', {
                  method: 'PUT',
                  body: JSON.stringify({
                    pass: state.cacheDebug?.pass || {},
                    fail: { source: r.runId, excludeSteps: state.cacheDebug?.fail?.excludeSteps || [], dropTailCount: n },
                  }),
                });
                toast('已保存 dropTailCount = ' + n);
                await loadCacheData(caseId);
                renderAll();
              } catch (err) { toast('保存失败: ' + err.message); }
            } }, 'Save'),
          );
        }

        return el('div', {
          class: 'history-row' + (isPinnedPass ? ' pinned-pass' : '') + (isPinnedFail ? ' pinned-fail' : ''),
        }, head, progress, trim);
      }));
    }

    // Parse logTail for "Step N/M:" lines and return max N seen. Lets us tell
    // the developer "this run reached step 12" without needing extra fields.
    function lastReachedStep(run) {
      const lines = run.logTail || [];
      let max = null;
      for (const line of lines) {
        const m = /Step\s+(\d+)\s*\//i.exec(typeof line === 'string' ? line : (line.line || ''));
        if (m) {
          const n = Number(m[1]);
          if (!Number.isNaN(n) && (max == null || n > max)) max = n;
        }
      }
      return max;
    }

    async function togglePin(caseId, run, slot, isCurrentlyPinned, currentDropTail) {
      const next = {
        pass: state.cacheDebug?.pass || {},
        fail: state.cacheDebug?.fail || {},
      };
      if (slot === 'pass') {
        next.pass = { source: isCurrentlyPinned ? 'auto' : run.runId, excludeSteps: state.cacheDebug?.pass?.excludeSteps || [] };
      } else {
        next.fail = {
          source: isCurrentlyPinned ? 'auto' : run.runId,
          excludeSteps: state.cacheDebug?.fail?.excludeSteps || [],
          dropTailCount: currentDropTail,
        };
      }
      try {
        await api('/api/midscene-js/cases/' + encodeURIComponent(caseId) + '/cache-debug', {
          method: 'PUT', body: JSON.stringify(next),
        });
        toast(isCurrentlyPinned ? `${slot} 已恢复 auto` : `已钉为下次 ${slot.toUpperCase()} cache`);
        await loadCacheData(caseId);
        renderAll();
      } catch (err) { toast('保存失败: ' + err.message); }
    }

    function openLogModal(run) {
      const overlay = el('div', { class: 'modal-backdrop', onclick: (ev) => { if (ev.target === overlay) close(); } });
      function close() { overlay.remove(); }
      const lines = run.logTail || [];
      const pre = el('pre', { style: 'font-family:var(--mono);font-size:11px;line-height:1.55;background:var(--g-gray-10);color:var(--g-gray-95);padding:14px;max-height:60vh;overflow:auto;white-space:pre-wrap;margin:0;' },
        lines.length ? lines.map((x) => typeof x === 'string' ? x : (x.line || '')).join('\n') : '(no logTail)');
      const modal = el('div', { class: 'modal' },
        el('div', { class: 'modal-head' },
          el('div', {},
            el('div', { class: 'title' }, run.runId),
            el('div', { class: 'sub' }, (run.status || '?') + ' · ' + fmtDur(run.durationMs)),
          ),
          el('button', { class: 'close', onclick: close }, '✕'),
        ),
        el('div', { class: 'modal-body', style: 'padding:0;' }, pre),
      );
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
    }

    async function triggerRun() {
      const c = state.detail;
      if (!c) return;
      state.isRunning = true;
      state.runLog = [`[${new Date().toLocaleTimeString()}] kicking off · cache=${state.runMode}`];
      renderAll();
      const body = {
        headed: state.runHeaded,
        keepCacheOnFailure: state.keepCacheOnFailure,
      };
      const noCacheList = state.noCacheSteps.split(',').map((s) => Number(s.trim())).filter((n) => Number.isFinite(n));
      if (noCacheList.length) body.noCacheSteps = noCacheList;
      startLiveTail(c.id);
      try {
        const r = await api('/api/midscene-js/cases/' + encodeURIComponent(c.id) + '/run?cache=' + state.runMode, {
          method: 'POST', body: JSON.stringify(body),
        });
        state.lastRun = r.run || r;
        const log = state.lastRun?.logTail || [];
        if (log.length) state.runLog = log;
        else state.runLog.push(`[${new Date().toLocaleTimeString()}] runner finished · ${state.lastRun?.status || 'unknown'}`);
        toast('Run finished · ' + (state.lastRun?.status || '?'));
        await loadRuns(c.id);
      } catch (err) {
        state.runLog.push(`[err] ${err.message}`);
        toast('Run failed: ' + err.message);
      } finally {
        state.isRunning = false;
        stopLiveTail();
        renderAll();
      }
    }
    function startLiveTail(caseId) {
      stopLiveTail();
      state.pollTimer = setInterval(async () => {
        try {
          const r = await api('/api/midscene-js/runs/active');
          state.activeRuns = r.active || [];
          const active = state.activeRuns.find((a) => a.caseId === caseId);
          if (active?.logTail?.length) {
            state.runLog = active.logTail.map((x) => typeof x === 'string' ? x : (x.line || '')).filter(Boolean);
            const box = $('#liveTail');
            if (box && state.section === 'run') {
              box.replaceChildren(
                el('span', {}, el('span', { class: 'live-dot' }), 'LIVE · '),
                document.createTextNode(state.runLog.join('\n')),
              );
              box.scrollTop = box.scrollHeight;
            }
          }
          if (active) hydrateLiveShot(active);
        } catch {}
      }, 2000);
    }
    function stopLiveTail() {
      if (state.pollTimer) { clearInterval(state.pollTimer); state.pollTimer = null; }
    }

    // Ambient poll — fires every 2.5s while Run & Debug tab is mounted,
    // even if the user didn't kick off the run from here. Lets devs
    // attach to runs started from Run Center / another dev / etc.,
    // and shows them the live screenshot + abort button.
    let _ambientTimer = null;
    function startAmbientPoll() {
      stopAmbientPoll();
      _ambientTimer = setInterval(async () => {
        if (state.section !== 'run' || !state.activeId) return;
        // Skip if startLiveTail is already running — it covers active state.
        if (state.pollTimer) return;
        const prevIds = state.activeRuns.map((a) => a.runId).sort().join(',');
        await loadActiveRuns();
        const nowIds = state.activeRuns.map((a) => a.runId).sort().join(',');
        const anyForThisCase = state.activeRuns.some((a) => a.caseId === state.activeId);
        // Re-render only when the active set for this case changes — avoids
        // tearing focus from inputs / textareas every 2.5s.
        if (prevIds !== nowIds) renderAll();
        // Keep the live screen fresh even on idle re-renders.
        const liveForCase = state.activeRuns.find((a) => a.caseId === state.activeId);
        if (liveForCase) hydrateLiveShot(liveForCase);
        else if (anyForThisCase === false) { /* no live for this case */ }
      }, 2500);
    }
    function stopAmbientPoll() {
      if (_ambientTimer) { clearInterval(_ambientTimer); _ambientTimer = null; }
    }
    startAmbientPoll();

    // ══════════════════════════════════════════════════════════════════
    // 5. CACHE INSPECTOR
    // The reworked Cache Inspector mirrors the dev console (/index.html)
    // pattern: instead of letting devs poke at raw YAML, surface the run
    // each slot/snapshot came from + its Midscene report. Report can be
    // previewed inline (iframe) or opened in a new tab. Snapshots
    // without a report show "Missing report" gray text.
    // ══════════════════════════════════════════════════════════════════

    // Build URL for the report iframe — appends current theme so the
    // embedded report matches the case-studio dark/light state.
    function reportPreviewUrl(url) {
      if (!url) return url;
      let theme = document.documentElement.getAttribute('data-theme');
      if (theme !== 'light' && theme !== 'dark') {
        theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      const sep = url.includes('?') ? '&' : '?';
      return `${url}${sep}theme=${theme}`;
    }

    // Toggle state for inline iframe previews; one open at a time.
    const _reportPreviewOpen = new Set();

    // Build the report-action cluster shown on each row. If the run has
    // a report, two buttons: ▶ Preview (inline iframe under the row) +
    // Open in new tab. If not, gray "Missing report" text.
    function buildReportActions(run, rowEl, hostEl) {
      const url = run?.report?.url;
      const name = run?.report?.name;
      if (!url) {
        return el('span', { class: 'cache-rep-missing', title: '这次 run 没有 Midscene report — 可能跑挂在 runner 启动前' }, 'Missing report');
      }
      const key = `${run.runId || name}::${rowEl.dataset?.k || ''}`;
      const isOpen = _reportPreviewOpen.has(key);
      const previewBtn = el('button', {
        class: 'a-button a-button--brand-tertiary -small cache-rep-btn',
        onclick: (ev) => {
          ev.stopPropagation();
          if (_reportPreviewOpen.has(key)) {
            _reportPreviewOpen.delete(key);
            const existing = hostEl.querySelector('.cache-rep-frame');
            if (existing) existing.remove();
            previewBtn.textContent = '▶ Preview';
            return;
          }
          // Close any other open frame (single-open semantics).
          document.querySelectorAll('.cache-rep-frame').forEach((n) => n.remove());
          _reportPreviewOpen.clear();
          _reportPreviewOpen.add(key);
          previewBtn.textContent = '▾ Hide preview';
          const frame = el('div', { class: 'cache-rep-frame' },
            el('iframe', {
              src: reportPreviewUrl(url),
              loading: 'lazy',
              title: name || 'Midscene report',
            }),
          );
          hostEl.appendChild(frame);
        },
      }, isOpen ? '▾ Hide preview' : '▶ Preview');
      const openBtn = el('a', {
        class: 'a-button a-button--neutral-secondary -small cache-rep-btn',
        href: reportPreviewUrl(url),
        target: '_blank',
        rel: 'noopener',
        onclick: (ev) => ev.stopPropagation(),
      }, 'Open in new tab');
      return el('span', { class: 'cache-rep-actions' }, previewBtn, openBtn);
    }

    // Run progress text — copied from Run history's pattern so users see
    // the same "✓ 全部 N 步通过" / "✗ 跑到 step X / Y 挂了" across tabs.
    function runProgressText(run, stepCount) {
      const isPass = run?.status === 'passed';
      if (isPass) return `✓ 全部 ${stepCount} 步通过`;
      const reached = lastReachedStep(run);
      if (reached != null) return `✗ 跑到 step ${reached} / ${stepCount} 挂了`;
      if (run?.errorMessage) return `✗ ${String(run.errorMessage).slice(0, 120)}`;
      return '✗ 失败';
    }

    function renderCacheInspector() {
      const c = state.detail;
      if (!state.cacheFiles) { loadCacheData(c.id).then(renderAll); return el('div', { class: 'empty' }, '加载 cache 数据…'); }
      const cf = state.cacheFiles;
      const cd = state.cacheDebug || {};
      const passInfo = cd.currentPassFile;
      const failInfo = cd.currentFailFile;
      const stepCount = (state.detail?.parsed?.apiGuide?.steps || []).length || 0;
      const runsById = new Map((state.runs || []).map((r) => [r.runId, r]));

      // Resolve the source run for each slot. config.source = 'auto' picks
      // the latest matching snapshot; a runId pins to that specific run.
      const resolveSlotRun = (slotName) => {
        const cfg = cd[slotName];
        if (cfg?.source && cfg.source !== 'auto') {
          return { run: runsById.get(cfg.source) || null, pinned: true, sourceLabel: cfg.source };
        }
        // Auto = latest snapshot of matching status (passed or failed)
        const wantStatus = slotName === 'pass' ? 'passed' : 'failed';
        const matched = (cd.snapshots || []).find((s) => s.status === wantStatus && s.hasFile);
        if (matched) return { run: runsById.get(matched.runId) || matched, pinned: false, sourceLabel: 'auto · latest ' + wantStatus };
        return { run: null, pinned: false, sourceLabel: 'auto (no matching run yet)' };
      };

      const passSrc = resolveSlotRun('pass');
      const failSrc = resolveSlotRun('fail');

      const slotCard = (slotName, slotInfo, src, headTag, description) => {
        const card = el('div', { class: `slot-card is-${slotName}` });
        card.appendChild(el('h4', {}, slotName.toUpperCase() + ' slot'));
        card.appendChild(el('div', { class: 'slot-tag' }, headTag));
        card.appendChild(el('div', { class: 'slot-info' },
          slotInfo?.exists
            ? `${fmtBytes(slotInfo.sizeBytes)} · 更新 ${fmtDate(slotInfo.mtime)}`
            : '不存在（还没跑出过这个 slot）'));
        // Source run badge — pinned vs auto.
        card.appendChild(el('div', { class: 'slot-source' },
          el('span', { class: 'slot-source-label' }, src.pinned ? '★ pinned source' : '🜢 source'),
          el('span', { class: 'slot-source-value' }, src.run?.runId
            ? `${src.run.runId.slice(-12)} · ${fmtDate(src.run.finishedAt || src.run.startedAt)}`
            : src.sourceLabel),
        ));
        // Run progress text (mirrors Run history pattern).
        if (src.run && stepCount) {
          card.appendChild(el('div', {
            class: 'slot-progress ' + (src.run.status === 'passed' ? 'is-pass' : 'is-fail'),
          }, runProgressText(src.run, stepCount)));
        }
        // Description (what this slot is for — anti-mystery).
        card.appendChild(el('div', { class: 'slot-desc' }, description));
        // Report buttons live in their own row so the inline iframe has
        // a clean host element to mount into.
        if (src.run) {
          const repHost = el('div', { class: 'slot-rep-host', 'data-k': `slot-${slotName}` });
          repHost.appendChild(buildReportActions(src.run, repHost, repHost));
          card.appendChild(repHost);
        }
        return card;
      };

      const slots = el('div', { class: 'section-card' },
        el('div', { class: 'section-title' },
          el('span', {}, 'Current slots'),
          el('span', { class: 'head-sub' }, 'baseCacheId = ' + (cf.currentCacheId || '—')),
        ),
        el('div', { class: 'section-content' },
          el('div', { class: 'slot-summary' },
            slotCard('pass', passInfo, passSrc,
              'validated · Run with cache 读这里',
              'PASS slot 是"上线给用户跑"的标准 cache。Run with cache 读它；只有 passed run 会自动写它。'),
            slotCard('fail', failInfo, failSrc,
              'exploratory · Run raw / trim-tail 写这里',
              'FAIL slot 是调试用的暂存 cache。Run raw 每步现场 plan + 写它；用 trim-tail 救前半段时也读它。'),
          ),
        ),
      );

      // ── Per-run snapshots — runs that produced their own cache copy on
      // disk. Each row: status / slot / runId / progress / Report buttons
      // + **prominent "Use as next cache" pin** + Restore.
      //
      // The pin button writes into the same cacheSlotConfig.{pass|fail}.source
      // that Cache Debug modal + Run history ☆/★ buttons read — they all
      // stay in sync because every toggle reloads loadCacheData().
      // Passed runs can be pinned as PASS source; failed runs as FAIL.
      // Cross-slot pinning (passed → fail or vice-versa) is hidden because
      // it's almost always a mistake (mirrors dev console behavior).
      const passSourceId = cd.pass?.source || 'auto';
      const failSourceId = cd.fail?.source || 'auto';
      const currentDropTail = Number(cd.fail?.dropTailCount ?? 2);

      const snaps = (cd.snapshots || []).slice(0, 30);
      const snapRows = snaps.length === 0
        ? el('div', { class: 'empty' }, '还没有 per-run snapshot — 跑一次会自动生成。')
        : el('div', { class: 'snap-list' },
            ...snaps.map((snap) => {
              const r = runsById.get(snap.runId) || { ...snap, runId: snap.runId };
              const isPass = snap.status === 'passed';
              const isPinnedPass = passSourceId === snap.runId;
              const isPinnedFail = failSourceId === snap.runId;
              const isPinned = isPinnedPass || isPinnedFail;
              // Stale snapshots — file got cleaned up — can't be used as
              // a source anymore, so skip the pin button. Restore is also
              // hidden because there's nothing to restore from.
              const isStale = !snap.hasFile;
              const row = el('div', {
                class: 'snap-row'
                  + (isPinnedPass ? ' is-pinned-pass' : '')
                  + (isPinnedFail ? ' is-pinned-fail' : '')
                  + (isStale ? ' is-stale' : ''),
              });
              row.dataset.k = `snap-${snap.runId}`;

              const pinTargetSlot = isPass ? 'pass' : 'fail';
              const pinBtn = !isStale ? el('button', {
                class: 'cache-pin-snap'
                  + (isPass ? ' is-pass' : ' is-fail')
                  + (isPinned ? ' is-active' : ''),
                title: isPinned
                  ? `当前是 ${pinTargetSlot.toUpperCase()} cache — 点击恢复 auto`
                  : `把这次 snapshot 钉成下次 Run with cache${isPass ? '' : ' / Run raw'} 用的 ${pinTargetSlot.toUpperCase()} cache`,
                onclick: async () => {
                  try {
                    await togglePin(c.id, r, pinTargetSlot, isPinned, currentDropTail);
                  } catch (err) { /* togglePin shows its own toast */ }
                },
              }, isPinned ? `★ 已钉为下次 ${pinTargetSlot.toUpperCase()} cache` : `☆ 钉为下次 ${pinTargetSlot.toUpperCase()} cache`) : null;

              // Only the run-status pill (passed / failed) is shown here.
              // The cacheSlot tag used to sit next to it but it was visually
              // contradictory on `passed + FAIL` rows (a passed Run raw, by
              // design, writes the FAIL slot). The slot information is still
              // conveyed unambiguously by the pin button label on the right
              // (`★ 钉为下次 PASS cache` vs `★ 钉为下次 FAIL cache`).
              row.appendChild(el('div', { class: 'snap-head' },
                el('span', { class: 'status ' + (snap.status || 'pending') }, snap.status || '?'),
                el('span', { class: 'snap-runid' }, (snap.runId || '?').slice(-12)),
                isStale ? el('span', { class: 'snap-stale-tag', title: 'snapshot 文件已被清理 — 不能再钉为 cache / Restore' }, 'stale (no file)') : null,
                el('span', { class: 'snap-meta' },
                  fmtDate(snap.finishedAt) + ' · ' +
                  (snap.sizeBytes != null ? fmtBytes(snap.sizeBytes) + ' · ' : '') +
                  (stepCount ? runProgressText(r, stepCount) : (isPass ? '✓ passed' : '✗ failed')),
                ),
                el('span', { class: 'snap-actions' },
                  buildReportActions(r, row, row),
                  pinBtn,
                ),
              ));
              return row;
            }),
          );

      // ↺ Restore + Refresh removed per user feedback — "钉为下次 cache" 已经
      //涵盖了 90% 的"用这次 snapshot"用例（runner 启动时按钉的 source 复制），
      // Refresh 也是多余的（loadCacheData 在 tab 切换时已经跑一次）。
      const snapsCard = el('div', { class: 'section-card' },
        el('div', { class: 'section-title' },
          el('span', {}, `Per-run snapshots · ${snaps.length}`),
          el('span', { class: 'head-sub' }, '点 ★ 把某次 snapshot 钉成下次跑用的 cache · ▶ Preview 看那次的 report'),
        ),
        el('div', { class: 'section-content' }, snapRows),
      );

      // ── Other cache files on disk — kept for transparency (was the old
      // "All cache files" section), now without "View YAML". Just file
      // metadata + Delete. Most users won't need this; collapsed by default.
      state._cacheFilesExpanded = state._cacheFilesExpanded || false;
      const filesHead = el('div', { class: 'section-title', style: 'cursor:pointer;', onclick: () => { state._cacheFilesExpanded = !state._cacheFilesExpanded; renderAll(); } },
        el('span', {}, (state._cacheFilesExpanded ? '▾ ' : '▸ ') + 'Raw cache files on disk · ' + (cf.files || []).length),
        el('span', { class: 'head-sub' }, '一般不用看 — slot 文件和 stale 旧 hash 都在这里。要看 prompt → xpath 请去对应 run 的 Report。'),
      );
      const filesBody = state._cacheFilesExpanded
        ? el('div', { class: 'section-content', style: 'padding:0;overflow-x:auto;' },
            (cf.files || []).length === 0
              ? el('div', { class: 'empty' }, '没有 cache 文件 — 跑一次会自动生成')
              : el('table', { class: 'cache-table' },
                  el('thead', {}, el('tr', {},
                    el('th', {}, 'File'), el('th', {}, 'Slot'), el('th', {}, 'Size'),
                    el('th', {}, 'Modified'), el('th', {}, ''),
                  )),
                  el('tbody', {}, ...cf.files.map((f) => el('tr', { class: f.isCurrent ? 'is-current' : '' },
                    el('td', {}, el('code', { style: 'font-size:11px;' }, f.name)),
                    el('td', {}, el('span', { class: f.slot === 'pass' ? 'slot-pass' : f.slot === 'fail' ? 'slot-fail' : '' }, f.slot || (f.isCurrent ? 'legacy' : 'stale'))),
                    el('td', {}, fmtBytes(f.bytes)),
                    el('td', {}, fmtDate(f.modifiedAt)),
                    el('td', { class: 'cell-actions' },
                      el('button', { class: 'a-button a-button--destructive-primary -small', onclick: async () => {
                        if (!confirm('删 ' + f.name + '？')) return;
                        try {
                          await api('/api/midscene-js/cases/' + encodeURIComponent(c.id) + '/cache/' + encodeURIComponent(f.name), { method: 'DELETE' });
                          toast('已删除');
                          loadCacheData(c.id).then(renderAll);
                        } catch (err) { toast('删除失败: ' + err.message); }
                      } }, 'Delete'),
                    ),
                  ))),
                ),
          )
        : null;
      const files = el('div', { class: 'section-card' }, filesHead, filesBody);

      return el('div', {}, slots, snapsCard, files);
    }

    // (openCacheContentModal removed — Cache Inspector no longer surfaces
    // raw YAML; each row links to the matching Midscene report instead.)

    // ══════════════════════════════════════════════════════════════════
    // 6. HOW-TO — task / pain-point oriented
    // ══════════════════════════════════════════════════════════════════
    function renderHowTo() {
      function card(opts) {
        return el('div', { class: 'howto-card ' + (opts.kind ? 'is-' + opts.kind : '') },
          el('h3', {}, el('div', { class: 'howto-icon' }, opts.icon), opts.title),
          el('ol', {}, ...opts.steps.map((s) => el('li', { html: s }))),
          opts.hint ? el('div', { class: 'howto-hint', html: opts.hint }) : null,
        );
      }
      const cards = [
        card({
          icon: '🆕', kind: 'success', title: '开一个新 case',
          steps: [
            '上面 <b>✦ Create new case</b> tab',
            '输个 id (kebab-case，如 <code>saptest12</code>)',
            '默认 NL 留着或改两步，点 <b>Create from template</b>',
            '自动跳到这个 case · 已经能 Run with cache（前 6 步会命中模板 cache）',
          ],
        }),
        card({
          icon: '🐛', kind: 'warning', title: 'case 跑到中间挂了，要救前面的部分',
          steps: [
            '<b>Run & Debug</b> tab，看 Run history 里那条 failed 行',
            '它会显示 "跑到 step 12 / 20 挂了"',
            '点这行右边的 <b>☆ fail</b> 把它钉为下次 FAIL cache',
            '出来一个黄框 — 输入 <b>drop trailing N</b>（runner 推荐的数字）',
            '点 Save → 下次 Run with cache 用前 N 步好的 xpath',
          ],
          hint: '原理：失败的 cache 默认会被回滚，但钉成下次 FAIL cache + 设 dropTailCount 让 runner 只保留前面好的部分。',
        }),
        card({
          icon: '✓', kind: 'success', title: 'case 调通了，怎么给用户？',
          steps: [
            '右上角点 <b>✓ Promote to user UI</b>',
            '用户去 Run Center，顶上点 <b>↻ Global Sync</b>',
            '他们就能看到这个新 case · 包含到 batch 里跑',
          ],
          hint: '不会自动 push 给用户 — 用户需要手动 Sync。',
        }),
        card({
