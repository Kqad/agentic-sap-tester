          el('div', { style: 'display:flex;align-items:center;gap:10px;flex-wrap:wrap;' },
            hypBadge,
            el('span', { style: 'font-size:12px;color:var(--muted);' }, `信心 ${conf}%`),
            analysis.evidence?.hadScreenshot
              ? el('span', { style: 'font-size:11px;padding:2px 8px;border-radius:9999px;background:#dcfce7;color:#166534;font-weight:700;' }, '📷 已看截图')
              : null,
            analysis.evidence
              ? el('span', { style: 'font-size:11px;padding:2px 8px;border-radius:9999px;background:#e0e7ff;color:#3730a3;font-weight:700;' }, `📋 report timeline · ${analysis.evidence.timeline?.length || 0} 条`)
              : null,
          ),
          el('div', { style: 'font-size:13px;line-height:1.55;color:var(--navy);' },
            analysis.explain || '(无说明)'),
          // Evidence panel — collapsed by default. Lets the user verify
          // what the AI actually saw before trusting the proposal.
          analysis.evidence ? renderEvidencePanel(analysis.evidence) : null,
          proposalCard,
          status,
          // Verdict record row · hidden until Apply succeeds. On click,
          // POSTs /api/case-agent/postmortem which writes a KB md and
          // triggers incremental reindex → next similar failure gets it.
          verdictRow,
          el('div', { style: 'display:flex;gap:8px;margin-top:6px;' },
            applyBtn,
            // Auto-loop: analyze → apply → run → verify → (if pass) auto
            // postmortem worked=true. Caps at 3 iterations; stops on
            // signature repeat, needs-human, or first pass.
            call ? el('button', {
              class: 'a-button a-button--brand-secondary',
              title: '不用手动重跑 · agent 自动跑 max 3 轮直到通过或放弃',
              onclick: () => startAutoLoop(bodyEl, caseId, call, analysis, close),
            }, '🔁 Auto-fix (max 3 轮)') : null,
            el('button', { class: 'a-button a-button--neutral-tertiary', onclick: close }, call ? 'Skip' : 'Close'),
          ),
        ),
      );
    }

    // Compute a stable signature for a toolCall — same shape as the
    // server's fixSignature so we can detect "planner just proposed the
    // exact same thing again" and break out of an infinite loop.
    function fixSignatureClient(caseId, toolCall) {
      const a = toolCall?.args || {};
      const t = toolCall?.tool || '?';
      const stepKey = a.stepIdx != null ? a.stepIdx : (a.afterStepIdx != null ? a.afterStepIdx : '?');
      let argKey = '';
      if (t === 'setStepLocator')  argKey = a.newLocator || '';
      else if (t === 'insertSleepAfter') argKey = 'sleep-' + Math.round((a.ms || 0) / 500) * 500;
      else if (t === 'changeStepApi')    argKey = (a.newApi || '') + '::' + (a.newArg || '');
      return `${caseId}::${stepKey}::${t}::${argKey}`;
    }

    // Server-side signature match for postmortem retrieval — used at end
    // of auto-loop to know whether a matching KB entry already exists.
    // (Client dedup only. Server has its own dedup on write.)

    // ── Auto-fix loop ──────────────────────────────────────────────
    // Owns modal body while running. Streams a timeline of iterations
    // so user sees exactly what happened each round.
    async function startAutoLoop(bodyEl, caseId, initialCall, initialAnalysis, close) {
      const MAX_ITER = 3;
      const tried = new Set([fixSignatureClient(caseId, initialCall)]);
      const timeline = el('div', { style: 'display:flex;flex-direction:column;gap:10px;' });
      const footer = el('div', { style: 'display:flex;gap:8px;margin-top:14px;' });
      bodyEl.replaceChildren(el('div', { style: 'padding:16px 20px;' },
        el('div', { style: 'font-size:15px;font-weight:800;color:var(--navy);margin-bottom:10px;' },
          '🔁 Auto-fix loop · 最多 ' + MAX_ITER + ' 轮'),
        timeline,
        footer,
      ));

      const stepCard = (n, phase, sub, tone = 'info') => {
        const bg = tone === 'ok' ? '#f0fdf4'
                : tone === 'fail' ? '#fef2f2'
                : tone === 'busy' ? '#eff6ff'
                : '#f8fafc';
        const border = tone === 'ok' ? '#86efac'
                    : tone === 'fail' ? '#fca5a5'
                    : tone === 'busy' ? '#93c5fd'
                    : 'var(--line)';
        return el('div', { style: `padding:10px 14px;border:1px solid ${border};border-radius:6px;background:${bg};` },
          el('div', { style: 'font-size:12.5px;font-weight:800;color:var(--navy);' }, `${n}. ${phase}`),
          sub ? el('div', { style: 'font-size:11.5px;color:var(--muted);margin-top:3px;' }, sub) : null,
        );
      };
      const pushStep = (n, phase, sub, tone) => {
        timeline.appendChild(stepCard(n, phase, sub, tone));
        bodyEl.scrollTop = bodyEl.scrollHeight;
      };

      let currentCall = initialCall;
      let currentAnalysis = initialAnalysis;
      let iter = 1;
      let outcome = { done: false };

      while (iter <= MAX_ITER && !outcome.done) {
        const prefix = `[iter ${iter}/${MAX_ITER}]`;
        try {
          // ── Apply ──────────────────────────────────────────────
          pushStep(iter, `${prefix} 应用 fix`, describeToolCall(currentCall), 'busy');
          const ar = await api('/api/case-agent/apply', {
            method: 'POST',
            body: JSON.stringify({ caseId, toolCall: currentCall }),
          });
          pushStep(iter, `${prefix} ✓ apply 完成`, ar.summary || '', 'ok');
          await loadCaseDetail(caseId).catch(() => {});

          // ── Run ────────────────────────────────────────────────
          pushStep(iter, `${prefix} 🏃 触发 run raw…`, 'cache=write · 可能 1-3 分钟', 'busy');
          state.isRunning = true; renderAll();
          const runR = await api('/api/midscene-js/cases/' + encodeURIComponent(caseId) + '/run?cache=write', {
            method: 'POST',
            body: JSON.stringify({ headed: state.runHeaded, keepCacheOnFailure: false }),
          });
          state.isRunning = false;
          state.lastRun = runR.run || runR;
          await loadRuns(caseId).catch(() => {});

          const runStatus = state.lastRun?.status || '?';
          const passed = runStatus === 'passed';
          const runId = (state.lastRun?.runId || '').slice(-12);

          pushStep(iter, `${prefix} run 结果: ${passed ? '✓ passed' : '✗ ' + runStatus}`,
            `runId ${runId} · duration ${Math.round((state.lastRun?.durationMs || 0) / 1000)}s`,
            passed ? 'ok' : 'fail');

          if (passed) {
            // ── Postmortem worked=true ────────────────────────────
            pushStep(iter + 0.5, '📚 写 KB (worked=true)', '沉淀到 postmortems/ · 触发增量 reindex', 'busy');
            try {
              const pmR = await api('/api/case-agent/postmortem', {
                method: 'POST',
                body: JSON.stringify({
                  caseId, toolCall: currentCall, worked: true,
                  hypothesis: currentAnalysis?.hypothesis || 'unknown',
                  failingSubType: currentAnalysis?.evidence?.failingSubType || '',
                  failingThought: currentAnalysis?.evidence?.failingThought || '',
                }),
              });
              pushStep(iter + 0.5, `✓ KB updated · ${pmR.file}`,
                `reindexed ${pmR.reindexedChunks} chunks`, 'ok');
            } catch (e) {
              pushStep(iter + 0.5, '⚠ 写 KB 失败', e.message, 'fail');
            }
            outcome = { done: true, kind: 'passed' };
            break;
          }

          // Also postmortem the failed attempt so we don't repeat it
          try {
            await api('/api/case-agent/postmortem', {
              method: 'POST',
              body: JSON.stringify({
                caseId, toolCall: currentCall, worked: false,
                hypothesis: currentAnalysis?.hypothesis || 'unknown',
                failingSubType: currentAnalysis?.evidence?.failingSubType || '',
                failingThought: currentAnalysis?.evidence?.failingThought || '',
              }),
            });
            pushStep(iter, '📚 已记 worked=false', 'planner 下轮会避开这个 fix', 'info');
          } catch { /* non-fatal */ }

          if (iter >= MAX_ITER) {
            outcome = { done: true, kind: 'exhausted' };
            break;
          }

          // ── Re-analyze (uses the fresh run's report) ──────────
          pushStep(iter, `${prefix} 🔍 重新分析新一轮 run`, '', 'busy');
          const nextReportUrl = state.lastRun?.report?.url || null;
          const nextErr = state.lastRun?.errorMessage || '';
          // Don't pass failedStepIdx — the server pulls it from the
          // report summary (Midscene's own task graph is more accurate
          // than any log-line regex we could do here).
          const nextR = await api('/api/case-agent/analyze', {
            method: 'POST',
            body: JSON.stringify({
              caseId, error: nextErr, reportUrl: nextReportUrl,
            }),
          });

          const nextCall = (nextR.toolCalls || [])[0];
          if (!nextCall) {
            pushStep(iter, `${prefix} 🛑 planner 说 needs-human`, nextR.explain || '', 'fail');
            outcome = { done: true, kind: 'needs-human', analysis: nextR };
            break;
          }
          const nextSig = fixSignatureClient(caseId, nextCall);
          if (tried.has(nextSig)) {
            pushStep(iter, `${prefix} 🛑 planner 又提了同样的 fix`, '(guard) 打破循环 → needs-human', 'fail');
            outcome = { done: true, kind: 'signature-repeat' };
            break;
          }
          tried.add(nextSig);
          currentCall = nextCall;
          currentAnalysis = nextR;
          iter += 1;
        } catch (err) {
          pushStep(iter, `${prefix} ✗ 迭代出错`, err.message, 'fail');
          outcome = { done: true, kind: 'error', error: err.message };
          break;
        } finally {
          state.isRunning = false;
        }
      }

      // Summary card at the bottom
      const summaryBox = el('div', {
        style: `margin-top:14px;padding:12px 16px;border-radius:8px;font-weight:800;font-size:14px;` +
          (outcome.kind === 'passed' ? 'background:#dcfce7;color:#166534;border:1px solid #86efac;'
          : 'background:#fef3c7;color:#78350f;border:1px solid #fcd34d;'),
      },
        outcome.kind === 'passed'      ? `🎉 修好了 · ${iter} 轮通过 · 已沉淀到 KB`
        : outcome.kind === 'exhausted' ? `⏱ 尝试 ${MAX_ITER} 轮仍未通过 · 需要人工介入`
        : outcome.kind === 'needs-human' ? '🙋 planner 判定需要人工看 · 结束'
        : outcome.kind === 'signature-repeat' ? '🔁 planner 打圈 · guard 停止'
        : `✗ 出错: ${outcome.error || 'unknown'}`
      );
      timeline.appendChild(summaryBox);
      footer.replaceChildren(
        el('button', { class: 'a-button a-button--neutral-tertiary', onclick: close }, '关闭'),
      );
    }

    function describeToolCall(call) {
      if (!call) return '(无 toolCall)';
      const a = call.args || {};
      if (call.tool === 'setStepLocator')  return `setStepLocator @ step ${a.stepIdx + 1}: "${(a.newLocator || '').slice(0, 60)}"`;
      if (call.tool === 'insertSleepAfter') return `insertSleepAfter step ${a.afterStepIdx + 1} · ${a.ms}ms`;
      if (call.tool === 'changeStepApi')    return `changeStepApi @ step ${a.stepIdx + 1} → ${a.newApi}("${a.newArg || ''}")`;
      return call.tool;
    }

    function renderEvidencePanel(ev) {
      const wrap = el('details', {
        style: 'border:1px solid var(--line);border-radius:6px;background:#fafbfc;',
      });
      const summary = el('summary', {
        style: 'padding:8px 12px;cursor:pointer;font-size:12px;font-weight:700;color:var(--navy);user-select:none;',
      }, '🔍 AI 看到的证据 (点开)');
      wrap.appendChild(summary);
      const body = el('div', { style: 'padding:8px 14px 12px;font-size:12px;line-height:1.6;' });

      body.appendChild(el('div', { style: 'color:var(--muted);' },
        'Report: ', el('code', { style: 'font-size:11px;' }, ev.reportPath)));

      if (ev.lastGoodExec) {
        body.appendChild(el('div', {},
          el('b', { style: 'color:#166534;' }, '最后一步 ok: '),
          ev.lastGoodExec));
      }
      body.appendChild(el('div', { style: 'margin-top:4px;' },
        el('b', { style: 'color:var(--red);' }, `失败点 [trace-idx=${ev.failingIdx}]: `),
        `${ev.failingType}/${ev.failingSubType} · status=`,
        el('code', { style: 'background:#fee2e2;padding:1px 6px;border-radius:3px;color:#991b1b;' }, ev.failingStatus || '?'),
        ' · ',
        ev.failingExec || '(no name)'));

      if (ev.failingThought) {
        body.appendChild(el('div', {
          style: 'margin-top:8px;padding:8px 10px;background:#fff7ed;border-left:3px solid #f59e0b;font-family:var(--mono);font-size:11px;line-height:1.5;color:#7c2d12;border-radius:2px;',
        },
          el('div', { style: 'font-weight:700;font-family:inherit;margin-bottom:4px;' }, 'AI thought:'),
          ev.failingThought));
      }

      if (ev.timeline?.length) {
        const tbl = el('div', { style: 'margin-top:10px;font-family:var(--mono);font-size:11px;line-height:1.6;' });
        for (const t of ev.timeline) {
          const row = el('div', {
            style: `padding:2px 6px;border-radius:3px;${t.isFailing ? 'background:#fee2e2;color:#991b1b;font-weight:700;' : 'color:var(--muted);'}`,
          },
            (t.isFailing ? '→ ' : '  ') + `[${t.idx}] ${t.type}/${t.subType} · ${t.status} · ${(t.execName || '').slice(0, 60)}`);
          tbl.appendChild(row);
        }
        body.appendChild(tbl);
      }
      wrap.appendChild(body);
      return wrap;
    }

    function renderToolArgs(call) {
      const a = call.args || {};
      if (call.tool === 'setStepLocator') {
        return el('div', { style: 'font-size:13px;line-height:1.6;' },
          el('div', {}, '把 step ', el('b', {}, `#${a.stepIdx + 1}`), ' 的定位描述改成：'),
          el('code', { style: 'display:block;margin-top:6px;background:#fff;padding:8px 12px;border-radius:4px;border:1px solid #d1fae5;' }, a.newLocator),
        );
      }
      if (call.tool === 'insertSleepAfter') {
        return el('div', { style: 'font-size:13px;line-height:1.6;' },
          '在 step ', el('b', {}, `#${a.afterStepIdx + 1}`), ' 后面插入 ',
          el('code', { style: 'background:#fff;padding:2px 8px;border-radius:4px;' }, `sleep(${a.ms}ms)`));
      }
      if (call.tool === 'changeStepApi') {
        return el('div', { style: 'font-size:13px;line-height:1.6;' },
          '把 step ', el('b', {}, `#${a.stepIdx + 1}`), ' 的 API 换成 ',
          el('code', { style: 'background:#fff;padding:2px 8px;border-radius:4px;' }, `${a.newApi}("${a.newArg || ''}")`),
        );
      }
      return el('code', {}, JSON.stringify(a));
    }

    async function triggerRun() {
      const c = state.detail;
      if (!c) return;
      state.isRunning = true;
      state.runLog = [`[${new Date().toLocaleTimeString()}] kicking off · cache=${state.runMode}`];
      renderAll();
      const body = {
        headed: state.runHeaded,
        keepCacheOnFailure: state.keepCacheOnFailure,
      };
      const noCacheList = state.noCacheSteps.split(',').map((s) => Number(s.trim())).filter((n) => Number.isFinite(n));
      if (noCacheList.length) body.noCacheSteps = noCacheList;
      startLiveTail(c.id);
      try {
        const r = await api('/api/midscene-js/cases/' + encodeURIComponent(c.id) + '/run?cache=' + state.runMode, {
          method: 'POST', body: JSON.stringify(body),
        });
        state.lastRun = r.run || r;
        const log = state.lastRun?.logTail || [];
        if (log.length) state.runLog = log;
        else state.runLog.push(`[${new Date().toLocaleTimeString()}] runner finished · ${state.lastRun?.status || 'unknown'}`);
        toast('Run finished · ' + (state.lastRun?.status || '?'));
        await loadRuns(c.id);
      } catch (err) {
        state.runLog.push(`[err] ${err.message}`);
        toast('Run failed: ' + err.message);
      } finally {
        state.isRunning = false;
        stopLiveTail();
        renderAll();
      }
    }
    function startLiveTail(caseId) {
      stopLiveTail();
      state.pollTimer = setInterval(async () => {
        try {
          const r = await api('/api/midscene-js/runs/active');
          state.activeRuns = r.active || [];
          const active = state.activeRuns.find((a) => a.caseId === caseId);
          if (active?.logTail?.length) {
            state.runLog = active.logTail.map((x) => typeof x === 'string' ? x : (x.line || '')).filter(Boolean);
            const box = $('#liveTail');
            if (box && state.section === 'run') {
              box.replaceChildren(
                el('span', {}, el('span', { class: 'live-dot' }), 'LIVE · '),
                document.createTextNode(state.runLog.join('\n')),
              );
              box.scrollTop = box.scrollHeight;
            }
          }
          if (active) hydrateLiveShot(active);
        } catch {}
      }, 2000);
    }
    function stopLiveTail() {
      if (state.pollTimer) { clearInterval(state.pollTimer); state.pollTimer = null; }
    }

    // Ambient poll — fires every 2.5s while Run & Debug tab is mounted,
    // even if the user didn't kick off the run from here. Lets devs
    // attach to runs started from Run Center / another dev / etc.,
    // and shows them the live screenshot + abort button.
    let _ambientTimer = null;
    function startAmbientPoll() {
      stopAmbientPoll();
      _ambientTimer = setInterval(async () => {
        if (state.section !== 'run' || !state.activeId) return;
        // Skip if startLiveTail is already running — it covers active state.
        if (state.pollTimer) return;
        const prevIds = state.activeRuns.map((a) => a.runId).sort().join(',');
        await loadActiveRuns();
        const nowIds = state.activeRuns.map((a) => a.runId).sort().join(',');
        const anyForThisCase = state.activeRuns.some((a) => a.caseId === state.activeId);
        // Re-render only when the active set for this case changes — avoids
        // tearing focus from inputs / textareas every 2.5s.
        if (prevIds !== nowIds) renderAll();
        // Keep the live screen fresh even on idle re-renders.
        const liveForCase = state.activeRuns.find((a) => a.caseId === state.activeId);
        if (liveForCase) hydrateLiveShot(liveForCase);
        else if (anyForThisCase === false) { /* no live for this case */ }
      }, 2500);
    }
    function stopAmbientPoll() {
      if (_ambientTimer) { clearInterval(_ambientTimer); _ambientTimer = null; }
    }
    startAmbientPoll();

    // ══════════════════════════════════════════════════════════════════
    // 5. CACHE INSPECTOR
    // The reworked Cache Inspector mirrors the dev console (/index.html)
    // pattern: instead of letting devs poke at raw YAML, surface the run
    // each slot/snapshot came from + its Midscene report. Report can be
    // previewed inline (iframe) or opened in a new tab. Snapshots
    // without a report show "Missing report" gray text.
    // ══════════════════════════════════════════════════════════════════

    // Build URL for the report iframe — appends current theme so the
    // embedded report matches the case-studio dark/light state.
    function reportPreviewUrl(url) {
      if (!url) return url;
      let theme = document.documentElement.getAttribute('data-theme');
      if (theme !== 'light' && theme !== 'dark') {
        theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      const sep = url.includes('?') ? '&' : '?';
      return `${url}${sep}theme=${theme}`;
    }

    // Toggle state for inline iframe previews; one open at a time.
    const _reportPreviewOpen = new Set();

    // Build the report-action cluster shown on each row. If the run has
    // a report, two buttons: ▶ Preview (inline iframe under the row) +
    // Open in new tab. If not, gray "Missing report" text.
    function buildReportActions(run, rowEl, hostEl) {
      const url = run?.report?.url;
      const name = run?.report?.name;
      if (!url) {
        return el('span', { class: 'cache-rep-missing', title: '这次 run 没有 Midscene report — 可能跑挂在 runner 启动前' }, 'Missing report');
      }
      const key = `${run.runId || name}::${rowEl.dataset?.k || ''}`;
      const isOpen = _reportPreviewOpen.has(key);
      const previewBtn = el('button', {
        class: 'a-button a-button--brand-tertiary -small cache-rep-btn',
        onclick: (ev) => {
          ev.stopPropagation();
          if (_reportPreviewOpen.has(key)) {
            _reportPreviewOpen.delete(key);
            const existing = hostEl.querySelector('.cache-rep-frame');
            if (existing) existing.remove();
            previewBtn.textContent = '▶ Preview';
            return;
          }
          // Close any other open frame (single-open semantics).
          document.querySelectorAll('.cache-rep-frame').forEach((n) => n.remove());
          _reportPreviewOpen.clear();
          _reportPreviewOpen.add(key);
          previewBtn.textContent = '▾ Hide preview';
          const frame = el('div', { class: 'cache-rep-frame' },
            el('iframe', {
              src: reportPreviewUrl(url),
              loading: 'lazy',
              title: name || 'Midscene report',
            }),
          );
          hostEl.appendChild(frame);
        },
      }, isOpen ? '▾ Hide preview' : '▶ Preview');
      const openBtn = el('a', {
        class: 'a-button a-button--neutral-secondary -small cache-rep-btn',
        href: reportPreviewUrl(url),
        target: '_blank',
        rel: 'noopener',
        onclick: (ev) => ev.stopPropagation(),
      }, 'Open in new tab');
      return el('span', { class: 'cache-rep-actions' }, previewBtn, openBtn);
    }

    // Run progress text — copied from Run history's pattern so users see
    // the same "✓ 全部 N 步通过" / "✗ 跑到 step X / Y 挂了" across tabs.
    function runProgressText(run, stepCount) {
      const isPass = run?.status === 'passed';
      if (isPass) return `✓ 全部 ${stepCount} 步通过`;
      const reached = lastReachedStep(run);
      if (reached != null) return `✗ 跑到 step ${reached} / ${stepCount} 挂了`;
      if (run?.errorMessage) return `✗ ${String(run.errorMessage).slice(0, 120)}`;
      return '✗ 失败';
    }

    function renderCacheInspector() {
      const c = state.detail;
      if (!state.cacheFiles) { loadCacheData(c.id).then(renderAll); return el('div', { class: 'empty' }, '加载 cache 数据…'); }
      const cf = state.cacheFiles;
      const cd = state.cacheDebug || {};
      const passInfo = cd.currentPassFile;
      const failInfo = cd.currentFailFile;
      const stepCount = (state.detail?.parsed?.apiGuide?.steps || []).length || 0;
      const runsById = new Map((state.runs || []).map((r) => [r.runId, r]));

      // Resolve the source run for each slot. config.source = 'auto' picks
      // the latest matching snapshot; a runId pins to that specific run.
      const resolveSlotRun = (slotName) => {
        const cfg = cd[slotName];
        if (cfg?.source && cfg.source !== 'auto') {
          return { run: runsById.get(cfg.source) || null, pinned: true, sourceLabel: cfg.source };
        }
        // Auto = latest snapshot of matching status (passed or failed)
        const wantStatus = slotName === 'pass' ? 'passed' : 'failed';
        const matched = (cd.snapshots || []).find((s) => s.status === wantStatus && s.hasFile);
        if (matched) return { run: runsById.get(matched.runId) || matched, pinned: false, sourceLabel: 'auto · latest ' + wantStatus };
        return { run: null, pinned: false, sourceLabel: 'auto (no matching run yet)' };
      };

      const passSrc = resolveSlotRun('pass');
      const failSrc = resolveSlotRun('fail');

      const slotCard = (slotName, slotInfo, src, headTag, description) => {
        const card = el('div', { class: `slot-card is-${slotName}` });
        card.appendChild(el('h4', {}, slotName.toUpperCase() + ' slot'));
        card.appendChild(el('div', { class: 'slot-tag' }, headTag));
        card.appendChild(el('div', { class: 'slot-info' },
          slotInfo?.exists
            ? `${fmtBytes(slotInfo.sizeBytes)} · 更新 ${fmtDate(slotInfo.mtime)}`
            : '不存在（还没跑出过这个 slot）'));
        // Source run badge — pinned vs auto.
        card.appendChild(el('div', { class: 'slot-source' },
          el('span', { class: 'slot-source-label' }, src.pinned ? '★ pinned source' : '🜢 source'),
          el('span', { class: 'slot-source-value' }, src.run?.runId
            ? `${src.run.runId.slice(-12)} · ${fmtDate(src.run.finishedAt || src.run.startedAt)}`
            : src.sourceLabel),
        ));
        // Run progress text (mirrors Run history pattern).
        if (src.run && stepCount) {
          card.appendChild(el('div', {
            class: 'slot-progress ' + (src.run.status === 'passed' ? 'is-pass' : 'is-fail'),
          }, runProgressText(src.run, stepCount)));
        }
        // Description (what this slot is for — anti-mystery).
        card.appendChild(el('div', { class: 'slot-desc' }, description));
        // Report buttons live in their own row so the inline iframe has
        // a clean host element to mount into.
        if (src.run) {
          const repHost = el('div', { class: 'slot-rep-host', 'data-k': `slot-${slotName}` });
          repHost.appendChild(buildReportActions(src.run, repHost, repHost));
          card.appendChild(repHost);
        }
        return card;
      };

      const slots = el('div', { class: 'section-card' },
        el('div', { class: 'section-title' },
          el('span', {}, 'Current slots'),
          el('span', { class: 'head-sub' }, 'baseCacheId = ' + (cf.currentCacheId || '—')),
        ),
        el('div', { class: 'section-content' },
          el('div', { class: 'slot-summary' },
            slotCard('pass', passInfo, passSrc,
              'validated · Run with cache 读这里',
              'PASS slot 是"上线给用户跑"的标准 cache。Run with cache 读它；只有 passed run 会自动写它。'),
            slotCard('fail', failInfo, failSrc,
              'exploratory · Run raw / trim-tail 写这里',
              'FAIL slot 是调试用的暂存 cache。Run raw 每步现场 plan + 写它；用 trim-tail 救前半段时也读它。'),
          ),
        ),
      );

      // ── Per-run snapshots — runs that produced their own cache copy on
      // disk. Each row: status / slot / runId / progress / Report buttons
      // + **prominent "Use as next cache" pin** + Restore.
      //
      // The pin button writes into the same cacheSlotConfig.{pass|fail}.source
      // that Cache Debug modal + Run history ☆/★ buttons read — they all
      // stay in sync because every toggle reloads loadCacheData().
      // Passed runs can be pinned as PASS source; failed runs as FAIL.
      // Cross-slot pinning (passed → fail or vice-versa) is hidden because
      // it's almost always a mistake (mirrors dev console behavior).
      const passSourceId = cd.pass?.source || 'auto';
      const failSourceId = cd.fail?.source || 'auto';
      const currentDropTail = Number(cd.fail?.dropTailCount ?? 2);

      const snaps = (cd.snapshots || []).slice(0, 30);
      const snapRows = snaps.length === 0
        ? el('div', { class: 'empty' }, '还没有 per-run snapshot — 跑一次会自动生成。')
        : el('div', { class: 'snap-list' },
            ...snaps.map((snap) => {
              const r = runsById.get(snap.runId) || { ...snap, runId: snap.runId };
              const isPass = snap.status === 'passed';
              const isPinnedPass = passSourceId === snap.runId;
              const isPinnedFail = failSourceId === snap.runId;
              const isPinned = isPinnedPass || isPinnedFail;
              // Stale snapshots — file got cleaned up — can't be used as
              // a source anymore, so skip the pin button. Restore is also
              // hidden because there's nothing to restore from.
              const isStale = !snap.hasFile;
              const row = el('div', {
                class: 'snap-row'
                  + (isPinnedPass ? ' is-pinned-pass' : '')
                  + (isPinnedFail ? ' is-pinned-fail' : '')
                  + (isStale ? ' is-stale' : ''),
              });
              row.dataset.k = `snap-${snap.runId}`;

              const pinTargetSlot = isPass ? 'pass' : 'fail';
              const pinBtn = !isStale ? el('button', {
                class: 'cache-pin-snap'
                  + (isPass ? ' is-pass' : ' is-fail')
                  + (isPinned ? ' is-active' : ''),
                title: isPinned
                  ? `当前是 ${pinTargetSlot.toUpperCase()} cache — 点击恢复 auto`
                  : `把这次 snapshot 钉成下次 Run with cache${isPass ? '' : ' / Run raw'} 用的 ${pinTargetSlot.toUpperCase()} cache`,
                onclick: async () => {
                  try {
                    await togglePin(c.id, r, pinTargetSlot, isPinned, currentDropTail);
                  } catch (err) { /* togglePin shows its own toast */ }
                },
              }, isPinned ? `★ 已钉为下次 ${pinTargetSlot.toUpperCase()} cache` : `☆ 钉为下次 ${pinTargetSlot.toUpperCase()} cache`) : null;

              // Only the run-status pill (passed / failed) is shown here.
              // The cacheSlot tag used to sit next to it but it was visually
              // contradictory on `passed + FAIL` rows (a passed Run raw, by
              // design, writes the FAIL slot). The slot information is still
              // conveyed unambiguously by the pin button label on the right
              // (`★ 钉为下次 PASS cache` vs `★ 钉为下次 FAIL cache`).
              row.appendChild(el('div', { class: 'snap-head' },
                el('span', { class: 'status ' + (snap.status || 'pending') }, snap.status || '?'),
                el('span', { class: 'snap-runid' }, (snap.runId || '?').slice(-12)),
                isStale ? el('span', { class: 'snap-stale-tag', title: 'snapshot 文件已被清理 — 不能再钉为 cache / Restore' }, 'stale (no file)') : null,
                el('span', { class: 'snap-meta' },
                  fmtDate(snap.finishedAt) + ' · ' +
                  (snap.sizeBytes != null ? fmtBytes(snap.sizeBytes) + ' · ' : '') +
                  (stepCount ? runProgressText(r, stepCount) : (isPass ? '✓ passed' : '✗ failed')),
                ),
                el('span', { class: 'snap-actions' },
                  buildReportActions(r, row, row),
                  pinBtn,
                ),
              ));
              return row;
            }),
          );

      // ↺ Restore + Refresh removed per user feedback — "钉为下次 cache" 已经
      //涵盖了 90% 的"用这次 snapshot"用例（runner 启动时按钉的 source 复制），
      // Refresh 也是多余的（loadCacheData 在 tab 切换时已经跑一次）。
      const snapsCard = el('div', { class: 'section-card' },
        el('div', { class: 'section-title' },
          el('span', {}, `Per-run snapshots · ${snaps.length}`),
          el('span', { class: 'head-sub' }, '点 ★ 把某次 snapshot 钉成下次跑用的 cache · ▶ Preview 看那次的 report'),
        ),
        el('div', { class: 'section-content' }, snapRows),
      );

      // ── Other cache files on disk — kept for transparency (was the old
      // "All cache files" section), now without "View YAML". Just file
      // metadata + Delete. Most users won't need this; collapsed by default.
      state._cacheFilesExpanded = state._cacheFilesExpanded || false;
      const filesHead = el('div', { class: 'section-title', style: 'cursor:pointer;', onclick: () => { state._cacheFilesExpanded = !state._cacheFilesExpanded; renderAll(); } },
        el('span', {}, (state._cacheFilesExpanded ? '▾ ' : '▸ ') + 'Raw cache files on disk · ' + (cf.files || []).length),
        el('span', { class: 'head-sub' }, '一般不用看 — slot 文件和 stale 旧 hash 都在这里。要看 prompt → xpath 请去对应 run 的 Report。'),
      );
      const filesBody = state._cacheFilesExpanded
        ? el('div', { class: 'section-content', style: 'padding:0;overflow-x:auto;' },
            (cf.files || []).length === 0
              ? el('div', { class: 'empty' }, '没有 cache 文件 — 跑一次会自动生成')
              : el('table', { class: 'cache-table' },
                  el('thead', {}, el('tr', {},
                    el('th', {}, 'File'), el('th', {}, 'Slot'), el('th', {}, 'Size'),
                    el('th', {}, 'Modified'), el('th', {}, ''),
                  )),
                  el('tbody', {}, ...cf.files.map((f) => el('tr', { class: f.isCurrent ? 'is-current' : '' },
                    el('td', {}, el('code', { style: 'font-size:11px;' }, f.name)),
                    el('td', {}, el('span', { class: f.slot === 'pass' ? 'slot-pass' : f.slot === 'fail' ? 'slot-fail' : '' }, f.slot || (f.isCurrent ? 'legacy' : 'stale'))),
                    el('td', {}, fmtBytes(f.bytes)),
                    el('td', {}, fmtDate(f.modifiedAt)),
                    el('td', { class: 'cell-actions' },
                      el('button', { class: 'a-button a-button--destructive-primary -small', onclick: async () => {
                        if (!confirm('删 ' + f.name + '？')) return;
                        try {
                          await api('/api/midscene-js/cases/' + encodeURIComponent(c.id) + '/cache/' + encodeURIComponent(f.name), { method: 'DELETE' });
                          toast('已删除');
                          loadCacheData(c.id).then(renderAll);
                        } catch (err) { toast('删除失败: ' + err.message); }
                      } }, 'Delete'),
                    ),
                  ))),
                ),
          )
        : null;
      const files = el('div', { class: 'section-card' }, filesHead, filesBody);

      return el('div', {}, slots, snapsCard, files);
    }

    // (openCacheContentModal removed — Cache Inspector no longer surfaces
    // raw YAML; each row links to the matching Midscene report instead.)

    // ══════════════════════════════════════════════════════════════════
    // 6. HOW-TO — task / pain-point oriented
    // ══════════════════════════════════════════════════════════════════
    function renderHowTo() {
      function card(opts) {
        return el('div', { class: 'howto-card ' + (opts.kind ? 'is-' + opts.kind : '') },
          el('h3', {}, el('div', { class: 'howto-icon' }, opts.icon), opts.title),
          el('ol', {}, ...opts.steps.map((s) => el('li', { html: s }))),
          opts.hint ? el('div', { class: 'howto-hint', html: opts.hint }) : null,
        );
      }
      const cards = [
        card({
          icon: '🆕', kind: 'success', title: '开一个新 case',
          steps: [

    // ══════════════════════════════════════════════════════════════════
    // AI Chat widget
    // ══════════════════════════════════════════════════════════════════
    function toggleChat(open) {
      state.chatOpen = open;
      $('#chatPanel').classList.toggle('open', open);
      $('#chatPanel').setAttribute('aria-hidden', !open);
      // Hide the labeled FAB while panel is up so it doesn't clip behind.
      $('#chatFab').classList.toggle('is-hidden', open);
      if (open) {
        // Repaint each time we open — the welcome's "you're on tab X /
        // case Y" line should reflect current state, not whatever was
        // current when you first opened the chat.
        renderChatHeader();
        renderChatMessages();
        setTimeout(() => $('#chatInput').focus(), 100);
      } else {
        // Reset history dropdown so reopening doesn't re-show it stale.
        state.chatHistoryOpen = false;
        renderChatHistory();
      }
    }

    // ── Tiny safe markdown renderer for AI replies ──────────────────
    // HTML-escapes everything first, then re-injects a small subset:
    // **bold**, *italic*, `code`, ```fences```, # headers, - bullets,
    // 1. numbered lists, blank line → paragraph break.
    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function mdToHtml(s) {
      if (typeof s !== 'string') return '';
      // 1. Pull out code fences before escaping, so their contents don't
      //    get bold/italic-transformed and HTML inside stays literal.
      const blocks = [];
      s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, _lang, code) => {
        const i = blocks.push('<pre><code>' + escapeHtml(code.replace(/\n$/, '')) + '</code></pre>') - 1;
        return `␀B${i}␀`;
      });
      // 2. Escape everything else, then restore the code blocks.
      s = escapeHtml(s);
      s = s.replace(/␀B(\d+)␀/g, (_, i) => blocks[Number(i)]);
      // 3. Inline transforms.
      s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
      s = s.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/__([^_\n]+?)__/g, '<strong>$1</strong>');
      s = s.replace(/(^|[\s(])\*([^*\n]+?)\*(?=[\s),.;:!?]|$)/g, '$1<em>$2</em>');
      s = s.replace(/^#{1,6}\s+(.+)$/gm, '<h4>$1</h4>');
      // 4. Line-level: group bullets / numbered list runs.
      const lines = s.split('\n');
      let out = ''; let inUl = false; let inOl = false;
      const closeLists = () => {
        if (inUl) { out += '</ul>'; inUl = false; }
        if (inOl) { out += '</ol>'; inOl = false; }
      };
      for (const raw of lines) {
        const ul = /^\s*[-•]\s+(.+)/.exec(raw);
        const ol = /^\s*\d+\.\s+(.+)/.exec(raw);
        if (ul) {
          if (inOl) { out += '</ol>'; inOl = false; }
          if (!inUl) { out += '<ul>'; inUl = true; }
          out += '<li>' + ul[1] + '</li>';
        } else if (ol) {
          if (inUl) { out += '</ul>'; inUl = false; }
          if (!inOl) { out += '<ol>'; inOl = true; }
          out += '<li>' + ol[1] + '</li>';
        } else if (raw.trim() === '') {
          closeLists();
          out += '<br>';
        } else {
          closeLists();
          // Pre/H4 blocks shouldn't get extra <br> — they bring their own break.
          if (/^<(pre|h4)\b/i.test(raw)) out += raw;
          else out += raw + '<br>';
        }
      }
      closeLists();
      return out;
    }

    // Rich, categorized welcome screen — only shown when no messages yet.
    // Each example question is a button: click → fills the input + focus.
    // Categories match the persona of Case Studio (debug / build / publish).
    const STUDIO_WELCOME_QUESTIONS = [
      { cat: '📦 Debug 当前 case', qs: [
        '我的 case 跑到第 N 步挂了，怎么救？',
        'AI 找不到某个按钮怎么办？',
        '怎么手动指定 xpath？讲一下 F12 复制的步骤',
        '页面没加载完就走下一步，怎么改？',
      ]},
      { cat: '🛠 Cache 相关', qs: [
        'Run with cache 和 Run raw 有什么区别？',
        'dropTailCount 是干啥的？什么时候用？',
        '我的 cache 突然全是 MISS 了',
        '怎么从一次 passed 的 snapshot 恢复 cache？',
      ]},
      { cat: '🚀 发布给用户', qs: [
        '怎么把调通的 case 给用户跑？',
        '用户那边为什么看不到我新建的 case？',
        '三个 UI（Console / Studio / Run Center）怎么同步？',
      ]},
      { cat: '🆕 新 case 流程', qs: [
        '怎么开一个全新的 case？',
        'Regen API Guide 是干啥的？什么时候点？',
        '改了 NL 之后为什么 cache 全废了？',
      ]},
    ];

    function buildWelcome(questions) {
      const wrap = el('div', { class: 'chat-msg ai', style: 'max-width:100%;' });
      const w = el('div', { class: 'chat-welcome' },
        el('div', { class: 'w-greet' },
          el('span', { class: 'w-avatar' }, '🤖'),
          'Hi! 我是 Studio Assistant',
        ),
        el('div', { class: 'w-intro' },
          '我能看到你当前在 ',
          el('b', {}, state.activeId || '(还没选 case)'),
          ' · ',
          el('b', {}, sectionLabel(state.section)),
          ' tab。可以问我下面这些，或者随便聊。点问题直接发：',
        ),
        ...questions.map((g) => el('div', { class: 'w-cat' },
          el('div', { class: 'w-cat-title' }, g.cat),
          ...g.qs.map((q) => el('button', {
            class: 'w-q',
            onclick: () => { $('#chatInput').value = q; sendChat(); },
          }, '"' + q + '"')),
        )),
        el('div', { class: 'w-foot' },
          '回复支持 markdown（**粗体** · `code` · 列表）· Enter 直接发 · Shift+Enter 换行',
        ),
      );
      wrap.appendChild(w);
      return wrap;
    }

    function sectionLabel(s) {
      return ({ create:'Create', nl:'NL & Guide', run:'Run & Debug',
                cache:'Cache Inspector', howto:'How-to' })[s] || s;
    }

    function renderChatMessages() {
      const body = $('#chatBody');
      const c = activeChat();
      const nodes = c.messages.length
        ? c.messages.map((m) => {
            const n = el('div', { class: 'chat-msg ' + m.role });
            if (m.role === 'ai') n.innerHTML = mdToHtml(m.content);
            else if (m.content) n.appendChild(document.createTextNode(m.content));
            // Visible proof that the screenshot really got attached and
            // sent — render it as a thumbnail inside the user bubble,
            // click to open full-size in a lightbox.
            if (m.role === 'user' && m.screenshot) {
              const thumb = el('img', {
                class: 'chat-msg-shot',
                src: m.screenshot,
                alt: 'attached screenshot',
                title: '点击放大查看 · 这是发送给 AI 的截图',
              });
              thumb.addEventListener('click', (ev) => {
                ev.stopPropagation();
                chatLightbox(m.screenshot);
              });
              n.appendChild(thumb);
            }
            return n;
          })
        : [buildWelcome(STUDIO_WELCOME_QUESTIONS)];
      if (state.chatBusy) nodes.push(el('div', { class: 'chat-msg sys' }, 'AI 在想…'));
      body.replaceChildren(...nodes);
      body.scrollTop = body.scrollHeight;
    }

    // Lightbox for tapping the inline screenshot thumbnail. Click anywhere
    // or press Esc to close. Re-mounted each open so listener cleanup is
    // straightforward. Mirrors run-center.html's chatLightbox.
    function chatLightbox(src) {
      const existing = document.getElementById('chatLightbox');
      if (existing) existing.remove();
      const wrap = el('div', { id: 'chatLightbox', class: 'chat-lightbox' },
        el('img', { src, alt: 'attached screenshot · full size' }),
        el('div', { class: 'chat-lightbox-close', title: '关闭 (Esc)' }, '✕'),
      );
      const close = () => {
        wrap.remove();
        document.removeEventListener('keydown', onKey);
      };
      const onKey = (e) => { if (e.key === 'Escape') close(); };
      wrap.addEventListener('click', close);
      document.addEventListener('keydown', onKey);
      document.body.appendChild(wrap);
    }

    async function sendChat() {
      const input = $('#chatInput');
      const msg = input.value.trim();
      if (!msg) return;
      if (state.chatBusy) { toast('上一条还在响应'); return; }
      const chat = activeChat();

      // Capture screenshot FIRST so we can attach it to the user bubble
      // as visible proof the image was really sent. Captured before the
      // panel re-renders (the chat panel ignores itself via the html2canvas
      // ignoreElements filter, so a stale render doesn't matter).
      let screenshot = null;
      const shotCb = $('#chatIncludeScreenshot');
      if (shotCb && shotCb.checked) {
        try { screenshot = await captureScreenshot(); }
        catch (e) { console.warn('[chat] screenshot capture failed:', e?.message || e); }
      }

      const userMsg = { role: 'user', content: msg };
      if (screenshot) userMsg.screenshot = screenshot;
      chat.messages.push(userMsg);

      // Auto-title from first user message — gives the History list
      // something meaningful instead of "New chat".
      if (chat.title === 'New chat') {
        chat.title = msg.replace(/\s+/g, ' ').trim().slice(0, 32) + (msg.length > 32 ? '…' : '');
        renderChatHeader();
      }
      input.value = '';
      state.chatBusy = true;
      renderChatMessages();
      saveChats();

      // Build context from current page state. The `app` field tells the
      // server which knowledge base to inject (Case Studio uses the dev
      // KB; Run Center uses the end-user KB).
      const p = parsedOf(state.detail);
      const ctx = {
        app: 'case-studio',
        caseId: state.activeId,
        caseTitle: titleOf(state.detail) || p.title,
        section: state.section,
        stepCount: p.apiGuide?.steps?.length,
        runMode: state.runMode,
        lastRunStatus: state.lastRun?.status,
        lastError: state.lastRun?.errorMessage,
        lastLogTail: state.runLog,
      };
      if (screenshot) ctx.screenshot = screenshot;

      try {
        const r = await api('/api/chat', {
          method: 'POST',
          body: JSON.stringify({ message: msg, context: ctx }),
        });
        chat.messages.push({ role: 'ai', content: r.reply || '(no reply)' });
      } catch (err) {
        chat.messages.push({ role: 'ai', content: '出错了: ' + err.message });
      } finally {
        state.chatBusy = false;
        saveChats();
        renderChatMessages();
      }
    }

    // Real screenshot via html2canvas (loaded from CDN in <head>). Crops
    // to the visible viewport (not the whole scrollable body) so we don't
    // ship a 6000px-tall PNG to the model when the user just wants to ask
    // about what they currently see. If html2canvas wasn't loaded (corp
    // proxy blocked the CDN), falls back to a best-effort SVG-foreignObject
    // capture — better than nothing but can struggle with fonts / cross-
    // origin assets.
    async function captureScreenshot() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const sx = window.scrollX || window.pageXOffset || 0;
      const sy = window.scrollY || window.pageYOffset || 0;
      if (window.html2canvas) {
        try {
          const canvas = await window.html2canvas(document.body, {
            scale: 0.7,                // smaller PNG = faster upload
            backgroundColor: '#eff1f2',
            logging: false,
            useCORS: true,
            removeContainer: true,
            // Skip the chat panel itself — the AI doesn't need to see the
            // very chat it lives in (and it confuses Qwen-VL).
            ignoreElements: (el) => el.id === 'chatPanel' || el.id === 'chatFab',
            // Viewport-only crop — start at current scroll offset, size = viewport.
            x: sx, y: sy, width: vw, height: vh,
            windowWidth: document.documentElement.clientWidth,
            windowHeight: document.documentElement.clientHeight,
          });
          return canvas.toDataURL('image/png');
        } catch (e) {
          console.warn('[chat] html2canvas failed, using SVG fallback:', e?.message || e);
        }
      }
      // Fallback: draw the body offset by the current scroll position so
      // the canvas (sized to vw × vh) ends up with just the viewport.
      const html = document.documentElement.outerHTML
        .replace(/<script[\s\S]*?<\/script>/g, '');
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${vw}" height="${vh}">
        <foreignObject width="100%" height="100%">
          <div xmlns="http://www.w3.org/1999/xhtml">${html}</div>
        </foreignObject>
      </svg>`;
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      try {
        const img = await new Promise((resolve, reject) => {
          const i = new Image();
          i.onload = () => resolve(i); i.onerror = reject; i.src = url;
        });
        const canvas = document.createElement('canvas');
        canvas.width = vw; canvas.height = vh;
        canvas.getContext('2d').drawImage(img, -sx, -sy);
        return canvas.toDataURL('image/png');
      } finally {
        URL.revokeObjectURL(url);
      }
    }

    init();
  </script>
